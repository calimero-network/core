# AI Code Reviewer config for calimero-network/core.
# Driven by .github/workflows/ai-review.yaml and .github/workflows/doc-update.yaml.
# Reusable workflows from calimero-network/ai-code-reviewer pin to a SHA;
# this file pins the model and doc-generation behaviour for this repo.

version: 1

# Anthropic Messages API.
# We deliberately use Sonnet (cheaper than Opus) for both review agents and
# doc generation. Haiku was too weak for the doc HTML-patch task — it failed
# to emit valid find/replace patches and most files were silently skipped.
# Do not switch to Opus without an explicit cost discussion.
anthropic:
  default_model: claude-sonnet-4-6
  enable_prompt_caching: true

# Doc auto-update — historically opened a draft PR on merges to master with
# proposed changes to the generated architecture site. Disabled at the docs
# cutover: the published docs are now the hand-authored Starlight site in
# docs/, not auto-generated HTML, and the legacy architecture/ site has been
# removed. Re-enable only if the bot is repointed at generating reference
# *data* for the new site, not free-form HTML.
doc_generation:
  enabled: false
  model: claude-sonnet-4-6  # Sonnet: Haiku failed the HTML find/replace patch task
  max_files: 15
  pr_labels:
    - automated-docs
    - documentation
  pr_draft: true
