# AI Code Reviewer config for calimero-network/core.
# Driven by .github/workflows/ai-review.yaml and .github/workflows/doc-update.yaml.
# Reusable workflows from calimero-network/ai-code-reviewer pin to a SHA;
# this file pins the model and doc-generation behaviour for this repo.

version: 1

# Anthropic Messages API.
# We deliberately use Sonnet (cheaper than Opus) for both review agents and
# doc generation. Haiku was too weak for the doc HTML-patch task — it failed
# to emit valid find/replace patches and most files were silently skipped.
# Do not switch to Opus without an explicit cost discussion.
anthropic:
  default_model: claude-sonnet-5
  enable_prompt_caching: true

# Reviews now post via the built-in github-actions token; keep recognizing the
# reviews the removed MeroReviewer App posted so delta tracking stays continuous.
github:
  extra_reviewer_users:
    - "meroreviewer[bot]"

# Review agents. Only takes effect when the workflow passes --config; the App's
# webhook uses its own config. Names must match the reviewer's registry exactly.
# Order matters: --agents N runs the first N. Thinking is ON only for the two
# highest-value reasoning agents (security, logic) - off elsewhere to bound cost
# and latency. max_tokens is raised where thinking is on so it doesn't eat the
# findings-JSON budget.
agents:
  - name: security-reviewer      # security, auth, crypto, untrusted input
    model: claude-sonnet-5
    thinking_enabled: true
    max_tokens: 32000
    max_tool_calls: 20
  - name: logic-reviewer         # correctness, edge cases, concurrency, CRDT/DAG invariants
    model: claude-sonnet-5
    thinking_enabled: true
    max_tokens: 32000
    max_tool_calls: 20
  - name: patterns-reviewer      # architecture, consistency, maintainability
    model: claude-sonnet-5
    thinking_enabled: false
    max_tool_calls: 20
  - name: performance-reviewer   # hot paths, allocations, sync/network throughput
    model: claude-sonnet-5       # 4th slot: not run by default (--agents 3);
    thinking_enabled: false      # included via workflow_dispatch agents>=4
    max_tool_calls: 20

# Skip agents on vendored / generated paths (read even without --config).
ignore:
  - "target/**"
  - "Cargo.lock"
  - "**/*.lock"
  - "**/snapshots/**"
  - "**/*.wasm"
  - "CHANGELOG.md"
  - "graphify-out/**"
  - "docs/**"

# Doc auto-update — historically opened a draft PR on merges to master with
# proposed changes to the generated architecture site. Disabled at the docs
# cutover: the published docs are now the hand-authored Starlight site in
# docs/, not auto-generated HTML, and the legacy architecture/ site has been
# removed. Re-enable only if the bot is repointed at generating reference
# *data* for the new site, not free-form HTML.
doc_generation:
  enabled: false
  model: claude-sonnet-5  # Sonnet: Haiku failed the HTML find/replace patch task
  max_files: 15
  pr_labels:
    - automated-docs
    - documentation
  pr_draft: true
