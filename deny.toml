[graph]
targets = []

[advisories]
# Vulnerabilities are denied by default. Only flag unmaintained crates we depend on
# directly (transitive unmaintained crates aren't actionable here).
unmaintained = "workspace"
# Dated baseline of advisories accepted for now. The vulnerabilities are all
# transitive through libp2p 0.56's TLS/QUIC/DNS stack and can't be lock-bumped
# without a libp2p upgrade (tracked follow-up); any *new* advisory still fails CI.
ignore = [
    { id = "RUSTSEC-2026-0044", reason = "aws-lc-sys, via libp2p-tls; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0048", reason = "aws-lc-sys, via libp2p-tls; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki, via libp2p-tls; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki, via libp2p-tls; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki, via libp2p-tls; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki, via libp2p-tls; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0118", reason = "hickory-proto, via libp2p-dns; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0119", reason = "hickory-proto, via libp2p-dns; pending libp2p upgrade" },
    { id = "RUSTSEC-2026-0097", reason = "rand, transitive; pending upstream upgrade" },
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin timing attack, transitive; no upstream fix available" },
]

[bans]
multiple-versions = "warn" # Warn about duplicate dependency versions

# Skip specific crates that might need multiple versions
[[bans.skip]]
name = "ring"
version = "*"

[[bans.skip]]
name = "tokio"
version = "*"

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
]

# AGPL-3.0 is not blanket-allowed (MIT/Apache project). These two TEE/TDX
# attestation crates (pulled in via Dstack-TEE/dstack) are the only permitted
# exceptions; a new accidental copyleft dependency still fails the check.
[[licenses.exceptions]]
name = "configfs-tsm"
allow = ["AGPL-3.0-or-later"]

[[licenses.exceptions]]
name = "tdx-quote"
allow = ["AGPL-3.0-or-later"]

# Add exceptions for packages with complex licensing
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "ISC OR OpenSSL OR MIT"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/xJonathanLEI/starknet-rs", "https://github.com/Dstack-TEE/dstack"]
