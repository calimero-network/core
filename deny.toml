[graph]
targets = []

[bans]
multiple-versions = "warn" # Warn about duplicate dependency versions

# Skip specific crates that might need multiple versions
[[bans.skip]]
name = "ring"
version = "*"

[[bans.skip]]
name = "tokio"
version = "*"

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "MPL-2.0",
    "0BSD",
    "Unlicense",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
]

# AGPL-3.0 is not blanket-allowed (MIT/Apache project). These two TEE/TDX
# attestation crates (pulled in via Dstack-TEE/dstack) are the only permitted
# exceptions; a new accidental copyleft dependency still fails the check.
[[licenses.exceptions]]
name = "configfs-tsm"
allow = ["AGPL-3.0"]

[[licenses.exceptions]]
name = "tdx-quote"
allow = ["AGPL-3.0"]

# Add exceptions for packages with complex licensing
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "ISC OR OpenSSL OR MIT"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/xJonathanLEI/starknet-rs", "https://github.com/Dstack-TEE/dstack"]
