[package]
name = "calimero-primitives"
version.workspace = true
authors.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
description.workspace = true
publish = true

[dependencies]
bs58.workspace = true
borsh = { workspace = true, features = ["derive"], optional = true }
ed25519-dalek.workspace = true
eyre.workspace = true
multiaddr.workspace = true
rand = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha2.workspace = true
thiserror.workspace = true
url = { workspace = true, features = ["serde"] }
zeroize.workspace = true

[dev-dependencies]
hex.workspace = true

# Installs the repo's git hooks (.githooks/) during `cargo test`. Wired onto a
# foundational crate so a normal test run also reinstalls them, on top of the
# workspace-member build trigger. See crates/git-hooks and .githooks/.
calimero-git-hooks = { path = "../git-hooks" }

# Reimport self with the borsh feature enabled
calimero-primitives = { path = ".", features = ["borsh"] }

[features]
default = []
borsh = ["dep:borsh"]
