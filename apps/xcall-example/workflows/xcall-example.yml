name: XCall Ping-Pong (same-namespace demo)
description: >
  Minimal "how to use xcall" demo. Two contexts in the SAME namespace ping each
  other's `pong` entry point; each pong increments the target's counter.

  Note on the trust model: cross-context calls are gated by the namespace
  boundary — a context may only xcall a target in its own namespace (see
  `xcall.yml` for the full authorization test, including the cross-namespace
  and non-entry-point denials). This demo therefore keeps both contexts in one
  namespace so the calls are permitted.

force_pull_image: false
near_devnet: false

nodes:
  count: 1
  image: merod:local
  prefix: rust-xcall

steps:
  - name: Install app
    type: install_application
    node: rust-xcall-1
    path: res/xcall_example.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create shared namespace
    type: create_namespace
    node: rust-xcall-1
    application_id: "{{app_id}}"
    outputs:
      ns: namespaceId

  - name: Create Context A
    type: create_context
    node: rust-xcall-1
    application_id: "{{app_id}}"
    group_id: "{{ns}}"
    outputs:
      ctx_a: contextId

  - name: Create Context B (same namespace)
    type: create_context
    node: rust-xcall-1
    application_id: "{{app_id}}"
    group_id: "{{ns}}"
    outputs:
      ctx_b: contextId

  - name: Ping A -> B
    type: call
    node: rust-xcall-1
    context_id: "{{ctx_a}}"
    method: ping
    args:
      target_context: "{{ctx_b}}"

  - name: Wait for xcall to execute
    type: wait
    seconds: 8

  - name: Read B counter
    type: call
    node: rust-xcall-1
    context_id: "{{ctx_b}}"
    method: get_counter
    outputs:
      b_counter: result.output
  - name: Assert B received the ping (counter 1)
    type: json_assert
    statements:
      - "equal({{b_counter}}, 1)"

  - name: Ping B -> A
    type: call
    node: rust-xcall-1
    context_id: "{{ctx_b}}"
    method: ping
    args:
      target_context: "{{ctx_a}}"

  - name: Wait for xcall to execute
    type: wait
    seconds: 8

  - name: Read A counter
    type: call
    node: rust-xcall-1
    context_id: "{{ctx_a}}"
    method: get_counter
    outputs:
      a_counter: result.output
  - name: Assert A received the ping (counter 1)
    type: json_assert
    statements:
      - "equal({{a_counter}}, 1)"

stop_all_nodes: true
restart: false
wait_timeout: 120
