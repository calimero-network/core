name: XCall Authorization (L1 owning-group · L3 entry-point · L2a provenance)
description: >
  End-to-end validation of cross-context-call authorization (closes #2130 / #2137).

  A node-local xcall is gated by three independent layers, all exercised here:
    * L1 — owning-group boundary: a context may only xcall a target in its OWN
      owning group. Calls to a target in a different group — a different
      namespace, or a different subgroup of the same namespace — are denied
      (fail-closed). Gating on the shared namespace root instead would let any
      sibling context anywhere in the namespace reach into another subgroup.
    * L3 — entry points: only methods declared `#[app::xcall]` are reachable
      via xcall. The non-entry-point `secret` method is denied.
    * L2a — provenance: `env::xcall_origin()` is set by the node from the
      calling context and cannot be forged, so a direct call (no origin) to the
      xcall-only `pong` is rejected by the app.

  Denials are observable: the target counter never moves, and the node logs the
  same "xcall denied: ..." line that drives the `XCall` Denied event.

  Two regression scenarios also run at the end:
    * Self-xcall (C1 -> C1) must COMPLETE, not hang. xcalls are dispatched
      out-of-band; awaiting them inline re-entered the actor and deadlocked on
      the source context's execution lock. A reintroduced inline dispatch hangs
      this step until wait_timeout.
    * Cross-subgroup xcall (C1 in N's root group -> C4 in subgroup S under N) is
      DENIED. This is the owning-group boundary in its own right: same
      namespace, different owning group — the old namespace-root gate allowed
      it, the owning-group gate denies it.

  Single node: all contexts are created by node-1, which owns a member of each,
  so every xcall dispatches locally — the gates are node-local, so one node
  exercises them fully.

# Built from this branch; CI overrides with `--image merod:local`. The app
# imports the `xcall_origin` host function added by this change, so it requires
# a merod built from this branch (or a release that includes it).
force_pull_image: false
near_devnet: false

nodes:
  count: 1
  image: merod:local
  prefix: xcall-authz

steps:
  # ---------------- setup: namespace N ⊃ {C1, C2}, namespace M ⊃ {C3} ----------------
  - name: Install app on Node 1
    type: install_application
    node: xcall-authz-1
    path: res/xcall_example.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create Namespace N
    type: create_namespace
    node: xcall-authz-1
    application_id: "{{app_id}}"
    outputs:
      ns_n: namespaceId

  - name: Create Context C1 in N
    type: create_context
    node: xcall-authz-1
    application_id: "{{app_id}}"
    group_id: "{{ns_n}}"
    outputs:
      c1: contextId
      c1_key: memberPublicKey

  - name: Create Context C2 in N
    type: create_context
    node: xcall-authz-1
    application_id: "{{app_id}}"
    group_id: "{{ns_n}}"
    outputs:
      c2: contextId
      c2_key: memberPublicKey

  - name: Create Namespace M
    type: create_namespace
    node: xcall-authz-1
    application_id: "{{app_id}}"
    outputs:
      ns_m: namespaceId

  - name: Create Context C3 in M
    type: create_context
    node: xcall-authz-1
    application_id: "{{app_id}}"
    group_id: "{{ns_m}}"
    outputs:
      c3: contextId
      c3_key: memberPublicKey

  # ============================================================================
  # POSITIVE — same-group xcall to a declared entry point is ALLOWED.
  # C1 and C2 are both created directly in namespace N's root group, so they
  # share an owning group. Exercises L1 (same owning group), L3 (pong is
  # `#[app::xcall]`), and L2a (the node-set origin equals C1, which pong
  # verifies before running).
  # ============================================================================
  - name: C2 pong counter starts at 0
    type: call
    node: xcall-authz-1
    context_id: "{{c2}}"
    method: get_counter
    outputs:
      c2_before: result.output
  - name: Assert C2 counter is 0
    type: json_assert
    statements:
      - "equal({{c2_before}}, 0)"

  - name: Ping C1 -> C2 (targets pong, a declared entry point)
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: ping
    args:
      target_context: "{{c2}}"

  - name: Wait for xcall dispatch + log flush
    type: wait
    seconds: 8
    message: Let the post-commit xcall dispatch + target execute, and flush logs

  - name: C2 pong counter after allowed xcall
    type: call
    node: xcall-authz-1
    context_id: "{{c2}}"
    method: get_counter
    outputs:
      c2_after: result.output
  - name: Assert pong ran (L1 allow + L3 entry-point + L2a origin matched)
    type: json_assert
    statements:
      - "equal({{c2_after}}, 1)"
  - name: Assert no denial logged on the happy path
    type: assert_log_absent
    nodes:
      - xcall-authz-1
    patterns:
      - "xcall denied"

  # ============================================================================
  # NEGATIVE L1 — an xcall to a target in a different owning group is DENIED
  # (fail-closed). C1 (namespace N's root group) -> C3 (namespace M's root
  # group) do not share an owning group: pong must NOT run and the node logs
  # the owning-group-boundary denial.
  # ============================================================================
  - name: C3 pong counter starts at 0
    type: call
    node: xcall-authz-1
    context_id: "{{c3}}"
    method: get_counter
    outputs:
      c3_before: result.output
  - name: Assert C3 counter is 0
    type: json_assert
    statements:
      - "equal({{c3_before}}, 0)"

  - name: Ping C1 -> C3 (cross-namespace, must be denied)
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: ping
    args:
      target_context: "{{c3}}"

  - name: Wait for xcall dispatch + log flush
    type: wait
    seconds: 8

  - name: C3 pong counter after cross-namespace xcall
    type: call
    node: xcall-authz-1
    context_id: "{{c3}}"
    method: get_counter
    outputs:
      c3_after: result.output
  - name: Assert pong did NOT run across owning groups (L1 denied)
    type: json_assert
    statements:
      - "equal({{c3_after}}, 0)"
  - name: Assert L1 owning-group-boundary denial was logged
    type: assert_log_present
    nodes:
      - xcall-authz-1
    patterns:
      - "xcall denied: owning group boundary"
    min_matches: 1

  # ============================================================================
  # NEGATIVE L3 — same-group xcall to a NON-entry-point method is DENIED.
  # C1 -> C2 targeting `secret` (not `#[app::xcall]`): secret must NOT run.
  # ============================================================================
  - name: C2 secret counter starts at 0
    type: call
    node: xcall-authz-1
    context_id: "{{c2}}"
    method: get_secret_counter
    outputs:
      secret_before: result.output
  - name: Assert secret counter is 0
    type: json_assert
    statements:
      - "equal({{secret_before}}, 0)"

  - name: Ping C1 -> C2 targeting 'secret' (not an entry point)
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: ping_to
    args:
      target_context: "{{c2}}"
      method: secret

  - name: Wait for xcall dispatch + log flush
    type: wait
    seconds: 8

  - name: C2 secret counter after non-entry-point xcall
    type: call
    node: xcall-authz-1
    context_id: "{{c2}}"
    method: get_secret_counter
    outputs:
      secret_after: result.output
  - name: Assert secret did NOT run (L3 denied)
    type: json_assert
    statements:
      - "equal({{secret_after}}, 0)"
  - name: Assert L3 entry-point denial was logged
    type: assert_log_present
    nodes:
      - xcall-authz-1
    # Substring before the "#[app::xcall]" literal — avoids regex-escaping the
    # brackets while still uniquely matching the L3 denial line.
    patterns:
      - "xcall denied: not an"
    min_matches: 1

  # ============================================================================
  # L2a — a DIRECT (non-xcall) call to the xcall-only `pong` is REJECTED.
  # This is the one case where the call itself fails (no `env::xcall_origin()`),
  # so `expected_failure` applies. The pong counter must stay at 1 (unchanged
  # from the positive case).
  # ============================================================================
  - name: Direct call to xcall-only pong is rejected (no provenance)
    type: call
    node: xcall-authz-1
    context_id: "{{c2}}"
    method: pong
    args:
      from_context: "{{c2}}"
    expected_failure: true

  - name: C2 pong counter unchanged after rejected direct call
    type: call
    node: xcall-authz-1
    context_id: "{{c2}}"
    method: get_counter
    outputs:
      c2_final: result.output
  - name: Assert pong counter still 1 (direct call did not execute)
    type: json_assert
    statements:
      - "equal({{c2_final}}, 1)"

  # ============================================================================
  # DEADLOCK REGRESSION — a self-targeted xcall (C1 -> C1) must COMPLETE, not
  # hang. Before xcalls were dispatched out-of-band, awaiting execute_with_origin
  # inline re-entered the actor and deadlocked on C1's own execution lock (still
  # held by the in-flight source execute), hanging until wait_timeout. C1 and C1
  # trivially share an owning group, so the call is allowed and pong runs as C1.
  # If the inline dispatch is ever reintroduced, this step hangs and the run
  # fails on wait_timeout.
  # ============================================================================
  # C1 has only ever been a ping *source* in the steps above (C1->C2, C1->C3,
  # C1->C2/secret); it has never been a pong *target*, so its counter is still
  # 0. If a future edit makes C1 a callee before this point, this pre-condition
  # correctly fails and flags that the regression below is no longer isolated.
  - name: C1 pong counter starts at 0
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: get_counter
    outputs:
      c1_before: result.output
  - name: Assert C1 counter is 0
    type: json_assert
    statements:
      - "equal({{c1_before}}, 0)"

  - name: Ping C1 -> C1 (self-xcall; pre-fix this deadlocked the actor)
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: ping
    args:
      target_context: "{{c1}}"

  - name: Wait for self-xcall dispatch + target execute
    type: wait
    seconds: 8

  - name: C1 pong counter after self-xcall
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: get_counter
    outputs:
      c1_after: result.output
  # Exactly 1 (not >=1): with c1_before pinned to 0 immediately above, ==1
  # proves the self-xcall ran exactly once — it catches BOTH a hang/no-op
  # (counter stays 0) AND an accidental duplicate dispatch (counter would be 2).
  - name: Assert self-xcall completed (pong ran on C1 exactly once; no deadlock/hang)
    type: json_assert
    statements:
      - "equal({{c1_after}}, 1)"

  # ============================================================================
  # SUBGROUP BOUNDARY — an xcall to a target in a DIFFERENT owning group of the
  # SAME namespace is DENIED. Gating on the namespace root (the old behavior)
  # would have ALLOWED this, letting a sibling context reach into another
  # subgroup; gating on the owning group denies it. C1 lives in N's root group;
  # C4 lives in subgroup S nested under N.
  # ============================================================================
  - name: Create subgroup S under namespace N
    type: create_group_in_namespace
    node: xcall-authz-1
    namespace_id: "{{ns_n}}"
    group_alias: subgroup-s
    outputs:
      sub_s: groupId

  - name: Create Context C4 in subgroup S
    type: create_context
    node: xcall-authz-1
    application_id: "{{app_id}}"
    group_id: "{{sub_s}}"
    outputs:
      c4: contextId
      c4_key: memberPublicKey

  - name: C4 pong counter starts at 0
    type: call
    node: xcall-authz-1
    context_id: "{{c4}}"
    method: get_counter
    outputs:
      c4_before: result.output
  - name: Assert C4 counter is 0
    type: json_assert
    statements:
      - "equal({{c4_before}}, 0)"

  - name: Ping C1 -> C4 (same namespace, different subgroup — must be denied)
    type: call
    node: xcall-authz-1
    context_id: "{{c1}}"
    method: ping
    args:
      target_context: "{{c4}}"

  - name: Wait for xcall dispatch + log flush
    type: wait
    seconds: 8

  - name: C4 pong counter after cross-subgroup xcall
    type: call
    node: xcall-authz-1
    context_id: "{{c4}}"
    method: get_counter
    outputs:
      c4_after: result.output
  - name: Assert pong did NOT run across subgroups (owning-group denied)
    type: json_assert
    statements:
      - "equal({{c4_after}}, 0)"
  # The authoritative proof that this cross-subgroup xcall was denied is
  # `c4_after == 0` above (pong never ran). This log check is a secondary
  # confirmation that owning-group denials surface in the log at all. It uses
  # min_matches: 1 deliberately — the log is cumulative over the run (an earlier
  # C1->C3 cross-namespace denial also matches), so a higher count would be a
  # fragile, order-dependent coupling to unrelated steps rather than added
  # signal.
  - name: Assert an owning-group-boundary denial was logged
    type: assert_log_present
    nodes:
      - xcall-authz-1
    patterns:
      - "xcall denied: owning group boundary"
    min_matches: 1

stop_all_nodes: true
restart: false
wait_timeout: 180
