description: >
  Sync-resilience smoke test: a peer is paused mid-session (simulating
  a long sleep / container freeze / host migration), writes happen on
  the other peer, then the paused peer is unpaused and must catch up.

  Like sync-resilience-peer-restart.yml, this does NOT meaningfully
  exercise calimero-network/core#2446's relay-reservation recovery —
  the two nodes are on the same Docker bridge and reach each other
  directly, not through a relay. See that file's description for the
  framing.

  Where this workflow earns its keep: catching regressions in
  pause/unpause recovery — buffered-delta replay (the sync::manager
  swallowed-error path noted in calimero-network/core's relay-recovery
  memory entry), gossipsub mesh re-formation after a long pause, and
  any sync-state-machine bug that breaks when one peer comes back
  after losing the connection.

  mdns: false to keep the test honest about which discovery code path
  is being exercised (see peer-restart workflow's rationale).
name: Sync Resilience — Peer Pause

force_pull_image: false

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-resil-node
  mdns: false

steps:
  # ---------- Setup ----------

  - name: Install application on node-1
    type: install_application
    node: sync-resil-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create context in namespace on node-1
    type: create_context
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: sync-resil-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation_node2: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: sync-resil-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation_node2}}'

  - name: Node-2 joins context via group membership
    type: join_context
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'

  # ---------- Baseline ----------

  - name: Write baseline key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: baseline
      value: awake

  - name: Wait for baseline to converge
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 60
    trigger_sync: true

  - name: Read baseline on node-2 (sanity)
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2: result

  - name: Assert baseline replicated
    type: assert
    statements:
      - "contains({{baseline_n2}}, 'awake')"

  # ---------- Fault: pause node-2 for a minute ----------

  - name: Pause node-2 (simulate long sleep)
    type: pause_container
    container: sync-resil-node-2

  - name: Write to node-1 while node-2 is paused
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: during_pause
      value: written_while_paused

  - name: Pause duration
    type: wait
    seconds: 60

  - name: Unpause node-2 (simulate wake)
    type: unpause_container
    container: sync-resil-node-2

  # ---------- Catch-up ----------

  - name: Wait for node-2 to catch up post-unpause
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 120
    trigger_sync: true

  - name: Read during-pause key on node-2
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: during_pause
    outputs:
      during_n2: result

  - name: Assert node-2 caught up to the during-pause write
    type: assert
    statements:
      - "contains({{during_n2}}, 'written_while_paused')"

stop_all_nodes: true
