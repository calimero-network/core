description: >
  Sync-resilience smoke test: a peer is paused mid-session (simulating
  a long sleep / container freeze / host migration), writes happen on
  the other peer, then the paused peer is unpaused and must catch up.

  Discovery + routing setup
  -------------------------

  This workflow exercises the relay/rendezvous recovery path
  end-to-end via:

    * `preserve_default_bootstrap: true` keeps the public devnet
      boot-node from `merod init` in `bootstrap.nodes` under
      `--e2e-mode`; the boot-node doubles as the relay server.

    * `mdns: false` disables local discovery so the post-unpause
      reconnect is forced through the relay path rather than the
      Docker bridge's mDNS shortcut.

  Catches regressions in pause/unpause recovery — buffered-delta
  replay (the `sync::manager` swallowed-error path called out in
  the relay-recovery memory entry), gossipsub mesh re-formation
  after a long pause, and any sync-state-machine bug that breaks
  when one peer comes back after losing the connection.

  Same single-bridge caveat as `sync-resilience-peer-restart.yml`:
  multi-network NAT-topology (#2467 / merobox#251) is the eventual
  thorough version; for now the test is best-effort against the
  relay path given the shared bridge.
name: Sync Resilience — Peer Pause

force_pull_image: false

# Triggers merobox's `_wire_cluster_bootstrap_peers` so each node's
# `bootstrap.nodes` is populated with the sibling's bridge address.
# Without this + `mdns: false`, the two nodes can't find each other
# at setup time. See sync-resilience-network-partition.yml for the
# full rationale.
restart: true

# Keep `merod init`'s default boot-node (public devnet from
# `crates/network/primitives/src/config.rs`); see header for why.
preserve_default_bootstrap: true

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-resil-node
  # See header — required to force routing through the boot-node /
  # relay rather than the Docker bridge's mDNS shortcut.
  mdns: false

steps:
  # ---------- Setup ----------

  - name: Install application on node-1
    type: install_application
    node: sync-resil-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create context in namespace on node-1
    type: create_context
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: sync-resil-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation_node2: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: sync-resil-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation_node2}}'

  - name: Node-2 joins context via group membership
    type: join_context
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'

  # ---------- Baseline ----------

  - name: Write baseline key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: baseline
      value: awake

  - name: Wait for baseline to converge
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 60
    trigger_sync: true

  - name: Read baseline on node-2 (sanity)
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2: result

  - name: Assert baseline replicated
    type: assert
    statements:
      - "contains({{baseline_n2}}, 'awake')"

  # ---------- Fault: pause node-2 for a minute ----------

  - name: Pause node-2 (simulate long sleep)
    type: pause_container
    container: sync-resil-node-2

  - name: Write to node-1 while node-2 is paused
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: during_pause
      value: written_while_paused

  - name: Wait while node-2 is paused (60s)
    type: wait
    seconds: 60

  - name: Unpause node-2 (simulate wake)
    type: unpause_container
    container: sync-resil-node-2

  # The paused container's TCP stack was frozen too; on unpause, libp2p
  # needs to redial the (now half-open or dead) connection to node-1
  # and rejoin the gossipsub mesh. trigger_sync called before that
  # finishes would race the reconnect.
  - name: Wait for libp2p to redial after unpause
    type: wait
    seconds: 10

  # ---------- Catch-up ----------

  - name: Wait for node-2 to catch up post-unpause
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 120
    trigger_sync: true

  - name: Read during-pause key on node-2
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: during_pause
    outputs:
      during_n2: result

  - name: Assert node-2 caught up to the during-pause write
    type: assert
    statements:
      - "contains({{during_n2}}, 'written_while_paused')"

  # Re-read the baseline key on node-2 post-unpause. Catches the class
  # of regression where the paused node loses pre-pause state on wake
  # (e.g. a state-machine bug that re-initialises the context on
  # reconnect).

  - name: Read baseline key on node-2 post-unpause
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2_post: result

  - name: Assert node-2 retained baseline across pause
    type: assert
    statements:
      - "contains({{baseline_n2_post}}, 'awake')"

stop_all_nodes: true
