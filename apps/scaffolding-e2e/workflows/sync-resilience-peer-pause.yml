description: >
  Sync-resilience smoke test: a peer is paused mid-session (simulating
  a long sleep / container freeze / host migration), writes happen on
  the other peer, then the paused peer is unpaused and must catch up.

  Topology
  --------

  Uses `topology: { type: nat, nat_mode: cone }` from
  merobox 0.6.19+. Both peers behind a NAT-gateway; the only path
  to the boot-node (which serves as the relay) is via the gateway's
  MASQUERADE. When node-2 is paused, its TCP stack is frozen too;
  on unpause it must re-dial the boot-node, refresh its relay
  reservation, and rejoin the gossipsub mesh — the same path the
  recovery work in #2446/#2459 fixed.

  Why cone (not symmetric): cone NAT preserves source-port across
  destinations, so DCUtR hole-punching can upgrade the
  circuit-relayed connection to a direct one after the initial
  rendezvous. The post-pause recovery still goes through the relay
  on the way up; the direct upgrade just happens after.
  `sync-resilience-peer-pause-symmetric.yml` is the strict variant
  that blocks DCUtR and forces every packet through the relay.

  Catches regressions in pause/unpause recovery — buffered-delta
  replay (the `sync::manager` swallowed-error path called out in
  the relay-recovery memory entry), gossipsub mesh re-formation
  after a long pause, and any sync-state-machine bug that breaks
  when one peer comes back after losing the connection.
name: Sync Resilience — Peer Pause (NAT cone)

force_pull_image: false

topology:
  type: nat
  nat_mode: cone

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-resil-node

steps:
  # ---------- Setup ----------

  - name: Install application on node-1
    type: install_application
    node: sync-resil-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create context in namespace on node-1
    type: create_context
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: sync-resil-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation_node2: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: sync-resil-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation_node2}}'

  - name: Node-2 joins context via group membership
    type: join_context
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'

  # ---------- Baseline ----------

  - name: Write baseline key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: baseline
      value: awake

  - name: Wait for baseline to converge
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 60
    trigger_sync: true

  - name: Read baseline on node-2 (sanity)
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2: result

  - name: Assert baseline replicated
    type: assert
    statements:
      - "contains({{baseline_n2}}, 'awake')"

  # ---------- Fault: pause node-2 for a minute ----------

  - name: Pause node-2 (simulate long sleep)
    type: pause_container
    container: sync-resil-node-2

  - name: Write to node-1 while node-2 is paused
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: during_pause
      value: written_while_paused

  - name: Wait while node-2 is paused (60s)
    type: wait
    seconds: 60

  - name: Unpause node-2 (simulate wake)
    type: unpause_container
    container: sync-resil-node-2

  # The paused container's TCP stack was frozen too; on unpause,
  # libp2p has to redial the boot-node, refresh the relay
  # reservation, and rejoin the gossipsub mesh before sync can
  # resume. trigger_sync before that completes would race the
  # recovery sequence. 15s ceiling: reservation handshake is
  # sub-second, mesh rejoin is the long pole.
  - name: Wait for libp2p + relay reservation to re-form after unpause
    type: wait
    seconds: 15

  # ---------- Catch-up ----------

  - name: Wait for node-2 to catch up post-unpause
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 120
    trigger_sync: true

  - name: Read during-pause key on node-2
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: during_pause
    outputs:
      during_n2: result

  - name: Assert node-2 caught up to the during-pause write
    type: assert
    statements:
      - "contains({{during_n2}}, 'written_while_paused')"

  # Re-read the baseline key on node-2 post-unpause. Catches the
  # class of regression where the paused node loses pre-pause
  # state on wake (e.g. a state-machine bug that re-initialises
  # the context on reconnect).

  - name: Read baseline key on node-2 post-unpause
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2_post: result

  - name: Assert node-2 retained baseline across pause
    type: assert
    statements:
      - "contains({{baseline_n2_post}}, 'awake')"

  # Cone mode allows DCUtR to upgrade the relayed connection
  # post-rendezvous, but the reservation handshake itself still
  # has to complete BOTH pre- and post-unpause for the recovery
  # to land. `tail_lines: 200` scopes the check to recent
  # activity so a setup-phase reservation can't mask a failed
  # post-unpause re-acquisition. node-2 is the one that paused;
  # asserting on both nodes' tails covers the symmetric
  # reservation each one holds.

  - name: Confirm node-1 still has its relay reservation
    type: assert_log_present
    nodes: [sync-resil-node-1]
    tail_lines: 200
    patterns:
      - "ReservationReqAccepted"

  - name: Confirm node-2 re-acquired its relay reservation post-unpause
    type: assert_log_present
    nodes: [sync-resil-node-2]
    tail_lines: 200
    patterns:
      - "ReservationReqAccepted"

stop_all_nodes: true
