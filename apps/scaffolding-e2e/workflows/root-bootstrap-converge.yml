name: E2E KV Store - Root bootstrap convergence on cold join
description: >
  Regression guard for the cold-join Root<T> convergence bug.

  Scenario:
    1. node-1 alone creates a namespace and a context, then writes
       several keys via the app's KV `set` method. Each write
       advances node-1's HLC, so by the end node-1's `Root<T>`
       entry (the typed application-state container at the
       canonical root id `[118; 32]`) carries the HLC of the last
       write.
    2. A short settle pauses real-time progression so node-2's
       HLC at materialisation time is unambiguously LATER than
       node-1's last `Root` update.
    3. node-2 joins the namespace and the context cold. Joining
       constructs a fresh `Root<T>` on node-2 at materialisation
       time, so node-2's local `Root` entry now has a HLC that is
       LATER than the populated `Root` on node-1, even though
       node-2's `Root` is the empty default and node-1's holds
       all the real application state.
    4. node-2 immediately writes its own key, then a `wait_for_sync`
       with `trigger_sync: true` forces a HashComparison round
       between the two now-initialised peers (both have
       `has_state = true`, so `select_protocol` lands on
       HashComparison rather than Snapshot).
    5. We then read back BOTH sides:
         - node-2 must see every key node-1 wrote in step 1
           (the failure mode the bug produced: node-2's "later"
           empty `Root` would silently win an LWW-by-HLC merge
           and drop node-1's data on the joiner).
         - node-1 must still hold every key it originally wrote
           (the failure mode that follows on the next sync tick:
           node-2 propagates its post-join empty `Root` back and
           wipes node-1).
         - node-1 and node-2 must both see node-2's post-join
           write (a sanity check that bidirectional convergence
           still works at all).

  This scenario is the cold-join HLC-inversion case that
  routing `Root<T>` through the generic LWW-by-HLC path
  reintroduces. The fix routes `Root<T>` merges through
  `merge_root_state` instead, which delegates to the
  application's registered `Mergeable` impl (auto-generated by
  the `#[app::state]` macro) so each field merges with its own
  CRDT semantics — and a bootstrap-aware default in
  `merge_root_state` accepts the incoming side when the local
  side has never been explicitly written (created_at ==
  updated_at).

force_pull_image: false
near_devnet: false

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: e2e-node

steps:
  # --- Phase 1: node-1 alone seeds the context with several writes ---

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Create context on node-1
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{ns}}'
    outputs:
      ctx: contextId

  - name: Node-1 writes key A
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: set
    args:
      key: "alpha"
      value: "from_node_1_first"

  - name: Node-1 writes key B
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: set
    args:
      key: "beta"
      value: "from_node_1_second"

  - name: Node-1 writes key C
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: set
    args:
      key: "gamma"
      value: "from_node_1_third"

  # --- Phase 2: settle so node-2 materialises its Root with an
  # unambiguously later wall-clock and HLC than node-1's last write.
  # This is the HLC-inversion precondition the bug needs to fire. ---

  - name: Settle so node-2's join HLC is later than node-1's last write
    type: wait
    seconds: 5

  # --- Phase 3: node-2 joins cold. Joining materialises a fresh,
  # empty `Root<T>` locally on node-2; that local Root now carries a
  # HLC later than node-1's populated Root. ---

  - name: Invite node-2 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{ns}}'
    outputs:
      invitation: invitation

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{ns}}'
    invitation: '{{invitation}}'

  - name: Node-2 joins context
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx}}'

  # --- Phase 4: node-2 writes its own key. This bumps node-2 to
  # `has_state = true` (if it wasn't already) and ensures both
  # peers fall into the initialised-peer protocol-selection rules
  # so the next sync tick uses HashComparison, not Snapshot. ---

  - name: Node-2 writes its own key after join
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: set
    args:
      key: "delta_from_node2"
      value: "joiner_post_join_write"

  - name: Force a HashComparison-driven convergence round
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Settle after convergence
    type: wait
    seconds: 3

  # --- Phase 5: read back from both sides. Pre-fix, node-2 would
  # see only its own write (`delta_from_node2`) and none of
  # node-1's three writes; node-1 would have lost its writes on
  # the back-propagation of node-2's "later" empty Root. ---

  - name: Node-2 reads key A (node-1's first write)
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: get
    args:
      key: "alpha"
    outputs:
      alpha_node2: result

  - name: Assert node-2 sees node-1's key A
    type: json_assert
    statements:
      - 'json_equal({{alpha_node2}}, {"output": "from_node_1_first"})'

  - name: Node-2 reads key B (node-1's second write)
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: get
    args:
      key: "beta"
    outputs:
      beta_node2: result

  - name: Assert node-2 sees node-1's key B
    type: json_assert
    statements:
      - 'json_equal({{beta_node2}}, {"output": "from_node_1_second"})'

  - name: Node-2 reads key C (node-1's third write)
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: get
    args:
      key: "gamma"
    outputs:
      gamma_node2: result

  - name: Assert node-2 sees node-1's key C
    type: json_assert
    statements:
      - 'json_equal({{gamma_node2}}, {"output": "from_node_1_third"})'

  - name: Node-1 reads back key A (must not have been wiped by node-2's empty Root)
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: get
    args:
      key: "alpha"
    outputs:
      alpha_node1: result

  - name: Assert node-1 still has key A
    type: json_assert
    statements:
      - 'json_equal({{alpha_node1}}, {"output": "from_node_1_first"})'

  - name: Node-1 reads back key C (must not have been wiped by node-2's empty Root)
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: get
    args:
      key: "gamma"
    outputs:
      gamma_node1: result

  - name: Assert node-1 still has key C
    type: json_assert
    statements:
      - 'json_equal({{gamma_node1}}, {"output": "from_node_1_third"})'

  - name: Node-1 reads node-2's post-join write (bidirectional sanity)
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: get
    args:
      key: "delta_from_node2"
    outputs:
      delta_node1: result

  - name: Assert node-1 sees node-2's post-join write
    type: json_assert
    statements:
      - 'json_equal({{delta_node1}}, {"output": "joiner_post_join_write"})'

stop_all_nodes: false
