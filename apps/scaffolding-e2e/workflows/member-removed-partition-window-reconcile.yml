name: E2E KV Store - MemberRemoved Partition-Window Reconcile
description: >
  Constructs the partition-window divergence scenario the
  reconcile-via-anchor sync path is designed to heal:

    1. Three nodes synced in a namespace with one context.
    2. Admin (node-1) is partitioned off the docker bridge —
       no inter-container traffic in or out, but the node keeps
       running and retains state.
    3. Node-2 writes to the context. Node-3 receives the write
       (they're still on the bridge). Admin does NOT see it.
    4. Partition heals (`docker network connect bridge node-1`).
    5. Admin immediately removes node-2. The signed
       `MemberRemoved` op carries `expected_context_state_hashes`
       reflecting admin's view — which doesn't include node-2's
       in-flight write because admin signed before catching up.
    6. The op propagates to node-3. node-3 applies it, then
       recomputes its context root hash — which DOES reflect
       node-2's write. The hashes diverge.
    7. The apply pipeline surfaces a `DivergenceReport`. The node
       handler routes it to the sync manager's reconcile path,
       which picks admin (the only trusted-anchor identity node-3
       has observed signing applied messages) as the sync target.
    8. node-3 pulls canonical state from admin via Snapshot sync.
       After adoption, node-3's root hash matches admin's signed
       expected value: node-2's late write is gone from node-3's
       view of the context.
    9. Convergence: node-3's context state matches node-1's.

  This is the §8.3.2 partition-window case from the cross-DAG
  authorization design. The trade-off is explicit: node-2's
  legitimate pre-cut write is dropped by node-3 in favor of the
  admin's canonical view. Recovery is automatic when an anchor
  (admin or other Admin/ReadOnlyTee) is reachable; no operator
  intervention required.

  Known limitation in the docker-bridge partition approach used
  here: re-attaching the container drains any TCP packets the OS
  buffered while it was disconnected, so the gossipsub mesh may
  catch up faster than a "real" network partition would. The test
  works around this by signing the removal in the same step as
  the reconnect, before peer catchup can deliver node-2's write
  to admin.

force_pull_image: false
near_devnet: false

nodes:
  count: 3
  image: ghcr.io/calimero-network/merod:edge
  prefix: e2e-node

steps:
  # --- Phase 1: baseline three-node sync ---

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Invite node-2 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invite_node2: invitation

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invite_node2}}'
    outputs:
      identity_node2: memberIdentity

  - name: Invite node-3 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invite_node3: invitation

  - name: Node-3 joins namespace
    type: join_namespace
    node: e2e-node-3
    namespace_id: '{{namespace_id}}'
    invitation: '{{invite_node3}}'
    outputs:
      identity_node3: memberIdentity

  - name: Create context in namespace
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx: contextId

  - name: Node-2 joins context
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx}}'

  - name: Node-3 joins context
    type: join_context
    node: e2e-node-3
    context_id: '{{ctx}}'

  - name: Node-1 writes a baseline value
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: set
    args:
      key: "baseline"
      value: "before_partition"

  - name: Wait for baseline to propagate
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
      - e2e-node-3
    timeout: 60
    trigger_sync: true

  # --- Phase 2: partition admin away from peers ---

  - name: Partition admin away from peers
    type: script
    script: scripts/disconnect-node-from-bridge.sh
    target: local
    args:
      - e2e-node-1

  - name: Brief settle so libp2p notices the partition
    type: wait
    seconds: 3

  # --- Phase 3: node-2 writes while admin is partitioned away.
  #     node-3 receives, admin does not. ---

  - name: Node-2 writes while admin is partitioned
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: set
    args:
      key: "during_partition"
      value: "node2_write_admin_will_miss"

  - name: Wait for node-3 to receive node-2's partition-window write
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes:
      - e2e-node-2
      - e2e-node-3
    timeout: 30
    trigger_sync: true

  - name: Confirm node-3 has node-2's write
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: get
    args:
      key: "during_partition"
    outputs:
      pre_reconcile_read_node3: result

  - name: Assert node-3 saw the partition-window write
    type: json_assert
    statements:
      - 'json_equal({{pre_reconcile_read_node3}}, {"output": "node2_write_admin_will_miss"})'

  # --- Phase 4: heal the partition AND remove node-2 in close
  #     succession. The removal op signed by admin carries
  #     `expected_context_state_hashes` reflecting admin's view —
  #     which doesn't yet include node-2's partition-window write
  #     (admin was just disconnected, hasn't drained TCP buffers
  #     yet, hasn't applied the delta). ---

  - name: Heal admin's partition
    type: script
    script: scripts/connect-node-to-bridge.sh
    target: local
    args:
      - e2e-node-1

  - name: Admin removes node-2 (signs against pre-write view)
    type: remove_group_members
    node: e2e-node-1
    group_id: '{{namespace_id}}'
    members:
      - '{{identity_node2}}'

  # --- Phase 5: wait for the signed removal to propagate to node-3
  #     AND for node-3's reconcile-after-divergence to fire its
  #     anchor sync. The reconcile happens inside the apply path's
  #     follow-up spawn; allow time for it to complete. ---

  - name: Wait for membership convergence on node-3
    type: wait_for_sync
    group_id: '{{namespace_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-3
    timeout: 90
    trigger_sync: true

  - name: Settle for reconcile-via-anchor to complete
    type: wait
    seconds: 10

  # --- Phase 6: assertions on the converged state ---

  - name: Confirm node-3 sees node-2 removed
    type: list_group_members
    node: e2e-node-3
    group_id: '{{namespace_id}}'
    outputs:
      members_after_remove: members

  - name: Assert node-3's member list excludes node-2
    type: assert
    statements:
      - "not_contains({{members_after_remove}}, {{identity_node2}})"

  # The key assertion: node-2's partition-window write is GONE
  # from node-3's view after reconcile pulled canonical state
  # from admin. The trade-off (legitimate pre-cut write dropped
  # in favor of admin's canonical view) is by design.

  - name: Node-3 reads the partition-window key after reconcile
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: get
    args:
      key: "during_partition"
    outputs:
      post_reconcile_read_node3: result

  - name: Assert node-3 converged to admin's canonical view (no partition-window write)
    type: json_assert
    statements:
      - 'json_equal({{post_reconcile_read_node3}}, {"output": null})'

  # And baseline state still present — reconcile must not have
  # wiped pre-partition writes.

  - name: Node-3 reads the baseline key
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: get
    args:
      key: "baseline"
    outputs:
      baseline_read_node3: result

  - name: Assert baseline state preserved after reconcile
    type: json_assert
    statements:
      - 'json_equal({{baseline_read_node3}}, {"output": "before_partition"})'

stop_all_nodes: false
