description: >
  Sync-resilience smoke test: one peer is fully partitioned from the
  Docker bridge for ~15 seconds while the other peer writes, then the
  partition is healed and the partitioned peer must catch up.

  This file previously used `inject_network_fault loss=100% duration=3s`,
  but a 3-second packet-loss window is shorter than libp2p's
  connection-keepalive timeout (yamux ping ~30s, ping behaviour ~15s),
  so the TCP connection survived the loss as buffered retransmits and
  the test exercised gossipsub message loss rather than connection
  teardown + recovery. `tc qdisc loss` is also egress-only by default,
  so the partition was actually asymmetric (node-1's writes still
  arrived at node-2's NIC, just node-2's outbound ACKs were dropped).

  `disconnect_node` + `connect_node` instead use Docker's network
  detach/attach to produce a real, symmetric partition: when node-2 is
  detached, its libp2p connections are torn down immediately. The 15s
  pause is long enough for libp2p's ping behaviour to mark the
  connection dead (typically ~15-30s), which exercises the connection
  recovery path on reattach — the same code path a flaky home Wi-Fi or
  brief route change would trigger in production.

  Discovery + routing setup
  -------------------------

  This workflow DOES exercise the relay/rendezvous recovery path
  (the code path #2446 fixed). Two settings make that happen:

    * `preserve_default_bootstrap: true` keeps the public devnet
      boot-node from `merod init` in `bootstrap.nodes` even under
      `--e2e-mode`. That boot-node also acts as the relay server.

    * `mdns: false` kills the local-discovery shortcut. Without
      this, both nodes on the same Docker bridge would find each
      other directly via mDNS, the relay path would be dead code,
      and the test would only exercise libp2p's TCP/QUIC reconnect
      handling — not the relay-reservation recovery we want to
      regress against.

  With both settings in place, after `disconnect_node` removes
  node-2 from the bridge there is no direct route to node-1; the
  only way for node-2 to find node-1 again on reconnect is to redial
  the boot-node and route through the relay. That's exactly the path
  the recovery code in `crates/network/src/discovery/state.rs`
  handles, and the path this test exists to catch regressions on.

  A true multi-network NAT-topology version is still tracked under
  calimero-network/core#2467 / calimero-network/merobox#251 — both
  nodes share the same Docker bridge here, so a node that keeps a
  cached sibling address in its address book might still race a
  direct dial against the relay path. The single-bridge limit is the
  same constraint the relay-recovery unit tests have; multi-network
  closes that final gap.
name: Sync Resilience — Network Partition

force_pull_image: false

# Selects merobox's `run_multiple_nodes` startup path, which is the
# one that triggers `_wire_cluster_bootstrap_peers` to populate each
# node's `bootstrap.nodes` with the sibling's bridge address — on top
# of the preserved devnet boot-node, per the cluster-wiring fix in
# merobox PR #253. Without `restart: true`, merobox starts each node
# individually via the no-restart loop, the wiring step never runs,
# and with `mdns: false` below the two nodes have no way to find each
# other — `join_namespace` fails at the setup phase with "could not
# open a namespace-join stream to any mesh peer". Fresh-CI nodes are
# always cold-started, so "restart" here is a no-op for the lifecycle
# and just selects the right code path.
restart: true

# Keep `merod init`'s default boot-node (the public devnet from
# `crates/network/primitives/src/config.rs`); see header for why.
preserve_default_bootstrap: true

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-resil-node
  # See header — required to force routing through the boot-node /
  # relay rather than the Docker bridge's mDNS shortcut.
  mdns: false

steps:
  # ---------- Setup ----------

  - name: Install application on node-1
    type: install_application
    node: sync-resil-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create context in namespace on node-1
    type: create_context
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: sync-resil-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation_node2: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: sync-resil-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation_node2}}'

  - name: Node-2 joins context via group membership
    type: join_context
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'

  # ---------- Baseline ----------

  - name: Write baseline key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: baseline
      value: pre_partition

  - name: Wait for baseline to converge
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 60
    trigger_sync: true

  - name: Read baseline on node-2 (sanity)
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2: result

  - name: Assert baseline replicated
    type: assert
    statements:
      - "contains({{baseline_n2}}, 'pre_partition')"

  # ---------- Fault: detach node-2 from the bridge ----------

  - name: Disconnect node-2 from the bridge
    type: disconnect_node
    node: sync-resil-node-2

  - name: Write during-partition key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: during_partition
      value: written_while_partitioned

  - name: Hold the partition (allow libp2p to mark connection dead)
    type: wait
    seconds: 15

  - name: Reconnect node-2 to the bridge
    type: connect_node
    node: sync-resil-node-2

  # Reattaching the network doesn't instantly restore libp2p
  # connections; the swarm needs to redial. Give it room before
  # trigger_sync fires.
  - name: Wait for libp2p to redial after reconnect
    type: wait
    seconds: 10

  # ---------- Catch-up ----------

  - name: Wait for sync to catch up post-partition
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 120
    trigger_sync: true

  - name: Read during-partition key on node-2
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: during_partition
    outputs:
      during_n2: result

  - name: Assert node-2 caught up to the during-partition write
    type: assert
    statements:
      - "contains({{during_n2}}, 'written_while_partitioned')"

  # Re-read the baseline key on node-2 post-reconnect. Catches the
  # class of regression where the partitioned node loses pre-partition
  # state on reconnect (e.g. a state-machine bug that re-initialises
  # the context on re-establishing the connection).

  - name: Read baseline key on node-2 post-partition
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2_post: result

  - name: Assert node-2 retained baseline across partition
    type: assert
    statements:
      - "contains({{baseline_n2_post}}, 'pre_partition')"

stop_all_nodes: true
