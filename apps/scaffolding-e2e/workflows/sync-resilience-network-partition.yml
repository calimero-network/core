description: >
  Sync-resilience smoke test: one peer is fully partitioned from the
  LAN bridge for ~15 seconds while the other peer writes, then the
  partition is healed and the partitioned peer must catch up.

  Fault primitive
  ---------------

  This file previously used `inject_network_fault loss=100%
  duration=3s`, but a 3-second packet-loss window is shorter than
  libp2p's connection-keepalive timeout (yamux ping ~30s, ping
  behaviour ~15s), so the TCP connection survived the loss as
  buffered retransmits and the test exercised gossipsub message
  loss rather than connection teardown + recovery. `tc qdisc loss`
  is also egress-only by default, so the partition was actually
  asymmetric (node-1's writes still arrived at node-2's NIC, just
  node-2's outbound ACKs were dropped).

  `disconnect_node` + `connect_node` instead use Docker's network
  detach/attach to produce a real, symmetric partition: when
  node-2 is detached from the LAN bridge, its libp2p connections
  are torn down immediately AND its route to the NAT gateway
  vanishes. The 15s pause is long enough for libp2p's ping
  behaviour to mark the connection dead, exercising the
  connection-recovery + relay-reservation re-registration path
  on reattach.

  Topology
  --------

  Uses `topology: { type: nat, nat_mode: cone }` from
  merobox 0.6.19+. Both peers sit behind a NAT-gateway container
  on an internal LAN bridge; the only path to the boot-node (which
  serves as the relay) is via the gateway's MASQUERADE. There is
  no direct route between siblings. Docker's
  DOCKER-ISOLATION-STAGE-2 chain prevents cross-bridge traffic
  from going through the host even if the gateway weren't there,
  and the clients' default routes are explicitly pinned at the
  gateway's LAN IP via merobox's post-startup route injection.

  Detach + reattach considerations
  --------------------------------

  When `disconnect_node` removes node-2 from the LAN bridge:
    * node-2's eth0 (the LAN veth) is destroyed.
    * node-2 still has its container netns with the routing
      table — `default via <gateway-lan-ip>` — but the next-hop
      is now unreachable.
    * libp2p inside node-2 sees the connection drop on next
      keepalive failure.

  On `connect_node`, Docker re-attaches the LAN bridge:
    * eth0 is recreated (with potentially a different IP from
      the LAN IPAM pool — Docker may or may not reuse the
      previous one).
    * The default route in the routing table still points at
      the pinned gateway LAN IP, which is still on the bridge.
      ARP re-resolves on the first outbound packet.
    * libp2p has to redial the boot-node (the cached
      connection is gone) and refresh its relay reservation
      before sync can resume — the exact recovery path #2446
      fixed.

  Why cone: cone NAT allows DCUtR to upgrade the relayed
  connection to a direct one once both peers are re-rendezvoused.
  The recovery still goes through the relay on the way up. See
  `sync-resilience-network-partition-symmetric.yml` for the
  strict variant where every packet stays on the relay.
name: Sync Resilience — Network Partition (NAT cone)

force_pull_image: false

topology:
  type: nat
  nat_mode: cone

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-resil-node

steps:
  # ---------- Setup ----------

  - name: Install application on node-1
    type: install_application
    node: sync-resil-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create context in namespace on node-1
    type: create_context
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: sync-resil-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation_node2: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: sync-resil-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation_node2}}'

  - name: Node-2 joins context via group membership
    type: join_context
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'

  # ---------- Baseline ----------

  - name: Write baseline key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: baseline
      value: pre_partition

  - name: Wait for baseline to converge
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 60
    trigger_sync: true

  - name: Read baseline on node-2 (sanity)
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2: result

  - name: Assert baseline replicated
    type: assert
    statements:
      - "contains({{baseline_n2}}, 'pre_partition')"

  # ---------- Fault: detach node-2 from the LAN bridge ----------

  - name: Disconnect node-2 from the LAN bridge
    type: disconnect_node
    node: sync-resil-node-2

  - name: Write during-partition key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: during_partition
      value: written_while_partitioned

  - name: Hold the partition (allow libp2p to mark connection dead)
    type: wait
    seconds: 15

  - name: Reconnect node-2 to the LAN bridge
    type: connect_node
    node: sync-resil-node-2

  # Reattaching the network doesn't instantly restore libp2p
  # connections; the swarm needs to redial the boot-node and
  # refresh its relay reservation. 15s buffer covers ARP
  # re-resolution + dial + relay-reservation re-register.
  - name: Wait for libp2p to redial + reservation to refresh
    type: wait
    seconds: 15

  # ---------- Catch-up ----------

  - name: Wait for sync to catch up post-partition
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 120
    trigger_sync: true

  - name: Read during-partition key on node-2
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: during_partition
    outputs:
      during_n2: result

  - name: Assert node-2 caught up to the during-partition write
    type: assert
    statements:
      - "contains({{during_n2}}, 'written_while_partitioned')"

  # Re-read the baseline key on node-2 post-reconnect. Catches the
  # class of regression where the partitioned node loses
  # pre-partition state on reconnect.

  - name: Read baseline key on node-2 post-partition
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2_post: result

  - name: Assert node-2 retained baseline across partition
    type: assert
    statements:
      - "contains({{baseline_n2_post}}, 'pre_partition')"

  # Relay-handshake sanity: assert `ReservationReqAccepted`
  # appears in each client's log. merod emits this line ONCE per
  # reservation (initial reserve, `renewal: false`); a
  # `tail_lines` scope races the log growth and misses the
  # initial event — same diagnostic story as peer-restart, see
  # that file's comment. Post-partition relay recovery is
  # validated by the post-partition sync-converge step above
  # (which only passes if relay-mediated sync re-established
  # after reattach).

  - name: Confirm node-1 obtained a relay reservation
    type: assert_log_present
    nodes: [sync-resil-node-1]
    patterns:
      - "ReservationReqAccepted"

  - name: Confirm node-2 obtained a relay reservation
    type: assert_log_present
    nodes: [sync-resil-node-2]
    patterns:
      - "ReservationReqAccepted"

stop_all_nodes: true
