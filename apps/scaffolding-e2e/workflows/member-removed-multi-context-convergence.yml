name: E2E KV Store - MemberRemoved Multi-Context Convergence
description: >
  Exercises a `MemberRemoved` op against a namespace that hosts
  multiple contexts. The signed op carries per-context state-hash
  claims (one entry per registered context, sorted by context_id)
  plus a governance-state hash claim. On each receiver the apply
  path runs the post-apply verify against those claims; this test
  pins the happy-path "all hashes match, no divergence, no
  reconcile fired, all peers converge to identical state."

  Catches regressions in:
    * sign-time precompute (admin must produce the same per-context
      hashes the receivers compute post-apply)
    * apply-time verify (the merge-scan over the sorted context
      list, the sentinel handling for the group-state hash, the
      structured outcome returned up the apply pipeline)
    * the `NamespaceApplyOutcome::Applied { divergence }` wire
      shape (a regression that breaks the divergence field would
      surface as either a deserialization error in the actor
      pipeline or a spurious reconcile trigger).

  Does NOT exercise the reconcile-via-anchor sync path itself — that
  fires only on actual mismatch, which requires a partition window
  to construct. See `member-removed-partition-window-reconcile.yml`
  for the partition variant.

force_pull_image: false
near_devnet: false

nodes:
  count: 3
  image: ghcr.io/calimero-network/merod:edge
  prefix: e2e-node

steps:
  # --- Setup: app + namespace owned by node-1 ---

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Assert application installed
    type: assert
    statements:
      - "is_set({{app_id}})"

  - name: Create namespace on node-1
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Assert namespace created
    type: assert
    statements:
      - "is_set({{namespace_id}})"

  # --- node-2 and node-3 join the namespace ---

  - name: Invite node-2 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invite_node2: invitation

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invite_node2}}'
    outputs:
      identity_node2: memberIdentity

  - name: Invite node-3 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invite_node3: invitation

  - name: Node-3 joins namespace
    type: join_namespace
    node: e2e-node-3
    namespace_id: '{{namespace_id}}'
    invitation: '{{invite_node3}}'
    outputs:
      identity_node3: memberIdentity

  # --- Three contexts under the namespace, each populated by
  #     different members. Three is enough to make the per-context
  #     hash array non-trivial (sort-order matters for the signed
  #     op's content hash) without making the test slow. ---

  - name: Create context A in namespace
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_a: contextId

  - name: Create context B in namespace
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_b: contextId

  - name: Create context C in namespace
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_c: contextId

  # All three nodes need to join each context so the membership
  # cascade through the namespace makes them visible — otherwise
  # `enumerate_group_contexts` on admin includes all three but
  # the receivers' snapshot wouldn't, generating
  # only-in-expected divergence (which is correct catchup
  # behavior covered by a separate workflow but not what this
  # one is testing).

  - name: Node-2 joins context A
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx_a}}'
  - name: Node-3 joins context A
    type: join_context
    node: e2e-node-3
    context_id: '{{ctx_a}}'
  - name: Node-2 joins context B
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx_b}}'
  - name: Node-3 joins context B
    type: join_context
    node: e2e-node-3
    context_id: '{{ctx_b}}'
  - name: Node-2 joins context C
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx_c}}'
  - name: Node-3 joins context C
    type: join_context
    node: e2e-node-3
    context_id: '{{ctx_c}}'

  # Each node writes to a different context — drives each
  # context's CRDT state to a distinct root_hash so the per-context
  # snapshot array carries three different hashes (catches a hash-
  # array-collapsing-to-zero bug that the all-zero-fallback
  # sentinel logic could mask if every entry were the same).

  - name: Node-1 writes to context A
    type: call
    node: e2e-node-1
    context_id: '{{ctx_a}}'
    method: set
    args:
      key: "from_node1"
      value: "in_ctx_a"

  - name: Node-2 writes to context B
    type: call
    node: e2e-node-2
    context_id: '{{ctx_b}}'
    method: set
    args:
      key: "from_node2"
      value: "in_ctx_b"

  - name: Node-3 writes to context C
    type: call
    node: e2e-node-3
    context_id: '{{ctx_c}}'
    method: set
    args:
      key: "from_node3"
      value: "in_ctx_c"

  - name: Wait for all writes to propagate
    type: wait_for_sync
    context_id: '{{ctx_a}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
      - e2e-node-3
    timeout: 60
    trigger_sync: true
  - name: Wait for context B propagation
    type: wait_for_sync
    context_id: '{{ctx_b}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
      - e2e-node-3
    timeout: 60
    trigger_sync: true
  - name: Wait for context C propagation
    type: wait_for_sync
    context_id: '{{ctx_c}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
      - e2e-node-3
    timeout: 60
    trigger_sync: true

  # --- The actual MemberRemoved. The admin's sign-time path
  #     computes:
  #       * `cut`: namespace governance position (heads + pre-apply
  #         group state hash)
  #       * `expected_group_state_hash`: post-remove governance hash
  #         (in-memory simulation of removing node-2 from the
  #         materialized member set)
  #       * `expected_context_state_hashes`: per-context root_hash
  #         snapshot at sign time, sorted by context_id (three
  #         entries: ctx_a, ctx_b, ctx_c)
  #     and embeds all three in the signed op. Each receiver applies
  #     the op locally, recomputes the same hashes, and compares.
  #     This test asserts no divergence fires on any peer. ---

  - name: Admin (node-1) removes node-2
    type: remove_group_members
    node: e2e-node-1
    group_id: '{{namespace_id}}'
    members:
      - '{{identity_node2}}'

  - name: Wait for MemberRemoved propagation to node-3
    type: wait_for_sync
    group_id: '{{namespace_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-3
    timeout: 60
    trigger_sync: true

  - name: Confirm node-3 sees node-2 removed
    type: list_group_members
    node: e2e-node-3
    group_id: '{{namespace_id}}'
    outputs:
      members_after_remove: members

  - name: Assert node-3's member list no longer contains node-2
    type: assert
    statements:
      - "not_contains({{members_after_remove}}, {{identity_node2}})"

  # Cross-check: node-1's view matches node-3's (the canonical
  # convergence the signed claims aim to guarantee).

  - name: List members on node-1 for cross-check
    type: list_group_members
    node: e2e-node-1
    group_id: '{{namespace_id}}'
    outputs:
      members_on_node1: members

  - name: Assert node-1 and node-3 agree on member set
    type: assert
    statements:
      - "not_contains({{members_on_node1}}, {{identity_node2}})"

  # Per-context state still consistent on remaining members:
  # node-1's earlier write to ctx_a is still visible on node-3
  # (the removal must not corrupt unrelated context state).

  - name: Node-3 reads ctx_a's earlier write
    type: call
    node: e2e-node-3
    context_id: '{{ctx_a}}'
    method: get
    args:
      key: "from_node1"
    outputs:
      read_a_on_node3: result

  - name: Assert ctx_a state is preserved on node-3 after removal
    type: json_assert
    statements:
      - 'json_equal({{read_a_on_node3}}, {"output": "in_ctx_a"})'

stop_all_nodes: false
