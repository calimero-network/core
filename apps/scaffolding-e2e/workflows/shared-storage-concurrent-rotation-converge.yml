name: Shared Storage — Cross-Node Concurrent Writer Rotation Converges
description: >
  Belt-and-suspenders integration coverage for the convergence
  guarantee #2665 establishes by composition. #2665 makes each node
  self-log its OWN rotations (alongside received ones), so the
  causal `writers_at` resolution is total and symmetric across
  nodes. That is covered by unit/node tests; the one angle not
  exercised there is a genuinely-concurrent, multi-node rotation
  that has to converge end-to-end over real sync. This workflow is
  that test.

  Identities (each held by exactly one node, so each can actually
  execute writes and have them accepted/rejected):
    * A = node-1
    * B = node-2
    * C = node-3

  Making the two rotations DAG-concurrent
  ---------------------------------------
  node-1 and node-2 must each rotate from the same head H without
  having seen the other's rotation. We achieve that with merobox's
  `disconnect_node` / `connect_node` fault-injection steps (the same
  primitives the sync-resilience suite uses), with one rule: we
  NEVER issue a `call` to a disconnected node (a detached node loses
  its published-port RPC along with its bridge interface). Instead
  we isolate the two NON-rotating nodes while each rotator acts, so
  the rotating node is always connected (callable) yet the node it
  rotates on never receives the other rotation:

    1. Disconnect node-1 and node-3. node-2 (still connected) rotates
       {A,B} -> {A}, dropping B (itself). Neither node-1 nor node-3
       sees it.
    2. Disconnect node-2; connect node-1. Now only node-1 is online,
       and it is still at H (it was offline when node-2 rotated, and
       the only holder of that rotation — node-2 — is now offline, so
       it can't be fetched). node-1 rotates {A,B} -> {A,C}: causally
       CONCURRENT with node-2's {A}.
    3. Reconnect node-2 and node-3. wait_for_sync converges all
       three — the root-hash convergence assertion — with both
       rotations merged.
    4. Assert every node resolves the SAME writer set directly from
       the two concurrent rotations — no settling rotation needed
       (see the #2673 note below). Both rotations dropped B and kept
       A, so the resolved set retains A and revokes B on every node —
       retroactive revocation of a baseline writer under concurrency,
       independent of which rotation wins the tiebreak.
    5. Assert the rotated-out writer's write is rejected: node-2 (B)
       calling `shared_set` fails on every node, while node-1 (A)
       writing succeeds and the legitimate value converges.

  Why no settling rotation (#2673): the app-facing
  `SharedStorage::writers()` used to read the rotation log's
  most-recently-*appended* entry — per-node insertion order, not
  causal order — so under two concurrent rotations the nodes could
  read different sets from the same log. This workflow originally
  papered over that with a causally-latest "settling" rotation by
  node-3. #2673 changed the local gate to resolve by
  max-(HLC, signer), which is insertion-order invariant: every node
  now resolves the SAME set straight from the two concurrent entries.

  The two rotations ({A,C} from node-1, {A} from node-2) deliberately
  DIFFER — so the resolution is order-dependent under the old gate and
  must collapse identically on every node — yet BOTH drop B and keep
  A. That makes the A/B assertions hermetic (A retained, B revoked
  regardless of which rotation wins the HLC tiebreak); only C's
  membership is HLC-dependent, and it is asserted winner-agnostically
  (all three nodes agree). The merge-path security boundary is still
  the causal `writers_at(parents)`; the post-heal `wait_for_sync`
  asserts the storage-root convergence #2665 guarantees.

  Why a plain bridge (no NAT): the concurrent-rotation guarantee is
  a CRDT/merge property — it has nothing to do with relay recovery,
  which is the whole point of the NAT topology the sync-resilience
  partition workflows use. A plain-bridge `disconnect_node` is a
  sufficient libp2p partition here (the same primitive the
  hashcomparison-shared-user-reconcile workflow relies on), and
  plain-bridge reconnect re-establishes direct peer connections
  quickly — no relay-reservation re-registration to wait on or flake
  on. Since the choreography never calls a disconnected node, the
  fact that detaching also drops the node's RPC does not matter.

  Note: a plain-bridge detach is not a hermetically perfect
  partition (a peer could in principle reach a detached node via the
  host-published port). If the two rotations ever turn out NOT to be
  concurrent, they reconcile causally and the convergence assertions
  still hold — so the worst case is weaker coverage, never a false
  pass. The fully-deterministic guarantee lives in the node-level
  sim test that accompanies this workflow
  (crates/node/src/sync/rotation_log_reader.rs); this is the
  real-network belt-and-suspenders on top. A direct primitive that
  would simplify this (cut libp2p between a peer pair while keeping
  RPC) is tracked in calimero-network/merobox#278.

  Relates: #2665, #2655, #2588, #2233.

force_pull_image: false

nodes:
  count: 3
  image: merod:local
  prefix: e2e-node

steps:
  # ---------- Setup: context with writer set {A} ----------

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Create context on node-1
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{ns}}'
    outputs:
      ctx: contextId

  - name: Invite node-2 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{ns}}'
    outputs:
      invite_node2: invitation

  - name: Invite node-3 to namespace
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{ns}}'
    outputs:
      invite_node3: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{ns}}'
    invitation: '{{invite_node2}}'

  - name: Node-2 joins context
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx}}'

  - name: Node-3 joins namespace
    type: join_namespace
    node: e2e-node-3
    namespace_id: '{{ns}}'
    invitation: '{{invite_node3}}'

  - name: Node-3 joins context
    type: join_context
    node: e2e-node-3
    context_id: '{{ctx}}'

  # Capture each node's identity (A/B/C).
  - name: Identity A (node-1)
    type: get_namespace_identity
    node: e2e-node-1
    namespace_id: '{{ns}}'
    outputs:
      id_a: publicKey
  - name: Identity B (node-2)
    type: get_namespace_identity
    node: e2e-node-2
    namespace_id: '{{ns}}'
    outputs:
      id_b: publicKey
  - name: Identity C (node-3)
    type: get_namespace_identity
    node: e2e-node-3
    namespace_id: '{{ns}}'
    outputs:
      id_c: publicKey

  # ---------- Baseline: writer set {A, B} + member entries ----------

  # Settle all three at the genesis context state (sole writer {A}) BEFORE the
  # first rotation. This is load-bearing. A cold joiner seeds its rotation log
  # with the writer set as-of its join boundary ({A} here). If node-1 rotates
  # while a joiner is still catching up, the joiner can converge the
  # post-rotation tree via Snapshot/HashComparison WITHOUT ever applying the
  # rotation as a delta — so the rotation is never appended to the joiner's
  # rotation log, and `SharedStorage::writers()` (which reads the log ahead of
  # the index) keeps returning the stale genesis set. The joiner then can't act
  # as a writer even though the tree shows it as one. Settling first pins each
  # joiner at the {A} genesis head, so the add-writer below arrives as a single
  # forward-applied delta that DOES append to every node's rotation log.
  - name: Settle all three at the genesis writer set {A}
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes: [e2e-node-1, e2e-node-2, e2e-node-3]
    timeout: 120
    check_interval: 2
    trigger_sync: true

  - name: Brief settle at genesis
    type: wait
    seconds: 3

  - name: Node-1 seeds shared value
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_set
    args:
      value: "v0"

  # Isolate the add-writer rotation with its own sync so every node
  # forward-applies it as a single delta (and logs it).
  - name: Node-1 adds B to the writer set ({A} -> {A, B})
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_add_writer
    args:
      writer_bs58: '{{id_b}}'

  - name: Converge the {A, B} rotation onto every node's rotation log
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes: [e2e-node-1, e2e-node-2, e2e-node-3]
    timeout: 120
    check_interval: 2
    trigger_sync: true

  - name: Settle after the rotation
    type: wait
    seconds: 3

  # Member entries written before the concurrent rotations — must survive and
  # converge across the rotation window.
  - name: Node-1 writes member entry m1
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: set
    args:
      key: "m1"
      value: "pre-rotation"
  - name: Node-2 writes member entry m2
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: set
    args:
      key: "m2"
      value: "pre-rotation-n2"

  - name: Converge member entries
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes: [e2e-node-1, e2e-node-2, e2e-node-3]
    timeout: 120
    check_interval: 2
    trigger_sync: true

  - name: Settle after member entries
    type: wait
    seconds: 3

  # Precondition for the concurrent rotations: EVERY node — including the
  # joiners that must rotate below — resolves the writer set as {A, B}. node-2
  # (B) in particular MUST see itself as a writer here, or it cannot rotate.
  - name: Baseline — node-2 sees A as writer
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_a}}'
    outputs:
      base_a_n2: result
  - name: Baseline — node-2 sees itself (B) as writer
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_b}}'
    outputs:
      base_b_n2: result
  - name: Baseline — node-2 does NOT yet see C as writer
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_c}}'
    outputs:
      base_c_n2: result
  - name: Baseline — node-3 sees A as writer
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_a}}'
    outputs:
      base_a_n3: result
  - name: Baseline — node-3 sees B as writer
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_b}}'
    outputs:
      base_b_n3: result
  - name: Baseline — node-3 does NOT yet see C as writer
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_c}}'
    outputs:
      base_c_n3: result

  - name: Assert baseline writer set {A, B} on both joiners
    type: json_assert
    statements:
      - 'json_equal({{base_a_n2}}, {"output": true})'
      - 'json_equal({{base_b_n2}}, {"output": true})'
      - 'json_equal({{base_c_n2}}, {"output": false})'
      - 'json_equal({{base_a_n3}}, {"output": true})'
      - 'json_equal({{base_b_n3}}, {"output": true})'
      - 'json_equal({{base_c_n3}}, {"output": false})'

  # ---------- Concurrent rotation, window 1: node-2 -> {A} ----------
  # Isolate the two non-rotators (node-1, node-3) so node-2 can rotate while
  # connected (callable) without either of them seeing it.

  - name: Disconnect node-1 from the bridge
    type: disconnect_node
    node: e2e-node-1
  - name: Disconnect node-3 from the bridge
    type: disconnect_node
    node: e2e-node-3

  - name: Wait for libp2p to mark node-1/node-3 connections dead
    type: wait
    seconds: 20

  # node-2 (the only connected node) is still a writer ({A,B}), so it first
  # makes a Shared *value* write — concurrent with node-1's branch. After the
  # heal the causally-latest legitimate write (node-1's "by-writer-a-final"
  # below) must win LWW, so this value must NOT survive on any node; the final
  # assertion proves that. It's done BEFORE node-2's rotation because that
  # rotation drops B (below), after which node-2 could no longer write.
  - name: Node-2 writes the shared value during the split
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_set
    args:
      value: "shared-by-b-split"

  # node-2 then rotates {A,B} -> {A}: drops B (itself). Combined with node-1's
  # concurrent {A,B} -> {A,C}, BOTH rotations drop B and keep A. So whichever
  # wins the HLC tiebreak, the resolved set retains A and revokes B — the
  # A/B assertions are hermetic, with no reliance on rotation timing. Only C
  # (node-1's addition) is HLC-dependent, and that is asserted winner-
  # agnostically below. The two sets still DIFFER ({A,C} vs {A}), so the
  # order-dependent resolution #2673 must collapse identically on every node.
  - name: Node-2 rotates writer set to {A} (drops B, itself)
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_rotate_writers
    args:
      writers:
        - '{{id_a}}'

  - name: Node-2 writes member entry during the split
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: set
    args:
      key: "during2"
      value: "from-n2"

  # ---------- Concurrent rotation, window 2: node-1 -> {A, C} ----------
  # Take node-2 (the sole holder of its {A} rotation) offline and bring node-1
  # back. node-1 is still at H — it was offline when node-2 rotated, and the
  # only holder of that rotation is now offline — so it rotates from the
  # pristine head, concurrently.

  - name: Disconnect node-2 from the bridge
    type: disconnect_node
    node: e2e-node-2
  - name: Reconnect node-1 to the bridge
    type: connect_node
    node: e2e-node-1

  - name: Wait for node-1 to re-establish (its peers are offline; it stays at H)
    type: wait
    seconds: 20

  # node-1 rotates {A,B} -> {A,C}: drops B, adds C. Causally CONCURRENT with
  # node-2's {A} (node-1 never saw it). Both dropped B; they differ on C.
  - name: Node-1 rotates writer set to {A, C}
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_rotate_writers
    args:
      writers:
        - '{{id_a}}'
        - '{{id_c}}'
  - name: Node-1 writes member entry during the split
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: set
    args:
      key: "during"
      value: "from-n1"

  # ---------- Heal: reconnect everyone; both rotations now merge ----------

  - name: Reconnect node-2 to the bridge
    type: connect_node
    node: e2e-node-2
  - name: Reconnect node-3 to the bridge
    type: connect_node
    node: e2e-node-3

  - name: Wait for libp2p mesh to reform (direct connections)
    type: wait
    seconds: 20

  # This is the root-hash convergence assertion: it only passes once all three
  # nodes share the same contextStateHash, i.e. both concurrent rotations (and
  # the surrounding data writes) have reconciled into an identical storage tree.
  - name: Converge after concurrent rotations
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes: [e2e-node-1, e2e-node-2, e2e-node-3]
    timeout: 180
    check_interval: 2
    trigger_sync: true

  - name: Settle after concurrent-rotation convergence
    type: wait
    seconds: 5

  # ---------- The concurrent rotations converge on their own (#2673) ----------
  #
  # No settling rotation is needed. Before #2673 the app-facing writer set was
  # read from the rotation log's most-recently-*appended* entry (this node's
  # insertion order), so after the heal the two nodes could read DIFFERENT sets
  # ({A,C} vs {A}) from the same log — and this workflow had to issue a
  # causally-latest "settling" rotation by node-3 (C, common to both sets) to
  # collapse that ambiguity. #2673 changed the gate to resolve by
  # max-(HLC, signer), which is insertion-order invariant, so every node now
  # resolves the SAME set directly from the two concurrent rotations.
  #
  # That set is {A, C}: node-1's rotation ran in window 2, ~20s+ after node-2's
  # in window 1, so it carries the later HLC and wins the concurrent tiebreak
  # (the window gap dwarfs any same-host clock skew). The assertions below
  # confirm all three nodes agree on {A, C} with no settling step — which is
  # exactly the convergence #2673 establishes.

  # ---------- Assert: identical resolved writer set on every node ----------
  # A and C are writers, B is revoked — on node-1, node-2, AND node-3.

  - name: node-1 — is A a writer?
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_a}}'
    outputs:
      a_n1: result
  - name: node-1 — is B a writer?
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_b}}'
    outputs:
      b_n1: result
  - name: node-1 — is C a writer?
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_c}}'
    outputs:
      c_n1: result

  - name: node-2 — is A a writer?
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_a}}'
    outputs:
      a_n2: result
  - name: node-2 — is B a writer?
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_b}}'
    outputs:
      b_n2: result
  - name: node-2 — is C a writer?
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_c}}'
    outputs:
      c_n2: result

  - name: node-3 — is A a writer?
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_a}}'
    outputs:
      a_n3: result
  - name: node-3 — is B a writer?
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_b}}'
    outputs:
      b_n3: result
  - name: node-3 — is C a writer?
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_is_writer
    args:
      key_bs58: '{{id_c}}'
    outputs:
      c_n3: result

  # #2673 convergence, stated winner-agnostically: all three nodes agree on
  # every writer's membership, with no settling rotation. (Pre-#2673 a_n* and
  # b_n* would disagree across nodes — that's the bug this asserts is gone.)
  - name: Assert all three nodes agree on the resolved writer set
    type: json_assert
    statements:
      - 'json_equal({{a_n1}}, {{a_n2}})'
      - 'json_equal({{a_n2}}, {{a_n3}})'
      - 'json_equal({{b_n1}}, {{b_n2}})'
      - 'json_equal({{b_n2}}, {{b_n3}})'
      - 'json_equal({{c_n1}}, {{c_n2}})'
      - 'json_equal({{c_n2}}, {{c_n3}})'

  # Concrete, hermetic facts (independent of the HLC tiebreak): both concurrent
  # rotations dropped B and kept A, so EVERY node retains A and revokes B. (C's
  # membership is the only HLC-dependent bit — covered winner-agnostically by
  # the agreement assertion above.) This is the retroactive revocation of a
  # baseline writer (B) under concurrency.
  - name: Assert all nodes retained A and revoked B
    type: json_assert
    statements:
      - 'json_equal({{a_n1}}, {"output": true})'
      - 'json_equal({{b_n1}}, {"output": false})'
      - 'json_equal({{a_n2}}, {"output": true})'
      - 'json_equal({{b_n2}}, {"output": false})'
      - 'json_equal({{a_n3}}, {"output": true})'
      - 'json_equal({{b_n3}}, {"output": false})'

  # ---------- Assert: member entries converged on every node ----------

  - name: node-2 reads m1
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: get
    args:
      key: "m1"
    outputs:
      m1_n2: result
  - name: node-3 reads m2
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: get
    args:
      key: "m2"
    outputs:
      m2_n3: result
  - name: node-2 reads the during-split write from node-1
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: get
    args:
      key: "during"
    outputs:
      during_n2: result
  - name: node-1 reads the during-split write from node-2
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: get
    args:
      key: "during2"
    outputs:
      during2_n1: result

  - name: Assert member entries converged across the rotation window
    type: json_assert
    statements:
      - 'json_equal({{m1_n2}}, {"output": "pre-rotation"})'
      - 'json_equal({{m2_n3}}, {"output": "pre-rotation-n2"})'
      - 'json_equal({{during_n2}}, {"output": "from-n1"})'
      - 'json_equal({{during2_n1}}, {"output": "from-n2"})'

  # ---------- Bonus: rotated-out writer (B) is rejected everywhere ----------

  # node-2 (B) is no longer a writer. Its `shared_set` must be rejected locally
  # (B not in the resolved set {A, C}).
  - name: Node-2 (revoked B) attempts a shared write — must be rejected
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_set
    args:
      value: "by-revoked-b"
    expected_failure: true

  # Positive control: a current writer (A / node-1) can still write.
  - name: Node-1 (A) writes shared value
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_set
    args:
      value: "by-writer-a-final"

  - name: Converge final shared value
    type: wait_for_sync
    context_id: '{{ctx}}'
    nodes: [e2e-node-1, e2e-node-2, e2e-node-3]
    timeout: 120
    check_interval: 2
    trigger_sync: true

  - name: node-1 reads final shared value
    type: call
    node: e2e-node-1
    context_id: '{{ctx}}'
    method: shared_get
    outputs:
      shared_n1: result
  - name: node-2 reads final shared value
    type: call
    node: e2e-node-2
    context_id: '{{ctx}}'
    method: shared_get
    outputs:
      shared_n2: result
  - name: node-3 reads final shared value
    type: call
    node: e2e-node-3
    context_id: '{{ctx}}'
    method: shared_get
    outputs:
      shared_n3: result

  # The legitimate writer's value converges on every node (incl. node-1). This
  # also proves the revoked write ("by-revoked-b") and B's concurrent
  # during-split shared write ("shared-by-b-split") both lost — neither appears.
  - name: Assert revoked/concurrent writes never took effect; legit write converged
    type: json_assert
    statements:
      - 'json_equal({{shared_n1}}, {"output": "by-writer-a-final"})'
      - 'json_equal({{shared_n2}}, {"output": "by-writer-a-final"})'
      - 'json_equal({{shared_n3}}, {"output": "by-writer-a-final"})'

stop_all_nodes: false
