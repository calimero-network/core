name: E2E KV Store - Group Metadata
description: >
  End-to-end coverage for the generic metadata records introduced in
  core #2338. Exercises all six merobox workflow step types
  (set/get group, member, context metadata) and the
  CAN_MANAGE_METADATA = 256 capability gate:

    1. Bootstrap a namespace + Open subgroup + group-registered context
       on node-1.
    2. Write MetadataRecord values on the namespace, subgroup, and
       context (name + opaque `data` map).
    3. Invite node-2 into the namespace, add it to the subgroup, sync.
    4. Read each record back from node-2 and json_assert the contents.
    5. Confirm node-2 cannot set group metadata without
       CAN_MANAGE_METADATA (expected_failure), then grant the
       capability and confirm the same call succeeds.
    6. Confirm a member may always set its own member metadata with
       no capability granted.

  Step types covered: set_group_metadata, get_group_metadata,
  set_member_metadata, get_member_metadata, set_context_metadata,
  get_context_metadata. Mirrors merobox/workflow-examples/
  workflow-group-metadata-example.yml but adapted to the
  scaffolding-e2e harness (e2e-node prefix, res/scaffolding_e2e.wasm,
  force_pull_image: false — CI builds merod:local locally).

force_pull_image: false
near_devnet: false

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: e2e-node

steps:
  # --- Phase 1: Bootstrap namespace + subgroup + context on node-1 ---

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Assert application installed
    type: assert
    statements:
      - "is_set({{app_id}})"

  - name: Create namespace on node-1
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      ns: namespaceId

  - name: Assert namespace created
    type: assert
    statements:
      - "is_set({{ns}})"

  - name: Create subgroup in namespace
    type: create_group_in_namespace
    node: e2e-node-1
    namespace_id: '{{ns}}'
    group_name: 'general'
    outputs:
      sub: groupId

  - name: Assert subgroup created
    type: assert
    statements:
      - "is_set({{sub}})"

  - name: Wait for subgroup governance propagation
    type: wait
    seconds: 5

  - name: Create context in subgroup
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{sub}}'
    outputs:
      ctx: contextId

  - name: Assert context created
    type: assert
    statements:
      - "is_set({{ctx}})"

  # --- Phase 2: Write metadata records on node-1 ---

  - name: Set namespace metadata
    type: set_group_metadata
    node: e2e-node-1
    group_id: '{{ns}}'
    record_name: 'Acme Workspace'
    data:
      topic: company-wide
      icon: rocket

  - name: Set subgroup metadata
    type: set_group_metadata
    node: e2e-node-1
    group_id: '{{sub}}'
    record_name: 'general'
    data:
      topic: everything
      archived: 'false'

  - name: Set context metadata
    type: set_context_metadata
    node: e2e-node-1
    group_id: '{{sub}}'
    context_id: '{{ctx}}'
    record_name: 'general-main'
    data:
      kind: primary

  # --- Phase 3: Invite node-2 into the namespace + add to subgroup ---

  - name: Create namespace invitation
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{ns}}'
    outputs:
      invitation: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{ns}}'
    invitation: '{{invitation}}'
    outputs:
      node2_id: memberIdentity

  - name: Assert node-2 joined
    type: assert
    statements:
      - "is_set({{node2_id}})"

  - name: Add node-2 to subgroup
    type: add_group_members
    node: e2e-node-1
    group_id: '{{sub}}'
    members:
      - identity: '{{node2_id}}'
        role: Member

  # Push the membership op immediately rather than waiting for the
  # next gossip heartbeat (same pattern as group-member-channel-lifecycle).
  - name: Force governance push on node-1
    type: sync_group
    node: e2e-node-1
    group_id: '{{sub}}'

  - name: Wait for member gossip
    type: wait
    seconds: 10

  - name: Wait for subgroup sync
    type: wait_for_sync
    group_id: '{{sub}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Settle after subgroup sync
    type: wait
    seconds: 5

  # --- Phase 4: Read metadata back from node-2 ---
  # `get_*_metadata` returns a MetadataRecord
  # ({name, data, updatedAt, updatedBy}). `outputs:` supports dotted
  # paths (e.g. `data.topic`) into that record; `json_assert` only
  # resolves flat `{{var}}` placeholders, so the nested-value
  # extraction has to happen here in `outputs:`.

  - name: Get namespace metadata from node-2
    type: get_group_metadata
    node: e2e-node-2
    group_id: '{{ns}}'
    outputs:
      ns_name: name
      ns_topic: data.topic
      ns_icon: data.icon

  - name: Assert namespace metadata
    type: json_assert
    statements:
      - 'json_equal({{ns_name}}, "Acme Workspace")'
      - 'json_equal({{ns_topic}}, "company-wide")'
      - 'json_equal({{ns_icon}}, "rocket")'

  - name: Get subgroup metadata from node-2
    type: get_group_metadata
    node: e2e-node-2
    group_id: '{{sub}}'
    outputs:
      sub_name: name
      sub_topic: data.topic
      sub_archived: data.archived

  - name: Assert subgroup metadata
    type: json_assert
    statements:
      - 'json_equal({{sub_name}}, "general")'
      - 'json_equal({{sub_topic}}, "everything")'
      - 'json_equal({{sub_archived}}, "false")'

  - name: Get context metadata from node-2
    type: get_context_metadata
    node: e2e-node-2
    group_id: '{{sub}}'
    context_id: '{{ctx}}'
    outputs:
      ctx_name: name
      ctx_kind: data.kind

  - name: Assert context metadata
    type: json_assert
    statements:
      - 'json_equal({{ctx_name}}, "general-main")'
      - 'json_equal({{ctx_kind}}, "primary")'

  # --- Phase 4a: pre-grant self-write member metadata ---
  # A member may set its OWN member metadata unconditionally
  # (`signer == member` short-circuit in
  # crates/context/src/group_store/mod.rs::require_can_manage_metadata).
  # Done BEFORE the capability grant in Phase 5 so the success path is
  # not masked by CAN_MANAGE_METADATA.

  - name: Node-2 sets its own member metadata (no capability)
    type: set_member_metadata
    node: e2e-node-2
    group_id: '{{ns}}'
    member_id: '{{node2_id}}'
    record_name: 'node-two'
    data:
      status: online

  - name: Wait for member metadata sync
    type: wait_for_sync
    group_id: '{{ns}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Settle after member metadata sync
    type: wait
    seconds: 5

  - name: Get node-2 member metadata from node-1
    type: get_member_metadata
    node: e2e-node-1
    group_id: '{{ns}}'
    member_id: '{{node2_id}}'
    outputs:
      m2_name: name
      m2_status: data.status

  - name: Assert self-written member metadata
    type: json_assert
    statements:
      - 'json_equal({{m2_name}}, "node-two")'
      - 'json_equal({{m2_status}}, "online")'

  # --- Phase 4b: pre-grant cross-member negative test ---
  # Writing another member's record requires CAN_MANAGE_METADATA (or
  # admin). Node-2 still has no capability — writing node-1's record
  # must fail.

  - name: Get node-1 namespace identity
    type: get_namespace_identity
    node: e2e-node-1
    namespace_id: '{{ns}}'
    outputs:
      node1_id: publicKey

  - name: Node-2 tries to write node-1 member metadata without capability
    type: set_member_metadata
    node: e2e-node-2
    group_id: '{{ns}}'
    member_id: '{{node1_id}}'
    record_name: 'should-fail-cross-member'
    expected_failure: true

  # --- Phase 5: CAN_MANAGE_METADATA capability gate ---
  # Node-2 has no metadata-management capability yet, so setting the
  # subgroup's metadata must fail.

  - name: Node-2 tries to rename subgroup without capability
    type: set_group_metadata
    node: e2e-node-2
    group_id: '{{sub}}'
    record_name: 'should-fail'
    expected_failure: true

  # Grant CAN_MANAGE_METADATA = 1 << 8 = 256 to node-2 in the namespace.
  # (calimero-network/core: crates/context/config/src/lib.rs,
  #  MemberCapabilities::CAN_MANAGE_METADATA)
  - name: Grant node-2 CAN_MANAGE_METADATA
    type: set_member_capabilities
    node: e2e-node-1
    group_id: '{{ns}}'
    member_id: '{{node2_id}}'
    capabilities: 256

  - name: Wait for capability sync
    type: wait_for_sync
    group_id: '{{ns}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Settle after capability sync
    type: wait
    seconds: 5

  - name: Node-2 sets subgroup metadata with capability
    type: set_group_metadata
    node: e2e-node-2
    group_id: '{{sub}}'
    record_name: 'renamed-by-node2'

  - name: Wait for subgroup metadata sync
    type: wait_for_sync
    group_id: '{{sub}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Settle after subgroup metadata sync
    type: wait
    seconds: 5

  - name: Get subgroup metadata from node-1 after rename
    type: get_group_metadata
    node: e2e-node-1
    group_id: '{{sub}}'
    outputs:
      sub_name2: name

  - name: Assert subgroup renamed by node-2
    type: json_assert
    statements:
      - 'json_equal({{sub_name2}}, "renamed-by-node2")'

  # --- Phase 5c: a granted member can keep updating the record ---
  # Wholly-replace RMW: the second write supersedes the first and
  # carries a fresh `data` map. Confirms the capability is durable
  # (not single-use) and that updates land both `name` and `data`.

  - name: Node-2 updates subgroup metadata after grant
    type: set_group_metadata
    node: e2e-node-2
    group_id: '{{sub}}'
    record_name: 'general-updated'
    data:
      topic: 'random-banter'
      archived: 'true'

  - name: Wait for subgroup metadata update sync
    type: wait_for_sync
    group_id: '{{sub}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Settle after subgroup metadata update sync
    type: wait
    seconds: 5

  - name: Get subgroup metadata from node-1 after update
    type: get_group_metadata
    node: e2e-node-1
    group_id: '{{sub}}'
    outputs:
      sub_name3: name
      sub_topic3: data.topic
      sub_archived3: data.archived

  - name: Assert subgroup updated by node-2
    type: json_assert
    statements:
      - 'json_equal({{sub_name3}}, "general-updated")'
      - 'json_equal({{sub_topic3}}, "random-banter")'
      - 'json_equal({{sub_archived3}}, "true")'

  # --- Phase 6: post-grant cross-member positive ---
  # With CAN_MANAGE_METADATA, node-2 can now write *another* member's
  # record — the same call that failed in Phase 4b must now succeed.
  # Confirms the capability path on `set_member_metadata` (not just
  # the `signer == member` short-circuit exercised in Phase 4a).

  - name: Node-2 writes node-1 member metadata with capability
    type: set_member_metadata
    node: e2e-node-2
    group_id: '{{ns}}'
    member_id: '{{node1_id}}'
    record_name: 'node-one-tagged-by-two'
    data:
      tag: 'cross-member'

  - name: Wait for cross-member metadata sync
    type: wait_for_sync
    group_id: '{{ns}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 30
    check_interval: 2
    trigger_sync: true

  - name: Settle after cross-member metadata sync
    type: wait
    seconds: 5

  - name: Get node-1 member metadata from node-1
    type: get_member_metadata
    node: e2e-node-1
    group_id: '{{ns}}'
    member_id: '{{node1_id}}'
    outputs:
      m1_name: name
      m1_tag: data.tag

  - name: Assert cross-member metadata
    type: json_assert
    statements:
      - 'json_equal({{m1_name}}, "node-one-tagged-by-two")'
      - 'json_equal({{m1_tag}}, "cross-member")'

stop_all_nodes: false
