name: E2E KV Store - Voluntary Leave, Then You Must Be Let Back In
description: >
  Tests the cycle: voluntary `leave_group` (publishes `MemberLeft`) →
  self-rejoin via `join_subgroup_inheritance` is REJECTED → admin
  re-add → bidirectional read/write resumes.

  Leaving is not a ban: node-2 can come back. What it cannot do is let
  ITSELF back in. `MemberLeft` writes a re-entry block, and re-entry
  has to be an explicit act — a freshly issued invitation, or an admin
  re-adding you. Inheritance is neither: an Open subgroup admits any
  parent member holding `CAN_JOIN_OPEN_SUBGROUPS` automatically, so if
  inheritance could readmit a leaver, walking out and walking back in
  would be indistinguishable from never having left. The only lever an
  admin would have left is revoking `CAN_JOIN_OPEN_SUBGROUPS`
  wholesale — which also bars them from every *other* Open subgroup.

  The deny-list and the re-entry block are different things and this
  flow leans on the difference. The deny-list *silences* node-2 (its
  state deltas are dropped at the receive filter) and is retracted the
  moment any member row is written. The block *authorizes*, and
  deliberately survives a member-row write, so the re-join fails
  instead of quietly succeeding.

  Direct-row prerequisite: the `leave_group` handler at
  `crates/context/src/handlers/leave_group.rs` requires the leaver
  to be a *direct* member of the subgroup (an inherited-only member
  has no row to remove and the handler bails with "leave the
  parent group where the membership anchor lives instead"). So the
  test admin first adds node-2 via `add_group_members` to give them
  a direct row. Its inherited path stays fully intact afterwards —
  node-2 still holds `CAN_JOIN_OPEN_SUBGROUPS` and the subgroup is
  still `Open` — which is what makes the rejection in Phase 5 a tight
  test of the block itself rather than of some incidental loss of
  authority.

  Distinct from siblings:
    * `group-leave-context.yml` covers `leave_context` (local opt-out,
      no DAG op) → `join_context` rejoin. No `MemberLeft`, no
      deny-list, no re-entry block, no inheritance.
    * `group-kick-and-rejoin-keyshare.yml` covers `MemberRemoved`
      (admin kick), where the block is stricter still: no invitation
      readmits a removed member, only an admin re-add.
    * This workflow covers `MemberLeft` (self-published), where a
      fresh invitation WOULD also work — the invitation half of that
      is unit-tested in `governance-store`; here we exercise the admin
      re-add at the wire level.

  Mero-chat user-visible failure mode this guards against: "I left a
  public channel and immediately rejoined myself — leaving does not
  actually do anything."

force_pull_image: false
near_devnet: false

auth_mode: embedded

nodes:
  count: 3
  image: merod:local
  prefix: leave-rejoin-node

steps:
  # First login on a fresh embedded-auth node bootstraps its root key
  # and seeds merobox's token cache; every step below runs authenticated.
  - name: Login on leave-rejoin-node-1
    type: login
    node: leave-rejoin-node-1
    username: dev
    password: dev-password

  - name: Login on leave-rejoin-node-2
    type: login
    node: leave-rejoin-node-2
    username: dev
    password: dev-password

  - name: Login on leave-rejoin-node-3
    type: login
    node: leave-rejoin-node-3
    username: dev
    password: dev-password

  # ── Phase 1: Bootstrap namespace + Open subgroup + context ────────

  - name: Install application on node-1
    type: install_application
    node: leave-rejoin-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Install application on node-2
    type: install_application
    node: leave-rejoin-node-2
    path: res/scaffolding_e2e.wasm
    dev: true

  - name: Install application on node-3
    type: install_application
    node: leave-rejoin-node-3
    path: res/scaffolding_e2e.wasm
    dev: true

  - name: Node-1 creates namespace
    type: create_namespace
    node: leave-rejoin-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  # node-1's namespace identity not captured here — admin doesn't
  # write to the context in this workflow (only members write +
  # cross-peer reads), so the executor_public_key for admin would be
  # unused. Removed to avoid dead output noise flagged in code review.

  - name: Invite node-2 to namespace
    type: create_namespace_invitation
    node: leave-rejoin-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invite_node2: invitation

  - name: Invite node-3 to namespace
    type: create_namespace_invitation
    node: leave-rejoin-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invite_node3: invitation

  - name: Wait for namespace governance to gossip
    type: wait
    seconds: 10

  - name: Node-2 joins namespace
    type: join_namespace
    node: leave-rejoin-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invite_node2}}'
    outputs:
      identity_node2: memberIdentity

  - name: Node-3 joins namespace
    type: join_namespace
    node: leave-rejoin-node-3
    namespace_id: '{{namespace_id}}'
    invitation: '{{invite_node3}}'
    outputs:
      identity_node3: memberIdentity

  - name: Node-1 creates Open subgroup
    type: create_group_in_namespace
    node: leave-rejoin-node-1
    namespace_id: '{{namespace_id}}'
    group_alias: open-channel
    outputs:
      subgroup_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: leave-rejoin-node-1
    group_id: '{{subgroup_id}}'
    visibility: open

  # Direct-row prerequisite: node-2 needs a direct membership row to
  # call `leave_group`. node-3 is added direct as well so it can
  # serve as the cross-peer reader and stays in the subgroup the
  # whole time.
  - name: Admin adds node-2 and node-3 to subgroup directly
    type: add_group_members
    node: leave-rejoin-node-1
    group_id: '{{subgroup_id}}'
    members:
      - identity: '{{identity_node2}}'
        role: Member
      - identity: '{{identity_node3}}'
        role: Member

  - name: Node-1 creates context inside Open subgroup
    type: create_context
    node: leave-rejoin-node-1
    application_id: '{{app_id}}'
    group_id: '{{subgroup_id}}'
    outputs:
      ctx_id: contextId

  - name: Wait for MemberAdded + ContextRegistered to propagate
    type: wait
    seconds: 10

  - name: Node-2 joins context
    type: join_context
    node: leave-rejoin-node-2
    context_id: '{{ctx_id}}'
    outputs:
      node2_key: memberPublicKey

  - name: Node-3 joins context
    type: join_context
    node: leave-rejoin-node-3
    context_id: '{{ctx_id}}'
    outputs:
      node3_key: memberPublicKey

  - name: Initial sync to settle Root state
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - leave-rejoin-node-1
      - leave-rejoin-node-2
      - leave-rejoin-node-3
    timeout: 60
    check_interval: 2

  # ── Phase 2: Pre-leave — node-2 writes, node-3 reads ──────────────

  - name: Pre-leave — node-2 writes
    type: call
    node: leave-rejoin-node-2
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: "pre_leave"
      value: "node2_msg_before_leave"
    executor_public_key: '{{node2_key}}'

  - name: Pre-leave sync
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - leave-rejoin-node-1
      - leave-rejoin-node-2
      - leave-rejoin-node-3
    timeout: 30
    check_interval: 2

  - name: Pre-leave — node-3 reads node-2's write
    type: call
    node: leave-rejoin-node-3
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: "pre_leave"
    executor_public_key: '{{node3_key}}'
    outputs:
      pre_leave_read: result

  - name: Assert pre-leave converged
    type: json_assert
    statements:
      - 'json_equal({{pre_leave_read}}, {"output": "node2_msg_before_leave"})'

  # ── Phase 3: node-2 voluntarily leaves the subgroup ───────────────
  # Publishes `MemberLeft` against the subgroup. The apply arm at
  # `group_store/mod.rs:1535` deletes node-2's direct row and stamps
  # them on the per-subgroup deny-list (`mark_denied` at line 1627).

  - name: Node-2 leaves subgroup voluntarily
    type: leave_group
    node: leave-rejoin-node-2
    group_id: '{{subgroup_id}}'

  - name: Wait for MemberLeft + deny-list to propagate
    type: wait_for_sync
    group_id: '{{subgroup_id}}'
    nodes:
      - leave-rejoin-node-1
      - leave-rejoin-node-3
    timeout: 30
    check_interval: 2

  - name: Confirm node-2 absent from subgroup membership
    type: list_group_members
    node: leave-rejoin-node-1
    group_id: '{{subgroup_id}}'
    outputs:
      members_after_leave: members

  - name: Assert node-2 absent after leave
    type: assert
    statements:
      - "not_contains({{members_after_leave}}, {{identity_node2}})"
      - "contains({{members_after_leave}}, {{identity_node3}})"

  # ── Phase 4: Departed node's write must NOT reach node-3 ──────────
  # Same negative-control discipline as the kick-rejoin and
  # kick-readd workflows: the cross-peer read on node-3 below catches
  # silent local-success-then-gossip-drop before the rejoin, instead
  # of deferring it to the end-of-workflow assertion.

  - name: Post-leave — node-2 attempts write (must fail or be dropped)
    type: call
    node: leave-rejoin-node-2
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: "while_left"
      value: "this_must_not_appear"
    executor_public_key: '{{node2_key}}'
    expected_failure: true

  - name: Drain in-flight gossip before negative-control read
    type: wait
    seconds: 5

  - name: Negative control — node-3 must NOT see the dropped write
    type: call
    node: leave-rejoin-node-3
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: "while_left"
    executor_public_key: '{{node3_key}}'
    outputs:
      while_left_pre_rejoin: result

  - name: Assert dropped value is genuinely absent on node-3 BEFORE rejoin
    type: json_assert
    statements:
      - 'json_equal({{while_left_pre_rejoin}}, {"output": null})'

  # ── Phase 5: node-2 self-rejoins via inheritance endpoint ─────────
  # Inheritance is intact: node-2 still holds CAN_JOIN_OPEN_SUBGROUPS
  # at the namespace and the subgroup is still Open, so its inherited
  # path resolves perfectly well and `MemberJoinedOpen` would have
  # admitted it before.
  #
  # KEY INVARIANT THIS TEST PINS: it is rejected anyway. Leaving writes
  # a re-entry block, and re-entry has to be an *explicit* act — a
  # fresh invitation, or an admin re-adding you. Inheritance is passive
  # and carries no fresh authorization, so it cannot be the thing that
  # readmits you. Without this, walking out of an Open subgroup and
  # walking straight back in would be indistinguishable from never
  # having left, and the only lever an admin would have to keep someone
  # out of an Open subgroup is revoking CAN_JOIN_OPEN_SUBGROUPS
  # wholesale — which also bars them from every other Open subgroup.

  - name: Node-2 attempts to re-inherit into the subgroup (must be rejected)
    type: join_subgroup_inheritance
    node: leave-rejoin-node-2
    group_id: '{{subgroup_id}}'
    expected_failure: true

  # ── Phase 6: the leaver must still be out ─────────────────────────
  # A rejected `MemberJoinedOpen` leaves no trace: no direct row, and no
  # reappearance in the inherited half of the `list_group_members`
  # union either (`enumerate_inherited` still filters them out on the
  # deny-list).

  - name: Confirm subgroup membership after the rejected re-inheritance
    type: list_group_members
    node: leave-rejoin-node-1
    group_id: '{{subgroup_id}}'
    outputs:
      members_after_failed_rejoin: members

  - name: Assert the leaver is still out
    type: assert
    statements:
      - "not_contains({{members_after_failed_rejoin}}, {{identity_node2}})"
      - "contains({{members_after_failed_rejoin}}, {{identity_node3}})"

  # ── Phase 6b: being re-added is how a leaver comes back ───────────
  # Leaving is not a ban — node-2 can return. It just has to be let
  # back in rather than letting itself back in. An admin re-add is one
  # of the two ways (a freshly issued invitation is the other, covered
  # by the unit tests in `governance-store`); it clears the re-entry
  # block and, through the membership choke point, the deny-list.

  - name: Admin (node-1) re-adds node-2 to the subgroup
    type: add_group_members
    node: leave-rejoin-node-1
    group_id: '{{subgroup_id}}'
    members:
      - identity: '{{identity_node2}}'
        role: Member

  - name: Wait for MemberAdded + KeyDelivery to propagate
    type: wait_for_sync
    group_id: '{{subgroup_id}}'
    nodes:
      - leave-rejoin-node-1
      - leave-rejoin-node-2
      - leave-rejoin-node-3
    timeout: 60
    check_interval: 2

  - name: Confirm subgroup membership shape after the re-add
    type: list_group_members
    node: leave-rejoin-node-1
    group_id: '{{subgroup_id}}'
    outputs:
      members_after_rejoin: members

  - name: Assert the re-added leaver is back in the member list
    type: assert
    statements:
      - "contains({{members_after_rejoin}}, {{identity_node2}})"
      - "contains({{members_after_rejoin}}, {{identity_node3}})"

  # ── Phase 7: Post-re-add write must reach node-3 ──────────────────
  # The end-to-end signal that the re-add really restored node-2: the
  # re-entry block lifted, the per-peer deny-list cleared, and a usable
  # group key delivered.

  # A node's namespace-derived identity is stable across leave and
  # re-add, so the pre-leave `node2_key` is still the right executor
  # here — and using it makes the point that nothing about node-2's
  # identity changed. What changed is that an admin let it back in.
  - name: Post-re-add — node-2 writes
    type: call
    node: leave-rejoin-node-2
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: "post_rejoin"
      value: "node2_msg_after_rejoin"
    executor_public_key: '{{node2_key}}'

  - name: Post-rejoin sync
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - leave-rejoin-node-1
      - leave-rejoin-node-2
      - leave-rejoin-node-3
    timeout: 60
    check_interval: 2

  - name: Post-rejoin — node-3 reads node-2's write
    type: call
    node: leave-rejoin-node-3
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: "post_rejoin"
    executor_public_key: '{{node3_key}}'
    outputs:
      post_rejoin_read: result

  - name: Assert post-rejoin write reached node-3
    type: json_assert
    statements:
      - 'json_equal({{post_rejoin_read}}, {"output": "node2_msg_after_rejoin"})'

  # Mirror of the kick-rejoin / kick-readd end-of-workflow check: the
  # `while_left` write was dropped during the banned window, the
  # rejoin must NOT retroactively replay it. A regression that
  # buffered the dropped write and re-delivered on deny-list-clear
  # would surface here as `while_left` being visible post-rejoin.

  - name: Confirm dropped-during-leave write was NOT delivered post-rejoin
    type: call
    node: leave-rejoin-node-3
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: "while_left"
    executor_public_key: '{{node3_key}}'
    outputs:
      while_left_post_rejoin: result

  - name: Assert dropped-during-leave value stays dropped after rejoin
    type: json_assert
    statements:
      - 'json_equal({{while_left_post_rejoin}}, {"output": null})'

stop_all_nodes: false
restart: false
wait_timeout: 120
