description: >
  Sync-resilience smoke test: 50% packet loss sustained for 20 seconds
  on one peer, with the other peer writing during the loss window.
  Verifies that gossipsub + sync converge under a degraded channel
  (not a partition — packets get through, just with significant loss).

  Complement to sync-resilience-network-partition.yml: that one tests
  full disconnection followed by reconnection (libp2p must redial and
  the connection-recovery path fires); this one tests a degraded-but-
  alive channel (the connection survives via TCP retransmits but
  gossipsub propagation is slow). Both shapes show up in production
  (full route failure vs flaky home Wi-Fi or congested cellular).

  Why 50% / 20s:
    - 50% loss is enough to noticeably degrade throughput but not
      enough to break TCP (4-retry retransmits each succeed with
      ~94% probability per cycle), so the connection survives.
    - 20s is longer than libp2p's ping interval (~15s), so the
      keepalive does cycle under loss; the test exercises both the
      ping-survives-loss path and gossipsub's mesh-stability-under-
      loss heuristics. A 30s window would arguably be more
      stressful but also more CI time for no extra signal.

  Like the other sync-resilience workflows, this does NOT specifically
  exercise the relay-reservation recovery in calimero-network/core#2446
  (sibling nodes on the same Docker bridge reach each other directly,
  no relay in the loop). A real NAT-topology version is tracked under
  calimero-network/core#2467 / calimero-network/merobox#251.

  mdns: false to keep the test honest about which discovery code path
  is being exercised.
name: Sync Resilience — Lossy Link

force_pull_image: false

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-resil-node
  mdns: false

steps:
  # ---------- Setup ----------

  - name: Install application on node-1
    type: install_application
    node: sync-resil-node-1
    path: res/scaffolding_e2e.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace on node-1
    type: create_namespace
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Create context in namespace on node-1
    type: create_context
    node: sync-resil-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: sync-resil-node-1
    namespace_id: '{{namespace_id}}'
    outputs:
      invitation_node2: invitation

  - name: Wait for namespace gossip
    type: wait
    seconds: 5

  - name: Node-2 joins namespace
    type: join_namespace
    node: sync-resil-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{invitation_node2}}'

  - name: Node-2 joins context via group membership
    type: join_context
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'

  # ---------- Baseline ----------

  - name: Write baseline key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: baseline
      value: pre_loss

  - name: Wait for baseline to converge
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 60
    trigger_sync: true

  - name: Read baseline on node-2 (sanity)
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2: result

  - name: Assert baseline replicated
    type: assert
    statements:
      - "contains({{baseline_n2}}, 'pre_loss')"

  # ---------- Fault: 50% packet loss on node-2 for 20s ----------
  #
  # inject_network_fault holds the fault for `duration` and clears it
  # automatically. tc qdisc loss is applied to the container's egress
  # interface — meaning packets sent FROM node-2 are dropped with the
  # given probability. For this test that's fine: node-2's ACKs and
  # any gossipsub propagation it tries to do back to node-1 get
  # degraded. Inbound packets to node-2 also slow because TCP needs
  # ACKs to make progress.

  - name: Inject 50% packet loss on node-2 for 20s
    type: inject_network_fault
    container: sync-resil-node-2
    fault: loss
    percent: 50
    duration: 20

  # The inject step blocks until the fault clears. By the time we get
  # here the network is healthy again, but node-2 has just spent 20s
  # exchanging packets through a lossy link.

  - name: Write post-loss key on node-1
    type: call
    node: sync-resil-node-1
    context_id: '{{ctx_id}}'
    method: set
    args:
      key: post_loss
      value: recovered

  # ---------- Catch-up ----------

  - name: Wait for sync to converge post-loss
    type: wait_for_sync
    context_id: '{{ctx_id}}'
    nodes:
      - sync-resil-node-1
      - sync-resil-node-2
    timeout: 120
    trigger_sync: true

  - name: Read post-loss key on node-2
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: post_loss
    outputs:
      post_n2: result

  - name: Assert post-loss write replicated
    type: assert
    statements:
      - "contains({{post_n2}}, 'recovered')"

  # Re-read baseline on node-2 — catches state-corruption regressions
  # where a lossy episode somehow re-initialises or trims state on
  # the affected node.

  - name: Read baseline key on node-2 post-loss
    type: call
    node: sync-resil-node-2
    context_id: '{{ctx_id}}'
    method: get
    args:
      key: baseline
    outputs:
      baseline_n2_post: result

  - name: Assert node-2 retained baseline across the lossy window
    type: assert
    statements:
      - "contains({{baseline_n2_post}}, 'pre_loss')"

stop_all_nodes: true
