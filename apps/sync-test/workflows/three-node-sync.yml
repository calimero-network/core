description: |
  Three-node sync test reproducing the Sandi/Matea/Fran scenario.
  Phase 1: Sequential joins + concurrent writes + convergence verification.
  Phase 2: Third node joins AFTER first two have exchanged writes.
name: Three Node Sync Test

force_pull_image: true

nodes:
  chain_id: testnet-1
  count: 3
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync-test-node

steps:
  # ============================================
  # Setup: Install app on all nodes
  # ============================================

  - name: Install app on Node 1 (Fran)
    type: install_application
    node: sync-test-node-1
    path: res/sync_test.wasm
    dev: true
    outputs:
      app_id_1: applicationId

  - name: Install app on Node 2 (Matea)
    type: install_application
    node: sync-test-node-2
    path: res/sync_test.wasm
    dev: true
    outputs:
      app_id_2: applicationId

  - name: Install app on Node 3 (Sandi)
    type: install_application
    node: sync-test-node-3
    path: res/sync_test.wasm
    dev: true
    outputs:
      app_id_3: applicationId

  # ============================================
  # Phase 1: Fran creates context, Matea joins
  # ============================================

  - name: Fran creates namespace
    type: create_namespace
    node: sync-test-node-1
    application_id: "{{app_id_1}}"
    outputs:
      namespace_id: namespaceId

  - name: Fran creates context
    type: create_context
    node: sync-test-node-1
    application_id: "{{app_id_1}}"
    group_id: "{{namespace_id}}"
    outputs:
      context_id: contextId
      fran_key: memberPublicKey

  - name: Assert context created
    type: assert
    statements:
      - "is_set({{context_id}})"
      - "is_set({{fran_key}})"

  # Matea joins via invitation
  - name: Invite Matea to Namespace
    type: create_namespace_invitation
    node: sync-test-node-1
    namespace_id: "{{namespace_id}}"
    outputs:
      matea_invitation: invitation

  - name: Matea joins namespace
    type: join_namespace
    node: sync-test-node-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{matea_invitation}}"
    outputs:
      matea_key: memberIdentity

  - name: Wait for Matea join to sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - sync-test-node-1
      - sync-test-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ============================================
  # Phase 2: Fran and Matea exchange writes
  # ============================================

  - name: Fran writes key1
    type: call
    node: sync-test-node-1
    context_id: "{{context_id}}"
    method: write
    args:
      key: "key1"
      value: "from_fran"
      writer: "fran"

  - name: Matea writes key2
    type: call
    node: sync-test-node-2
    context_id: "{{context_id}}"
    method: write
    args:
      key: "key2"
      value: "from_matea"
      writer: "matea"

  - name: Wait for Fran+Matea writes to sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - sync-test-node-1
      - sync-test-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # Verify both nodes see both keys
  - name: Fran reads count
    type: call
    node: sync-test-node-1
    context_id: "{{context_id}}"
    method: count
    outputs:
      fran_count_1: result

  - name: Assert Fran sees 2 entries
    type: json_assert
    statements:
      - 'json_equal({{fran_count_1}}, {"output": 2})'

  - name: Matea reads count
    type: call
    node: sync-test-node-2
    context_id: "{{context_id}}"
    method: count
    outputs:
      matea_count_1: result

  - name: Assert Matea sees 2 entries
    type: json_assert
    statements:
      - 'json_equal({{matea_count_1}}, {"output": 2})'

  # ============================================
  # Phase 3: Sandi joins AFTER existing writes
  # ============================================

  - name: Invite Sandi to Namespace
    type: create_namespace_invitation
    node: sync-test-node-1
    namespace_id: "{{namespace_id}}"
    outputs:
      sandi_invitation: invitation

  - name: Sandi joins namespace
    type: join_namespace
    node: sync-test-node-3
    namespace_id: "{{namespace_id}}"
    invitation: "{{sandi_invitation}}"
    outputs:
      sandi_key: memberIdentity

  - name: Wait for Sandi join to sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - sync-test-node-1
      - sync-test-node-2
      - sync-test-node-3
    timeout: 90
    check_interval: 3
    trigger_sync: true

  # Sandi must see the 2 existing entries (snapshot sync)
  - name: Sandi reads count
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: count
    outputs:
      sandi_count_1: result

  - name: Assert Sandi sees 2 existing entries
    type: json_assert
    statements:
      - 'json_equal({{sandi_count_1}}, {"output": 2})'

  # ============================================
  # Phase 4: All three write concurrently
  # ============================================

  - name: Fran writes key3
    type: call
    node: sync-test-node-1
    context_id: "{{context_id}}"
    method: write
    args:
      key: "key3"
      value: "concurrent_fran"
      writer: "fran"

  - name: Matea writes key4
    type: call
    node: sync-test-node-2
    context_id: "{{context_id}}"
    method: write
    args:
      key: "key4"
      value: "concurrent_matea"
      writer: "matea"

  - name: Sandi writes key5
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: write
    args:
      key: "key5"
      value: "concurrent_sandi"
      writer: "sandi"

  - name: Wait for all concurrent writes to sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - sync-test-node-1
      - sync-test-node-2
      - sync-test-node-3
    timeout: 90
    check_interval: 3
    trigger_sync: true

  # ============================================
  # Phase 5: Verify convergence — all 3 see 5 keys
  # ============================================

  - name: Fran reads final count
    type: call
    node: sync-test-node-1
    context_id: "{{context_id}}"
    method: count
    outputs:
      fran_final: result

  - name: Assert Fran sees 5 entries
    type: json_assert
    statements:
      - 'json_equal({{fran_final}}, {"output": 5})'

  - name: Matea reads final count
    type: call
    node: sync-test-node-2
    context_id: "{{context_id}}"
    method: count
    outputs:
      matea_final: result

  - name: Assert Matea sees 5 entries
    type: json_assert
    statements:
      - 'json_equal({{matea_final}}, {"output": 5})'

  - name: Sandi reads final count
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: count
    outputs:
      sandi_final: result

  - name: Assert Sandi sees 5 entries
    type: json_assert
    statements:
      - 'json_equal({{sandi_final}}, {"output": 5})'

  # Verify specific values are consistent
  - name: Fran reads snapshot
    type: call
    node: sync-test-node-1
    context_id: "{{context_id}}"
    method: snapshot
    outputs:
      fran_snapshot: result

  - name: Sandi reads snapshot
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: snapshot
    outputs:
      sandi_snapshot: result

  - name: Assert Fran and Sandi have identical state
    type: json_assert
    statements:
      - "json_equal({{fran_snapshot}}, {{sandi_snapshot}})"

  # ============================================
  # Phase 6: DM invitation flow (Curb pattern)
  # Sandi writes an invitation for Matea in shared state.
  # Matea must be able to read it after sync.
  # This simulates: create_dm_chat writes invitation_payload
  # that the invitee reads via get_dms.
  # ============================================

  - name: Sandi creates DM invitation for Matea
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: create_invitation
    args:
      inviter: "sandi"
      invitee: "matea"
      payload: "dm_context_id_sandi_matea_12345"

  - name: Sandi creates DM invitation for Fran
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: create_invitation
    args:
      inviter: "sandi"
      invitee: "fran"
      payload: "dm_context_id_sandi_fran_67890"

  - name: Wait for invitation deltas to sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes:
      - sync-test-node-1
      - sync-test-node-2
      - sync-test-node-3
    timeout: 90
    check_interval: 3
    trigger_sync: true

  # Matea reads the invitation from her node — this is the critical test
  - name: Matea reads her invitation from Sandi
    type: call
    node: sync-test-node-2
    context_id: "{{context_id}}"
    method: read_invitation
    args:
      inviter: "sandi"
      invitee: "matea"
    outputs:
      matea_invitation_result: result

  - name: Assert Matea can see Sandi's DM invitation
    type: json_assert
    statements:
      - 'json_equal({{matea_invitation_result}}, {"output": "dm_context_id_sandi_matea_12345"})'

  # Fran reads the invitation from her node
  - name: Fran reads her invitation from Sandi
    type: call
    node: sync-test-node-1
    context_id: "{{context_id}}"
    method: read_invitation
    args:
      inviter: "sandi"
      invitee: "fran"
    outputs:
      fran_invitation_result: result

  - name: Assert Fran can see Sandi's DM invitation
    type: json_assert
    statements:
      - 'json_equal({{fran_invitation_result}}, {"output": "dm_context_id_sandi_fran_67890"})'

  # Verify all invitations are visible on all nodes
  - name: Matea reads all invitations
    type: call
    node: sync-test-node-2
    context_id: "{{context_id}}"
    method: all_invitations
    outputs:
      matea_all_invitations: result

  - name: Sandi reads all invitations
    type: call
    node: sync-test-node-3
    context_id: "{{context_id}}"
    method: all_invitations
    outputs:
      sandi_all_invitations: result

  - name: Assert all nodes see the same invitations
    type: json_assert
    statements:
      - "json_equal({{matea_all_invitations}}, {{sandi_all_invitations}})"

stop_all_nodes: false
restart: false
wait_timeout: 180
