description: |
  Six-node sync stress test.
  - Node 1 creates context
  - Nodes 2-3 join immediately
  - All three write concurrently
  - Nodes 4-6 join AFTER existing writes (late joiners must snapshot)
  - All six write concurrently
  - Verify full convergence across all 6 nodes
  - Node 6 creates DM invitation, Node 4 must read it
name: Six Node Sync Test

force_pull_image: true

nodes:
  chain_id: testnet-1
  count: 6
  image: ghcr.io/calimero-network/merod:edge
  prefix: sync6

steps:
  # ============================================
  # Setup: Install app on all 6 nodes
  # ============================================

  - name: Install app on all nodes
    type: install_application
    node: sync6-1
    path: res/sync_test.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Install n2
    type: install_application
    node: sync6-2
    path: res/sync_test.wasm
    dev: true

  - name: Install n3
    type: install_application
    node: sync6-3
    path: res/sync_test.wasm
    dev: true

  - name: Install n4
    type: install_application
    node: sync6-4
    path: res/sync_test.wasm
    dev: true

  - name: Install n5
    type: install_application
    node: sync6-5
    path: res/sync_test.wasm
    dev: true

  - name: Install n6
    type: install_application
    node: sync6-6
    path: res/sync_test.wasm
    dev: true

  # ============================================
  # Phase 1: Node 1 creates context, Nodes 2-3 join
  # ============================================

  - name: Node 1 creates context
    type: create_context
    node: sync6-1
    application_id: "{{app_id}}"
    outputs:
      ctx: contextId
      key1: memberPublicKey
      group_id: groupId

  - name: Invite Node 2 to Group
    type: create_group_invitation
    node: sync6-1
    group_id: "{{group_id}}"
    outputs:
      inv2: invitation

  - name: Node 2 joins group
    type: join_group
    node: sync6-2
    invitation: "{{inv2}}"
    outputs:
      key2: memberIdentity

  - name: Invite Node 3 to Group
    type: create_group_invitation
    node: sync6-1
    group_id: "{{group_id}}"
    outputs:
      inv3: invitation

  - name: Node 3 joins group
    type: join_group
    node: sync6-3
    invitation: "{{inv3}}"
    outputs:
      key3: memberIdentity

  - name: Wait for 3-node sync
    type: wait_for_sync
    context_id: "{{ctx}}"
    nodes: [sync6-1, sync6-2, sync6-3]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ============================================
  # Phase 2: First 3 nodes write concurrently
  # ============================================

  - name: N1 writes
    type: call
    node: sync6-1
    context_id: "{{ctx}}"
    executor_public_key: "{{key1}}"
    method: write
    args: {"key": "a1", "value": "from_n1", "writer": "n1"}

  - name: N2 writes
    type: call
    node: sync6-2
    context_id: "{{ctx}}"
    executor_public_key: "{{key2}}"
    method: write
    args: {"key": "a2", "value": "from_n2", "writer": "n2"}

  - name: N3 writes
    type: call
    node: sync6-3
    context_id: "{{ctx}}"
    executor_public_key: "{{key3}}"
    method: write
    args: {"key": "a3", "value": "from_n3", "writer": "n3"}

  - name: Wait for writes to sync
    type: wait_for_sync
    context_id: "{{ctx}}"
    nodes: [sync6-1, sync6-2, sync6-3]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Verify N1 count=3
    type: call
    node: sync6-1
    context_id: "{{ctx}}"
    executor_public_key: "{{key1}}"
    method: count
    outputs:
      n1_count: result

  - name: Assert 3 entries
    type: json_assert
    statements:
      - 'json_equal({{n1_count}}, {"output": 3})'

  # ============================================
  # Phase 3: Nodes 4-6 join LATE (must snapshot existing state)
  # ============================================

  - name: Invite Node 4 to Group
    type: create_group_invitation
    node: sync6-1
    group_id: "{{group_id}}"
    outputs:
      inv4: invitation

  - name: Node 4 joins group
    type: join_group
    node: sync6-4
    invitation: "{{inv4}}"
    outputs:
      key4: memberIdentity

  - name: Invite Node 5 to Group
    type: create_group_invitation
    node: sync6-1
    group_id: "{{group_id}}"
    outputs:
      inv5: invitation

  - name: Node 5 joins group
    type: join_group
    node: sync6-5
    invitation: "{{inv5}}"
    outputs:
      key5: memberIdentity

  - name: Invite Node 6 to Group
    type: create_group_invitation
    node: sync6-1
    group_id: "{{group_id}}"
    outputs:
      inv6: invitation

  - name: Node 6 joins group
    type: join_group
    node: sync6-6
    invitation: "{{inv6}}"
    outputs:
      key6: memberIdentity

  - name: Wait for 6-node sync (late joiners must snapshot 3 entries)
    type: wait_for_sync
    context_id: "{{ctx}}"
    nodes: [sync6-1, sync6-2, sync6-3, sync6-4, sync6-5, sync6-6]
    timeout: 120
    check_interval: 3
    trigger_sync: true

  # Late joiners must see the 3 existing entries
  - name: Node 4 count
    type: call
    node: sync6-4
    context_id: "{{ctx}}"
    executor_public_key: "{{key4}}"
    method: count
    outputs:
      n4_count: result

  - name: Assert N4 sees 3
    type: json_assert
    statements:
      - 'json_equal({{n4_count}}, {"output": 3})'

  - name: Node 6 count
    type: call
    node: sync6-6
    context_id: "{{ctx}}"
    executor_public_key: "{{key6}}"
    method: count
    outputs:
      n6_count: result

  - name: Assert N6 sees 3
    type: json_assert
    statements:
      - 'json_equal({{n6_count}}, {"output": 3})'

  # ============================================
  # Phase 4: All 6 write concurrently
  # ============================================

  - name: N1 writes b1
    type: call
    node: sync6-1
    context_id: "{{ctx}}"
    executor_public_key: "{{key1}}"
    method: write
    args: {"key": "b1", "value": "round2_n1", "writer": "n1"}

  - name: N2 writes b2
    type: call
    node: sync6-2
    context_id: "{{ctx}}"
    executor_public_key: "{{key2}}"
    method: write
    args: {"key": "b2", "value": "round2_n2", "writer": "n2"}

  - name: N3 writes b3
    type: call
    node: sync6-3
    context_id: "{{ctx}}"
    executor_public_key: "{{key3}}"
    method: write
    args: {"key": "b3", "value": "round2_n3", "writer": "n3"}

  - name: N4 writes b4
    type: call
    node: sync6-4
    context_id: "{{ctx}}"
    executor_public_key: "{{key4}}"
    method: write
    args: {"key": "b4", "value": "round2_n4", "writer": "n4"}

  - name: N5 writes b5
    type: call
    node: sync6-5
    context_id: "{{ctx}}"
    executor_public_key: "{{key5}}"
    method: write
    args: {"key": "b5", "value": "round2_n5", "writer": "n5"}

  - name: N6 writes b6
    type: call
    node: sync6-6
    context_id: "{{ctx}}"
    executor_public_key: "{{key6}}"
    method: write
    args: {"key": "b6", "value": "round2_n6", "writer": "n6"}

  - name: Wait for 6-node concurrent writes
    type: wait_for_sync
    context_id: "{{ctx}}"
    nodes: [sync6-1, sync6-2, sync6-3, sync6-4, sync6-5, sync6-6]
    timeout: 120
    check_interval: 3
    trigger_sync: true

  # ============================================
  # Phase 5: Full convergence — all 6 must see 9 entries
  # ============================================

  - name: N1 final count
    type: call
    node: sync6-1
    context_id: "{{ctx}}"
    executor_public_key: "{{key1}}"
    method: count
    outputs:
      n1_final: result

  - name: Assert N1 = 9
    type: json_assert
    statements:
      - 'json_equal({{n1_final}}, {"output": 9})'

  - name: N4 final count
    type: call
    node: sync6-4
    context_id: "{{ctx}}"
    executor_public_key: "{{key4}}"
    method: count
    outputs:
      n4_final: result

  - name: Assert N4 = 9
    type: json_assert
    statements:
      - 'json_equal({{n4_final}}, {"output": 9})'

  - name: N6 final count
    type: call
    node: sync6-6
    context_id: "{{ctx}}"
    executor_public_key: "{{key6}}"
    method: count
    outputs:
      n6_final: result

  - name: Assert N6 = 9
    type: json_assert
    statements:
      - 'json_equal({{n6_final}}, {"output": 9})'

  # Snapshot comparison across extremes (N1=first, N6=last joiner)
  - name: N1 snapshot
    type: call
    node: sync6-1
    context_id: "{{ctx}}"
    executor_public_key: "{{key1}}"
    method: snapshot
    outputs:
      snap1: result

  - name: N6 snapshot
    type: call
    node: sync6-6
    context_id: "{{ctx}}"
    executor_public_key: "{{key6}}"
    method: snapshot
    outputs:
      snap6: result

  - name: Assert N1 and N6 identical state
    type: json_assert
    statements:
      - "json_equal({{snap1}}, {{snap6}})"

  # ============================================
  # Phase 6: DM invitation — N6 writes, N4 reads
  # ============================================

  - name: N6 creates invitation for N4
    type: call
    node: sync6-6
    context_id: "{{ctx}}"
    executor_public_key: "{{key6}}"
    method: create_invitation
    args: {"inviter": "n6", "invitee": "n4", "payload": "dm_ctx_n6_n4"}

  - name: Wait for invitation sync
    type: wait_for_sync
    context_id: "{{ctx}}"
    nodes: [sync6-4, sync6-6]
    timeout: 60
    check_interval: 3
    trigger_sync: true

  - name: N4 reads invitation
    type: call
    node: sync6-4
    context_id: "{{ctx}}"
    executor_public_key: "{{key4}}"
    method: read_invitation
    args: {"inviter": "n6", "invitee": "n4"}
    outputs:
      n4_inv: result

  - name: Assert N4 sees N6's invitation
    type: json_assert
    statements:
      - 'json_equal({{n4_inv}}, {"output": "dm_ctx_n6_n4"})'

stop_all_nodes: false
restart: false
wait_timeout: 300
