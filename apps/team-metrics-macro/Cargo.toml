[package]
name = "team-metrics-macro"
version.workspace = true
authors.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true

[lib]
# `rlib` (alongside the wasm `cdylib`) lets the convergence integration test in
# `tests/` import the app type; harmless for the wasm build.
crate-type = ["cdylib", "rlib"]

[dependencies]
calimero-sdk.workspace = true
calimero-storage.workspace = true
calimero-storage-macros.workspace = true

[dev-dependencies]
# Enables `register_crdt_merge` + the native mock host so `TestHost` can drive
# CRDT state under `cargo test`.
calimero-storage = { workspace = true, features = ["testing"] }
