description: "AI Bot Match: Caller vs Caller (2 full hands to showdown)"
name: Poker Bot Demo

force_pull_image: true

nodes:
  chain_id: testnet-1
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: bot

steps:
  # ============================================
  # Setup
  # ============================================

  - name: Install Poker App
    type: install_application
    node: bot-1
    path: res/poker.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create Mesh
    type: create_mesh
    context_node: bot-1
    application_id: "{{app_id}}"
    params: '{}'
    nodes:
      - bot-2
    capability: member
    outputs:
      context_id: contextId
      member_public_key: memberPublicKey

  - name: Bot A Joins (1000 chips)
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: join_table
    args:
      buy_in: 1000

  - name: Bot B Joins (1000 chips)
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: join_table
    args:
      buy_in: 1000

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ============================================
  # HAND 1 — Bot A (dealer/SB) vs Bot B (BB)
  #   Both use Caller strategy (1): always call/check
  #   Guaranteed: PreFlop → Flop → Turn → River → Showdown
  # ============================================

  - name: "Hand 1: Deal"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: start_hand

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── PreFlop (Bot A = SB/dealer acts first in heads-up) ──

  - name: "H1 PreFlop: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }
    outputs:
      h1_a_pf: result.output

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H1 PreFlop: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }
    outputs:
      h1_b_pf: result.output

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── Flop (Bot B acts first post-flop) ──

  - name: "H1 Flop: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }
    outputs:
      h1_b_flop: result.output

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H1 Flop: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }
    outputs:
      h1_a_flop: result.output

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── Turn ──

  - name: "H1 Turn: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H1 Turn: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── River ──

  - name: "H1 River: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H1 River: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync Showdown
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── Hand 1 Result ──

  - name: "Hand 1 Result"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_hand_result
    outputs:
      h1_winner: result.output.winner_id
      h1_winning_hand: result.output.winning_hand
      h1_pot: result.output.pot
      h1_reason: result.output.reason
      h1_community: result.output.community_cards
      h1_cards: result.output.player_cards

  - name: Assert Hand 1 went to showdown
    type: assert
    statements:
      - "is_set({{h1_winner}})"
      - "{{h1_pot}} == 40"
      - 'equal({{h1_reason}}, "showdown")'
      - "is_set({{h1_winning_hand}})"
      - "is_set({{h1_community}})"
      - "is_set({{h1_cards}})"

  - name: Chip check after Hand 1
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_game_state
    outputs:
      h1_final_players: result.output.players
      h1_final_phase: result.output.phase

  - name: Assert Hand 1 complete
    type: assert
    statements:
      - 'equal({{h1_final_phase}}, "Waiting")'

  # ============================================
  # HAND 2 — Dealer rotates. Bot B (dealer/SB) vs Bot A (BB)
  # ============================================

  # ── Reconfigure blinds for Hand 2 (5/10 instead of 10/20) ──

  - name: "Reconfigure: blinds 5/10"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: configure
    args:
      small_blind: 5
      big_blind: 10

  - name: "Hand 2: Deal"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: start_hand

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # Dealer rotated → Bot B is dealer/SB, acts first preflop

  - name: "H2 PreFlop: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H2 PreFlop: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # Flop H2: Bot A acts first (non-dealer)

  - name: "H2 Flop: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H2 Flop: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # Turn H2

  - name: "H2 Turn: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H2 Turn: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # River H2

  - name: "H2 River: Bot A decides"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: "H2 River: Bot B decides"
    type: call
    node: bot-2
    context_id: "{{context_id}}"
    executor_public_key: "{{public_key_bot-2}}"
    method: bot_play
    args: { strategy: 1 }

  - name: Sync
    type: wait_for_sync
    context_id: "{{context_id}}"
    nodes: [bot-1, bot-2]
    timeout: 60
    check_interval: 2
    trigger_sync: true

  # ── Hand 2 Result ──

  - name: "Hand 2 Result"
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_hand_result
    outputs:
      h2_winner: result.output.winner_id
      h2_winning_hand: result.output.winning_hand
      h2_pot: result.output.pot
      h2_community: result.output.community_cards
      h2_cards: result.output.player_cards

  - name: Assert Hand 2 went to showdown (blinds 5/10 → pot=20)
    type: assert
    statements:
      - "is_set({{h2_winner}})"
      - "{{h2_pot}} == 20"
      - "is_set({{h2_winning_hand}})"

  # ── Final scoreboard ──

  - name: Final Scoreboard
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_game_state
    outputs:
      final_phase: result.output.phase
      final_hand_num: result.output.hand_number
      final_players: result.output.players

  - name: Assert 2 hands played, chips conserved
    type: assert
    statements:
      - 'equal({{final_phase}}, "Waiting")'
      - "{{final_hand_num}} == 2"
      - "is_set({{final_players}})"

  # ── Hand history & stats ──

  - name: Get Hand History (all)
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_hand_history
    args:
      limit: 0
    outputs:
      history: result.output

  - name: Assert history has 2 entries
    type: assert
    statements:
      - "is_set({{history}})"

  - name: Get Hand History (last 1)
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_hand_history
    args:
      limit: 1
    outputs:
      last_hand: result.output

  - name: Assert last hand is set
    type: assert
    statements:
      - "is_set({{last_hand}})"

  - name: Get Table Stats
    type: call
    node: bot-1
    context_id: "{{context_id}}"
    executor_public_key: "{{member_public_key}}"
    method: get_stats
    outputs:
      stats_hands: result.output.hands_played
      stats_players: result.output.players

  - name: Assert stats show 2 hands and players
    type: assert
    statements:
      - "{{stats_hands}} == 2"
      - "is_set({{stats_players}})"

stop_all_nodes: false
restart: false
wait_timeout: 120
