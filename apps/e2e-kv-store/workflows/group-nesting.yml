name: E2E KV Store - Group Nesting
description: >
  Tests subgroup creation via create_group_in_namespace, explicit
  unnest_group, and explicit nest_group (re-nesting after unnest):
    1. Create subgroup via create_group_in_namespace, verify in listing
    2. Add member, create context in nested group, verify sync
    3. Unnest the group, verify it disappears from subgroup list
    4. Re-nest the group via explicit nest_group, verify it reappears
    5. Verify context still functions through all nesting transitions

force_pull_image: false
near_devnet: false

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: e2e-node

steps:
  # --- Setup ---

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/e2e_kv_store.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Create namespace (parent group)
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      parent_id: namespaceId

  - name: Assert namespace created
    type: assert
    statements:
      - "is_set({{parent_id}})"

  - name: Invite node-2
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{parent_id}}'
    outputs:
      invite: invitation

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{parent_id}}'
    invitation: '{{invite}}'
    outputs:
      identity_node2: memberIdentity

  # --- SCENARIO 1: Create child group, verify in listing ---

  - name: Create child group via namespace
    type: create_group_in_namespace
    node: e2e-node-1
    namespace_id: '{{parent_id}}'
    group_alias: nestable-child
    outputs:
      child_id: groupId

  - name: Assert child group created
    type: assert
    statements:
      - "is_set({{child_id}})"

  - name: List subgroups after creation
    type: list_subgroups
    node: e2e-node-1
    group_id: '{{parent_id}}'
    outputs:
      subs_after_create: subgroups

  - name: Assert child is listed as subgroup
    type: assert
    statements:
      - "is_set({{subs_after_create}})"

  # --- SCENARIO 2: Use nested group — add member, context, sync ---

  - name: Add node-2 to child group
    type: add_group_members
    node: e2e-node-1
    group_id: '{{child_id}}'
    members:
      - identity: '{{identity_node2}}'
        role: Member

  - name: Create context in child group
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{child_id}}'
    outputs:
      child_ctx_id: contextId

  - name: Assert child context created
    type: assert
    statements:
      - "is_set({{child_ctx_id}})"

  - name: Wait for membership and context propagation
    type: wait
    seconds: 5

  - name: Node-2 joins child context
    type: join_context
    node: e2e-node-2
    context_id: '{{child_ctx_id}}'

  - name: Node-1 writes to child context
    type: call
    node: e2e-node-1
    context_id: '{{child_ctx_id}}'
    method: set
    args:
      key: "nested_key"
      value: "nested_value"

  - name: Wait for child context sync
    type: wait_for_sync
    context_id: '{{child_ctx_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Node-2 reads from child context
    type: call
    node: e2e-node-2
    context_id: '{{child_ctx_id}}'
    method: get
    args:
      key: "nested_key"
    outputs:
      nested_read: result

  - name: Assert child context synced
    type: json_assert
    statements:
      - 'json_equal({{nested_read}}, {"output": "nested_value"})'

  # --- SCENARIO 3: Unnest the child group, verify removal ---

  - name: Unnest child from parent
    type: unnest_group
    node: e2e-node-1
    parent_group_id: '{{parent_id}}'
    child_group_id: '{{child_id}}'

  - name: List subgroups after unnest
    type: list_subgroups
    node: e2e-node-1
    group_id: '{{parent_id}}'
    outputs:
      subs_after_unnest: subgroups

  # After unnest the subgroup list should be empty (no children)
  - name: Assert subgroup list is empty after unnest
    type: assert
    statements:
      - "not(is_set({{subs_after_unnest}}))"

  # --- SCENARIO 4: Re-nest via explicit nest_group, verify it reappears ---

  - name: Wait for unnest propagation
    type: wait
    seconds: 3

  - name: Re-nest child under parent via nest_group
    type: nest_group
    node: e2e-node-1
    parent_group_id: '{{parent_id}}'
    child_group_id: '{{child_id}}'

  - name: List subgroups after re-nest
    type: list_subgroups
    node: e2e-node-1
    group_id: '{{parent_id}}'
    outputs:
      subs_after_renest: subgroups

  - name: Assert child reappears in subgroup list
    type: assert
    statements:
      - "is_set({{subs_after_renest}})"

  # --- SCENARIO 5: Verify context still functions through all transitions ---

  - name: Node-1 writes after re-nest
    type: call
    node: e2e-node-1
    context_id: '{{child_ctx_id}}'
    method: set
    args:
      key: "post_renest_key"
      value: "still_works"

  - name: Wait for sync after re-nest
    type: wait_for_sync
    context_id: '{{child_ctx_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Node-2 reads after re-nest
    type: call
    node: e2e-node-2
    context_id: '{{child_ctx_id}}'
    method: get
    args:
      key: "post_renest_key"
    outputs:
      post_renest_read: result

  - name: Assert context works after re-nest
    type: json_assert
    statements:
      - 'json_equal({{post_renest_read}}, {"output": "still_works"})'

stop_all_nodes: false
