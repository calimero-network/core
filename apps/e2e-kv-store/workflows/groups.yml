name: E2E KV Store - Group Lifecycle Tests
description: >
  Tests group creation, group invitation, join group, join group context,
  multi-context groups, and context invitation within groups.

force_pull_image: false
near_devnet: false

nodes:
  count: 2
  image: ghcr.io/calimero-network/merod:edge
  prefix: e2e-node

steps:
  # --- SCENARIO 1: Full namespace lifecycle ---

  - name: Install application on node-1
    type: install_application
    node: e2e-node-1
    path: res/e2e_kv_store.wasm
    dev: true
    outputs:
      app_id: applicationId

  - name: Assert application installed
    type: assert
    statements:
      - "is_set({{app_id}})"

  - name: Create namespace on node-1
    type: create_namespace
    node: e2e-node-1
    application_id: '{{app_id}}'
    outputs:
      namespace_id: namespaceId

  - name: Assert namespace created
    type: assert
    statements:
      - "is_set({{namespace_id}})"

  - name: Create context 1 in namespace on node-1
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx1_id: contextId
      ctx1_key_node1: memberPublicKey

  - name: Create namespace invitation on node-1
    type: create_namespace_invitation
    node: e2e-node-1
    namespace_id: '{{namespace_id}}'

  - name: Node-2 joins namespace
    type: join_namespace
    node: e2e-node-2
    namespace_id: '{{namespace_id}}'
    invitation: '{{group_invitation_e2e-node-1}}'
    outputs:
      member_identity_node2: memberIdentity

  - name: Node-1 writes to context 1
    type: call
    node: e2e-node-1
    context_id: '{{ctx1_id}}'
    executor_public_key: '{{ctx1_key_node1}}'
    method: set
    args:
      key: "group_key1"
      value: "from_node1"

  - name: Wait for sync - context 1
    type: wait_for_sync
    context_id: '{{ctx1_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Node-2 reads from context 1
    type: call
    node: e2e-node-2
    context_id: '{{ctx1_id}}'
    executor_public_key: '{{member_identity_node2}}'
    method: get
    args:
      key: "group_key1"
    outputs:
      get_result_1: result

  - name: Assert node-1 value synced to node-2
    type: json_assert
    statements:
      - 'json_equal({{get_result_1}}, {"output": "from_node1"})'

  - name: Node-2 writes to context 1
    type: call
    node: e2e-node-2
    context_id: '{{ctx1_id}}'
    executor_public_key: '{{member_identity_node2}}'
    method: set
    args:
      key: "group_key2"
      value: "from_node2"

  - name: Wait for sync - context 1 reverse
    type: wait_for_sync
    context_id: '{{ctx1_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Node-1 reads node-2 value
    type: call
    node: e2e-node-1
    context_id: '{{ctx1_id}}'
    executor_public_key: '{{ctx1_key_node1}}'
    method: get
    args:
      key: "group_key2"
    outputs:
      get_result_2: result

  - name: Assert node-2 value synced to node-1
    type: json_assert
    statements:
      - 'json_equal({{get_result_2}}, {"output": "from_node2"})'


  # --- SCENARIO 2 : Context invitation within namespace ---

  - name: Create context 3 in same namespace
    type: create_context
    node: e2e-node-1
    application_id: '{{app_id}}'
    group_id: '{{namespace_id}}'
    outputs:
      ctx3_id: contextId
      ctx3_key_node1: memberPublicKey

  - name: Node-2 joins context 3 via group membership
    type: join_context
    node: e2e-node-2
    context_id: '{{ctx3_id}}'
    outputs:
      ctx3_key_node2: memberPublicKey

  - name: Wait for sync - context 3
    type: wait_for_sync
    context_id: '{{ctx3_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Node-2 writes to context 3
    type: call
    node: e2e-node-2
    context_id: '{{ctx3_id}}'
    executor_public_key: '{{ctx3_key_node2}}'
    method: set
    args:
      key: "ctx3_test"
      value: "invite_join_works"

  - name: Wait for sync - context 3 write
    type: wait_for_sync
    context_id: '{{ctx3_id}}'
    nodes:
      - e2e-node-1
      - e2e-node-2
    timeout: 60
    check_interval: 2
    trigger_sync: true

  - name: Node-1 reads from context 3
    type: call
    node: e2e-node-1
    context_id: '{{ctx3_id}}'
    executor_public_key: '{{ctx3_key_node1}}'
    method: get
    args:
      key: "ctx3_test"
    outputs:
      ctx3_get_result: result

  - name: Assert context invitation join works
    type: json_assert
    statements:
      - 'json_equal({{ctx3_get_result}}, {"output": "invite_join_works"})'

stop_all_nodes: false
