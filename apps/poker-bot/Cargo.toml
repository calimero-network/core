[package]
name = "poker-bot"
version = "0.1.0"
edition = "2021"
publish = false
description = "External AI bot client for Calimero Poker — connects via JSON-RPC"

[[bin]]
name = "poker-bot"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ureq = { version = "2", features = ["json"] }
rand = "0.8"
