name: App migration e2e

# End-to-end coverage for the per-context application migration
# pipeline and its namespace-cascade extensions. One shared `build`
# job compiles merod:local and every migration-suite + scenario-*
# WASM fixture once; the `scenario` matrix fans those artifacts out
# across one job per workflow under workflows/app-migration/ so every
# scenario runs in parallel and reports its own pass/fail.

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "crates/context/src/handlers/update_application/**"
      - "crates/context/src/handlers/upgrade_group.rs"
      - "crates/context/src/handlers/apply_signed_group_op.rs"
      - "crates/context/src/handlers/create_group.rs"
      - "crates/context/primitives/src/local_governance/**"
      - "crates/governance-store/src/ops/**"
      - "crates/storage/src/interface.rs"
      - "crates/sdk/macros/**"
      - "apps/migrations/**"
      - "workflows/app-migration/**"
      - ".github/workflows/app-migration-e2e.yml"
      - ".github/actions/build-local-merod/**"
      - ".github/actions/setup-merobox/**"

  pull_request:
    branches: [master]
    paths:
      - "crates/context/src/handlers/update_application/**"
      - "crates/context/src/handlers/upgrade_group.rs"
      - "crates/context/src/handlers/apply_signed_group_op.rs"
      - "crates/context/src/handlers/create_group.rs"
      - "crates/context/primitives/src/local_governance/**"
      - "crates/governance-store/src/ops/**"
      - "crates/storage/src/interface.rs"
      - "crates/sdk/macros/**"
      - "apps/migrations/**"
      - "workflows/app-migration/**"
      - ".github/workflows/app-migration-e2e.yml"
      - ".github/actions/build-local-merod/**"
      - ".github/actions/setup-merobox/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: info,calimero_=debug
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  # One shared build of merod:local + every migration-suite +
  # scenario-* WASM fixture. Both are uploaded as artifacts so the
  # downstream matrix jobs never re-compile Rust.
  build:
    name: Build merod
    runs-on: ubuntu-24.04-8cpu
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          # Share the e2e-rust-apps cache bucket: this job builds the same
          # native x86_64 merod release binary, so it rides that workflow's
          # already-warm dependency cache instead of a private cold one.
          shared-key: e2e-rust-apps
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build local merod image
        uses: ./.github/actions/build-local-merod
        env:
          CALIMERO_WEBUI_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALIMERO_AUTH_FRONTEND_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all WASM fixtures
        run: bash workflows/app-migration/build-wasms.sh

      - name: Save merod:local Docker image
        run: |
          mkdir -p image-artifact
          docker save merod:local | gzip > image-artifact/merod-local.tar.gz
          ls -la image-artifact/

      - name: Upload merod image artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-migration-merod-image
          path: image-artifact/merod-local.tar.gz
          retention-days: 1

      - name: Upload WASM fixtures artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-migration-wasm-fixtures
          # The workflows install the signed same-package .mpk bundles; the
          # raw wasms ride along for the schema-guard job and local rebuilds.
          path: |
            apps/migrations/**/res/*.wasm
            apps/migrations/**/res/*.mpk
          retention-days: 1
          if-no-files-found: error

  # Static migration-safety guard (no merobox / no runtime): build the
  # deliberate identity-downgrade scenario, emit both versions' state schemas,
  # and assert `calimero-abi diff` catches the AuthoredMap -> UnorderedMap
  # downgrade (UNSAFE_IDENTITY_DOWNGRADE, exit 1). This proves the L2 lint fires
  # on a real, emitter-produced schema pair — the downgrade pair is intentionally
  # NOT in the merobox matrix because a downgrade migration is unsafe at runtime.
  schema-downgrade-guard:
    name: Schema downgrade guard
    runs-on: ubuntu-24.04-8cpu
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          # Read the warm e2e-rust-apps dependency cache, but never SAVE under that
          # key: the `build` job owns it, and a second writer for the same key only
          # races / wastes a save. This guard is read-only on the shared cache.
          shared-key: e2e-rust-apps
          save-if: false

      - name: Build calimero-abi
        run: cargo build -p mero-abi

      - name: Emit downgrade-scenario state schemas
        run: |
          bash apps/migrations/scenario-identity-downgrade-v1/build.sh
          bash apps/migrations/scenario-identity-downgrade-v2/build.sh

      - name: calimero-abi diff must flag the identity downgrade
        run: |
          set +e
          # Capture stderr too (2>&1): on a compile/runtime failure the diagnostic
          # would otherwise be lost and the assertion below would print a confusing
          # "expected exit 1" against empty output instead of the real error.
          OUT=$(cargo run -q -p mero-abi -- diff \
            apps/migrations/scenario-identity-downgrade-v2/res/state-schema.json \
            apps/migrations/scenario-identity-downgrade-v1/res/state-schema.json 2>&1)
          CODE=$?
          echo "$OUT"
          if [ "$CODE" -ne 1 ]; then
            echo "::error::expected exit 1 (the downgrade must fail CI), got $CODE"
            exit 1
          fi
          echo "$OUT" | grep -q "UNSAFE_IDENTITY_DOWNGRADE" || {
            echo "::error::expected an UNSAFE_IDENTITY_DOWNGRADE finding"
            exit 1
          }
          echo "✓ identity downgrade correctly flagged and failed CI"

  # Fan-out: one matrix entry per workflow YAML. Each entry downloads
  # the pre-built image + fixtures, then runs exactly one merobox
  # workflow. fail-fast disabled so a flaky scenario doesn't mask
  # other failures in the same run.
  scenario:
    name: ${{ matrix.workflow }}
    needs: build
    runs-on: ubuntu-24.04-8cpu
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        workflow:
          - 00-single-group-migration-baseline
          - 01-namespace-cascade-migration
          - 02-scenario-additive-field
          - 03-scenario-remove-field
          - 04-scenario-rename-field
          - 05-scenario-change-type
          - 06-scenario-new-method
          - 07-scenario-new-enum-variant
          - 08-scenario-pure-bugfix
          - 09-scenario-crdt-native
          - 10-scenario-struct-to-enum
          - 11-scenario-field-split
          - 12-scenario-field-remove-archive
          - 13-scenario-invariant-reshuffle
          - 14-cascade-status-rpc
          - 15-scenario-authored-map
          - 16-scenario-user-storage
          - 17-scenario-frozen-storage
          - 18-scenario-shared-storage
          - 19-scenario-authored-vector
          - 20-scenario-unordered-set
          - 21-reads-available-during-upgrade
          - 22-scenario-identity-downgrade
          - 26-owner-driven-authored
          - 28-get-migration-status
          - 29-migration-check-pass
          - 30-migration-check-fail-abort
          - 31-admin-abort-logical
          - 32-authored-migrate-ux
          - 33-authored-remaining-count
          - 35-two-namespaces-coexist
          - 36-chained-catchup
          - 37-namespace-invite-join-regression
    env:
      WORKFLOW: ${{ matrix.workflow }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download merod image artifact
        uses: actions/download-artifact@v4
        with:
          name: app-migration-merod-image
          path: image-artifact

      - name: Load merod:local Docker image
        run: |
          gunzip -c image-artifact/merod-local.tar.gz | docker load
          docker images | grep merod || true

      - name: Download WASM fixtures
        uses: actions/download-artifact@v4
        with:
          name: app-migration-wasm-fixtures
          path: apps/migrations

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Run workflow
        run: |
          mkdir -p docker-logs
          LOGDIR="$GITHUB_WORKSPACE/docker-logs"
          # merobox 0.6.34+ persists per-container logs natively to
          # data/container-logs/<name>.log on every `bootstrap run`,
          # regardless of `stop_all_nodes` (calimero-network/merobox#207).
          # This replaces the old background `docker logs -f` watcher.

          set +e
          set -o pipefail
          merobox bootstrap run "workflows/app-migration/${WORKFLOW}.yml" \
              --image merod:local \
              --e2e-mode \
              --verbose 2>&1 | tee "docker-logs/merobox-${WORKFLOW}.log"
          wf_exit=${PIPESTATUS[0]}
          set +o pipefail

          # Collect merobox's native per-container logs into the artifact dir.
          for f in data/container-logs/*.log; do
              [ -e "$f" ] || continue
              cp -f "$f" "$LOGDIR/$(basename "$f")"
          done

          exit "$wf_exit"

      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-migration-logs-${{ matrix.workflow }}
          path: docker-logs/
          retention-days: 7
          if-no-files-found: ignore
