name: Deploy Docs Site (Starlight)

# Builds the new Astro Starlight documentation site (docs-site/) and deploys it
# to GitHub Pages. MANUAL ONLY for now (workflow_dispatch): a repo has a single
# Pages site, currently owned by `pages.yml` (the legacy architecture/ folder).
# Running this performs the migration cutover — it publishes the Starlight site
# at the Pages root and preserves the legacy hand-built site under
# /architecture-legacy/ so nothing is lost. To fully cut over later, retire
# pages.yml and switch this `on:` to `push` on docs-site/** ; to roll back,
# re-run pages.yml.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Shares the `pages` concurrency group with pages.yml so the two never race.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install
        working-directory: docs-site
        run: npm ci

      - name: Build
        working-directory: docs-site
        run: npm run build

      # Keep the legacy hand-built site reachable during migration.
      - name: Bundle legacy architecture site
        run: |
          mkdir -p docs-site/dist/architecture-legacy
          cp -r architecture/* docs-site/dist/architecture-legacy/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
