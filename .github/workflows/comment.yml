name: PR Comment

on:
  workflow_run:
    workflows:
      [
        "PR Description",
        "PR Title",
        "E2E - Rust Apps",
      ]
    types:
      - completed

# Least-privilege: runs in the base-repo context (workflow_run); only needs to read
# the triggering run's artifacts and post a PR comment.
permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  submit:
    name: Submit
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion != 'cancelled'

    steps:
      - name: Set artifact name
        id: artifact
        run: |
          case "${{ github.event.workflow_run.name }}" in
            "E2E - Rust Apps") echo "name=pr-comment-payload-rust-apps" >> $GITHUB_OUTPUT ;;
            *) echo "name=pr-comment-payload" >> $GITHUB_OUTPUT ;;
          esac

      - name: Download artifact
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ${{ steps.artifact.outputs.name }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract payload
        id: payload
        if: ${{ steps.download.outcome == 'success' }}
        # payload.json comes from a fork-influenced workflow artifact. Emit each value
        # with a unique random heredoc delimiter so its contents cannot forge extra
        # workflow outputs (output injection).
        run: |
          emit() {
            local delim
            delim="EOF_$(openssl rand -hex 16)"
            {
              printf '%s<<%s\n' "$1" "$delim"
              jq "$2" payload.json
              printf '%s\n' "$delim"
            } >> "$GITHUB_OUTPUT"
          }
          emit pr '.pr'
          emit tag '.tag'
          emit mode '.mode'
          emit message '.message'

      - name: Apply pull request comment
        if: ${{ steps.download.outcome == 'success' }}
        uses: thollander/actions-comment-pull-request@65f9e5c9a1f2cd378bd74b2e057c9736982a8e74 # v3
        with:
          pr-number: ${{ fromJson(steps.payload.outputs.pr) }}
          comment-tag: ${{ fromJson(steps.payload.outputs.tag) }}
          mode: ${{ fromJson(steps.payload.outputs.mode) }}
          message: ${{ fromJson(steps.payload.outputs.message) }}
