name: Deploy Architecture Site (legacy — manual rollback only)

# Demoted to manual-only: the Starlight site (docs-site.yml) is now the
# published documentation. Keep this workflow as an emergency rollback — run it
# via "Run workflow" to republish the legacy architecture/ site at the Pages
# root.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: architecture
      - id: deployment
        uses: actions/deploy-pages@v4
