name: SDK E2E (paired)

# Live behavioural gate ("core breaks first"). Builds merod from this PR, boots a
# single node with embedded auth, then runs the mero-js e2e suite against it. A
# renamed/removed param makes the SDK send the old shape → the node 4xx → red here,
# on the core dev's PR. The SDK ref is paired: declare `sdk-ref: <branch>` in the
# PR body (or push a same-named branch on mero-js) so a breaking change and its SDK
# fix go green together; otherwise it runs against mero-js master.

permissions:
  contents: read

# Cancel superseded PR runs; never cancel a master run.
concurrency:
  group: sdk-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

on:
  pull_request:
    paths:
      - "crates/server/**"
      - "crates/auth/**"
      - "crates/primitives/**"
      - "crates/merod/**"
      - ".github/workflows/sdk-e2e.yml"
      - "scripts/resolve-paired-ref.sh"
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always
  SERVER_PORT: "2428"
  # Out-of-band secret gating first-root-key bootstrap (fail-closed since the
  # TOFU removal). The boot step exports it into merod's environment; the
  # "Bootstrap root key" step presents the same value to mint the dev/dev root
  # key BEFORE the SDK suite runs, so mero-js's plain username/password logins
  # authenticate on the existing-user fast path and never need the secret.
  # CI-only test value for an ephemeral localhost node.
  MERO_AUTH_BOOTSTRAP_SECRET: sdk-e2e-ci-bootstrap
  # Root-user credentials, pre-provisioned by the "Bootstrap root key" step
  # and consumed by mero-js's e2e harness (tests/e2e/harness.ts resolveCreds()
  # reads MERO_E2E_USER / MERO_E2E_PASS, defaulting to dev/dev). Pinning them
  # here keeps both sides in lockstep even if the harness defaults change.
  #
  # The password MUST satisfy the provider's configured minimum length
  # (default 8): the "Bootstrap root key" step below creates the root key, and
  # creation enforces the minimum (a short password → 401 at bootstrap). This
  # workflow-level value is what that step inherits, so it cannot be `dev`.
  MERO_E2E_USER: dev
  MERO_E2E_PASS: dev-password

jobs:
  sdk-e2e:
    name: SDK E2E (paired)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout core (PR head)
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust toolchain
        # Pinned to a commit SHA (supply-chain hygiene); comment tracks the tag.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build merod
        run: cargo build -p merod --bin merod

      - name: Resolve mero-js ref (paired)
        id: sdkref
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          chmod +x scripts/resolve-paired-ref.sh
          REF="$(scripts/resolve-paired-ref.sh master)"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Testing against mero-js@$REF"

      - name: Checkout mero-js (paired ref)
        uses: actions/checkout@v7
        with:
          repository: calimero-network/mero-js
          ref: ${{ steps.sdkref.outputs.ref }}
          path: _mero-js

      - name: Setup Node + pnpm
        uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install -g pnpm

      - name: Boot merod (embedded auth, single node)
        run: |
          BIN="$PWD/target/debug/merod"
          "$BIN" --node ci-node init --server-port "$SERVER_PORT" --swarm-port 2528 --auth-mode embedded
          "$BIN" --node ci-node run &
          echo "MEROD_PID=$!" >> "$GITHUB_ENV"
          # Wait for the admin API to answer.
          for i in $(seq 1 60); do
            if curl -fsS "http://localhost:$SERVER_PORT/admin-api/health" >/dev/null 2>&1; then
              echo "merod healthy"; break
            fi
            sleep 2
            if [ "$i" = "60" ]; then echo "merod did not become healthy"; exit 1; fi
          done

      - name: Bootstrap root key (out-of-band secret)
        # First-root-key bootstrap requires MERO_AUTH_BOOTSTRAP_SECRET (the
        # node inherited it from the boot step's environment). Mint the root
        # key for MERO_E2E_USER here so every login the SDK suite performs is
        # a plain existing-user authentication — including the negative test
        # that asserts wrong/wrong is rejected (a root key exists, so the
        # bootstrap path never re-opens).
        run: |
          BODY=$(jq -n --arg u "$MERO_E2E_USER" --arg p "$MERO_E2E_PASS" \
            --arg s "$MERO_AUTH_BOOTSTRAP_SECRET" --argjson ts "$(date +%s)" \
            '{auth_method: "user_password", public_key: $u,
              client_name: "sdk-e2e-ci", permissions: ["admin"], timestamp: $ts,
              provider_data: {username: $u, password: $p, bootstrap_secret: $s}}')
          RESP=$(curl -fsS -m 10 -X POST "http://localhost:$SERVER_PORT/auth/token" \
            -H 'Content-Type: application/json' -d "$BODY") || {
              echo "::error::root-key bootstrap request failed"; exit 1; }
          TOKEN=$(echo "$RESP" | jq -r '.data.access_token // empty')
          if [ -z "$TOKEN" ]; then
            echo "::error::root-key bootstrap did not return a token: $RESP"
            exit 1
          fi
          echo "root key bootstrapped for user $MERO_E2E_USER"

      - name: Run mero-js e2e against booted node
        working-directory: _mero-js
        env:
          NODE_BASE_URL: "http://localhost:${{ env.SERVER_PORT }}"
          # The e2e coverage recorder writes the endpoints it hit here.
          MERO_COVERAGE_OUT: "${{ github.workspace }}/_mero-js/covered-endpoints.json"
          # MERO_E2E_USER / MERO_E2E_PASS are inherited from the workflow-level
          # env (dev / dev-password) so the suite logs in with the exact
          # credentials the "Bootstrap root key" step provisioned. Do not
          # re-declare them here — a second, divergent value is what previously
          # let the bootstrap step mint one password while the suite logged in
          # with another.
        run: |
          pnpm install --frozen-lockfile
          pnpm test:e2e

      - name: Endpoint coverage (manifest vs e2e hits)
        if: always()
        run: |
          COVERED="_mero-js/covered-endpoints.json"
          chmod +x scripts/check-endpoint-coverage.sh
          if [ -f "$COVERED" ]; then
            # Enforced with a baseline ratchet: a NEW uncovered route fails; the
            # accepted-uncovered backlog lives in coverage-baseline.json.
            scripts/check-endpoint-coverage.sh \
              crates/server/endpoints.json "$COVERED" crates/server/coverage-baseline.json
          else
            echo "::warning::no covered-endpoints.json produced by the e2e run"
          fi

      - name: Stop merod
        if: always()
        # Guard the PID — an unset MEROD_PID would make `kill 0` signal the whole
        # process group (it never defaults to 0).
        run: '[ -n "${MEROD_PID:-}" ] && kill "$MEROD_PID" 2>/dev/null || true'
