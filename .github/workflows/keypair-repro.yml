# Throwaway diagnostic workflow for #2469. ITERATION 2:
#
# Iteration 1 (run 26535918008) proved keypair persists across
# `docker restart` for a single merod container — same peer-id
# read from config.toml on disk both pre- and post-restart. So
# the bug is NOT keypair-persistence.
#
# Iteration 2: spin up the actual NAT topology (boot-node + 2
# client nodes + gateway) via merobox, restart node-1, then
# DUMP EVERYTHING — pre-restart node-1, post-restart node-1,
# boot-node, surviving node-2. We're looking for: does
# post-restart node-1 successfully reconnect to boot-node?
# Does it re-register with rendezvous? Earlier evidence said
# node-2's rendezvous queries return empty for 60+ seconds
# post-restart, but we never had node-1's own logs to see why.
#
# Delete this file once the question is answered.
name: keypair-repro
on:
  workflow_dispatch:
  push:
    branches:
      - feat/relay-recovery-workflows
    paths:
      - .github/workflows/keypair-repro.yml

jobs:
  topology-repro:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install merobox via APT
        run: |
          curl -sSL https://calimero-network.github.io/merobox/gpg.key \
            | sudo tee /usr/share/keyrings/merobox.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/merobox.gpg] https://calimero-network.github.io/merobox stable main" \
            | sudo tee /etc/apt/sources.list.d/merobox.list
          sudo apt-get update -o Acquire::https::Timeout=20
          sudo apt-get install -y merobox
          merobox --version

      - name: Pull merod image
        run: docker pull ghcr.io/calimero-network/merod:edge

      - name: Pull boot-node image
        run: docker pull ghcr.io/calimero-network/boot-node:edge

      - name: Run peer-restart workflow with merobox
        # Catch the failure but keep going so we can dump logs.
        # The whole point of this workflow is to capture the
        # diagnostic data, not to make the merobox run succeed.
        continue-on-error: true
        env:
          # Snapshot pre/post-restart logs to a known dir we'll
          # archive. merobox 0.6.24 honors this env var (see
          # merobox/commands/bootstrap/steps/restart.py).
          MEROBOX_RESTART_LOG_DIR: ${{ github.workspace }}/restart-snapshots
          RUST_LOG: debug
        run: |
          set -eu
          mkdir -p restart-snapshots docker-logs
          cd apps/scaffolding-e2e

          # Background watcher: stream `docker logs -f` for every
          # calimero node container to a file. Captures the
          # surviving node-2's logs in real-time AND the boot-
          # node's logs. The pre/post-restart node-1 logs land
          # in restart-snapshots/ via merobox 0.6.24.
          LOGDIR="$GITHUB_WORKSPACE/docker-logs"
          mkdir -p "$LOGDIR"
          STOP_FILE="$(mktemp)"
          (
            seen=""
            while [ ! -f "$STOP_FILE" ]; do
              for c in $(docker ps --filter "label=calimero.node=true" --format "{{.Names}}" 2>/dev/null | grep -v -- '-init$' || true); do
                if ! echo "$seen" | grep -qw "$c"; then
                  seen="$seen $c"
                  echo "[watcher] following $c"
                  docker logs -f "$c" > "$LOGDIR/$c.log" 2>&1 &
                fi
              done
              # Also follow the boot-node (different label).
              for c in $(docker ps --format "{{.Names}}" 2>/dev/null | grep "boot-node" || true); do
                if ! echo "$seen" | grep -qw "$c"; then
                  seen="$seen $c"
                  echo "[watcher] following $c"
                  docker logs -f "$c" > "$LOGDIR/$c.log" 2>&1 &
                fi
              done
              sleep 1
            done
          ) &
          WATCHER=$!

          # Run merobox; ignore exit (we know it'll fail).
          merobox bootstrap run workflows/sync-resilience-peer-restart.yml \
            --image ghcr.io/calimero-network/merod:edge \
            --e2e-mode \
            || true

          touch "$STOP_FILE"
          sleep 2
          kill $WATCHER 2>/dev/null || true
          # Reap any leftover docker-logs -f children.
          for pid in $(jobs -p); do kill "$pid" 2>/dev/null || true; done
          wait 2>/dev/null || true

      - name: Analyze post-restart node-1 connectivity
        if: always()
        run: |
          set -eu
          echo "==================================================="
          echo "Snapshot files (pre/post-restart node-1 logs):"
          echo "==================================================="
          ls -la "$GITHUB_WORKSPACE/restart-snapshots" 2>&1 || echo "no snapshots"

          echo ""
          echo "==================================================="
          echo "Watcher captures (boot-node + nodes, live streams):"
          echo "==================================================="
          ls -la "$GITHUB_WORKSPACE/docker-logs" 2>&1 || echo "no docker-logs"

          PRE=$(ls "$GITHUB_WORKSPACE/restart-snapshots"/*pre-restart*.log 2>/dev/null | head -1 || true)
          POST=$(ls "$GITHUB_WORKSPACE/restart-snapshots"/*post-restart*.log 2>/dev/null | head -1 || true)

          if [ -n "$PRE" ] && [ -n "$POST" ]; then
            PRE_PEER=$(grep -oE 'Peer ID: [A-Za-z0-9]+' "$PRE" | head -1 | awk '{print $3}')
            POST_PEER=$(grep -oE 'Peer ID: [A-Za-z0-9]+' "$POST" | head -1 | awk '{print $3}')
            echo ""
            echo "PRE-restart node-1 peer-id:  $PRE_PEER"
            echo "POST-restart node-1 peer-id: $POST_PEER"
            if [ "$PRE_PEER" = "$POST_PEER" ]; then
              echo "✓ Keypair persists (expected per repro v2)."
            else
              echo "✗ Keypair changed across restart!"
            fi

            echo ""
            echo "=== POST-restart node-1: boot-node connection attempts ==="
            grep -E "boot-node|Identify|Dialing|ConnectionEstablished|ConnectionClosed|Failed to dial|Establish connection" "$POST" | head -30 || echo "(no matches)"

            echo ""
            echo "=== POST-restart node-1: rendezvous events ==="
            grep -iE "rendezvous|register|register req|registration" "$POST" | head -20 || echo "(no matches)"

            echo ""
            echo "=== POST-restart node-1: relay-reservation events ==="
            grep -iE "relay|reservation|circuit|hop" "$POST" | head -30 || echo "(no matches)"

            echo ""
            echo "=== POST-restart node-1: error / warn lines ==="
            grep -iE "ERROR|WARN" "$POST" | head -30 || echo "(no matches)"
          else
            echo ""
            echo "✗ Missing snapshots — pre=$PRE post=$POST"
            echo "Check whether merobox got to the restart_container step."
          fi

      - name: Upload all logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keypair-repro-topology-${{ github.sha }}
          path: |
            ${{ github.workspace }}/restart-snapshots/
            ${{ github.workspace }}/docker-logs/
          retention-days: 7
          if-no-files-found: warn
