# Throwaway diagnostic workflow for #2469. ITERATION 4:
#
# v2 ruled out keypair-persistence (single-container test).
# v3 ran the actual peer-restart workflow but died at
# `install_application` because the scaffolding-e2e WASM
# isn't shipped from this workflow (the regular CI builds it
# in a separate job). Key finding from v3: the NAT topology
# setup ITSELF worked perfectly — both clients reached the
# boot-node on the first probe, no flake. So the bug isn't
# in merobox setup; the matrix-level reachability flake is
# unrelated.
#
# v4: write a minimal merobox YAML INLINE that needs no
# external WASM. Just: spin up the NAT topology, get a relay
# reservation, restart node-1, wait, then exit. The merobox
# `restart_container` step's pre/post snapshots are what we
# care about — the absence of any test logic just lets us
# isolate the libp2p-layer reconnection.
#
# Delete this file once the question is answered.
name: keypair-repro
on:
  workflow_dispatch:
  push:
    branches:
      - feat/relay-recovery-workflows
    paths:
      - .github/workflows/keypair-repro.yml

jobs:
  topology-repro:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install merobox via APT
        run: |
          curl -sSL https://calimero-network.github.io/merobox/gpg.key \
            | sudo tee /usr/share/keyrings/merobox.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/merobox.gpg] https://calimero-network.github.io/merobox stable main" \
            | sudo tee /etc/apt/sources.list.d/merobox.list
          sudo apt-get update -o Acquire::https::Timeout=20
          sudo apt-get install -y merobox
          merobox --version

      - name: Pull images
        run: |
          docker pull ghcr.io/calimero-network/merod:edge
          docker pull ghcr.io/calimero-network/boot-node:edge

      - name: Write minimal NAT-restart workflow
        run: |
          mkdir -p /tmp/repro
          cat > /tmp/repro/minimal-restart.yml <<'YAML'
          description: >
            Minimal NAT-topology restart repro for #2469. No
            application install, no sync — just bring up the
            topology, wait, restart node-1, wait, exit. The
            point is to capture pre/post-restart node-1 logs
            via merobox 0.6.24's snapshot feature.

          name: Minimal NAT restart repro

          topology:
            type: nat
            nat_mode: cone

          nodes:
            count: 2
            image: ghcr.io/calimero-network/merod:edge
            prefix: sync-resil-node

          steps:
            - name: Wait for libp2p to settle (initial)
              type: wait
              seconds: 10

            - name: Restart node-1 mid-session
              type: restart_container
              container: sync-resil-node-1
              wait_healthy: true
              timeout: 60

            - name: Wait for libp2p + rendezvous + reservation post-restart
              type: wait
              seconds: 30

          stop_all_nodes: true
          YAML
          cat /tmp/repro/minimal-restart.yml

      - name: Run the minimal repro
        continue-on-error: true
        env:
          MEROBOX_RESTART_LOG_DIR: ${{ github.workspace }}/restart-snapshots
          RUST_LOG: debug
        run: |
          set -eu
          mkdir -p restart-snapshots docker-logs

          # Background watcher: streams `docker logs -f` for every
          # container that appears, including boot-node + clients
          # + gateway. The clients + gateway get the calimero.node
          # label; the boot-node doesn't, so we follow it by name.
          LOGDIR="$GITHUB_WORKSPACE/docker-logs"
          STOP_FILE="$(mktemp)"
          (
            seen=""
            while [ ! -f "$STOP_FILE" ]; do
              for c in $(docker ps --filter "label=calimero.node=true" --format "{{.Names}}" 2>/dev/null | grep -v -- '-init$' || true); do
                if ! echo "$seen" | grep -qw "$c"; then
                  seen="$seen $c"
                  echo "[watcher] following $c"
                  docker logs -f "$c" > "$LOGDIR/$c.log" 2>&1 &
                fi
              done
              for c in $(docker ps --format "{{.Names}}" 2>/dev/null | grep -E "boot-node|nat-gateway" || true); do
                if ! echo "$seen" | grep -qw "$c"; then
                  seen="$seen $c"
                  echo "[watcher] following $c"
                  docker logs -f "$c" > "$LOGDIR/$c.log" 2>&1 &
                fi
              done
              sleep 1
            done
          ) &
          WATCHER=$!

          merobox bootstrap run /tmp/repro/minimal-restart.yml \
            --image ghcr.io/calimero-network/merod:edge \
            --e2e-mode || echo "(merobox exited non-zero — expected if stop_all_nodes raced)"

          touch "$STOP_FILE"
          sleep 2
          kill $WATCHER 2>/dev/null || true
          for pid in $(jobs -p); do kill "$pid" 2>/dev/null || true; done
          wait 2>/dev/null || true

      - name: Analyze post-restart node-1 connectivity
        if: always()
        run: |
          set -eu
          echo "==================================================="
          echo "Snapshot files (pre/post-restart node-1 logs):"
          echo "==================================================="
          ls -la "$GITHUB_WORKSPACE/restart-snapshots" 2>&1 || echo "no snapshots"

          echo ""
          echo "==================================================="
          echo "Watcher captures (boot-node + clients + gateway):"
          echo "==================================================="
          ls -la "$GITHUB_WORKSPACE/docker-logs" 2>&1 || echo "no docker-logs"

          PRE=$(ls "$GITHUB_WORKSPACE/restart-snapshots"/*pre-restart*.log 2>/dev/null | head -1 || true)
          POST=$(ls "$GITHUB_WORKSPACE/restart-snapshots"/*post-restart*.log 2>/dev/null | head -1 || true)

          if [ -n "$PRE" ] && [ -n "$POST" ]; then
            PRE_PEER=$(grep -oE 'Peer ID: [A-Za-z0-9]+' "$PRE" | head -1 | awk '{print $3}')
            POST_PEER=$(grep -oE 'Peer ID: [A-Za-z0-9]+' "$POST" | head -1 | awk '{print $3}')
            echo ""
            echo "PRE-restart node-1 peer-id:  $PRE_PEER"
            echo "POST-restart node-1 peer-id: $POST_PEER"
            if [ "$PRE_PEER" = "$POST_PEER" ]; then
              echo "✓ Keypair persists (matches v2 single-container repro)"
            else
              echo "✗ Keypair changed across restart!"
            fi

            echo ""
            echo "=== POST-restart node-1: identify / dial / connection events ==="
            grep -E "boot-node|Identify|Dialing|ConnectionEstablished|ConnectionClosed|Failed to dial|established|Address /p2p" "$POST" | head -30 || echo "(no matches)"

            echo ""
            echo "=== POST-restart node-1: rendezvous events ==="
            grep -iE "rendezvous|Register|Discovered" "$POST" | head -20 || echo "(no matches)"

            echo ""
            echo "=== POST-restart node-1: relay-reservation events ==="
            grep -iE "ReservationReq|Hop|circuit|relay" "$POST" | head -30 || echo "(no matches)"

            echo ""
            echo "=== POST-restart node-1: ALL warn/error lines ==="
            grep -iE "ERROR|WARN" "$POST" | head -50 || echo "(no matches)"

            echo ""
            echo "=== Boot-node logs (does it see node-1 reconnect?) ==="
            BOOT_LOG=$(ls "$GITHUB_WORKSPACE/docker-logs"/*boot-node*.log 2>/dev/null | head -1 || true)
            if [ -n "$BOOT_LOG" ]; then
              echo "Last 30 boot-node lines AFTER node-1 restart:"
              # The restart fires after ~10s of initial wait + setup ~10s
              # so look at lines from 30s in onwards.
              tail -200 "$BOOT_LOG" | grep -iE "register|reservation|peer.id|new connection|disconnect" | head -30 || echo "(no matches in boot-node tail)"
            else
              echo "(no boot-node log captured)"
            fi
          else
            echo ""
            echo "✗ Missing snapshots — pre=$PRE post=$POST"
          fi

      - name: Upload all logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keypair-repro-v4-${{ github.sha }}
          path: |
            ${{ github.workspace }}/restart-snapshots/
            ${{ github.workspace }}/docker-logs/
          retention-days: 7
          if-no-files-found: warn
