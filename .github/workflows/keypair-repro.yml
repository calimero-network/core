# Throwaway diagnostic workflow for #2469. ITERATION 5:
#
# Iteration learnings:
#   v2: keypair persists (single container) — confirmed.
#   v3: WASM missing — fixed by writing inline workflow.
#   v4: snapshot fires ~1ms after wait_healthy → captures
#       only merod's earliest startup phase, not libp2p
#       activity. Watcher's label filter didn't match NAT
#       containers either. Total diagnostic: nothing useful.
#
# v5: instead of trying to follow logs in real-time, lean
# on merobox's NATIVE graceful-stop log dump. When
# `stop_all_nodes: true` fires at workflow end, merobox
# writes complete container logs to
# `<data_dir>/container-logs/<node>.log` — including
# everything between restart and stop. We just collect
# all those at the end.
#
# Also bumps the post-restart wait so libp2p has time to
# attempt reconnection + register before the container is
# torn down.
name: keypair-repro
on:
  workflow_dispatch:
  push:
    branches:
      - feat/relay-recovery-workflows
    paths:
      - .github/workflows/keypair-repro.yml

jobs:
  topology-repro:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install merobox via APT
        run: |
          curl -sSL https://calimero-network.github.io/merobox/gpg.key \
            | sudo tee /usr/share/keyrings/merobox.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/merobox.gpg] https://calimero-network.github.io/merobox stable main" \
            | sudo tee /etc/apt/sources.list.d/merobox.list
          sudo apt-get update -o Acquire::https::Timeout=20
          sudo apt-get install -y merobox
          merobox --version

      - name: Pull images
        run: |
          docker pull ghcr.io/calimero-network/merod:edge
          docker pull ghcr.io/calimero-network/boot-node:edge

      - name: Write minimal NAT-restart workflow
        run: |
          mkdir -p /tmp/repro
          cat > /tmp/repro/minimal-restart.yml <<'YAML'
          description: >
            Minimal NAT-topology restart repro for #2469.

          name: Minimal NAT restart repro

          topology:
            type: nat
            nat_mode: cone

          nodes:
            count: 2
            image: ghcr.io/calimero-network/merod:edge
            prefix: sync-resil-node

          steps:
            - name: Wait for libp2p to settle (initial)
              type: wait
              seconds: 15

            - name: Restart node-1 mid-session
              type: restart_container
              container: sync-resil-node-1
              wait_healthy: true
              timeout: 60

            # 60s is plenty for libp2p to attempt every step we
            # care about: dial boot-node, identify, request
            # relay reservation, register with rendezvous. If
            # post-restart node-1 hasn't done any of those by
            # 60s, that's the diagnostic answer.
            - name: Wait for libp2p + rendezvous + reservation post-restart
              type: wait
              seconds: 60

          stop_all_nodes: true
          YAML

      - name: Run the minimal repro
        continue-on-error: true
        env:
          MEROBOX_RESTART_LOG_DIR: ${{ github.workspace }}/restart-snapshots
          RUST_LOG: debug
        run: |
          mkdir -p restart-snapshots
          merobox bootstrap run /tmp/repro/minimal-restart.yml \
            --image ghcr.io/calimero-network/merod:edge \
            --e2e-mode \
            || echo "(merobox exited non-zero — expected if stop_all_nodes raced)"

      - name: Collect graceful-stop container logs
        if: always()
        run: |
          # merobox's `stop_all_nodes: true` triggers
          # `_graceful_stop_containers_batch` which writes the
          # FULL container log to `<data_dir>/container-logs/
          # <node>.log` for each node before it's removed. That
          # includes EVERY post-restart event up to the stop —
          # exactly what we need to see libp2p's reconnection
          # behaviour (which the early `wait_healthy` snapshot
          # misses by 60+ seconds).
          mkdir -p final-logs
          find . -type d -name container-logs 2>/dev/null | while read d; do
            echo "=== found $d ==="
            ls -la "$d"
            cp -r "$d"/* final-logs/ 2>/dev/null || true
          done
          echo ""
          echo "=== final-logs/ contents ==="
          ls -la final-logs/ 2>&1 || echo "(empty)"

      - name: Analyze post-restart node-1 connectivity
        if: always()
        run: |
          set -eu
          NODE1_LOG="final-logs/sync-resil-node-1.log"
          if [ ! -f "$NODE1_LOG" ]; then
            echo "✗ Missing $NODE1_LOG — graceful stop didn't dump"
            ls -la final-logs/ || true
            exit 0
          fi

          # Find the post-restart marker: the SECOND occurrence
          # of "TEE not configured; starting" (the very first
          # line merod prints) marks the boundary between the
          # pre-restart and post-restart container's lifecycle.
          POST_RESTART_LINE=$(grep -n "TEE not configured" "$NODE1_LOG" | sed -n 2p | cut -d: -f1)
          if [ -z "$POST_RESTART_LINE" ]; then
            echo "✗ No second 'TEE not configured' found — restart didn't trigger a fresh merod start?"
            grep -c "TEE not configured" "$NODE1_LOG" || true
            tail -50 "$NODE1_LOG"
            exit 0
          fi
          echo "Post-restart merod startup begins at line $POST_RESTART_LINE"
          echo ""

          # Slice the log to just post-restart content.
          tail -n "+$POST_RESTART_LINE" "$NODE1_LOG" > /tmp/node1-post.log

          PRE_PEER=$(grep -m1 "Peer ID:" "$NODE1_LOG" | grep -oE '12D3KooW[A-Za-z0-9]+')
          POST_PEER=$(grep -m1 "Peer ID:" /tmp/node1-post.log | grep -oE '12D3KooW[A-Za-z0-9]+')
          echo "PRE-restart node-1 peer-id:  $PRE_PEER"
          echo "POST-restart node-1 peer-id: $POST_PEER"
          [ "$PRE_PEER" = "$POST_PEER" ] && echo "✓ Keypair persists" || echo "✗ Keypair changed!"

          echo ""
          echo "=== POST-restart node-1: log line count + duration ==="
          POST_LINES=$(wc -l < /tmp/node1-post.log)
          POST_DURATION=$(awk 'NR==1{first=$0} END{last=$0} END{print first" ... "last}' /tmp/node1-post.log | head -1)
          echo "Lines: $POST_LINES"
          echo ""

          echo "=== POST-restart node-1: BOOT-NODE connection events ==="
          grep -E "Dialing|ConnectionEstablished|ConnectionClosed|Failed to dial.*Transport" /tmp/node1-post.log | grep -oE "(Dialing|ConnectionEstablished|ConnectionClosed|Failed)[^,]*peer[_=]?id?[\":= ]+[A-Za-z0-9]+" | sort -u | head -20 || echo "(no matches)"
          echo ""

          echo "=== POST-restart node-1: rendezvous register attempts ==="
          grep -iE "rendezvous_register|Register req|Sent register" /tmp/node1-post.log | head -10 || echo "(no matches)"
          echo ""

          echo "=== POST-restart node-1: relay reservation attempts ==="
          grep -iE "ReservationReqAccepted|ReservationReqDenied|Hop.*reservation|listening on.*p2p-circuit|Relay.*reservation" /tmp/node1-post.log | head -10 || echo "(no matches)"
          echo ""

          echo "=== POST-restart node-1: any WARN/ERROR ==="
          grep -E " WARN |ERROR" /tmp/node1-post.log | head -30 || echo "(no matches)"
          echo ""

          echo "=== POST-restart node-1: identify events (debug level) ==="
          grep "identify.*Received\|identify.*Sent" /tmp/node1-post.log | head -10 || echo "(no matches)"

      - name: Upload everything
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keypair-repro-v5-${{ github.sha }}
          path: |
            ${{ github.workspace }}/final-logs/
            ${{ github.workspace }}/restart-snapshots/
          retention-days: 7
          if-no-files-found: warn
