name: Docs CI

# Build the Starlight docs site and validate internal links on every PR that
# touches it, so the docs can't silently break. Content-only; no deploy.
on:
  pull_request:
    paths: ['docs-site/**']
  push:
    branches: [master]
    paths: ['docs-site/**']

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
      - run: npm run check   # astro build + internal link check
