name: Auto-follow regression

# Regression runner for the 5 workflows in `workflows/auto-follow-tests/`.
# Runs on push to master + pull_request scoped by the path filter
# below, plus manual `workflow_dispatch`. Same shape as
# `.github/workflows/sync-regression.yml`.
#
# Until the #2422 fix lands, master and any PR touching the listed
# paths are expected to fail at least workflow 2
# (auto-follow-backfill-on-join) and the log-grep guards on workflows
# 4 + 5. That is BY DESIGN here — the red signal is the detection
# signal that drives the fix. Once the fix lands, all five jobs
# should be green; if any go red afterwards, that's a real regression.

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "crates/context/src/auto_follow.rs"
      - "crates/context/src/op_events.rs"
      - "crates/context/src/group_store/**"
      - "crates/context/src/handlers/set_member_auto_follow.rs"
      - "crates/context/src/handlers/create_context.rs"
      - "crates/node/src/sync/**"
      - "crates/node/primitives/src/sync/**"
      - "crates/store/src/**"
      - "workflows/auto-follow-tests/**"
      - ".github/workflows/auto-follow-regression.yml"
      - ".github/actions/build-local-merod/**"
      - ".github/actions/setup-merobox/**"

  pull_request:
    branches: [master]
    paths:
      - "crates/context/src/auto_follow.rs"
      - "crates/context/src/op_events.rs"
      - "crates/context/src/group_store/**"
      - "crates/context/src/handlers/set_member_auto_follow.rs"
      - "crates/context/src/handlers/create_context.rs"
      - "crates/node/src/sync/**"
      - "crates/node/primitives/src/sync/**"
      - "crates/store/src/**"
      - "workflows/auto-follow-tests/**"
      - ".github/workflows/auto-follow-regression.yml"
      - ".github/actions/build-local-merod/**"
      - ".github/actions/setup-merobox/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: info,calimero_=debug
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  auto-follow-regression:
    name: Auto-follow regression (${{ matrix.workflow }})
    runs-on: ubuntu-24.04-8cpu
    timeout-minutes: 20
    # Fail-fast off: until #2422 is fixed, some workflows are expected
    # to fail. We still want every entry's outcome on every run so the
    # bug-coverage map is complete.
    strategy:
      fail-fast: false
      matrix:
        workflow:
          - auto-follow-on-context-registered
          - auto-follow-backfill-on-join
          - auto-follow-flag-flipped-late
          - no-unknown-context-rejection-spam
          - asymmetric-context-membership
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          shared-key: auto-follow-regression
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build local merod image
        uses: ./.github/actions/build-local-merod
        env:
          CALIMERO_WEBUI_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALIMERO_AUTH_FRONTEND_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build kv-store-with-handlers WASM
        run: |
          cd apps/kv-store-with-handlers
          ./build.sh

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Run workflow
        # Same log-capture + run pattern as sync-regression.yml.
        # Container logs are captured WHILE the run is live —
        # `merobox bootstrap run` tears containers down on exit, so a
        # post-run `docker logs` pass would find nothing.
        #
        # `MATRIX_WORKFLOW` is bound to a fixed matrix value, not
        # attacker-controlled input, but we still funnel it through an
        # env var so the shell body contains no `${{ ... }}` GitHub
        # interpolation — matches sync-regression.yml convention.
        env:
          MATRIX_WORKFLOW: ${{ matrix.workflow }}
        run: |
          mkdir -p docker-logs

          LOGDIR="$GITHUB_WORKSPACE/docker-logs"
          WATCHER_STATE_DIR="$(mktemp -d)"
          (
            while [ ! -f "$WATCHER_STATE_DIR/stop" ]; do
              for c in $(docker ps --filter "label=calimero.node=true" \
                                   --format "{{.Names}}" 2>/dev/null \
                         | grep -v -- '-init$' || true); do
                mark="$WATCHER_STATE_DIR/${c}"
                if [ ! -f "$mark" ]; then
                  touch "$mark"
                  echo "[log-watcher] following $c"
                  docker logs -f --timestamps "$c" \
                    > "$LOGDIR/${c}.log" 2>&1 &
                fi
              done
              sleep 1
            done
          ) &
          WATCHER_PID=$!

          set +e
          set -o pipefail
          merobox bootstrap run \
              "workflows/auto-follow-tests/${MATRIX_WORKFLOW}.yml" \
              --image merod:local \
              --e2e-mode \
              --verbose 2>&1 | tee "docker-logs/merobox-${MATRIX_WORKFLOW}.log"
          exit_code=$?
          set +o pipefail

          touch "$WATCHER_STATE_DIR/stop"
          sleep 2
          kill "$WATCHER_PID" 2>/dev/null || true
          for pid in $(jobs -p); do kill "$pid" 2>/dev/null || true; done
          wait 2>/dev/null || true

          exit "$exit_code"

      - name: Upload docker logs
        # Always upload — even when the workflow itself passes, the
        # captured logs are the regression-signal artefact for the
        # log-grep guards below.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-follow-regression-${{ matrix.workflow }}-logs
          path: docker-logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Guard — no rejection of inbound sync from non-following peer
        # Workflows 4 + 5's regression signal lives here, NOT inside
        # the YAML — neither workflow asserts the log line directly,
        # by design (mirrors sync-regression.yml's #2356 guard pattern).
        #
        # Two distinct signatures, two distinct topologies:
        #
        # 1. "context not materialised within join race window" — the
        #    debug-level signature emitted at
        #      crates/node/src/sync/manager/mod.rs (the materialisation
        #      window's `materialised == None` arm)
        #    when the receiver IS a verified group member (so
        #    `dialer_verified == true`) but the context is not in its
        #    local store. This is the topology workflows 4 + 5 build:
        #    node-2 IS added to the subgroup, so `dialer_verified`
        #    flips to true, and node-2 simply hasn't materialised the
        #    context locally because auto-follow wasn't enabled for it.
        #
        #    RUST_LOG is set to `info,calimero_=debug` (top-level
        #    `env:` block), so the debug message is captured in the
        #    docker logs and grep-able here.
        #
        # 2. "inbound stream for unknown context, closing cleanly" —
        #    the warn-level signature emitted when EITHER
        #    `get_group_for_context` returns None OR
        #    `check_group_membership` returns false (the
        #    `!dialer_verified` arm). This matches the Ronit/Fran
        #    incident log verbatim (the warn level made it visible in
        #    the user-supplied log dump). Our workflows do not build
        #    that exact `!dialer_verified` topology by themselves —
        #    every receiver IS a verified group member — but we still
        #    grep for it so any future workflow that does provoke the
        #    Ronit/Fran shape (e.g. an added cross-namespace test) is
        #    auto-guarded.
        #
        # Fail-loud on absent logs: a merobox run that aborts before
        # any container starts would produce a silent false negative
        # (no files to grep means no match). The file-existence check
        # below fails the step in that case so upstream failure
        # surfaces.
        if: always() && (matrix.workflow == 'no-unknown-context-rejection-spam' || matrix.workflow == 'asymmetric-context-membership')
        env:
          # Symptom for the workflows-4/5 topology (verified member,
          # non-materialised context). debug-level — captured because
          # RUST_LOG includes calimero_=debug.
          NOT_MATERIALISED_SIGNATURE: "context not materialised within join race window"
          # Symptom for the Ronit/Fran incident topology (unverified
          # dialer / missing group_for_context mapping). warn-level.
          UNKNOWN_CONTEXT_SIGNATURE: "inbound stream for unknown context, closing cleanly"
        run: |
          set +e
          shopt -s nullglob
          # Each workflow uses its own node-name prefix; glob across
          # all of them so the guard works regardless of which
          # workflow this matrix entry is.
          log_files=(docker-logs/af-*-node-*.log)
          if [ ${#log_files[@]} -eq 0 ]; then
            echo "::error::No docker-logs/af-*-node-*.log captured — merobox run likely aborted before any container started."
            exit 1
          fi

          fail=0

          if grep -h -F "$NOT_MATERIALISED_SIGNATURE" "${log_files[@]}" 2>/dev/null; then
            echo "::error::Auto-follow regression: receiver closed an inbound sync stream because the context was not materialised within the join-race window."
            echo "This is the #2422 symptom on options 3/4 — node-1's sync layer picked node-2 as a sync target for a context node-2 never auto-followed."
            echo "See crates/node/src/sync/manager/mod.rs (materialisation-window arm)."
            fail=1
          fi

          if grep -h -F "$UNKNOWN_CONTEXT_SIGNATURE" "${log_files[@]}" 2>/dev/null; then
            echo "::error::Auto-follow regression (Ronit/Fran shape): inbound stream rejected as 'unknown context, closing cleanly'."
            echo "The dialer was not a verified group member or the group_for_context mapping was absent on the receiver."
            echo "See crates/node/src/sync/manager/mod.rs (the !dialer_verified arm)."
            fail=1
          fi

          if [ "$fail" = "1" ]; then
            exit 1
          fi
          echo "OK: no rejection-of-inbound-from-non-following-peer signatures observed across ${#log_files[@]} log file(s)."

      - name: Guard — no creator-side owned-identity race
        # Same companion guard as sync-regression.yml carries — if the
        # creator's auto-follow cascade fires before ContextIdentity
        # is written, the synchronous sync attempt bails with the
        # signature below and the cascade enters exponential backoff.
        # Auto-follow workflows go through this code path on every
        # `create_context`, so it's a relevant guard here too.
        if: always()
        env:
          OWNED_IDENT_SIGNATURE: "no owned identities found for context"
        run: |
          set +e
          shopt -s nullglob
          log_files=(docker-logs/af-*-node-*.log)
          if [ ${#log_files[@]} -eq 0 ]; then
            echo "::error::No docker-logs/af-*-node-*.log captured — cannot verify owned-identity guard."
            exit 1
          fi
          if grep -h -F "$OWNED_IDENT_SIGNATURE" "${log_files[@]}" 2>/dev/null; then
            echo "::error::Detected 'no owned identities found' race on a creator node."
            echo "ContextIdentity must be written BEFORE sign_apply_and_publish(ContextRegistered)"
            echo "so the auto-follow cascade triggered by the local apply can find the key."
            echo "See crates/context/src/handlers/create_context.rs."
            exit 1
          fi
          echo "OK: no creator-side owned-identity races observed across ${#log_files[@]} log file(s)."
