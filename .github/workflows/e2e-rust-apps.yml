name: E2E - Rust Apps

# Tests scaffolding-e2e and xcall-example apps using locally-built Docker image.
# Parallel build: merod image + WASM apps build concurrently, then all test
# workflows run in parallel via matrix.
# Self-contained: doesn't depend on release.yml

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "crates/**"
      - "apps/scaffolding-e2e/**"
      - "apps/xcall-example/**"
      - "apps/kv-store-with-shared-storage/**"
      - "apps/components-demo/**"
      - ".github/workflows/e2e-rust-apps.yml"

  pull_request:
    branches: [master]
    paths:
      - "crates/**"
      - "apps/scaffolding-e2e/**"
      - "apps/xcall-example/**"
      - "apps/kv-store-with-shared-storage/**"
      - "apps/components-demo/**"
      - ".github/workflows/e2e-rust-apps.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CALIMERO_CONTRACTS_VERSION: "latest"
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  # ── Build merod Docker image (heaviest step) ──
  build-image:
    name: Build Image
    runs-on: ubuntu-24.04-8cpu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          shared-key: e2e-rust-apps
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build local merod image
        uses: ./.github/actions/build-local-merod
        env:
          CALIMERO_WEBUI_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALIMERO_AUTH_FRONTEND_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save and upload Docker image
        run: docker save merod:local | zstd -T0 -3 -o /tmp/merod-local.tar.zst

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: merod-image
          path: /tmp/merod-local.tar.zst
          retention-days: 1
          compression-level: 0

  # ── Build WASM apps (runs in parallel with image build) ──
  build-apps:
    name: Build Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          shared-key: e2e-wasm-apps
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build scaffolding-e2e app
        run: |
          cd apps/scaffolding-e2e
          ./build.sh

      - name: Build scaffolding-e2e multi-service bundle
        run: |
          cd apps/scaffolding-e2e
          ./build-multi-service-bundle.sh

      - name: Build xcall-example app
        run: |
          cd apps/xcall-example
          ./build.sh

      - name: Build kv-store-with-shared-storage app
        run: |
          cd apps/kv-store-with-shared-storage
          ./build.sh

      - name: Build components-demo app
        run: |
          cd apps/components-demo
          ./build.sh

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-apps
          path: |
            apps/scaffolding-e2e/res/*.wasm
            apps/scaffolding-e2e/res/abi.json
            apps/scaffolding-e2e/res/*.mpk
            apps/scaffolding-e2e/res/state-schema.json
            apps/xcall-example/res/*.wasm
            apps/xcall-example/res/abi.json
            apps/kv-store-with-shared-storage/res/*.wasm
            apps/kv-store-with-shared-storage/res/abi.json
            apps/kv-store-with-shared-storage/res/state-schema.json
            apps/components-demo/res/*.wasm
            apps/components-demo/res/abi.json
            apps/components-demo/res/state-schema.json
          retention-days: 1

  # ── Test phase: run each workflow in parallel ──
  test:
    name: Test (${{ matrix.workflow }})
    needs: [build-image, build-apps]
    runs-on: ubuntu-24.04-8cpu
    strategy:
      fail-fast: false
      matrix:
        include:
          - workflow: scaffolding-e2e
            file: workflows/e2e.yml
            app: scaffolding-e2e
          - workflow: frozen-rga-convergence
            file: workflows/frozen-rga-convergence.yml
            app: scaffolding-e2e
          - workflow: groups
            file: workflows/groups.yml
            app: scaffolding-e2e
          - workflow: group-3node
            file: workflows/group-3node.yml
            app: scaffolding-e2e
          - workflow: group-context-isolation
            file: workflows/group-context-isolation.yml
            app: scaffolding-e2e
          - workflow: group-late-joiner
            file: workflows/group-late-joiner.yml
            app: scaffolding-e2e
          - workflow: group-governance-late-joiner
            file: workflows/group-governance-late-joiner.yml
            app: scaffolding-e2e
          - workflow: group-governance-peer-down
            file: workflows/group-governance-peer-down.yml
            app: scaffolding-e2e
          - workflow: group-subgroup
            file: workflows/group-subgroup.yml
            app: scaffolding-e2e
          - workflow: group-subgroup-cold-sync
            file: workflows/group-subgroup-cold-sync.yml
            app: scaffolding-e2e
          - workflow: group-subgroup-queued-deltas
            file: workflows/group-subgroup-queued-deltas.yml
            app: scaffolding-e2e
          - workflow: group-membership
            file: workflows/group-membership.yml
            app: scaffolding-e2e
          - workflow: group-leave-context
            file: workflows/group-leave-context.yml
            app: scaffolding-e2e
          - workflow: group-leave-member
            file: workflows/group-leave-member.yml
            app: scaffolding-e2e
          - workflow: group-leave-namespace
            file: workflows/group-leave-namespace.yml
            app: scaffolding-e2e
          - workflow: group-kick-and-rejoin-keyshare
            file: workflows/group-kick-and-rejoin-keyshare.yml
            app: scaffolding-e2e
          - workflow: group-kick-and-readd-deny-list
            file: workflows/group-kick-and-readd-deny-list.yml
            app: scaffolding-e2e
          - workflow: group-leave-then-rejoin-via-inheritance
            file: workflows/group-leave-then-rejoin-via-inheritance.yml
            app: scaffolding-e2e
          - workflow: group-private-add-then-write
            file: workflows/group-private-add-then-write.yml
            app: scaffolding-e2e
          - workflow: group-remove-from-root-revokes-inherited
            file: workflows/group-remove-from-root-revokes-inherited.yml
            app: scaffolding-e2e
          - workflow: group-capabilities
            file: workflows/group-capabilities.yml
            app: scaffolding-e2e
          - workflow: group-member-channel-lifecycle
            file: workflows/group-member-channel-lifecycle.yml
            app: scaffolding-e2e
          - workflow: group-metadata
            file: workflows/group-metadata.yml
            app: scaffolding-e2e
          - workflow: hashcomparison-shared-user-reconcile
            file: workflows/hashcomparison-shared-user-reconcile.yml
            app: scaffolding-e2e
          - workflow: shared-storage-concurrent-rotation-converge
            file: workflows/shared-storage-concurrent-rotation-converge.yml
            app: scaffolding-e2e
          - workflow: group-subgroup-visibility-inheritance
            file: workflows/group-subgroup-visibility-inheritance.yml
            app: scaffolding-e2e
          - workflow: group-open-self-join-key-delivery
            file: workflows/group-open-self-join-key-delivery.yml
            app: scaffolding-e2e
          - workflow: group-join-via-inheritance
            file: workflows/group-join-via-inheritance.yml
            app: scaffolding-e2e
          - workflow: dm-subgroup-privacy
            file: workflows/dm-subgroup-privacy.yml
            app: scaffolding-e2e
          - workflow: group-list-subgroups-restricted-hidden
            file: workflows/group-list-subgroups-restricted-hidden.yml
            app: scaffolding-e2e
          - workflow: member-removed-multi-context-convergence
            file: workflows/member-removed-multi-context-convergence.yml
            app: scaffolding-e2e
          - workflow: member-removed-late-joiner-catchup
            file: workflows/member-removed-late-joiner-catchup.yml
            app: scaffolding-e2e
          # The partition-window-reconcile workflow exists at
          # `apps/scaffolding-e2e/workflows/member-removed-partition-window-reconcile.yml`
          # but is intentionally NOT registered in the matrix yet.
          # Docker-bridge partition primitives can't construct the
          # divergence scenario deterministically: signing after the
          # heal races the TCP-buffer drain (admin sees node-2's
          # partition-window write before signing → no divergence),
          # while signing during the partition is blocked by the
          # readiness gate that requires mesh peers. The reconcile
          # code path is covered by unit tests on
          # `apply_group_op_mutations`; this e2e needs a more
          # surgical partition primitive (e.g. iptables-level drop
          # on a specific peer pair) to be deterministic.
          - workflow: group-default-capabilities-propagation
            file: workflows/group-default-capabilities-propagation.yml
            app: scaffolding-e2e
          - workflow: group-reparent
            file: workflows/group-reparent.yml
            app: scaffolding-e2e
          - workflow: group-reparent-and-cascade-delete
            file: workflows/group-reparent-and-cascade-delete.yml
            app: scaffolding-e2e
          - workflow: group-multi-service
            file: workflows/group-multi-service.yml
            app: scaffolding-e2e
          - workflow: handler-test
            file: workflows/handler-test.yml
            app: scaffolding-e2e
          - workflow: xcall-example
            file: workflows/xcall.yml
            app: xcall-example
          - workflow: shared-storage
            file: workflows/test_shared_storage.yml
            app: kv-store-with-shared-storage
          - workflow: components-demo
            file: workflows/components-demo.yml
            app: components-demo
          - workflow: kv-store-joiner-cold
            file: workflows/kv-store-joiner-cold.yml
            app: scaffolding-e2e
          - workflow: root-bootstrap-converge
            file: workflows/root-bootstrap-converge.yml
            app: scaffolding-e2e
          - workflow: mesh-soak-8node
            file: workflows/mesh-soak-8node.yml
            app: scaffolding-e2e
          # #2422 auto-follow regression workflows.
          - workflow: auto-follow-on-context-registered
            file: workflows/auto-follow/auto-follow-on-context-registered.yml
            app: scaffolding-e2e
          - workflow: auto-follow-backfill-on-join
            file: workflows/auto-follow/auto-follow-backfill-on-join.yml
            app: scaffolding-e2e
          - workflow: auto-follow-flag-flipped-late
            file: workflows/auto-follow/auto-follow-flag-flipped-late.yml
            app: scaffolding-e2e
          - workflow: auto-follow-no-rejection-spam
            file: workflows/auto-follow/no-unknown-context-rejection-spam.yml
            app: scaffolding-e2e
          - workflow: auto-follow-asymmetric-context-membership
            file: workflows/auto-follow/asymmetric-context-membership.yml
            app: scaffolding-e2e
          # Sync-resilience smoke tests using the docker fault-injection
          # primitives. Each workflow YAML uses
          # `topology: { type: nat }` from merobox 0.6.19+ —
          # peers sit on an internal LAN bridge behind a NAT
          # gateway, with no direct path between siblings. The only
          # way to reach the boot-node (which doubles as the relay
          # server) is via the gateway's MASQUERADE; Docker's
          # `DOCKER-ISOLATION-STAGE-2` chain plus the client-side
          # default-route override at the gateway make direct dial
          # physically impossible. Every cross-client packet either
          # uses the boot-node's relay circuit, or — in cone mode —
          # gets upgraded to a direct one by DCUtR after the
          # initial rendezvous lands. The previous incarnation of
          # these workflows used `preserve_default_bootstrap: true` +
          # `mdns: false` on a single Docker bridge, which gave
          # "hopeful" relay coverage rather than enforced.
          #
          # NAT-topology coverage (merobox 0.6.19+ `topology:
          # { type: nat }`):
          #
          #   * `-cone` variants — cone NAT (plain MASQUERADE).
          #     DCUtR hole-punching may upgrade the relay-mediated
          #     connection to a direct one; the relay path is still
          #     exercised on the way up, and these tests run faster
          #     because the post-rendezvous traffic shortcuts to
          #     direct.
          #   * `-symmetric` variants — symmetric NAT (MASQUERADE
          #     --random-fully). DCUtR fails reliably, so every
          #     cross-client packet stays on the boot-node's relay
          #     circuit. These exercise the relay-reservation
          #     recovery code path strictly — a regression in
          #     relay-mediated sync surfaces as a test failure
          #     here, while the cone variant might mask it via
          #     the DCUtR-direct fallback.
          #
          # The same three scenarios (restart, pause, partition)
          # are run under both NAT modes so we catch both relay-
          # recovery-only regressions AND any DCUtR-upgrade-path
          # regressions in the cone runs.
          - workflow: sync-resilience-network-partition
            file: workflows/sync-resilience-network-partition.yml
            app: scaffolding-e2e
          - workflow: sync-resilience-network-partition-symmetric
            file: workflows/sync-resilience-network-partition-symmetric.yml
            app: scaffolding-e2e
          - workflow: sync-resilience-peer-restart
            file: workflows/sync-resilience-peer-restart.yml
            app: scaffolding-e2e
          - workflow: sync-resilience-peer-restart-symmetric
            file: workflows/sync-resilience-peer-restart-symmetric.yml
            app: scaffolding-e2e
          - workflow: sync-resilience-peer-restart-autoresync
            file: workflows/sync-resilience-peer-restart-autoresync.yml
            app: scaffolding-e2e
          - workflow: sync-resilience-peer-pause
            file: workflows/sync-resilience-peer-pause.yml
            app: scaffolding-e2e
          - workflow: sync-resilience-peer-pause-symmetric
            file: workflows/sync-resilience-peer-pause-symmetric.yml
            app: scaffolding-e2e
          # sync-resilience-lossy-link.yml is tracked separately under
          # #2468; it needs a custom merod image with iproute2 (`tc`)
          # installed before it can land in CI. Adding it now would
          # always-fail because the stock merod:edge image lacks
          # iproute2 and inject_network_fault short-circuits with
          # `tc: executable file not found`.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: merod-image
          path: /tmp

      - name: Load Docker image
        run: zstd -d /tmp/merod-local.tar.zst --stdout | docker load

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-apps
          path: apps

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Run ${{ matrix.workflow }}
        run: |
          # Phase 11.3 (#2237): single attempt, fail loud. The retry loop
          # + `merobox nuke --force` between attempts existed to mask
          # cold-start governance flakes (#2198, #2225). With the
          # three-phase contract (publish_and_await_ack + readiness FSM
          # + parent_pull single-peer fallback) in place, a flake here
          # is a real bug worth surfacing.
          mkdir -p docker-logs
          cd apps/${{ matrix.app }}

          # merobox 0.6.34+ persists per-container logs to
          # `data/container-logs/<name>.log` natively on every `bootstrap
          # run`, regardless of `stop_all_nodes` (calimero-network/merobox#207).
          # This replaces the old background `docker logs -f` watcher, which
          # existed only because earlier merobox tore the runtime containers
          # down on exit before a post-run `docker logs` could read them.
          LOGDIR="$GITHUB_WORKSPACE/docker-logs"
          # Point merobox's `restart_container` pre-restart snapshot
          # (merobox 0.6.22+) at the same absolute LOGDIR. Without this
          # env override, merobox writes the snapshot to a CWD-relative
          # `docker-logs/` which resolves to `$GITHUB_WORKSPACE/apps/
          # <app>/docker-logs/` (because the line above `cd`s into the
          # app dir) — separate from the artifact-uploaded LOGDIR. The
          # snapshot would then be invisible to the artifact uploader
          # and post-restart debugging would stay blocked.
          export MEROBOX_PRE_RESTART_LOG_DIR="$LOGDIR"

          if merobox bootstrap run \
              "${{ matrix.file }}" \
              --image merod:local \
              --e2e-mode; then
              success=true
          else
              success=false
          fi

          # Collect merobox's native per-container logs into the artifact
          # dir before `nuke` clears node state. `nuke` only removes
          # `calimero-node-*` data dirs, not `data/container-logs/`, but
          # copying first keeps this robust to that behaviour changing.
          # Prefix with the workflow name to keep filenames self-describing
          # when several artifacts are downloaded together.
          for f in data/container-logs/*.log; do
              [ -e "$f" ] || continue
              cp -f "$f" "$LOGDIR/${{ matrix.workflow }}-$(basename "$f")"
          done

          merobox stop --all || true
          merobox nuke --force || true

          if [ "$success" = false ]; then
              echo "::error::${{ matrix.workflow }} workflow failed"
              exit 1
          fi

      - name: Assert no unified-op projection divergence (cutover gate)
        if: always()
        run: |
          # The unified-causal-log cutover shadow logs the marker
          # `unified_projection_divergence` whenever the unified-op projection
          # disagrees with the LIVE authorization decision on real traffic. ZERO
          # such markers across the e2e scenarios is the gate for flipping the
          # projection authoritative (F4) — and, having reached zero, for keeping
          # it that way.
          #
          # This is a HARD gate: the projection now reproduces the live decision
          # across every membership plane (cleartext Root joins, the encrypted
          # GroupOp plane via the live/backfill decrypt feed, genesis-admin and
          # inherited carve-outs, and materialized-only membership). A regression
          # that reintroduces divergence fails the job and must be fixed before
          # merge. Diagnostics (log_len / heads_in_log / author_in_any /
          # decision_group_in_view) are printed on the offending lines to pinpoint
          # the failure mode. Runs `always()` so divergence is reported even when
          # the scenario itself failed for another reason.
          if grep -rl "unified_projection_divergence" docker-logs/ 2>/dev/null | grep -q .; then
              echo "::error::unified-op projection diverged from the live decision in ${{ matrix.workflow }} — cutover gate not met"
              echo "planes seen:"
              grep -rho 'plane="[^"]*"' docker-logs/ | sort | uniq -c
              echo "sample:"
              grep -rn "unified_projection_divergence" docker-logs/ | head -30
              exit 1
          fi
          echo "no unified_projection_divergence markers — projection agrees with the live decision"

      - name: Report unified op-store completeness (C3 Stage 0, observe-only)
        if: always()
        run: |
          # The C3 completeness gate logs `op_store_incomplete` whenever the unified
          # op-store is missing a governance op the gov-DAG has — i.e. some apply path
          # isn't dual-writing the op-store. This turns "incomplete op-store" from a
          # mystery 60s sync timeout (how the read-flip failed three times) into a
          # cheap, specific signal naming the missing op count per namespace.
          #
          # OBSERVE-ONLY for now: the op-store is KNOWN incomplete until C3 closes the
          # structural write gaps (local-authoring A4/A5/B1, genesis G1/G2). This step
          # reports the markers so each stage can watch the count fall to zero; it does
          # NOT fail the job. It becomes a HARD gate at C3 Stage 4, when the read flips
          # onto the op-store and zero markers is the precondition.
          if grep -rl "op_store_incomplete" docker-logs/ 2>/dev/null | grep -q .; then
              count=$(grep -rho "op_store_incomplete" docker-logs/ | wc -l | tr -d ' ')
              echo "::notice::op-store incomplete in ${{ matrix.workflow }} — $count marker(s) (expected during C3; observe-only)"
              echo "sample (missing_count per namespace):"
              # Match `missing_count=N` anywhere on an op_store_incomplete line — robust
              # to field ordering. Tolerates the line not carrying the field at all.
              grep -rho 'op_store_incomplete.*' docker-logs/ | grep -oE 'missing_count=[0-9]+' | sort | uniq -c | head -10
              grep -rn "op_store_incomplete" docker-logs/ | head -10
          elif grep -rl "op_store_gate_unavailable" docker-logs/ 2>/dev/null | grep -q .; then
              # No gap markers, but the gate couldn't load the op-store somewhere — do
              # NOT claim a clean mirror, that would be a false "verified" line.
              gc=$(grep -rho "op_store_gate_unavailable" docker-logs/ | wc -l | tr -d ' ')
              echo "::notice::op-store completeness UNVERIFIED in ${{ matrix.workflow }} — no gaps seen but $gc gate-load failure(s); mirror NOT confirmed"
              grep -rn "op_store_gate_unavailable" docker-logs/ | head -5
          else
              echo "no op_store_incomplete or op_store_gate_unavailable markers — op-store mirrors the gov-DAG for every exercised namespace"
          fi

      - name: List docker-logs/ before upload (debug)
        if: always()
        run: ls -la docker-logs/ 2>&1 || echo "docker-logs/ missing"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.workflow }}-${{ github.sha }}
          # `docker-logs/` (with a trailing slash) uploads the
          # ENTIRE directory: merobox's native per-container logs,
          # copied in as `${matrix.workflow}-${container}.log`
          # (calimero-network/merobox#207), AND merobox 0.6.22+'s
          # pre-restart snapshots
          # (`${container}.pre-restart-${utc-ts}.log` — see
          # merobox#258). Each matrix entry runs on its own runner
          # with its own `docker-logs/` dir, so this doesn't
          # cross-contaminate. Earlier attempt used a two-pattern
          # glob `docker-logs/${{ matrix.workflow }}*` +
          # `docker-logs/*.pre-restart-*.log`, but the second
          # pattern silently matched zero files via upload-artifact's
          # multi-line path handling; uploading the whole directory
          # sidesteps that and is unambiguous.
          path: docker-logs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Report phase: notify on PR failure ──
  comment:
    name: Report Failed Workflow
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Check if main job failed or was cancelled
        id: check_status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "job_failed=true" >> $GITHUB_OUTPUT
            if [ "${{ needs.test.result }}" == "cancelled" ]; then
              echo "was_cancelled=true" >> $GITHUB_OUTPUT
            else
              echo "was_cancelled=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "job_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Failure Comment
        if: steps.check_status.outputs.job_failed == 'true' && steps.check_status.outputs.was_cancelled == 'false'
        run: |
          message="## E2E Rust Apps Failed

          One or more E2E workflows (scaffolding-e2e, xcall-example) failed.

          Please check the workflow logs for more details."

          jq -n \
            --arg pr '${{ github.event.number }}' \
            --arg tag e2e-rust-apps-report \
            --arg mode recreate \
            --arg message "$message" \
            '{pr: $pr, tag: $tag, mode: $mode, message: $message}' > payload.json

      - name: Upload Comment
        if: steps.check_status.outputs.job_failed == 'true' && steps.check_status.outputs.was_cancelled == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-payload-rust-apps
          path: payload.json

      - name: Fail if main job failed or was cancelled
        if: steps.check_status.outputs.job_failed == 'true'
        run: |
          if [ "${{ steps.check_status.outputs.was_cancelled }}" == "true" ]; then
            echo "Workflow was cancelled"
          else
            echo "Workflow failed"
          fi
          exit 1
