name: E2E - Rust Apps

# Tests e2e-kv-store and xcall-example apps using locally-built Docker image.
# Parallel build: merod image + WASM apps build concurrently, then all test
# workflows run in parallel via matrix.
# Self-contained: doesn't depend on release.yml

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "crates/**"
      - "apps/e2e-kv-store/**"
      - "apps/xcall-example/**"
      - ".github/workflows/e2e-rust-apps.yml"

  pull_request:
    branches: [master]
    paths:
      - "crates/**"
      - "apps/e2e-kv-store/**"
      - "apps/xcall-example/**"
      - ".github/workflows/e2e-rust-apps.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CALIMERO_CONTRACTS_VERSION: "latest"
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  # ── Build merod Docker image (heaviest step) ──
  build-image:
    name: Build Image
    runs-on: ubuntu-24.04-8cpu
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          shared-key: e2e-rust-apps
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build local merod image
        uses: ./.github/actions/build-local-merod
        env:
          CALIMERO_WEBUI_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALIMERO_AUTH_FRONTEND_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save and upload Docker image
        run: docker save merod:local | zstd -T0 -3 -o /tmp/merod-local.tar.zst

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: merod-image
          path: /tmp/merod-local.tar.zst
          retention-days: 1
          compression-level: 0

  # ── Build WASM apps (runs in parallel with image build) ──
  build-apps:
    name: Build Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          shared-key: e2e-wasm-apps
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build e2e-kv-store app
        run: |
          cd apps/e2e-kv-store
          ./build.sh

      - name: Build e2e-kv-store multi-service bundle
        run: |
          cd apps/e2e-kv-store
          ./build-multi-service-bundle.sh

      - name: Build xcall-example app
        run: |
          cd apps/xcall-example
          ./build.sh

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-apps
          path: |
            apps/e2e-kv-store/res/*.wasm
            apps/e2e-kv-store/res/abi.json
            apps/e2e-kv-store/res/*.mpk
            apps/e2e-kv-store/res/state-schema.json
            apps/xcall-example/res/*.wasm
            apps/xcall-example/res/abi.json
          retention-days: 1

  # ── Test phase: run each workflow in parallel ──
  test:
    name: Test (${{ matrix.workflow }})
    needs: [build-image, build-apps]
    runs-on: ubuntu-24.04-8cpu
    strategy:
      fail-fast: false
      matrix:
        include:
          - workflow: e2e-kv-store
            file: workflows/e2e.yml
            app: e2e-kv-store
          - workflow: groups
            file: workflows/groups.yml
            app: e2e-kv-store
          - workflow: group-3node
            file: workflows/group-3node.yml
            app: e2e-kv-store
          - workflow: group-context-isolation
            file: workflows/group-context-isolation.yml
            app: e2e-kv-store
          - workflow: group-late-joiner
            file: workflows/group-late-joiner.yml
            app: e2e-kv-store
          - workflow: group-subgroup
            file: workflows/group-subgroup.yml
            app: e2e-kv-store
          - workflow: group-subgroup-cold-sync
            file: workflows/group-subgroup-cold-sync.yml
            app: e2e-kv-store
          - workflow: group-membership
            file: workflows/group-membership.yml
            app: e2e-kv-store
          - workflow: group-capabilities
            file: workflows/group-capabilities.yml
            app: e2e-kv-store
          - workflow: group-reparent
            file: workflows/group-reparent.yml
            app: e2e-kv-store
          - workflow: group-reparent-and-cascade-delete
            file: workflows/group-reparent-and-cascade-delete.yml
            app: e2e-kv-store
          - workflow: group-multi-service
            file: workflows/group-multi-service.yml
            app: e2e-kv-store
          - workflow: handler-test
            file: workflows/handler-test.yml
            app: e2e-kv-store
          - workflow: xcall-example
            file: workflows/xcall.yml
            app: xcall-example
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: merod-image
          path: /tmp

      - name: Load Docker image
        run: zstd -d /tmp/merod-local.tar.zst --stdout | docker load

      - name: Download app artifacts
        uses: actions/download-artifact@v4
        with:
          name: e2e-apps
          path: apps

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Run ${{ matrix.workflow }}
        run: |
          mkdir -p docker-logs
          cd apps/${{ matrix.app }}
          max_attempts=2
          attempt=1
          success=false

          # Start a background watcher that streams `docker logs -f` from
          # each node container to an artifact file as soon as it appears.
          # A post-run `docker logs` loop does not work reliably on current
          # merobox because the runtime containers are torn down as part of
          # `merobox bootstrap run`'s exit path (regardless of
          # `stop_all_nodes: false`), leaving only the init-container names
          # behind by the time the shell regains control. The watcher
          # captures logs *while* containers are live, so post-run cleanup
          # can't remove what we've already written to disk.
          #
          # Workaround tracked in calimero-network/merobox#207; once merobox
          # persists logs natively we'll remove this block (calimero/core#2179).
          LOGDIR="$GITHUB_WORKSPACE/docker-logs"
          WATCHER_STATE_DIR="$(mktemp -d)"
          # The watcher reads the current attempt from this file each poll so
          # that (a) retry containers, which are nuked and recreated with the
          # same names as attempt 1's, get picked up as new followers, and
          # (b) attempt 1's logs aren't clobbered by attempt 2's output.
          echo "1" > "$WATCHER_STATE_DIR/attempt"
          (
              while [ ! -f "$WATCHER_STATE_DIR/stop" ]; do
                  cur_attempt=$(cat "$WATCHER_STATE_DIR/attempt" 2>/dev/null || echo 1)
                  # Follow containers labeled by merobox, excluding the
                  # short-lived init containers (`*-init`).
                  for c in $(docker ps --filter "label=calimero.node=true" --format "{{.Names}}" 2>/dev/null | grep -v -- '-init$' || true); do
                      mark="$WATCHER_STATE_DIR/attempt${cur_attempt}-${c}"
                      if [ ! -f "$mark" ]; then
                          touch "$mark"
                          echo "[log-watcher] following $c (attempt $cur_attempt)"
                          docker logs -f "$c" > "$LOGDIR/${{ matrix.workflow }}-attempt${cur_attempt}-${c}.log" 2>&1 &
                      fi
                  done
                  sleep 1
              done
          ) &
          WATCHER_PID=$!

          while [ $attempt -le $max_attempts ]; do
              if [ $attempt -gt 1 ]; then
                  merobox stop --all || true
                  merobox nuke --force || true
                  sleep 2
              fi
              # Tell the watcher which attempt we're on; it namespaces its
              # mark files + log filenames by this so each retry captures
              # cleanly without clobbering prior-attempt logs.
              echo "$attempt" > "$WATCHER_STATE_DIR/attempt"

              if merobox bootstrap run \
                  "${{ matrix.file }}" \
                  --image merod:local \
                  --e2e-mode; then
                  success=true
                  break
              fi
              attempt=$((attempt + 1))
          done

          # Signal the watcher to stop and give `docker logs -f` followers
          # a moment to flush their final output.
          touch "$WATCHER_STATE_DIR/stop"
          sleep 2
          kill "$WATCHER_PID" 2>/dev/null || true
          for pid in $(jobs -p); do kill "$pid" 2>/dev/null || true; done
          wait 2>/dev/null || true

          merobox stop --all || true
          merobox nuke --force || true

          if [ "$success" = false ]; then
              echo "::error::${{ matrix.workflow }} workflow failed after $max_attempts attempts"
              exit 1
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.workflow }}-${{ github.sha }}
          path: docker-logs/${{ matrix.workflow }}*
          retention-days: 7
          if-no-files-found: ignore

  # ── Report phase: notify on PR failure ──
  comment:
    name: Report Failed Workflow
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Check if main job failed or was cancelled
        id: check_status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "job_failed=true" >> $GITHUB_OUTPUT
            if [ "${{ needs.test.result }}" == "cancelled" ]; then
              echo "was_cancelled=true" >> $GITHUB_OUTPUT
            else
              echo "was_cancelled=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "job_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Failure Comment
        if: steps.check_status.outputs.job_failed == 'true' && steps.check_status.outputs.was_cancelled == 'false'
        run: |
          message="## E2E Rust Apps Failed

          One or more E2E workflows (e2e-kv-store, xcall-example) failed after retries.

          Please check the workflow logs for more details."

          jq -n \
            --arg pr '${{ github.event.number }}' \
            --arg tag e2e-rust-apps-report \
            --arg mode recreate \
            --arg message "$message" \
            '{pr: $pr, tag: $tag, mode: $mode, message: $message}' > payload.json

      - name: Upload Comment
        if: steps.check_status.outputs.job_failed == 'true' && steps.check_status.outputs.was_cancelled == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: pr-comment-payload-rust-apps
          path: payload.json

      - name: Fail if main job failed or was cancelled
        if: steps.check_status.outputs.job_failed == 'true'
        run: |
          if [ "${{ steps.check_status.outputs.was_cancelled }}" == "true" ]; then
            echo "Workflow was cancelled"
          else
            echo "Workflow failed"
          fi
          exit 1
