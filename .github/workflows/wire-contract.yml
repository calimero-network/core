name: Wire Contract

# Fast, Docker-free canary: the committed wire fixtures must round-trip through
# their Rust DTOs. A field rename/removal/retype in an HTTP request/response DTO
# reddens here, with a diff — the first signal that the hand-mirrored SDK types
# need a matching update. Regenerate after an intended change with
# `UPDATE_FIXTURES=1 cargo test -p calimero-server-primitives --test wire_fixtures`.

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "crates/server/primitives/**"
      - "crates/primitives/**"
      - ".github/workflows/wire-contract.yml"
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  wire-contract:
    name: Wire Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust toolchain
        # Pinned to a commit SHA (supply-chain hygiene); comment tracks the tag.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Wire-contract fixtures
        run: cargo test -p calimero-server-primitives --test wire_fixtures
