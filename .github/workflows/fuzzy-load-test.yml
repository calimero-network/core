name: Fuzzy Load Test - Long Running Performance

permissions:
  contents: read

on:
  # Fire after Release completes on master — whenever Release republishes
  # `merod:edge-profiling` (which covers Cargo.toml/Lock, crates/**,
  # release.yml itself, deps/**, actions/**, and scripts/profiling/**),
  # we want fuzzy-load-test to run against the fresh image.
  # Without this, changes to the profiling image (e.g. #2218, which only
  # touched release.yml) rebuild the image but never exercise it in a
  # fuzzy run.
  # Gated on Release success via a job-level `if` below.
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [master]
  # Direct push trigger for paths that don't need a Release rebuild:
  # - apps/** : app WASMs are compiled freshly in the Build Apps job,
  #   not baked into the image, so no image rebuild is required.
  # - workflows/fuzzy-tests/** and this workflow file: config-only.
  # `crates/**` is intentionally omitted — Release already fires on it
  # and rebuilds the image, and workflow_run below triggers fuzzy
  # against the fresh image.
  push:
    branches: [master]
    paths:
      - "apps/**"
      - "workflows/fuzzy-tests/**"
      - ".github/workflows/fuzzy-load-test.yml"
  # PR trigger — fires only on PRs that touch profiling-image paths.
  # release.yml's `prepare.outputs.profiling_paths_changed` gate the
  # `release-merod-profiling-container` job on the SAME path set, so
  # `pr-<N>-profiling` is published before fuzzy-load-test consumes it
  # via `scripts/determine-image-tag.sh`. Other PR paths skip both —
  # they keep their cheap default behaviour. Same-repo PRs only;
  # `prepare.outputs.docker_push` keeps fork PRs from pushing.
  pull_request:
    paths:
      - "scripts/profiling/**"
      - ".github/workflows/deps/prebuilt.profiling.Dockerfile"
      - ".github/workflows/fuzzy-load-test.yml"
      - "workflows/fuzzy-tests/**"
  #
  # Nightly soak: a longer run (default 60 minutes per app vs the 15
  # minutes used for routine triggers) fires at 00:00 UTC daily. The
  # 15-minute baseline gives statistically usable CPU samples and
  # exercises most code paths — enough for catching regressions on
  # every push. The nightly extends the window so slow leaks, rare
  # cascade orderings, and gradual degradation that need >15 min to
  # materialize still get caught daily.
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      duration_override:
        description: "Override test duration (minutes per app). Empty = default (15 normally, 60 for scheduled nightly soak)."
        required: false
        default: ""
        type: string
      test_app:
        description: "Run specific app test (kv-store, kv-store-with-handlers, or all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - kv-store
          - kv-store-with-handlers
      enable_profiling:
        description: "Use profiling image (merod:edge-profiling) with CPU and memory profiling enabled"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: info,calimero_=debug
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  build:
    name: Build Apps
    runs-on: ubuntu-24.04-8cpu
    # When triggered via `workflow_run` (after Release completes), only
    # proceed if Release succeeded — a failed Release means the
    # edge-profiling image wasn't republished, and running fuzzy against
    # a stale image is worse than not running at all. Other triggers
    # (push to fuzzy-tests/** or workflow_dispatch) always run.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Under workflow_run, github.sha is the default-branch HEAD —
          # not the commit Release actually built from. Pin to the
          # upstream commit so the fuzzy run's source tree matches the
          # image. Falls back to github.sha for push / workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          shared-key: fuzzy-load-test
          # Scheduled runs always save cache to keep it fresh
          save-if: "true"

      - name: Download NEAR contracts
        uses: ./.github/actions/download-contracts

      - name: Build kv-store app
        run: |
          cd apps/kv-store
          ./build.sh
        env:
          WASM_PROFILING: "true"

      - name: Build kv-store-with-handlers app
        run: |
          cd apps/kv-store-with-handlers
          ./build.sh
        env:
          WASM_PROFILING: "true"

      - name: Verify WASM files exist
        run: |
          ls -la apps/kv-store/res/
          ls -la apps/kv-store-with-handlers/res/
          test -f apps/kv-store/res/kv_store.wasm
          test -f apps/kv-store-with-handlers/res/kv_store_with_handlers.wasm

      # Use artifacts for same-run handoff between jobs (faster than cache for this use case)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzzy-test-build-artifacts
          path: |
            apps/kv-store/res/*.wasm
            apps/kv-store-with-handlers/res/*.wasm
            contracts/near
          retention-days: 1

  fuzzy-test-kv-store:
    name: Run KV Store Fuzzy Test with Profiling
    needs: build
    runs-on: big-machine
    timeout-minutes: 150
    outputs:
      test_passed: ${{ steps.set-result.outputs.passed }}
      exit_code: ${{ steps.kv-test.outputs.exit_code }}
    if: github.event.inputs.test_app == 'all' || github.event.inputs.test_app == 'kv-store' || github.event.inputs.test_app == ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Under workflow_run, github.sha is the default-branch HEAD —
          # not the commit Release actually built from. Pin to the
          # upstream commit so the fuzzy run's source tree matches the
          # image. Falls back to github.sha for push / workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fuzzy-test-build-artifacts

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Override test duration
        # Default is 15 minutes for routine triggers (push, workflow_run,
        # workflow_dispatch with empty input) and 60 minutes for the
        # nightly schedule. workflow_dispatch.inputs.duration_override
        # wins over both when set.
        run: |
          if [ -n "${{ github.event.inputs.duration_override }}" ]; then
            DURATION="${{ github.event.inputs.duration_override }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            DURATION="60"
          else
            DURATION="15"
          fi
          echo "Using duration: ${DURATION} minutes (trigger: ${{ github.event_name }})"
          cd workflows/fuzzy-tests/kv-store
          sed -i "s/\(duration_minutes: \)[0-9]*/\1$DURATION/" fuzzy-test.yml

      - name: Create directories
        run: |
          mkdir -p fuzzy-test-logs/kv-store
          mkdir -p profiling-data/kv-store
          mkdir -p profiling-reports/kv-store

      - name: Determine image to use
        id: image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/determine-image-tag.sh
          if [ "${{ github.event.inputs.enable_profiling }}" = "false" ]; then
            ./scripts/determine-image-tag.sh \
              "${{ github.event_name }}" \
              "${{ github.event.pull_request.number || '0' }}" \
              "${{ github.repository_owner }}" \
              "${{ github.repository }}" \
              "${{ github.head_ref || github.ref_name }}" \
              "${{ github.token }}"
            echo "profiling=false" >> $GITHUB_OUTPUT
          else
            ./scripts/determine-image-tag.sh \
              "${{ github.event_name }}" \
              "${{ github.event.pull_request.number || '0' }}" \
              "${{ github.repository_owner }}" \
              "${{ github.repository }}" \
              "${{ github.head_ref || github.ref_name }}" \
              "${{ github.token }}" \
              --profiling
            echo "profiling=true" >> $GITHUB_OUTPUT
          fi

      - name: Pull Docker image
        run: |
          IMAGE="ghcr.io/calimero-network/merod:${{ steps.image.outputs.tag }}"
          docker pull "$IMAGE" || true

      - name: Setup vmagent for metrics collection
        id: setup-vmagent
        run: |
          chmod +x scripts/setup-vmagent.sh
          COMMIT_HASH="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT_HASH:0:7}"
          ./scripts/setup-vmagent.sh \
            "kv-store" \
            "kv-store-${SHORT_COMMIT}" \
            "${{ github.run_id }}" \
            "${{ secrets.VICTORIA_LB_METRICS_BEARER_TOKEN }}" \
            "8429" \
            "$COMMIT_HASH" \
            "${{ github.ref_name }}"

      - name: Run KV Store Fuzzy Test with Metrics Collection
        id: kv-test
        run: |
          chmod +x scripts/run-vmagent.sh scripts/cleanup-vmagent.sh
          mkdir -p fuzzy-test-logs/kv-store/docker-logs
          cd workflows/fuzzy-tests/kv-store

          echo "start_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          TEST_CASE="kv-store"
          COMMIT_HASH="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT_HASH:0:7}"
          INSTANCE_NAME="${TEST_CASE}-${SHORT_COMMIT}"
          IMAGE="ghcr.io/calimero-network/merod:${{ steps.image.outputs.tag }}"

          VMAGENT_STARTED="false"
          if "$GITHUB_WORKSPACE/scripts/run-vmagent.sh" \
            "$TEST_CASE" "$INSTANCE_NAME" "${{ github.run_id }}" "$COMMIT_HASH" "${{ github.ref_name }}" \
            "${{ steps.setup-vmagent.outputs.vmagent_dir }}" \
            "${{ steps.setup-vmagent.outputs.victoria_url }}" \
            "${{ steps.setup-vmagent.outputs.auth_enabled }}" \
            "${{ steps.setup-vmagent.outputs.bearer_token_file }}" \
            "8429" "fuzzy-kv-node" "4" "3001" "2"; then
            VMAGENT_STARTED="true"
          fi

          UPDATE_PID=""
          VMAGENT_PID=""
          if [ "$VMAGENT_STARTED" = "true" ]; then
            UPDATE_PID=$(grep "^update_pid=" $GITHUB_OUTPUT | tail -1 | cut -d= -f2 || echo "")
            VMAGENT_PID=$(grep "^vmagent_pid=" $GITHUB_OUTPUT | tail -1 | cut -d= -f2 || echo "")
          fi

          # Stream docker logs live to disk so we keep them even when
          # `merobox bootstrap run` tears containers down on exit — a
          # post-run `docker logs` loop loses everything because the
          # containers are already gone. Mirrors the pattern we settled
          # on in e2e-rust-apps.yml (see merobox#207, #2179).
          LOGDIR="$GITHUB_WORKSPACE/fuzzy-test-logs/kv-store/docker-logs"
          WATCHER_STATE_DIR="$(mktemp -d)"
          (
            while [ ! -f "$WATCHER_STATE_DIR/stop" ]; do
              # Label filter matches merobox-started containers; exclude
              # short-lived `*-init` containers (setup-only, torn down
              # quickly and not useful for diagnosing steady-state).
              for c in $(docker ps --filter "label=calimero.node=true" \
                                   --format "{{.Names}}" 2>/dev/null \
                         | grep -v -- '-init$' || true); do
                mark="$WATCHER_STATE_DIR/${c}"
                if [ ! -f "$mark" ]; then
                  touch "$mark"
                  echo "[log-watcher] following $c"
                  docker logs -f --timestamps "$c" \
                    > "$LOGDIR/${c}.log" 2>&1 &
                fi
              done
              sleep 1
            done
          ) &
          WATCHER_PID=$!

          set +e
          set -o pipefail
          merobox bootstrap run \
              fuzzy-test.yml \
              --image "$IMAGE" \
              --e2e-mode \
              --verbose 2>&1 | tee ../../../fuzzy-test-logs/kv-store/merobox-output.log

          exit_code=$?
          set +o pipefail

          # Signal the watcher to stop and let the `docker logs -f`
          # followers flush their final output before we move on.
          touch "$WATCHER_STATE_DIR/stop"
          sleep 2
          kill "$WATCHER_PID" 2>/dev/null || true
          for pid in $(jobs -p); do kill "$pid" 2>/dev/null || true; done
          wait 2>/dev/null || true

          echo "end_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

          # Cleanup vmagent
          "$GITHUB_WORKSPACE/scripts/cleanup-vmagent.sh" \
            "$TEST_CASE" \
            "$UPDATE_PID" \
            "$VMAGENT_PID" \
            "/tmp/vmagent_scrape_${TEST_CASE}.yml" \
            "/tmp/vmagent-${TEST_CASE}.log"

          exit $exit_code

      - name: Collect profiling data from containers
        if: always() && steps.image.outputs.profiling == 'true'
        run: |
          chmod +x scripts/profiling/collect-from-containers.sh
          ./scripts/profiling/collect-from-containers.sh \
            "kv-store" \
            "fuzzy-test-logs/kv-store" \
            "profiling-data/kv-store" \
            "profiling-reports/kv-store"

      - name: Collect profiling data from host-side bind mounts
        if: always() && steps.image.outputs.profiling == 'true'
        run: |
          chmod +x scripts/profiling/harvest-host-profiling.sh
          ./scripts/profiling/harvest-host-profiling.sh \
            "workflows/fuzzy-tests/kv-store/data" \
            "profiling-data/kv-store"

      - name: Set test result
        id: set-result
        if: always()
        run: |
          EXIT_CODE="${{ steps.kv-test.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect KV Store node logs
        if: always()
        run: |
          find workflows/fuzzy-tests/kv-store -type d -name "logs" 2>/dev/null | while read logdir; do
            relpath=$(echo "$logdir" | sed 's|workflows/fuzzy-tests/kv-store/||')
            mkdir -p "fuzzy-test-logs/kv-store/$relpath"
            cp -r "$logdir"/* "fuzzy-test-logs/kv-store/$relpath/" 2>/dev/null || true
          done

      - name: Collect and upload vmagent logs
        if: always()
        run: |
          if [ -f /tmp/vmagent-kv-store.log ]; then
            mkdir -p fuzzy-test-logs/kv-store
            cp /tmp/vmagent-kv-store.log fuzzy-test-logs/kv-store/vmagent.log
            [ -f /tmp/vmagent_scrape_kv-store.yml ] && \
              cp /tmp/vmagent_scrape_kv-store.yml fuzzy-test-logs/kv-store/vmagent_config.yml
          fi

      - name: Upload KV Store test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzy-test-kv-store-${{ github.run_number }}-${{ github.run_id }}
          path: fuzzy-test-logs/kv-store/
          retention-days: 30
          compression-level: 6

      - name: Upload KV Store profiling data
        if: always() && steps.image.outputs.profiling == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: profiling-data-kv-store-${{ github.run_number }}-${{ github.run_id }}
          path: profiling-data/kv-store/
          retention-days: 30
          compression-level: 6

      - name: Upload KV Store profiling reports
        if: always() && steps.image.outputs.profiling == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: profiling-reports-kv-store-${{ github.run_number }}-${{ github.run_id }}
          path: profiling-reports/kv-store/
          retention-days: 30
          compression-level: 6

  fuzzy-test-handlers:
    name: Run KV Store with Handlers Fuzzy Test with Profiling
    needs: build
    runs-on: big-machine
    timeout-minutes: 150
    outputs:
      test_passed: ${{ steps.set-result-handlers.outputs.passed }}
      exit_code: ${{ steps.handlers-test.outputs.exit_code }}
    if: github.event.inputs.test_app == 'all' || github.event.inputs.test_app == 'kv-store-with-handlers' || github.event.inputs.test_app == ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Under workflow_run, github.sha is the default-branch HEAD —
          # not the commit Release actually built from. Pin to the
          # upstream commit so the fuzzy run's source tree matches the
          # image. Falls back to github.sha for push / workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fuzzy-test-build-artifacts

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Override test duration
        # Default is 15 minutes for routine triggers and 60 minutes for
        # the nightly schedule. See the equivalent step in
        # fuzzy-test-kv-store for details.
        run: |
          if [ -n "${{ github.event.inputs.duration_override }}" ]; then
            DURATION="${{ github.event.inputs.duration_override }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            DURATION="60"
          else
            DURATION="15"
          fi
          echo "Using duration: ${DURATION} minutes (trigger: ${{ github.event_name }})"
          cd workflows/fuzzy-tests/kv-store-with-handlers
          sed -i "s/\(duration_minutes: \)[0-9]*/\1$DURATION/" fuzzy-test.yml

      - name: Create directories
        run: |
          mkdir -p fuzzy-test-logs/kv-store-with-handlers
          mkdir -p profiling-data/kv-store-with-handlers
          mkdir -p profiling-reports/kv-store-with-handlers

      - name: Determine image to use
        id: image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/determine-image-tag.sh
          if [ "${{ github.event.inputs.enable_profiling }}" = "false" ]; then
            ./scripts/determine-image-tag.sh \
              "${{ github.event_name }}" \
              "${{ github.event.pull_request.number || '0' }}" \
              "${{ github.repository_owner }}" \
              "${{ github.repository }}" \
              "${{ github.head_ref || github.ref_name }}" \
              "${{ github.token }}"
            echo "profiling=false" >> $GITHUB_OUTPUT
          else
            ./scripts/determine-image-tag.sh \
              "${{ github.event_name }}" \
              "${{ github.event.pull_request.number || '0' }}" \
              "${{ github.repository_owner }}" \
              "${{ github.repository }}" \
              "${{ github.head_ref || github.ref_name }}" \
              "${{ github.token }}" \
              --profiling
            echo "profiling=true" >> $GITHUB_OUTPUT
          fi

      - name: Pull Docker image
        run: |
          IMAGE="ghcr.io/calimero-network/merod:${{ steps.image.outputs.tag }}"
          docker pull "$IMAGE" || true

      - name: Setup vmagent for metrics collection
        id: setup-vmagent-handlers
        run: |
          chmod +x scripts/setup-vmagent.sh
          COMMIT_HASH="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT_HASH:0:7}"
          ./scripts/setup-vmagent.sh \
            "kv-store-with-handlers" \
            "kv-store-with-handlers-${SHORT_COMMIT}" \
            "${{ github.run_id }}" \
            "${{ secrets.VICTORIA_LB_METRICS_BEARER_TOKEN }}" \
            "8430" \
            "$COMMIT_HASH" \
            "${{ github.ref_name }}"

      - name: Run Handlers Fuzzy Test with Metrics Collection
        id: handlers-test
        run: |
          chmod +x scripts/run-vmagent.sh scripts/cleanup-vmagent.sh
          mkdir -p fuzzy-test-logs/kv-store-with-handlers/docker-logs
          cd workflows/fuzzy-tests/kv-store-with-handlers

          echo "start_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          TEST_CASE="kv-store-with-handlers"
          COMMIT_HASH="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT_HASH:0:7}"
          INSTANCE_NAME="${TEST_CASE}-${SHORT_COMMIT}"
          IMAGE="ghcr.io/calimero-network/merod:${{ steps.image.outputs.tag }}"

          VMAGENT_STARTED="false"
          if "$GITHUB_WORKSPACE/scripts/run-vmagent.sh" \
            "$TEST_CASE" "$INSTANCE_NAME" "${{ github.run_id }}" "$COMMIT_HASH" "${{ github.ref_name }}" \
            "${{ steps.setup-vmagent-handlers.outputs.vmagent_dir }}" \
            "${{ steps.setup-vmagent-handlers.outputs.victoria_url }}" \
            "${{ steps.setup-vmagent-handlers.outputs.auth_enabled }}" \
            "${{ steps.setup-vmagent-handlers.outputs.bearer_token_file }}" \
            "8430" "fuzzy-handlers-node" "4" "3001" "2"; then
            VMAGENT_STARTED="true"
          fi

          UPDATE_PID=""
          VMAGENT_PID=""
          if [ "$VMAGENT_STARTED" = "true" ]; then
            UPDATE_PID=$(grep "^update_pid=" $GITHUB_OUTPUT | tail -1 | cut -d= -f2 || echo "")
            VMAGENT_PID=$(grep "^vmagent_pid=" $GITHUB_OUTPUT | tail -1 | cut -d= -f2 || echo "")
          fi

          # Live docker-logs watcher — see the kv-store job for the
          # rationale (merobox tears containers down on exit).
          LOGDIR="$GITHUB_WORKSPACE/fuzzy-test-logs/kv-store-with-handlers/docker-logs"
          WATCHER_STATE_DIR="$(mktemp -d)"
          (
            while [ ! -f "$WATCHER_STATE_DIR/stop" ]; do
              for c in $(docker ps --filter "label=calimero.node=true" \
                                   --format "{{.Names}}" 2>/dev/null \
                         | grep -v -- '-init$' || true); do
                mark="$WATCHER_STATE_DIR/${c}"
                if [ ! -f "$mark" ]; then
                  touch "$mark"
                  echo "[log-watcher] following $c"
                  docker logs -f --timestamps "$c" \
                    > "$LOGDIR/${c}.log" 2>&1 &
                fi
              done
              sleep 1
            done
          ) &
          WATCHER_PID=$!

          set +e
          set -o pipefail
          merobox bootstrap run \
              fuzzy-test.yml \
              --image "$IMAGE" \
              --e2e-mode \
              --verbose 2>&1 | tee ../../../fuzzy-test-logs/kv-store-with-handlers/merobox-output.log

          exit_code=$?
          set +o pipefail

          touch "$WATCHER_STATE_DIR/stop"
          sleep 2
          kill "$WATCHER_PID" 2>/dev/null || true
          for pid in $(jobs -p); do kill "$pid" 2>/dev/null || true; done
          wait 2>/dev/null || true

          echo "end_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

          # Cleanup vmagent
          "$GITHUB_WORKSPACE/scripts/cleanup-vmagent.sh" \
            "$TEST_CASE" \
            "$UPDATE_PID" \
            "$VMAGENT_PID" \
            "/tmp/vmagent_scrape_${TEST_CASE}.yml" \
            "/tmp/vmagent-${TEST_CASE}.log"

          exit $exit_code

      - name: Collect profiling data from containers
        if: always() && steps.image.outputs.profiling == 'true'
        run: |
          chmod +x scripts/profiling/collect-from-containers.sh
          ./scripts/profiling/collect-from-containers.sh \
            "kv-store-with-handlers" \
            "fuzzy-test-logs/kv-store-with-handlers" \
            "profiling-data/kv-store-with-handlers" \
            "profiling-reports/kv-store-with-handlers"

      - name: Collect profiling data from host-side bind mounts
        if: always() && steps.image.outputs.profiling == 'true'
        run: |
          chmod +x scripts/profiling/harvest-host-profiling.sh
          ./scripts/profiling/harvest-host-profiling.sh \
            "workflows/fuzzy-tests/kv-store-with-handlers/data" \
            "profiling-data/kv-store-with-handlers"

      - name: Set test result
        id: set-result-handlers
        if: always()
        run: |
          EXIT_CODE="${{ steps.handlers-test.outputs.exit_code }}"
          if [ "$EXIT_CODE" = "0" ]; then
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect Handlers node logs
        if: always()
        run: |
          find workflows/fuzzy-tests/kv-store-with-handlers -type d -name "logs" 2>/dev/null | while read logdir; do
            relpath=$(echo "$logdir" | sed 's|workflows/fuzzy-tests/kv-store-with-handlers/||')
            mkdir -p "fuzzy-test-logs/kv-store-with-handlers/$relpath"
            cp -r "$logdir"/* "fuzzy-test-logs/kv-store-with-handlers/$relpath/" 2>/dev/null || true
          done

      - name: Collect and upload vmagent logs
        if: always()
        run: |
          if [ -f /tmp/vmagent-kv-store-with-handlers.log ]; then
            mkdir -p fuzzy-test-logs/kv-store-with-handlers
            cp /tmp/vmagent-kv-store-with-handlers.log fuzzy-test-logs/kv-store-with-handlers/vmagent.log
            [ -f /tmp/vmagent_scrape_kv-store-with-handlers.yml ] && \
              cp /tmp/vmagent_scrape_kv-store-with-handlers.yml fuzzy-test-logs/kv-store-with-handlers/vmagent_config.yml
          fi

      - name: Upload Handlers test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzzy-test-handlers-${{ github.run_number }}-${{ github.run_id }}
          path: fuzzy-test-logs/kv-store-with-handlers/
          retention-days: 30
          compression-level: 6

      - name: Upload Handlers profiling data
        if: always() && steps.image.outputs.profiling == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: profiling-data-handlers-${{ github.run_number }}-${{ github.run_id }}
          path: profiling-data/kv-store-with-handlers/
          retention-days: 30
          compression-level: 6

      - name: Upload Handlers profiling reports
        if: always() && steps.image.outputs.profiling == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: profiling-reports-handlers-${{ github.run_number }}-${{ github.run_id }}
          path: profiling-reports/kv-store-with-handlers/
          retention-days: 30
          compression-level: 6

  test-summary:
    name: Test Summary
    needs: [fuzzy-test-kv-store, fuzzy-test-handlers]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate summary
        # Priority must match the duration-resolution blocks in both
        # fuzzy-test jobs above: `duration_override` first (it wins when
        # set, regardless of trigger), schedule second, routine last.
        # The three conditions are mutually exclusive in practice today
        # because `schedule` events carry no `inputs`, but keeping the
        # priority consistent avoids a silent drift if GitHub ever lets
        # scheduled runs accept dispatch inputs or if a future operator
        # adds another trigger that can set both.
        run: |
          if [ -n "${{ github.event.inputs.duration_override }}" ]; then
            RUN_KIND="Manual override (${{ github.event.inputs.duration_override }} min)"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            RUN_KIND="Nightly soak (60 min)"
          else
            RUN_KIND="Routine (15 min)"
          fi
          echo "## Fuzzy Load Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run kind:** ${RUN_KIND}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Profiling Enabled:** ${{ github.event.inputs.enable_profiling || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### KV Store Test" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.fuzzy-test-kv-store.result }}" = "skipped" ]; then
            echo "**SKIPPED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.fuzzy-test-kv-store.outputs.test_passed }}" = "true" ]; then
            echo "**PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**FAILED** (exit code: ${{ needs.fuzzy-test-kv-store.outputs.exit_code }})" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### KV Store with Handlers Test" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.fuzzy-test-handlers.result }}" = "skipped" ]; then
            echo "**SKIPPED**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.fuzzy-test-handlers.outputs.test_passed }}" = "true" ]; then
            echo "**PASSED**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**FAILED** (exit code: ${{ needs.fuzzy-test-handlers.outputs.exit_code }})" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Profiling Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- profiling-data-*: Raw profiling data" >> $GITHUB_STEP_SUMMARY
          echo "- profiling-reports-*: Generated reports (flamegraphs, memory reports)" >> $GITHUB_STEP_SUMMARY
