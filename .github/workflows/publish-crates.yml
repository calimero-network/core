name: Calimero Crates Publish

on:
  push:
    branches:
      - master

jobs:
  publish-cargo-crates:
    name: "Publish calimero-workspaces on crates.io"
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      contents: write # required for crates push
    timeout-minutes: 30 
    
    steps:
      - name: Checkout core repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Rust installation
        run: rustc --version

      - name: Check if version is already published
        run: |
          PACKAGE_NAME="calimero-primitives"
          
          echo "=== Debug: Current directory and environment ==="
          pwd
          ls -la
          echo "Rust version: $(rustc --version)"
          echo "Cargo version: $(cargo --version)"
          
          echo "=== Debug: Cargo.toml contents ==="
          cat Cargo.toml | head -30
          
          echo "=== Debug: Workspace metadata section ==="
          grep -A5 '\[workspace.metadata.workspaces\]' Cargo.toml || echo "No workspace.metadata.workspaces section found"
          
          echo "=== Debug: Raw cargo metadata output ==="
          cargo metadata --no-deps --format-version 1 || echo "cargo metadata command failed with exit code $?"
          
          echo "=== Debug: Cargo metadata with jq ==="
          cargo metadata --no-deps --format-version 1 | jq '.' || echo "jq parsing failed"
          
          echo "=== Debug: Attempting version extraction ==="
          # Try to get version from cargo metadata
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.metadata.workspaces.version // empty' 2>/dev/null || echo "")
          echo "Version from cargo metadata: '$VERSION'"
          
          # If that fails, try direct extraction from Cargo.toml
          if [ -z "$VERSION" ]; then
            echo "Cargo metadata failed, trying direct Cargo.toml extraction..."
            VERSION=$(grep -A1 '\[workspace.metadata.workspaces\]' Cargo.toml | grep 'version =' | sed 's/.*version = "\([^"]*\)".*/\1/' 2>/dev/null || echo "")
            echo "Version from Cargo.toml: '$VERSION'"
          fi
          
          if [ -z "$VERSION" ]; then
            echo "ERROR: Failed to extract version. Exiting."
            exit 1
          fi
          
          echo "=== Debug: Checking if version $VERSION is already published ==="
          # Get the versions from crates.io
          CRATES_RESPONSE=$(curl -s "https://crates.io/api/v1/crates/$PACKAGE_NAME/versions")
          echo "Crates.io response received (length: ${#CRATES_RESPONSE})"
          
          # Check if the version is already published
          PUBLISHED=$(echo "$CRATES_RESPONSE" | jq -r --arg ver "$VERSION" '.versions[] | select(.num == $ver) | .num // empty' 2>/dev/null || echo "")
          echo "Published version check result: '$PUBLISHED'"
          
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Version $VERSION of $PACKAGE_NAME is already published. Exiting."
            exit 1
          else
            echo "Version $VERSION of $PACKAGE_NAME is not yet published. Proceeding with publish."
          fi

      - name: Publish calimero-workspaces on crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -x
          cargo install --git https://github.com/miraclx/cargo-workspaces --tag v0.3.0 cargo-workspaces
          cargo ws publish --yes --allow-dirty --force '*' \
              --no-git-commit --no-git-push --no-individual-tags --tag-prefix 'crates-' \
              --tag-msg $$'crates.io snapshot\n---%{\n- %n - https://crates.io/crates/%n/%v}'
