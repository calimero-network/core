name: AI Code Review

on:
  # Automatic reviews are owned by the MeroReviewer App (webhook): it reviews
  # on PR open AND on every push, with delta tracking and convergence so
  # repeat passes stay cheap. Running this workflow on pull_request too made
  # every PR double-reviewed. Kept as manual-only: a deliberate full re-run
  # lever when the App's verdict needs a second opinion.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      agents:
        description: "Number of agents (1-5)"
        required: false
        default: "3"
        type: choice
        options: ["1", "2", "3", "4", "5"]

concurrency:
  group: ai-review-${{ github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Tracks ai-code-reviewer @master (pin a SHA here for a deliberate review gate).
      - name: Install ai-code-reviewer
        run: pip install git+https://github.com/calimero-network/ai-code-reviewer.git@master

      # Authenticate as the MeroReviewer App so review comments genuinely
      # come from meroreviewer[bot] (not whatever GH_PAT/GITHUB_TOKEN
      # resolves to), matching the --reviewer-name label below.
      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.MERO_REVIEWER_APP_ID }}
          private-key: ${{ secrets.MERO_REVIEWER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            core

      - name: Determine PR number and agent count
        id: pr
        run: |
          echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
          echo "agents=${{ github.event.inputs.agents }}"    >> $GITHUB_OUTPUT

      - name: Run AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          ai-reviewer review-pr \
            ${{ github.repository }} \
            ${{ steps.pr.outputs.number }} \
            --config .ai-reviewer.yaml \
            --agents ${{ steps.pr.outputs.agents }} \
            --reviewer-name "MeroReviewer" \
            --output github
