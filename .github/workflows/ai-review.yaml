name: AI Code Review

on:
  # This workflow is core's ONLY automatic reviewer (the MeroReviewer App is
  # removed from this repo - it double-reviewed every PR). `synchronize` is
  # included: every push re-reviews, with delta tracking + convergence keeping
  # repeat passes cheap and cancel-in-progress deduping rapid push trains.
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    # Skipped only when ALL changed files are doc-site content - mixed PRs
    # still trigger (standard paths-ignore semantics). Pure-doc PRs are owned
    # by the Doc Auto-Update workflow.
    paths-ignore:
      - 'docs/**'
      - 'architecture/**'
      - 'docs-static/**'
      - 'docs-site/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
      agents:
        description: "Number of agents (1-5)"
        required: false
        default: "3"
        type: choice
        options: ["1", "2", "3", "4", "5"]

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip drafts and fork PRs (forks don't get repo secrets, so the run
    # would call Claude with no key and fail noisily). Review fork PRs via
    # workflow_dispatch after auditing the diff.
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      # Tracks ai-code-reviewer @master (pin a SHA here for a deliberate review gate).
      - name: Install ai-code-reviewer
        run: pip install git+https://github.com/calimero-network/ai-code-reviewer.git@master

      - name: Determine PR number and agent count
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> $GITHUB_OUTPUT
            echo "agents=${{ github.event.inputs.agents }}"    >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            # 3 agents so the cross-review validation round runs (needs >=3);
            # the agents block in .ai-reviewer.yaml selects security/logic/patterns.
            echo "agents=3"                                        >> $GITHUB_OUTPUT
          fi

      - name: Run AI Code Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Built-in token: the MeroReviewer App was removed from this repo
          # (it double-reviewed), so its installation token no longer exists.
          # Reviews post as github-actions[bot]; the body header still says
          # MeroReviewer via --reviewer-name, and past meroreviewer[bot]
          # reviews stay recognized via extra_reviewer_users in .ai-reviewer.yaml.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ai-reviewer review-pr \
            ${{ github.repository }} \
            ${{ steps.pr.outputs.number }} \
            --config .ai-reviewer.yaml \
            --agents ${{ steps.pr.outputs.agents }} \
            --reviewer-name "MeroReviewer" \
            --output github
