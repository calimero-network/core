name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**"
      - "apps/**"
      - "e2e-tests/**"

env:
  CALIMERO_WEBUI_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CALIMERO_AUTH_FRONTEND_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

permissions:
  contents: read

# Cancel superseded PR runs; never cancel a master run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  rust:
    name: Rust
    runs-on: big-machine
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          components: rustfmt, clippy
          shared-key: ci-checks
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build
        run: |
          ./scripts/build-all-apps.sh
          cargo build --workspace --all-targets --tests

      - name: Cargo format
        run: cargo fmt --check

      # No-warnings gate: every workspace target (libs, bins, tests, examples)
      # must be clippy- and rustc-warning-free. `--features calimero-storage/testing`
      # pulls in that crate's feature-gated `testing` harness so it's linted in the
      # same single pass. Run the same command locally before pushing.
      - name: Cargo clippy
        if: ${{ !cancelled() }}
        run: cargo clippy --workspace --all-targets --features calimero-storage/testing -- -D warnings

      - name: Cargo test
        if: ${{ !cancelled() }}
        run: |
          FIRST_HOST=$(ifconfig | grep 'inet ' | grep -v '127.0.0.1' | awk '{print $2}' | head -n 1)

          export TEST_HOSTS=$FIRST_HOST,127.0.0.1,0.0.0.0
          echo $TEST_HOSTS

          cargo test -- --nocapture

      # The mock TEE attestation path is compiled out by default (the
      # `mock-attestation` feature is default-OFF so it never reaches a release
      # binary). The default `cargo test` above therefore does NOT cover it, so
      # lint + run the mock-only tests explicitly here, otherwise that coverage
      # silently disappears. Covers: merod KMS mock-attest tests, `merod tee
      # probe --mock-tee` tests, and the calimero-node mock-fleet governance
      # harness (`local_governance_node_e2e` + `cascade_dispatch_e2e`).
      - name: Cargo clippy (mock-attestation)
        if: ${{ !cancelled() }}
        run: cargo clippy -p merod -p calimero-node -p calimero-server -p calimero-tee-attestation --all-targets --features mock-attestation -- -D warnings

      - name: Cargo test (mock-attestation)
        if: ${{ !cancelled() }}
        run: cargo test -p merod -p calimero-node -p calimero-tee-attestation --features mock-attestation -- --nocapture

      - name: Cargo check (calimero-context-config)
        if: ${{ !cancelled() }}
        run: cargo check -p calimero-context-config

      - name: Cargo check (merod, local-only init binary)
        if: ${{ !cancelled() }}
        run: cargo check -p merod --no-default-features

      - name: Cargo deny
        if: ${{ !cancelled() }}
        run: |
          # Pin cargo-deny to 0.19.9: parses modern (CVSS 4.0) advisories and builds
          # on Rust 1.88.0. 0.16.3 could not load the current advisory DB.
          cargo install cargo-deny --version 0.19.9 --locked
          cargo deny check advisories bans licenses sources
