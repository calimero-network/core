name: Sync regression (smoke)

# Smoke regression for HashComparison sync — specifically the opaque-leaf
# code path fixed in #2344. Mirrors mero-drive's failing E2E (main)
# bootstrap pattern (2-node, namespace + context + interleaved writes)
# end-to-end, in ~3 min of merobox runtime + ~3 min of cold-start.
#
# This is smoke coverage. The deterministic regression guard lives in
# `crates/node/tests/sync_sim/protocol.rs` and runs on every PR via
# cargo-test. A failure here is a real bug; a green here does not mean
# every regression is caught.

permissions:
  contents: read

on:
  push:
    branches: [master]
    paths:
      - "crates/node/src/sync/**"
      - "crates/node/primitives/src/sync/**"
      - "crates/storage/src/**"
      - "workflows/sync-tests/**"
      - ".github/workflows/sync-regression.yml"
      - ".github/actions/build-local-merod/**"
      - ".github/actions/setup-merobox/**"

  pull_request:
    branches: [master]
    paths:
      - "crates/node/src/sync/**"
      - "crates/node/primitives/src/sync/**"
      - "crates/storage/src/**"
      - "workflows/sync-tests/**"
      - ".github/workflows/sync-regression.yml"
      - ".github/actions/build-local-merod/**"
      - ".github/actions/setup-merobox/**"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_LOG: info,calimero_=debug
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  sync-regression:
    name: Sync regression
    # Same runner class as e2e-rust-apps so cold-start performance is
    # comparable and we share the rust-ci cache.
    runs-on: ubuntu-24.04-8cpu
    # 15-min cap is generous: the workflow's own timeouts are 30s per
    # `wait_for_sync`, so a regression fails in ~30s. The cap is for the
    # cold-build steps (merod image + WASM) plus a safety margin.
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Rust CI
        uses: ./.github/actions/setup-rust-ci
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          shared-key: sync-regression
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Build local merod image
        uses: ./.github/actions/build-local-merod
        env:
          CALIMERO_WEBUI_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CALIMERO_AUTH_FRONTEND_FETCH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build kv-store-with-handlers WASM
        run: |
          cd apps/kv-store-with-handlers
          ./build.sh

      - name: Setup merobox
        uses: ./.github/actions/setup-merobox

      - name: Run sync-regression workflow
        # `merobox bootstrap run` exits non-zero on any failed step
        # (including a `wait_for_sync` timeout, which is the symptom
        # under regression). No retry — a flake here is a real bug, same
        # rationale as `e2e-rust-apps.yml`'s single-attempt policy.
        run: |
          mkdir -p docker-logs

          # merobox 0.6.34+ persists per-container logs natively to
          # data/container-logs/<name>.log on every `bootstrap run`,
          # regardless of `stop_all_nodes` (calimero-network/merobox#207).
          # This replaces the old background `docker logs -f` watcher.
          LOGDIR="$GITHUB_WORKSPACE/docker-logs"

          set +e
          set -o pipefail
          merobox bootstrap run \
              workflows/sync-tests/opaque-leaf-regression.yml \
              --image merod:local \
              --e2e-mode \
              --verbose 2>&1 | tee docker-logs/merobox-output.log
          exit_code=$?
          set +o pipefail

          # Collect merobox's native per-container logs into the artifact dir.
          for f in data/container-logs/*.log; do
              [ -e "$f" ] || continue
              cp -f "$f" "$LOGDIR/$(basename "$f")"
          done

          exit "$exit_code"

      - name: Upload docker logs
        # Always upload — green runs still need log evidence (e.g.
        # confirming sync timing is actually fast, not just barely
        # under the wait_for_sync budget). Matches the pattern in
        # `e2e-rust-apps.yml` (`if: always()`).
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sync-regression-docker-logs
          path: docker-logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Verify no premature inbound-stream closure (#2356)
        # Regression guard for the materialisation-wait short-circuit
        # fixed in this PR. The Phase 5 cold-start race in
        # `opaque-leaf-regression.yml` may or may not fire the
        # underlying timing race on a given runner — gossipsub
        # propagation in a stable 2-node mesh is fast — but when it
        # does fire pre-fix, node-2's log carries the exact warn
        # signature below. Post-fix, the responder waits for the group
        # binding to materialise within the 10 s window, and the warn
        # never fires.
        #
        # `if: always()` is on purpose — even when an earlier step
        # already failed (e.g. `wait_for_sync` timeout), the warn
        # signature in the captured docker logs is useful diagnostic
        # context for triage.
        #
        # Fail-loud on absent logs: a merobox bootstrap that aborts
        # *before* any node logs are captured (e.g. image pull failure)
        # would otherwise produce a silent false negative — `grep` of an
        # empty glob exits non-zero but `2>/dev/null` swallows that,
        # and "no match" is then indistinguishable from a true clean
        # run. The explicit file-existence check below fails the step
        # in that case so the upstream failure surfaces clearly.
        #
        # Hardcoded literals only; no `${{ ... }}` GitHub-context
        # interpolation in the shell body.
        if: always()
        env:
          WARN_SIGNATURE: "inbound stream for unknown context, closing cleanly"
        run: |
          set +e
          shopt -s nullglob
          log_files=(docker-logs/sync-regression-node-*.log)
          if [ ${#log_files[@]} -eq 0 ]; then
            echo "::error::No docker-logs/sync-regression-node-*.log found — cannot verify #2356 guard."
            echo "  (merobox bootstrap likely aborted before any node log was captured)"
            exit 1
          fi
          if grep -h -F "$WARN_SIGNATURE" "${log_files[@]}" 2>/dev/null; then
            echo "::error::Detected premature inbound-stream closure (#2356)"
            echo "See crates/node/src/sync/manager/mod.rs materialisation-wait loop."
            exit 1
          fi
          echo "OK: no premature inbound-stream closures observed across ${#log_files[@]} log file(s)."

      - name: Verify no creator-side owned-identity race (#2356 follow-up)
        # Companion guard for the ContextIdentity write-ordering fix in
        # `crates/context/src/handlers/create_context.rs`. Pre-fix the
        # creator's auto-follow sync cascade — triggered synchronously by
        # `sign_apply_and_publish(ContextRegistered)` — ran before
        # ContextIdentity was written to the datastore, so the immediate
        # sync attempt aborted with `no owned identities found for
        # context: <id>` and entered exponential backoff. Post-fix,
        # ContextIdentity is written first; the cascade finds the key and
        # proceeds. Same fail-loud-on-missing-logs semantics as above.
        if: always()
        env:
          OWNED_IDENT_SIGNATURE: "no owned identities found for context"
        run: |
          set +e
          shopt -s nullglob
          log_files=(docker-logs/sync-regression-node-*.log)
          if [ ${#log_files[@]} -eq 0 ]; then
            echo "::error::No docker-logs/sync-regression-node-*.log found — cannot verify creator-side guard."
            exit 1
          fi
          if grep -h -F "$OWNED_IDENT_SIGNATURE" "${log_files[@]}" 2>/dev/null; then
            echo "::error::Detected 'no owned identities found' race on the creator"
            echo "See crates/context/src/handlers/create_context.rs — ContextIdentity must be"
            echo "written BEFORE sign_apply_and_publish(ContextRegistered) so the auto-follow"
            echo "cascade triggered by the local apply can find the key."
            exit 1
          fi
          echo "OK: no creator-side owned-identity races observed across ${#log_files[@]} log file(s)."
