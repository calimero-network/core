name: Setup Rust CI
description: "Setup Rust toolchain and caching for CI workflows"

inputs:
  toolchain:
    description: "Rust toolchain to install (stable, nightly, or specific version)"
    required: false
    default: "stable"
  components:
    description: "Additional rustup components to install (comma-separated)"
    required: false
    default: ""
  targets:
    description: "Additional rustup targets to install (comma-separated)"
    required: false
    default: ""
  shared-key:
    description: "Shared key for rust-cache (typically workflow name)"
    required: true
  cache-on-failure:
    description: "Whether to save cache even when build fails"
    required: false
    default: "true"
  save-if:
    description: "Condition for saving cache (e.g., github.ref == 'refs/heads/master')"
    required: false
    default: "${{ github.ref == 'refs/heads/master' }}"

runs:
  using: "composite"
  steps:
    # `librocksdb-sys` → `bindgen 0.72` → `clang-sys` runs in runtime mode
    # (forced on by feature unification with wasmer's bindgen 0.70), so it
    # dlopen's libclang at build-script time. GitHub's ubuntu runners
    # don't ship `libclang-dev` by default — install it so the shared
    # library + symlinks are present. macOS runners use Homebrew's llvm
    # via `.cargo/config.toml`; no apt there.
    - name: Install libclang (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libclang-dev

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: v0-rust
        shared-key: ${{ inputs.shared-key }}
        cache-on-failure: ${{ inputs.cache-on-failure }}
        save-if: ${{ inputs.save-if }}
