name: Setup Merobox
description: "Setup Python and install merobox from PyPI"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install merobox from git
      shell: bash
      run: |
        # Pin setuptools to the <80 series. setuptools 80+ breaks PEP 517 metadata
        # extraction for one of merobox's sdist dependencies (calimero-client-py
        # 0.5.2): pip crashes in `warn_on_mismatching_name` because the built
        # metadata has `Name: None`. The runner's bundled setuptools (79.x) works,
        # so do not upgrade it. We still upgrade pip for general hygiene.
        python -m pip install --upgrade pip 'setuptools<80' wheel
        python -m pip install "merobox @ git+https://github.com/calimero-network/merobox.git@master"

    - name: Verify merobox installation
      shell: bash
      run: merobox --version
