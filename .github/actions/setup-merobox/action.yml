name: Setup Merobox
description: "Install merobox from PyPI (Linux only)"

runs:
  using: "composite"
  steps:
    - name: Install merobox (pip)
      shell: bash
      # Installed from PyPI: the gh-pages APT repository this action used to
      # target was replaced by the merobox docs site (its dists/ Release file
      # 404s), so apt installs fail for every consumer. `timeout` bounds the
      # network steps so a stalled download cannot wedge the job (one such
      # hang on PR #2472 ran 90 min in this step alone).
      run: |
        set -euo pipefail
        timeout 180 python3 -m pip install --user "merobox==0.6.43"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/merobox" --version
        # Floor: the e2e workflows depend on merobox features the pinned
        # version must be new enough to provide —
        #   * native per-container log persistence to data/container-logs/
        #     (merobox#207, 0.6.34),
        #   * the partition_peers/heal_peers surgical libp2p partition steps
        #     that keep RPC reachable (merobox#278, 0.6.35), used by
        #     shared-storage-concurrent-rotation-converge, and
        #   * the native `abort_migration` step (merobox#280, 0.6.36) used by
        #     31-admin-abort-logical, and
        #   * the migrations-v2 steps (resync_context / get_migration_status /
        #     assert_migration_complete, merobox#282; get_application,
        #     merobox#283 — 0.6.38), and
        #   * the `delete_blob` step (admin-API blob delete that cascades
        #     parent+chunks+metadata, merobox#285 — 0.6.39) used by
        #     37-stranded-resync (the old delete_blob_on_disk rm was a no-op for
        #     chunked blobs, so it could not stage the strand), and
        #   * forwarding of MERO_AUTH_ADMIN_USER / MERO_AUTH_ADMIN_PASSWORD
        #     into node and auth-service containers (0.6.43), required now
        #     that the admin root key is minted at `merod init` from those
        #     variables (the login path never mints keys; the bootstrap-secret
        #     flow is gone). Without it every fresh-node scenario login fails
        #     "Invalid credentials".
        # Pin the floor so an older build fails loudly rather than skipping
        # steps or collecting empty log artifacts.
        MIN_MEROBOX="0.6.43"
        HAVE_MEROBOX="$("$HOME/.local/bin/merobox" --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
        if [ "$(printf '%s\n%s\n' "$MIN_MEROBOX" "$HAVE_MEROBOX" | sort -V | head -1)" != "$MIN_MEROBOX" ]; then
          echo "::error::merobox ${HAVE_MEROBOX} is older than the required ${MIN_MEROBOX} (MERO_AUTH_ADMIN_* env forwarding)"
          exit 1
        fi
