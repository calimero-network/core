name: Setup Merobox
description: "Setup Python and install merobox from PyPI"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install merobox PR #185 and client master
      shell: bash
      run: |
        # Requested test matrix:
        # - merobox from PR #185 head
        # - calimero-client-py from master
        MEROBOX_REF="7c1d964d06c3466db8ec98af2305cc95c0b5c198"
        CLIENT_REF="master"

        pip install "merobox @ git+https://github.com/calimero-network/merobox.git@${MEROBOX_REF}"
        pip install --force-reinstall "calimero-client-py @ git+https://github.com/calimero-network/calimero-client-py.git@${CLIENT_REF}"

    - name: Verify merobox installation
      shell: bash
      run: merobox --version
