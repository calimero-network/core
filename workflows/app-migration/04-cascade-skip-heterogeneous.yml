name: 04 — Cascade skip heterogeneous (predicate mismatch leaves B untouched)
description: >
  Single-node regression guard for spec §3.2 predicate-skip semantics.
  Namespace `NS` contains two subgroups:
    * A — created with app_v1 (GroupMeta.app_key == v1)
    * B — created with app_v1, then non-cascade-upgraded to app_v2 via
          `migrate_v1_to_v2` (GroupMeta.app_key == v2 by the time NS is
          cascaded)
  Each subgroup holds two contexts. The headline step is a cascade
  upgrade against NS with `from_app_key == v1`. The walker visits both
  subgroups but the predicate (`GroupMeta.app_key == from_app_key`) only
  matches A; B's GroupMeta.app_key is v2, so the cascade-emitter must
  SKIP B and leave its contexts alone.

  Why this matters:
    If a future code change accidentally widens the predicate match
    (e.g. drops the equality check, walks unconditionally, or compares
    against the wrong field), B's already-v2 contexts would be fed to
    `migrate_v1_to_v2` — which `read_raw()`s the stored bytes and
    `BorshDeserialize`s them as `MigrationSuiteV1`. Deserializing v2
    bytes (which include the `notes` field absent from v1) as v1 panics
    inside the wasm, the per-context upgrade fails, and `get_notes` on
    B after the cascade either returns the default "added in v2" reset
    or 500s. This workflow catches that immediately at the post-cascade
    assertions on B.

  Deviation from the design-spec wording (cascade `v1 → v3`):
    The migration fixtures only ship `migrate_v1_to_v2` (in v2) and
    `migrate_v2_to_v3` (in v3) — no direct `migrate_v1_to_v3` function
    exists. A single cascade with `from_app_key=v1, target=v3` would
    have no valid migrate_method. Rather than synthesise a v1→v3 helper
    just for this regression test, the workflow cascades v1→v2: A goes
    v1→v2 (predicate match), B stays at v2 (predicate mismatch). The
    test's discriminator is *whether B was touched*, not the absolute
    target version, so v3 is not required to exercise the predicate.
    The v3 fixture is exercised by workflow 05 (cascade chain).

  -----------------------------------------------------------------------
  External-dependency contract (pinned for Task 14 CI guard):

    * `merobox >= 0.7.0` (placeholder pending merobox#255):
        - `upgrade_group` step must accept the `cascade: bool` field.
          Pre-#255 merobox silently drops unknown fields; the NS cascade
          step would then execute as a non-cascade single-group upgrade
          on the NS root, which has zero direct contexts and so would
          fail with "group has no contexts to upgrade". Treat any
          failure at "Cascade NS to v2" under pre-0.7.0 merobox as the
          version guard tripping, not a real regression.

    * Core: `feat/cascade-engine` (this branch) — provides the
      predicate-skip code path (PR-2 Tasks 2-3 / cascade walk) keyed
      off the `from_app_key == GroupMeta.app_key` check in
      `walk_for_predicate`.

  Task 14 (`.github/workflows/app-migration-e2e.yml`) wires the actual
  version check.
  -----------------------------------------------------------------------

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 1
  image: merod:local
  # Non-overlapping ports vs workflows 00 (9220/9320) and 01 (9221/9321)
  # so all app-migration workflows can run concurrently in local dev.
  prefix: app-migration-skip-heterogeneous
  base_port: 9222
  base_rpc_port: 9322

steps:
  # ── Phase 1: Install v1, v2, v3 on the single node ──────────────────
  # v3 is installed but never used as a cascade target in this workflow
  # (see header deviation note). It's available for follow-up local
  # exploration without re-running setup.

  - name: Install migration-suite-v1
    type: install_application
    node: app-migration-skip-heterogeneous-1
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install migration-suite-v2-add-field
    type: install_application
    node: app-migration-skip-heterogeneous-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true
    outputs:
      app_v2: applicationId

  - name: Install migration-suite-v3-add-list
    type: install_application
    node: app-migration-skip-heterogeneous-1
    path: apps/migrations/migration-suite-v3-add-list/res/migration_suite_v3_add_list.wasm
    dev: true
    outputs:
      app_v3: applicationId

  # ── Phase 2: Namespace NS at v1 + admin key ─────────────────────────

  - name: Create namespace NS
    type: create_namespace
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (for teardown)
    type: get_namespace_identity
    node: app-migration-skip-heterogeneous-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  # ── Phase 3: Subgroup A (stays on v1 until cascade) ─────────────────

  - name: Create subgroup A inside NS
    type: create_group_in_namespace
    node: app-migration-skip-heterogeneous-1
    namespace_id: "{{namespace_id}}"
    group_name: "heterogeneous-A"
    outputs:
      a_id: groupId

  - name: Create A-ctx1 (v1)
    type: create_context
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v1}}"
    group_id: "{{a_id}}"
    outputs:
      ctx_a_1: contextId

  - name: Create A-ctx2 (v1)
    type: create_context
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v1}}"
    group_id: "{{a_id}}"
    outputs:
      ctx_a_2: contextId

  # ── Phase 4: Subgroup B — born at v1, lifted to v2 BEFORE NS cascade ─
  # `create_group_in_namespace` does not accept an `application_id`
  # override (see merobox/commands/bootstrap/steps/namespace.py
  # CreateGroupInNamespaceStep — only `namespace_id` and `group_name`),
  # so B is forced to inherit NS's app (v1) at creation time. The only
  # path to GroupMeta.app_key=v2 is a per-group upgrade.
  #
  # `update_group_settings` cannot flip app_key either (it only accepts
  # `upgrade_policy` — see group_governance.py UpdateGroupSettingsStep).
  #
  # And per the upgrade preamble (`crates/context/src/handlers/
  # upgrade_group.rs` ≈ line 511: "group has no contexts to upgrade"),
  # a non-cascade `upgrade_group` on a group with zero contexts is
  # rejected — so B's contexts must be created BEFORE B's v1→v2
  # upgrade. The sequence here:
  #   1. Create B (inherits v1).
  #   2. Create 2 contexts in B at v1.
  #   3. Set upgrade policy on B to coordinated.
  #   4. Non-cascade upgrade B v1→v2 with migrate_v1_to_v2. This both
  #      flips GroupMeta.app_key to v2 AND migrates the two contexts to
  #      v2 schema. After this step, B is a fully-formed v2 subgroup.
  #   5. Write a sentinel `notes` value on each B context. The cascade
  #      walker, when later issued against NS with from_app_key=v1, must
  #      NOT touch B. The sentinel survives the cascade iff B was
  #      genuinely skipped.

  - name: Create subgroup B inside NS
    type: create_group_in_namespace
    node: app-migration-skip-heterogeneous-1
    namespace_id: "{{namespace_id}}"
    group_name: "heterogeneous-B"
    outputs:
      b_id: groupId

  - name: Create B-ctx1 (v1 initially)
    type: create_context
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v1}}"
    group_id: "{{b_id}}"
    outputs:
      ctx_b_1: contextId

  - name: Create B-ctx2 (v1 initially)
    type: create_context
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v1}}"
    group_id: "{{b_id}}"
    outputs:
      ctx_b_2: contextId

  - name: Wait for context registration
    type: wait
    seconds: 3

  - name: Set B upgrade policy to coordinated
    type: update_group_settings
    node: app-migration-skip-heterogeneous-1
    group_id: "{{b_id}}"
    upgrade_policy: coordinated

  - name: Pre-cascade upgrade B → v2 (flips GroupMeta.app_key to v2)
    type: upgrade_group
    node: app-migration-skip-heterogeneous-1
    group_id: "{{b_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2

  - name: Wait for B's pre-cascade upgrade to complete
    # B has 2 contexts × ~0.5s wasm migrate + state-write ≈ 1.5s; 8s
    # leaves comfortable headroom and matches workflow 00's budget.
    type: wait
    seconds: 8

  - name: Sanity — B's upgrade status is completed (not in_progress)
    type: get_group_upgrade_status
    node: app-migration-skip-heterogeneous-1
    group_id: "{{b_id}}"
    outputs:
      b_status_pre_cascade: result

  - name: Assert B upgrade completed before cascade
    type: json_assert
    statements:
      - 'json_subset({{b_status_pre_cascade}}, {"data": {"status": "completed"}})'

  - name: Sanity — B-ctx1 is v2 after pre-cascade upgrade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_1}}"
    method: schema_info
    outputs:
      b_1_schema_pre: result

  - name: Assert B-ctx1 is v2 before NS cascade
    type: json_assert
    statements:
      - 'json_subset({{b_1_schema_pre}}, {"output": {"schema_version": "2.0.0"}})'

  - name: Sanity — B-ctx2 is v2 after pre-cascade upgrade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_2}}"
    method: schema_info
    outputs:
      b_2_schema_pre: result

  - name: Assert B-ctx2 is v2 before NS cascade
    type: json_assert
    statements:
      - 'json_subset({{b_2_schema_pre}}, {"output": {"schema_version": "2.0.0"}})'

  # Sentinel write. The cascade emitter on NS must not touch B; if it
  # mistakenly does, the v2-only setter call paths inside the migration
  # wouldn't preserve this value (a fresh re-init would reset notes to
  # "added in v2"). Survival of these sentinels post-cascade is the
  # cleanest behavioural proof of predicate-skip.
  - name: Write sentinel notes on B-ctx1
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_1}}"
    method: set_notes
    args:
      notes: "B-ctx1-untouched-sentinel"

  - name: Write sentinel notes on B-ctx2
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_2}}"
    method: set_notes
    args:
      notes: "B-ctx2-untouched-sentinel"

  # ── Phase 5: Sanity — A's contexts are still v1 pre-cascade ─────────

  - name: Read A-ctx1 schema (sanity)
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_a_1}}"
    method: schema_info
    outputs:
      a_1_schema_pre: result

  - name: Assert A-ctx1 is v1 before cascade
    type: json_assert
    statements:
      - 'json_subset({{a_1_schema_pre}}, {"output": {"schema_version": "1.0.0"}})'

  - name: Read A-ctx2 schema (sanity)
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_a_2}}"
    method: schema_info
    outputs:
      a_2_schema_pre: result

  - name: Assert A-ctx2 is v1 before cascade
    type: json_assert
    statements:
      - 'json_subset({{a_2_schema_pre}}, {"output": {"schema_version": "1.0.0"}})'

  - name: Assert bootstrap shape (all IDs resolved)
    type: assert
    statements:
      - "is_set({{namespace_id}})"
      - "is_set({{a_id}})"
      - "is_set({{b_id}})"
      - "is_set({{ctx_a_1}})"
      - "is_set({{ctx_a_2}})"
      - "is_set({{ctx_b_1}})"
      - "is_set({{ctx_b_2}})"

  # ── Phase 6: Coordinate NS, then cascade NS v1 → v2 ─────────────────
  # The headline step. `cascade: true` against the namespace walks both
  # subgroups; the predicate (`GroupMeta.app_key == v1`, the implicit
  # from_app_key derived from NS's own app_key) matches A but NOT B
  # (B.app_key == v2 after phase 4). A's two contexts migrate; B's are
  # skipped entirely.

  - name: Set namespace upgrade policy to coordinated
    type: update_group_settings
    node: app-migration-skip-heterogeneous-1
    group_id: "{{namespace_id}}"
    upgrade_policy: coordinated

  - name: Cascade NS to v2 (B must be skipped by predicate)
    type: upgrade_group
    node: app-migration-skip-heterogeneous-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  - name: Wait for cascade walk + A's two migrations
    # Same budget shape as workflow 01 — 1 subgroup actually migrating,
    # 2 contexts, ~0.5s each → ~3s real work, 8s for headroom.
    type: wait
    seconds: 8

  - name: Read NS upgrade status (sanity — should be completed)
    type: get_group_upgrade_status
    node: app-migration-skip-heterogeneous-1
    group_id: "{{namespace_id}}"

  # ── Phase 7: Assert A migrated, B skipped ───────────────────────────

  # ---- A contexts: must be v2 now (predicate matched, migrated) ----
  - name: Read A-ctx1 schema post-cascade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_a_1}}"
    method: schema_info
    outputs:
      a_1_schema_post: result

  - name: Assert A-ctx1 is v2 after cascade
    type: json_assert
    statements:
      - 'json_subset({{a_1_schema_post}}, {"output": {"schema_version": "2.0.0"}})'

  - name: Read A-ctx2 schema post-cascade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_a_2}}"
    method: schema_info
    outputs:
      a_2_schema_post: result

  - name: Assert A-ctx2 is v2 after cascade
    type: json_assert
    statements:
      - 'json_subset({{a_2_schema_post}}, {"output": {"schema_version": "2.0.0"}})'

  # ---- B contexts: must still be v2 AND sentinel notes intact ----
  # If predicate widened, migrate_v1_to_v2 would re-run on these
  # already-v2 contexts, either panicking inside the wasm
  # (BorshDeserialize<MigrationSuiteV1> failing on v2 bytes) or, in the
  # less-obvious case, calling init() and resetting notes to the
  # default "added in v2".
  - name: Read B-ctx1 schema post-cascade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_1}}"
    method: schema_info
    outputs:
      b_1_schema_post: result

  - name: Assert B-ctx1 still v2 after cascade (predicate skip)
    type: json_assert
    statements:
      - 'json_subset({{b_1_schema_post}}, {"output": {"schema_version": "2.0.0"}})'

  - name: Read B-ctx1 sentinel notes post-cascade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_1}}"
    method: get_notes
    outputs:
      b_1_notes_post: result

  - name: Assert B-ctx1 sentinel survived cascade (untouched proof)
    type: json_assert
    statements:
      - 'json_equal({{b_1_notes_post}}, {"output": "B-ctx1-untouched-sentinel"})'

  - name: Read B-ctx2 schema post-cascade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_2}}"
    method: schema_info
    outputs:
      b_2_schema_post: result

  - name: Assert B-ctx2 still v2 after cascade (predicate skip)
    type: json_assert
    statements:
      - 'json_subset({{b_2_schema_post}}, {"output": {"schema_version": "2.0.0"}})'

  - name: Read B-ctx2 sentinel notes post-cascade
    type: call
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_2}}"
    method: get_notes
    outputs:
      b_2_notes_post: result

  - name: Assert B-ctx2 sentinel survived cascade (untouched proof)
    type: json_assert
    statements:
      - 'json_equal({{b_2_notes_post}}, {"output": "B-ctx2-untouched-sentinel"})'

  # ── Phase 8: B's own upgrade status — no in-progress cascade op ─────
  # After the NS cascade, B should still report its OWN earlier v1→v2
  # upgrade as the active record (completed). If the cascade had
  # incorrectly re-issued an upgrade against B, we'd see a fresher
  # "in_progress" or a new "completed" record with a different
  # from_version. Asserting `status: completed` is the conservative
  # check that catches the most-likely regression mode (a stuck
  # in_progress on B).

  - name: Read B upgrade status post-cascade
    type: get_group_upgrade_status
    node: app-migration-skip-heterogeneous-1
    group_id: "{{b_id}}"
    outputs:
      b_status_post: result

  - name: Assert B has no in-progress upgrade after NS cascade
    type: json_assert
    statements:
      - 'json_subset({{b_status_post}}, {"data": {"status": "completed"}})'

  # ── Phase 9: Teardown ───────────────────────────────────────────────

  - name: Delete A-ctx1
    type: delete_context
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_a_1}}"
    requester: "{{admin_key}}"

  - name: Delete A-ctx2
    type: delete_context
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_a_2}}"
    requester: "{{admin_key}}"

  - name: Delete B-ctx1
    type: delete_context
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_1}}"
    requester: "{{admin_key}}"

  - name: Delete B-ctx2
    type: delete_context
    node: app-migration-skip-heterogeneous-1
    context_id: "{{ctx_b_2}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup A
    type: delete_group
    node: app-migration-skip-heterogeneous-1
    group_id: "{{a_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup B
    type: delete_group
    node: app-migration-skip-heterogeneous-1
    group_id: "{{b_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-skip-heterogeneous-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1
    type: uninstall_application
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2
    type: uninstall_application
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v2}}"

  - name: Uninstall v3
    type: uninstall_application
    node: app-migration-skip-heterogeneous-1
    application_id: "{{app_v3}}"

stop_all_nodes: false
