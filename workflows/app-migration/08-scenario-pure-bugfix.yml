name: 08 — Scenario "pure bugfix" (v1 → v2, no state change, 2-node)
description: >
  2-node per-context upgrade for the pure-bugfix scenario.
  v2 has the byte-identical borsh layout of v1 (same field names,
  types, order) — only the body of an exported method (`sum_all_values`)
  differs: v1 has an off-by-one bug that adds 1 to the total, v2 fixes
  it. Because the state struct is unchanged, no `#[app::migrate]` is
  needed and the upgrade carries no `migrate_method`; existing v1 state
  bytes decode as v2 directly.

  Topology: namespace + one Open subgroup + one context in the subgroup.
  Upgrade is `upgrade_group(group=subgroup, target=v2)` — per-context
  (cascade=false), no migrate handler. Acts as the "code-only" row of
  the per-scenario matrix.

  Phase 7d invokes `sum_all_values` on node 2 (the buggy-now-fixed
  method) and asserts the correct 60 — proves the v2 code is in effect
  on the receiver too, not just the upgrade emitter.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-bugfix
  base_port: 9300
  base_rpc_port: 9400

steps:
  # Phase 1: Install both binaries on the ADMIN node (node 1) only.
  #
  # Realistic distribution: node 2 never runs install_application. It
  # auto-fetches the from-version when it joins the context and the
  # to-version when the upgrade announces the target blob (pulled over
  # BlobShare during its lazy migration; the sync-gate leaves BlobShare
  # open for exactly this). App ids are content-addressed, so node 1's
  # captured app ids are the same ids node 2 resolves. Proven by the
  # 01/02 admin-only canary.
  - name: Install scenario-pure-bugfix-v1 on node 1
    type: install_application
    node: app-migration-bugfix-1
    path: apps/migrations/scenario-pure-bugfix-v1/res/scenario_pure_bugfix_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install scenario-pure-bugfix-v2 on node 1
    type: install_application
    node: app-migration-bugfix-1
    path: apps/migrations/scenario-pure-bugfix-v2/res/scenario_pure_bugfix_v2.wasm
    dev: true
    outputs:
      app_v2: applicationId

  # Phase 2: Node 1 builds namespace + Open subgroup + context.
  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-bugfix-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-bugfix-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-bugfix-1
    namespace_id: "{{namespace_id}}"
    group_name: "pure-bugfix-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-bugfix-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-bugfix-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2 to namespace; materialise subgroup + context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-bugfix-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-bugfix-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-bugfix-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-bugfix-2
    context_id: "{{ctx_id}}"

  # Phase 4: Write v1 state on node 1, wait for node 2 to catch up.
  - name: Write v1 item k1=10
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: add_value
    args:
      key: "k1"
      value: 10

  - name: Write v1 item k2=20
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: add_value
    args:
      key: "k2"
      value: 20

  - name: Write v1 item k3=30
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: add_value
    args:
      key: "k3"
      value: 30

  - name: Call sum_all_values (v1, buggy)
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: sum_all_values
    outputs:
      v1_sum: result

  - name: Assert v1 sum reflects the off-by-one bug (10+20+30+1 = 61)
    type: json_assert
    statements:
      - 'json_equal({{v1_sum}}, {"output": 61})'

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-bugfix-1
      - app-migration-bugfix-2
    timeout: 90
    trigger_sync: true

  - name: Sanity-check v1 schema_info on node 1
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema in place
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "last_sum": 61}})'

  # LazyOnAccess: each node migrates its OWN byte-identical v1 state
  # on next access. The migration write path emits no DAG delta (full
  # root replacement, not CRDT-mergeable), so migrated bytes do not
  # propagate over sync — each node must self-migrate. Under
  # `coordinated` only the emitter migrates and the receiver is left
  # with v1 bytes behind a v2 app pointer → "Not all bytes read"
  # panic. The per-context TargetApplicationSet + GroupMigrationSet
  # ops set both `target_application_id` and the `migration` method on
  # the subgroup's GroupMeta, which each receiver's
  # `maybe_lazy_upgrade` reads to self-migrate.
  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-bugfix-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  # Phase 5: Per-context upgrade on the subgroup (cascade=false default).
  # Pure-bugfix: state struct is byte-identical, so no migrate_method is
  # supplied. Existing v1 state bytes must decode as v2 directly.
  - name: Upgrade subgroup v1 → v2 (per-context, no migrate handler)
    type: upgrade_group
    node: app-migration-bugfix-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"

  # Fixed wait, NOT wait_for_sync (see scenario 01 rationale).
  - name: Wait for upgrade to apply + log flush
    type: wait
    seconds: 15

  # These reads TRIGGER each node's lazy migration: schema_info is not
  # a state op, so `maybe_lazy_upgrade` fires on each node, migrating
  # its own v1 state to v2 before serving the read.
  - name: Read post-upgrade schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-upgrade schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-bugfix-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert v2 schema on node 1 (version bumped, last_sum preserved from v1)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "last_sum": 61}})'

  - name: Assert v2 schema on node 2 (same shape, proves upgrade reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0", "last_sum": 61}})'

  - name: Call sum_all_values (v2, bug fixed) on node 1
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: sum_all_values
    outputs:
      v2_sum: result

  - name: Assert v2 sum no longer has the off-by-one (10+20+30 = 60)
    type: json_assert
    statements:
      - 'json_equal({{v2_sum}}, {"output": 60})'

  - name: Get preserved item k1
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: get_value
    args:
      key: "k1"
    outputs:
      preserved_k1: result

  - name: Assert preserved k1 = 10
    type: json_assert
    statements:
      - 'json_equal({{preserved_k1}}, {"output": 10})'

  - name: Get preserved item k2
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: get_value
    args:
      key: "k2"
    outputs:
      preserved_k2: result

  - name: Assert preserved k2 = 20
    type: json_assert
    statements:
      - 'json_equal({{preserved_k2}}, {"output": 20})'

  - name: Get preserved item k3
    type: call
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    method: get_value
    args:
      key: "k3"
    outputs:
      preserved_k3: result

  - name: Assert preserved k3 = 30
    type: json_assert
    statements:
      - 'json_equal({{preserved_k3}}, {"output": 30})'

  # Phase 7d: invoke the buggy-now-fixed method on node 2 to prove the
  # v2 code is in effect there too (not just on the upgrade emitter).
  - name: Call sum_all_values (v2, bug fixed) on node 2
    type: call
    node: app-migration-bugfix-2
    context_id: "{{ctx_id}}"
    method: sum_all_values
    outputs:
      v2_sum_node2: result

  - name: Assert v2 fix in effect on node 2 (10+20+30 = 60)
    type: json_assert
    statements:
      - 'json_equal({{v2_sum_node2}}, {"output": 60})'

  # Phase 8: Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-bugfix-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-bugfix-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-bugfix-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-bugfix-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-bugfix-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
