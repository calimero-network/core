name: 37 — Stranded detection + self-heal (blob holder offline, 2-node)
description: >
  The "nobody stranded" guarantees that need no resync RPC: a context that
  cannot fetch its next upgrade-ladder rung is detected, parked safely on its
  current version (never wrong-hop, never corrupted), and self-heals once the
  blob becomes reachable again.

  Both nodes start at v1. node-1 (the only installer) upgrades the subgroup
  v1 -> v2 -> v3, migrating its own context to v3 — so node-1 holds the v2+v3
  blobs and the group's recorded ladder is [v2, v3]. node-2 learns the new
  target via governance gossip but does NOT access (stays bound at v1).

  Stop node-1. node-2's first access now resolves its next rung (v2) but
  ensure_blob_local fails (the only v2-blob holder is down): it persists
  NoMigrationPath, runs NO migration, and keeps answering the v1 schema. Bring
  node-1 back; node-2's next access fetches the rungs over BlobShare and
  replays v1 -> v2 -> v3, clearing the stranded marker.

  The operator-forced resync RPC path is covered separately once merobox gains
  a `resync_context` step; this workflow needs only existing step types.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-stranded
  base_port: 9700
  base_rpc_port: 9800

steps:
  # Phase 1: node-1 installs v1, builds namespace + Open subgroup + context.
  - name: Install migration-suite-v1 on node 1
    type: install_application
    node: app-migration-stranded-1
    path: apps/migrations/migration-suite-v1/res/migration-suite-1.0.0.mpk
    dev: true
    outputs:
      app_v1: applicationId

  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-stranded-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-stranded-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-stranded-1
    namespace_id: "{{namespace_id}}"
    group_name: "stranded-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-stranded-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-stranded-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 2: node-2 joins namespace -> subgroup -> context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-stranded-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-stranded-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-stranded-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-stranded-2
    context_id: "{{ctx_id}}"

  # Phase 3: seed v1 state, converge node-2 on it.
  - name: Write v1 description
    type: call
    node: app-migration-stranded-1
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "selfheal"

  - name: Increment counter (1/2)
    type: call
    node: app-migration-stranded-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Increment counter (2/2)
    type: call
    node: app-migration-stranded-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-stranded-1
      - app-migration-stranded-2
    timeout: 90
    trigger_sync: true

  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-stranded-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  # Phase 4: node-1 climbs v1 -> v2 -> v3 (migrating its own context each hop),
  # so node-1 holds the v2+v3 blobs and the ladder is [v2, v3].
  - name: Install migration-suite-v2 on node 1
    type: install_application
    node: app-migration-stranded-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration-suite-2.0.0.mpk
    dev: true
    outputs:
      app_v2: applicationId

  - name: Upgrade subgroup v1 -> v2
    type: upgrade_group
    node: app-migration-stranded-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"

  - name: Wait for v2 meta to gossip
    type: wait
    seconds: 12

  - name: Activate v2 on node 1
    type: call
    node: app-migration-stranded-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Install migration-suite-v3 on node 1
    type: install_application
    node: app-migration-stranded-1
    path: apps/migrations/migration-suite-v3-remove-field/res/migration-suite-3.0.0.mpk
    dev: true
    outputs:
      app_v3: applicationId

  - name: Upgrade subgroup v2 -> v3
    type: upgrade_group
    node: app-migration-stranded-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v3}}"

  - name: Activate v3 on node 1
    type: call
    node: app-migration-stranded-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v3_schema_node1: result

  - name: Assert node 1 reached v3
    type: json_assert
    statements:
      - 'json_subset({{v3_schema_node1}}, {"output": {"schema_version": "3.0.0", "description": "selfheal", "counter": "2"}})'

  # Let node-2 learn target=v3 + fold the ladder over governance gossip WITHOUT
  # accessing its context (so it stays bound at v1).
  - name: Wait for v3 upgrade meta + ladder to gossip to node 2
    type: wait
    seconds: 18

  # Phase 5: stop the only v2-blob holder, then poke node-2 → strand.
  - name: Stop node 1 (the only v2/v3 blob holder)
    type: stop_node
    nodes: app-migration-stranded-1

  - name: Wait for node 2 to notice node 1 is gone
    type: wait
    seconds: 8

  - name: Access node 2 while node 1 is down (triggers strand)
    type: call
    node: app-migration-stranded-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      stranded_schema_node2: result

  - name: Assert node 2 is parked safely on v1 (no wrong-hop, no corruption)
    type: json_assert
    statements:
      - 'json_subset({{stranded_schema_node2}}, {"output": {"schema_version": "1.0.0", "description": "selfheal", "counter": "2"}})'

  - name: Assert the next rung was unreachable (stranded, hop blocked)
    type: assert_log_present
    nodes:
      - app-migration-stranded-2
    patterns:
      - "ladder hop blocked"
    min_matches: 1

  - name: Assert NO migration ran against the stale state
    type: assert_log_absent
    nodes:
      - app-migration-stranded-2
    patterns:
      - "Migrated state written successfully"
      - "Not all bytes read"

  # Phase 6: bring node 1 back; node-2's next access self-heals through the chain.
  - name: Start node 1 again
    type: start_node
    nodes: app-migration-stranded-1
    wait_for_ready: true
    wait_timeout: 45

  - name: Wait for mesh + blob discovery to re-stabilise
    type: wait
    seconds: 20

  - name: Access node 2 again (self-heals v1 -> v2 -> v3)
    type: call
    node: app-migration-stranded-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      healed_schema_node2: result

  - name: Assert node 2 self-healed to v3 with data carried through the chain
    type: json_assert
    statements:
      - 'json_subset({{healed_schema_node2}}, {"output": {"schema_version": "3.0.0", "description": "selfheal", "counter": "2"}})'

  - name: Assert the ladder replay ran on node 2
    type: assert_log_present
    nodes:
      - app-migration-stranded-2
    patterns:
      - "replaying upgrade ladder hop"
      - "Migrated state written successfully"
    min_matches: 1

  # Phase 7: post-heal convergence — writes flow both ways at v3.
  - name: Write post-heal value on node 2
    type: call
    node: app-migration-stranded-2
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "post-heal"

  - name: Wait for post-heal sync
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-stranded-1
      - app-migration-stranded-2
    timeout: 90
    trigger_sync: true

  - name: Read post-heal value on node 1
    type: call
    node: app-migration-stranded-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      post_heal_node1: result

  - name: Assert post-heal convergence at v3 both ways
    type: json_assert
    statements:
      - 'json_subset({{post_heal_node1}}, {"output": {"schema_version": "3.0.0", "description": "post-heal"}})'
