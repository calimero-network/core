name: 06 — Scenario "new method" (v1 → v2-new-method, no migrate, 2-node)
description: >
  2-node per-context upgrade for the new-method scenario.
  v1 → v2-new-method adds a new exported method (`clear_items`) while
  keeping the borsh state layout BYTE-IDENTICAL (same field names,
  same types, same order). Because the layout is unchanged, no
  `#[app::migrate]` is needed — the v2 binary deserializes the v1
  state bytes directly. Topology: namespace + one Open subgroup + one
  context in the subgroup. Upgrade is `upgrade_group(group=subgroup,
  target=v2)` with `migrate_method` omitted entirely.

  Negative assertion: before the upgrade, the v2-only method
  `clear_items` must NOT be callable (the binary doesn't export it
  under v1). After the upgrade it must be callable on BOTH nodes and
  drain the preserved item map; Phase 7d exercises it on node 1 then
  reads schema_info on node 2 to prove the v2 method + post-clear
  state convergence reached node 2.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-newmethod
  base_port: 9280
  base_rpc_port: 9380

steps:
  # Phase 1: Install both binaries on the ADMIN node (node 1) only.
  #
  # Realistic distribution: node 2 never runs install_application. It
  # auto-fetches the from-version when it joins the context and the
  # to-version when the upgrade announces the target blob (pulled over
  # BlobShare during its lazy migration; the sync-gate leaves BlobShare
  # open for exactly this). App ids are content-addressed, so node 1's
  # captured app ids are the same ids node 2 resolves. Proven by the
  # 01/02 admin-only canary.
  - name: Install scenario-new-method-v1 on node 1
    type: install_application
    node: app-migration-newmethod-1
    path: apps/migrations/scenario-new-method-v1/res/scenario-new-method-1.0.0.mpk
    dev: true
    outputs:
      app_v1: applicationId

  # Phase 2: Node 1 builds namespace + Open subgroup + context.
  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-newmethod-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-newmethod-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-newmethod-1
    namespace_id: "{{namespace_id}}"
    group_name: "new-method-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-newmethod-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-newmethod-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2 to namespace; materialise subgroup + context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-newmethod-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-newmethod-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-newmethod-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-newmethod-2
    context_id: "{{ctx_id}}"

  # Phase 4: Write v1 state on node 1, wait for node 2 to catch up.
  - name: Write v1 item k1
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: set_item
    args:
      key: "k1"
      value: "v1"

  - name: Write v1 item k2
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: set_item
    args:
      key: "k2"
      value: "v2"

  - name: Increment counter (v1)
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Increment counter again (v1)
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-newmethod-1
      - app-migration-newmethod-2
    timeout: 90
    trigger_sync: true

  - name: Sanity-check v1 state shape on node 1
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema in place
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "items_len": 2}})'

  # Negative: v2-only method not yet callable under v1.
  - name: Negative — clear_items is not exported by v1
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: clear_items
    expected_failure: true

  # LazyOnAccess: each node migrates its OWN byte-identical v1 state
  # on next access. The migration write path emits no DAG delta (full
  # root replacement, not CRDT-mergeable), so migrated bytes do not
  # propagate over sync — each node must self-migrate. Under
  # `coordinated` only the emitter migrates and the receiver is left
  # with v1 bytes behind a v2 app pointer → "Not all bytes read"
  # panic. The per-context TargetApplicationSet + GroupMigrationSet
  # ops set both `target_application_id` and the `migration` method on
  # the subgroup's GroupMeta, which each receiver's
  # `maybe_lazy_upgrade` reads to self-migrate.
  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-newmethod-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  # Phase 5: Per-context upgrade on the subgroup (cascade=false default).
  - name: Install scenario-new-method-v2 on node 1
    type: install_application
    node: app-migration-newmethod-1
    path: apps/migrations/scenario-new-method-v2/res/scenario-new-method-2.0.0.mpk
    dev: true
    outputs:
      app_v2: applicationId


  - name: Assert both versions share one application id (bundle same-id)
    # Same-package bundles derive ApplicationId = hash(package, signer),
    # so the second install MUST dedup onto the first id — the upgrade
    # below then exercises the same-id (blob-only) propagation path.
    type: json_assert
    statements:
      - 'equal("{{app_v1}}", "{{app_v2}}")'

  - name: Upgrade subgroup v1 → v2 (no migrate; layout unchanged)
    type: upgrade_group
    node: app-migration-newmethod-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"

  # Fixed wait, NOT wait_for_sync (see scenario 01 rationale).
  - name: Wait for upgrade to apply + log flush
    type: wait
    seconds: 15

  # These reads TRIGGER each node's lazy migration: schema_info is not
  # a state op, so `maybe_lazy_upgrade` fires on each node, migrating
  # its own v1 state to v2 before serving the read.
  - name: Read post-upgrade schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-upgrade schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-newmethod-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert v2 schema on node 1 (version bumped, v1 data preserved byte-identical)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "items_len": 2}})'

  - name: Assert v2 schema on node 2 (same shape, proves upgrade reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0", "items_len": 2}})'

  - name: Assert v1 item map preserved under v2 (node 1)
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: get_item
    args:
      key: "k1"
    outputs:
      preserved_item: result

  - name: Assert preserved v1 item value
    type: json_assert
    statements:
      - 'json_equal({{preserved_item}}, {"output": "v1"})'

  # Phase 7d: v2-only method exercised on node 1, post-clear state converges on node 2.
  - name: v2-only clear_items now callable on node 1
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: clear_items
    outputs:
      cleared_count: result

  - name: Assert clear_items returned 2
    type: json_assert
    statements:
      - 'json_equal({{cleared_count}}, {"output": 2})'

  - name: Wait for cleared state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-newmethod-1
      - app-migration-newmethod-2
    timeout: 60
    trigger_sync: true

  - name: Read schema_info after clear on node 1
    type: call
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_after_clear_node1: result

  - name: Assert items map drained on node 1
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_after_clear_node1}}, {"output": {"schema_version": "2.0.0", "items_len": 0}})'

  - name: Read schema_info after clear on node 2
    type: call
    node: app-migration-newmethod-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_after_clear_node2: result

  - name: Assert items map drained on node 2 (v2-only clear reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_after_clear_node2}}, {"output": {"schema_version": "2.0.0", "items_len": 0}})'

  # Phase 8: Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-newmethod-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-newmethod-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-newmethod-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-newmethod-1
    application_id: "{{app_v1}}"


stop_all_nodes: false
