name: 20 — Scenario "unordered-set" (v1 → v2 build-during-migrate, 2-node)
description: >
  2-node per-context migration that REBUILDS a collection during the migrate.
  v1 holds `tags: UnorderedSet<String>`. v2's migrate reads the v1 tags and
  builds a NEW set with every tag UPPER-CASED — a real content-rewrite performed
  inside `#[app::migrate]`, not a carry-through.

  This is the convergent build-during-migrate case for a plain collection:
  `UnorderedSet` element ids are `compute_id(set_id, value)` (content-derived,
  no executor identity), so every node applying the SAME transform over the SAME
  old set produces a byte-identical set — even though migrate runs independently
  per node and emits no sync delta.

  Discriminating assertion: after BOTH nodes self-migrate, the UPPER-CASED tags
  are present and the original lower-cased tags are gone, identically on each
  node (membership + count converge), proving the rebuilt set is deterministic
  cross-node.

  Per-context upgrade on the subgroup (cascade=false).

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-uset
  base_port: 9620
  base_rpc_port: 9720

steps:
  - name: Install scenario-unordered-set-v1 on node 1
    type: install_application
    node: app-migration-uset-1
    path: apps/migrations/scenario-unordered-set-v1/res/scenario-unordered-set-1.0.0.mpk
    dev: true
    outputs:
      app_v1: applicationId

  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-uset-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-uset-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-uset-1
    namespace_id: "{{namespace_id}}"
    group_name: "unordered-set-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-uset-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-uset-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-uset-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-uset-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-uset-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-uset-2
    context_id: "{{ctx_id}}"

  # Phase 4: node 1 writes v1 set state.
  - name: Write v1 title
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: set_title
    args:
      title: "tag-set"

  - name: Add tag "alpha"
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: add_tag
    args:
      tag: "alpha"

  - name: Add tag "beta"
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: add_tag
    args:
      tag: "beta"

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-uset-1
      - app-migration-uset-2
    timeout: 90
    trigger_sync: true

  - name: Assert v1 schema on node 1
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema shape
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "title": "tag-set", "tag_count": 2}})'

  - name: Negative — migration_note is not exported by v1
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: migration_note
    expected_failure: true

  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-uset-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  - name: Install scenario-unordered-set-v2 on node 1
    type: install_application
    node: app-migration-uset-1
    path: apps/migrations/scenario-unordered-set-v2/res/scenario-unordered-set-2.0.0.mpk
    dev: true
    outputs:
      app_v2: applicationId

  - name: Assert both versions share one application id (bundle same-id)
    # Same-package bundles derive ApplicationId = hash(package, signer),
    # so the second install MUST dedup onto the first id — the upgrade
    # below then exercises the same-id (blob-only) propagation path.
    type: json_assert
    statements:
      - 'equal("{{app_v1}}", "{{app_v2}}")'

  - name: Upgrade subgroup v1 → v2 (per-context)
    type: upgrade_group
    node: app-migration-uset-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2

  - name: Wait for upgrade + migration to apply + log flush
    type: wait
    seconds: 15

  - name: Read post-migration schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-migration schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-uset-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert lazy migration ran on node 1
    type: assert_log_present
    nodes:
      - app-migration-uset-1
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert lazy migration ran on node 2 (receiver self-migrated)
    type: assert_log_present
    nodes:
      - app-migration-uset-2
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert v2 schema on node 1 (count preserved + note seeded)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "title": "tag-set", "tag_count": 2, "migration_note": "migrated-v1-to-v2"}})'

  - name: Assert v2 schema on node 2 (same shape — migration reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0", "title": "tag-set", "tag_count": 2, "migration_note": "migrated-v1-to-v2"}})'

  # Discriminating assertion: the rebuilt (upper-cased) set is identical on both
  # nodes — transformed tags present, original tags gone, on EACH node.
  - name: node 1 — has "ALPHA" (transformed)?
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: has_tag
    args:
      tag: "ALPHA"
    outputs:
      has_upper_node1: result

  - name: node 2 — has "ALPHA" (transformed)?
    type: call
    node: app-migration-uset-2
    context_id: "{{ctx_id}}"
    method: has_tag
    args:
      tag: "ALPHA"
    outputs:
      has_upper_node2: result

  - name: node 1 — has "alpha" (original, should be gone)?
    type: call
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    method: has_tag
    args:
      tag: "alpha"
    outputs:
      has_lower_node1: result

  - name: node 2 — has "alpha" (original, should be gone)?
    type: call
    node: app-migration-uset-2
    context_id: "{{ctx_id}}"
    method: has_tag
    args:
      tag: "alpha"
    outputs:
      has_lower_node2: result

  - name: Assert the rebuilt set converged cross-node (transformed in, original out)
    type: json_assert
    statements:
      - 'json_equal({{has_upper_node1}}, {"output": true})'
      - 'json_equal({{has_upper_node2}}, {"output": true})'
      - 'json_equal({{has_lower_node1}}, {"output": false})'
      - 'json_equal({{has_lower_node2}}, {"output": false})'

  # Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-uset-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-uset-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-uset-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1
    type: uninstall_application
    node: app-migration-uset-1
    application_id: "{{app_v1}}"


stop_all_nodes: false
