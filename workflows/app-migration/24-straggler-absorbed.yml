name: 24 — Straggler delta absorbed across a migration window (#2539 PR-6b)
description: >
  Absorb-don't-drop straggler safety net (PR-6b), validated against node logs.

  Two-node namespace cascade modeled on 01-namespace-cascade-migration. Node 2
  (the straggler) is network-partitioned for the ENTIRE migration window: while
  offline it authors a v1 write (a `set_description` the rest of the group never
  sees), then node 1 cascades the namespace v1 → v2. When node 2 reconnects its
  in-flight v1 delta arrives at a peer whose loaded reader has advanced to v2.

  Under the old fence that delta was SILENTLY DROPPED ("Dropping state delta —
  HLC fence: stale schema after cascade migration"). PR-6b instead ABSORBS it:
  the original signed bytes are persisted durably ("Absorbing state delta —
  loaded reader behind incoming schema") and replayed VERBATIM once the
  receiving node's binary advances ("absorb drain: replayed buffered straggler
  deltas verbatim after binary advance"). The straggler's write therefore
  converges into the v2 root instead of vanishing.

  Node-log assertions (the explicit requirement for this scenario):
    - assert_log_present "Absorbing state delta" + the absorbed_for_migration
      metric  → the straggler delta was buffered, not applied-blind
    - assert_log_present "absorb drain: replayed buffered straggler deltas
      verbatim"                                → it was replayed after advance
    - assert_log_absent  "Dropping state delta — HLC fence"
                                               → it was NEVER silently dropped
  Plus a cross-node convergence read proving the straggler's value survived.

  Because migration_v2 now defaults ON (PR-6b Task 6b.8), the nodes run the
  no-freeze / absorb behavior natively — no merobox feature flag is needed.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-straggler
  base_port: 9270
  base_rpc_port: 9370

steps:
  # Phase 1: Install v1 + v2 on the admin node only (node 2 fetches them
  # over BlobShare on context-join / lazy migration, same as scenario 01).
  - name: Install migration-suite-v1 on node 1
    type: install_application
    node: app-migration-straggler-1
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install migration-suite-v2-add-field on node 1
    type: install_application
    node: app-migration-straggler-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true
    outputs:
      app_v2: applicationId

  # Phase 2: Node 1 builds namespace + Open descendant subgroup + context.
  - name: Create namespace on node 1 (anchors app_v1)
    type: create_namespace
    node: app-migration-straggler-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (for teardown)
    type: get_namespace_identity
    node: app-migration-straggler-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create descendant Open subgroup on node 1
    type: create_group_in_namespace
    node: app-migration-straggler-1
    namespace_id: "{{namespace_id}}"
    group_name: "straggler-target-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-straggler-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-straggler-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Node 2 joins the namespace + inherits the subgroup + context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-straggler-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-straggler-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-straggler-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-straggler-2
    context_id: "{{ctx_id}}"

  # Phase 4: Seed v1 state on node 1 and confirm node 2 caught up — both
  # nodes hold byte-identical v1 state before the partition.
  - name: Node 1 writes v1 state (description)
    type: call
    node: app-migration-straggler-1
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "set-before-cascade"

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-straggler-1
      - app-migration-straggler-2
    timeout: 90
    trigger_sync: true

  - name: Node 2 reads v1 schema (catch-up verification)
    type: call
    node: app-migration-straggler-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema_node2: result

  - name: Assert node 2 caught up to v1 state
    type: json_assert
    statements:
      - 'json_subset({{v1_schema_node2}}, {"output": {"schema_version": "1.0.0", "description": "set-before-cascade"}})'

  # Phase 5: PARTITION node 2 for the entire migration window. It is now a
  # straggler: it can still execute locally but its deltas cannot reach the
  # group, and the cascade cannot reach it.
  - name: Disconnect node 2 (straggler goes offline)
    type: disconnect_node
    node: app-migration-straggler-2

  # Node 2 authors a v1 write while offline. This is the straggler delta
  # whose original signed bytes must be absorbed (not dropped) when node 2
  # reconnects into a now-v2 group.
  - name: Node 2 writes a v1 description while partitioned (the straggler delta)
    type: call
    node: app-migration-straggler-2
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "written-by-straggler-while-offline"

  # Phase 6: While node 2 is offline, node 1 migrates the namespace v1 → v2.
  - name: Set upgrade policy to lazy-on-access on node 1
    type: update_group_settings
    node: app-migration-straggler-1
    group_id: "{{namespace_id}}"
    upgrade_policy: lazy_on_access

  - name: Cascade namespace v1 → v2 (initiated by node 1, node 2 offline)
    type: upgrade_group
    node: app-migration-straggler-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  # Let node 1 publish + self-migrate to v2 while node 2 stays partitioned.
  - name: Wait for node 1 to migrate to v2 (node 2 still offline)
    type: wait
    seconds: 15

  - name: Node 1 reads post-migration schema_info (confirms node 1 on v2)
    type: call
    node: app-migration-straggler-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Assert node 1 reached v2 (migration window is real)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0"}})'

  # Phase 7: HEAL the partition. Node 2's buffered v1 delta now flows to a
  # peer whose loaded reader has advanced to v2, and node 2 itself receives
  # the cascade. trigger_sync drives reconciliation in both directions.
  - name: Reconnect node 2 (straggler comes back)
    type: connect_node
    node: app-migration-straggler-2

  - name: Wait for node 2 to rejoin + drive sync both ways
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-straggler-1
      - app-migration-straggler-2
    timeout: 120
    check_interval: 2
    trigger_sync: true

  # Touch each node so its lazy upgrade fires and the absorb drain runs
  # after the binary advances (the drain hooks the lazy-upgrade success
  # path + namespace-event binary-advance path).
  - name: Node 2 reads post-migration schema_info (triggers lazy upgrade + drain)
    type: call
    node: app-migration-straggler-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: "Settle: let the absorb drain replay the straggler delta"
    type: wait
    seconds: 15

  - name: Final cross-node sync after drain
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-straggler-1
      - app-migration-straggler-2
    timeout: 120
    check_interval: 2
    trigger_sync: true

  # Phase 8: NODE-LOG VALIDATION — the explicit requirement for scenario 24.
  #
  # (a) The straggler delta reached a v2 reader and was ABSORBED (buffered for
  #     verbatim replay), not applied blind. Asserted on node 1 (the node whose
  #     reader advanced to v2 ahead of receiving node 2's v1 delta).
  - name: Assert the straggler delta was absorbed (not dropped) on node 1
    type: assert_log_present
    nodes:
      - app-migration-straggler-1
    patterns:
      - "Absorbing state delta"
      - "absorbed_for_migration"
    min_matches: 1

  # (b) After node 1's binary advanced the absorbed delta was DRAINED + replayed
  #     verbatim — the convergence event PR-6b guarantees.
  - name: Assert the absorbed straggler delta was replayed verbatim on node 1
    type: assert_log_present
    nodes:
      - app-migration-straggler-1
    patterns:
      - "absorb drain: replayed buffered straggler deltas verbatim"
    min_matches: 1

  # (c) The silent-drop path must NEVER fire for this migration-fenced delta.
  #     This is the core regression guard: pre-PR-6b the straggler write was
  #     dropped here.
  - name: Assert no straggler delta was silently dropped (any node)
    type: assert_log_absent
    nodes: []
    patterns:
      - "Dropping state delta — HLC fence: stale schema after cascade migration"

  # Phase 9: CONVERGENCE — the straggler's offline write survived and both
  # nodes agree on the migrated v2 root.
  - name: Node 1 reads description after drain
    type: call
    node: app-migration-straggler-1
    context_id: "{{ctx_id}}"
    method: get_description
    outputs:
      desc_node1: result

  - name: Node 2 reads description after drain
    type: call
    node: app-migration-straggler-2
    context_id: "{{ctx_id}}"
    method: get_description
    outputs:
      desc_node2: result

  - name: Assert the straggler's offline write converged on both nodes
    type: json_assert
    statements:
      - 'json_equal({{desc_node1}}, {"output": "written-by-straggler-while-offline"})'
      - 'json_equal({{desc_node2}}, {"output": "written-by-straggler-while-offline"})'

  - name: Assert both nodes reached v2 (straggler delta refolded into v2 root)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0"}})'

  # Phase 10: Teardown (node 1 holds admin authority).
  - name: Delete context
    type: delete_context
    node: app-migration-straggler-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-straggler-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-straggler-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-straggler-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-straggler-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
