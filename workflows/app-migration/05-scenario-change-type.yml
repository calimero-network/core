name: 05 — Scenario "change type" (v4-rename-field → v5-change-type, 2-node)
description: >
  2-node per-context migration for the type-change scenario.
  v4-rename-field has `counter: LwwRegister<u64>` and an
  `increment_counter()` method. v5-change-type changes the in-state
  type to `LwwRegister<String>` and swaps `increment_counter()` for an
  explicit `set_counter(String)`. `migrate_v4_to_v5` stringifies the
  pre-migration u64 value so the existing counter survives the type
  change.

  This row of the scenario matrix proves that an explicit-migrate
  type-change keeps the field value intact (just re-typed) on BOTH
  nodes and that the new v5 method (set_counter) becomes callable
  while the v4 method (increment_counter) goes away. Phase 7d
  round-trips set_counter(String) on node 1 → get_counter on node 2.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-typechange
  base_port: 9270
  base_rpc_port: 9370

steps:
  # Phase 1: Install both binaries on the ADMIN node (node 1) only.
  #
  # Realistic distribution: node 2 never runs install_application. It
  # auto-fetches the from-version when it joins the context and the
  # to-version when the upgrade announces the target blob (pulled over
  # BlobShare during its lazy migration; the sync-gate leaves BlobShare
  # open for exactly this). App ids are content-addressed, so node 1's
  # captured app ids are the same ids node 2 resolves. Proven by the
  # 01/02 admin-only canary.
  - name: Install migration-suite-v4-rename-field on node 1
    type: install_application
    node: app-migration-typechange-1
    path: apps/migrations/migration-suite-v4-rename-field/res/migration-suite-4.0.0.mpk
    dev: true
    outputs:
      app_v4: applicationId

  # Phase 2: Node 1 builds namespace + Open subgroup + context.
  - name: Create namespace (v4) on node 1
    type: create_namespace
    node: app-migration-typechange-1
    application_id: "{{app_v4}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-typechange-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-typechange-1
    namespace_id: "{{namespace_id}}"
    group_name: "typechange-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-typechange-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v4)
    type: create_context
    node: app-migration-typechange-1
    application_id: "{{app_v4}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2 to namespace; materialise subgroup + context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-typechange-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-typechange-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-typechange-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-typechange-2
    context_id: "{{ctx_id}}"

  # Phase 4: Write v4 state on node 1, wait for node 2 to catch up.
  - name: Set details (v4)
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: set_details
    args:
      details: "typechange-scenario"

  # Increment counter (v4 numeric path). After three calls counter == 3.
  - name: Increment counter (v4 numeric) — 1
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Increment counter (v4 numeric) — 2
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Increment counter (v4 numeric) — 3
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Wait for v4 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-typechange-1
      - app-migration-typechange-2
    timeout: 90
    trigger_sync: true

  - name: Sanity-check v4 schema before migration on node 1
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v4_schema: result

  # v4 schema_info stringifies counter to JSON. The internal type is u64.
  - name: Assert v4 has counter "3"
    type: json_assert
    statements:
      - 'json_subset({{v4_schema}}, {"output": {"schema_version": "4.0.0", "details": "typechange-scenario", "counter": "3"}})'

  # LazyOnAccess: each node migrates its OWN byte-identical v4 state
  # on next access. The migration write path emits no DAG delta (full
  # root replacement, not CRDT-mergeable), so migrated bytes do not
  # propagate over sync — each node must self-migrate. Under
  # `coordinated` only the emitter migrates and the receiver is left
  # with v4 bytes behind a v5 app pointer → "Not all bytes read"
  # panic. The per-context TargetApplicationSet + GroupMigrationSet
  # ops set both `target_application_id` and the `migration` method on
  # the subgroup's GroupMeta, which each receiver's
  # `maybe_lazy_upgrade` reads to self-migrate.
  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-typechange-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  # Phase 5: Per-context upgrade on the subgroup (cascade=false default).
  - name: Install migration-suite-v5-change-type on node 1
    type: install_application
    node: app-migration-typechange-1
    path: apps/migrations/migration-suite-v5-change-type/res/migration-suite-5.0.0.mpk
    dev: true
    outputs:
      app_v5: applicationId


  - name: Assert both versions share one application id (bundle same-id)
    # Same-package bundles derive ApplicationId = hash(package, signer),
    # so the second install MUST dedup onto the first id — the upgrade
    # below then exercises the same-id (blob-only) propagation path.
    type: json_assert
    statements:
      - 'equal("{{app_v4}}", "{{app_v5}}")'

  - name: Upgrade subgroup v4 → v5 (counter u64 → String)
    type: upgrade_group
    node: app-migration-typechange-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v5}}"
    # The node resolves the migration from the target bundle's embedded ABI.

  # Fixed wait, NOT wait_for_sync (see scenario 01 rationale).
  - name: Wait for upgrade + migration to apply + log flush
    type: wait
    seconds: 15

  # These reads TRIGGER each node's lazy migration: schema_info is not
  # a state op, so `maybe_lazy_upgrade` fires on each node, migrating
  # its own v4 state to v5 before serving the read.
  - name: Read post-migration schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v5_schema_node1: result

  - name: Read post-migration schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-typechange-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v5_schema_node2: result

  # Both nodes self-migrated via the lazy path — assert the migration
  # logs on EACH after its triggering read above.
  - name: Assert lazy migration ran on node 1
    type: assert_log_present
    nodes:
      - app-migration-typechange-1
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert lazy migration ran on node 2 (receiver self-migrated)
    type: assert_log_present
    nodes:
      - app-migration-typechange-2
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert v5 schema on node 1 (counter still "3", but now String-typed)
    type: json_assert
    statements:
      - 'json_subset({{v5_schema_node1}}, {"output": {"schema_version": "5.0.0", "details": "typechange-scenario", "counter": "3"}})'

  - name: Assert v5 schema on node 2 (same shape, proves migration reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v5_schema_node2}}, {"output": {"schema_version": "5.0.0", "details": "typechange-scenario", "counter": "3"}})'

  # Phase 7d: v5's new set_counter (takes a String) round-trips
  # node 1 → node 2. v4 wouldn't have accepted a non-numeric value
  # because the param was numeric — proving the type change.
  - name: Node 1 calls v5 set_counter (accepts a String)
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: set_counter
    args:
      counter: "not-a-number-anymore"

  - name: Wait for v5 write to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-typechange-1
      - app-migration-typechange-2
    timeout: 60
    trigger_sync: true

  - name: Node 2 reads counter back via v5 get_counter
    type: call
    node: app-migration-typechange-2
    context_id: "{{ctx_id}}"
    method: get_counter
    outputs:
      counter_after_node2: result

  - name: Assert v5 counter holds the non-numeric string on node 2
    type: json_assert
    statements:
      - 'json_equal({{counter_after_node2}}, {"output": "not-a-number-anymore"})'

  # Negative: v4's increment_counter (no-arg, numeric) is gone in v5.
  - name: Negative — increment_counter gone in v5
    type: call
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    method: increment_counter
    expected_failure: true

  # Phase 8: Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-typechange-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-typechange-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-typechange-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v4 on node 1
    type: uninstall_application
    node: app-migration-typechange-1
    application_id: "{{app_v4}}"


stop_all_nodes: false
