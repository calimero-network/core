name: 25 — v1-binary node fed v2 bytes buffers, never corrupts (#2539 PR-6b)
description: >
  Sync-repair coverage for absorb-don't-drop (PR-6b Task 6b.7), validated
  against node logs.

  A node still pinned on the v1 binary must NOT be corrupted when a sync repair
  (HashComparison / LevelSync / snapshot) hands it leaves authored under the v2
  schema. Pre-PR-6b a v1 reader would LWW-store those unreadable v2 bytes and
  later panic the guest with `ActionNotAllowed("Cannot change StorageType")` /
  "Not all bytes read". PR-6b stamps `schema_app_key` on every sync leaf and has
  the apply gate DECLINE + BUFFER any leaf whose schema differs from the loaded
  reader ("sync-repair leaf authored under a newer schema than the loaded reader
  — buffered into the absorb buffer instead of storing unreadable bytes"), then
  replay it once the reader advances. No unreadable bytes are ever persisted.

  Topology (modeled on 01 / 21): two nodes share a v1 context. Node 2 is
  partitioned across the cascade while node 1 migrates to v2 AND writes a
  v2-only field (`set_notes`). On reconnect, node 2 — still on the v1 binary,
  because we sync BEFORE triggering its lazy upgrade — pulls node 1's v2 leaves
  via HashComparison. Those leaves must be BUFFERED, not stored. Only after we
  then touch node 2 (firing its lazy upgrade to the v2 binary) does the drain
  replay the buffered leaves, and node 2 converges — reading the v2-only field.

  Node-log assertions (the explicit requirement for this scenario):
    - assert_log_present "buffered into the absorb buffer instead of storing
      unreadable bytes" + the absorbed_leaf_future_schema metric on node 2
                                  → the v2 leaf was buffered, not stored
    - assert_log_absent  "Cannot change StorageType" and "Not all bytes read"
      and "ActionNotAllowed"      → the v1 reader was NEVER corrupted
  Plus a convergence read of the v2-only field after node 2 advances.

  Because migration_v2 now defaults ON (PR-6b Task 6b.8), the nodes run the
  absorb behavior natively — no merobox feature flag is needed.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-v1pin
  base_port: 9280
  base_rpc_port: 9380

steps:
  # Phase 1: Install v1 + v2 on the admin node only.
  - name: Install migration-suite-v1 on node 1
    type: install_application
    node: app-migration-v1pin-1
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install migration-suite-v2-add-field on node 1
    type: install_application
    node: app-migration-v1pin-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true
    outputs:
      app_v2: applicationId

  # Phase 2: Node 1 builds namespace + Open descendant subgroup + context.
  - name: Create namespace on node 1 (anchors app_v1)
    type: create_namespace
    node: app-migration-v1pin-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (for teardown)
    type: get_namespace_identity
    node: app-migration-v1pin-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create descendant Open subgroup on node 1
    type: create_group_in_namespace
    node: app-migration-v1pin-1
    namespace_id: "{{namespace_id}}"
    group_name: "v1pin-target-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-v1pin-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-v1pin-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Node 2 joins the namespace + inherits the subgroup + context,
  # fetching the v1 binary over BlobShare.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-v1pin-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-v1pin-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-v1pin-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-v1pin-2
    context_id: "{{ctx_id}}"

  # Phase 4: Seed v1 state and confirm node 2 (now running the v1 binary)
  # caught up. Both hold byte-identical v1 state.
  - name: Node 1 writes v1 state (description)
    type: call
    node: app-migration-v1pin-1
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "set-before-cascade"

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-v1pin-1
      - app-migration-v1pin-2
    timeout: 90
    trigger_sync: true

  - name: Node 2 reads v1 schema (confirms node 2 on the v1 binary)
    type: call
    node: app-migration-v1pin-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema_node2: result

  - name: Assert node 2 is on v1 with v1 data
    type: json_assert
    statements:
      - 'json_subset({{v1_schema_node2}}, {"output": {"schema_version": "1.0.0", "description": "set-before-cascade"}})'

  # Phase 5: PARTITION node 2 so it stays pinned on the v1 binary while node 1
  # migrates to v2 AND writes a v2-only field. Node 2 never executes during the
  # window, so its lazy upgrade does not fire — its loaded reader stays v1.
  - name: Disconnect node 2 (pins it on the v1 binary)
    type: disconnect_node
    node: app-migration-v1pin-2

  - name: Set upgrade policy to lazy-on-access on node 1
    type: update_group_settings
    node: app-migration-v1pin-1
    group_id: "{{namespace_id}}"
    upgrade_policy: lazy_on_access

  - name: Cascade namespace v1 → v2 (node 2 offline / still v1)
    type: upgrade_group
    node: app-migration-v1pin-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  - name: Wait for node 1 to migrate to v2
    type: wait
    seconds: 15

  # Node 1, now on v2, writes the v2-only field. The leaves carrying this
  # write are authored under the v2 schema — they are what node 2's v1 reader
  # must refuse to store on the next sync.
  - name: Node 1 writes v2-only field (set_notes)
    type: call
    node: app-migration-v1pin-1
    context_id: "{{ctx_id}}"
    method: set_notes
    args:
      notes: "v2-only-field-written-while-node2-offline"

  - name: Node 1 reads post-migration schema_info (confirms v2 + notes)
    type: call
    node: app-migration-v1pin-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Assert node 1 reached v2 with the v2-only field
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "notes": "v2-only-field-written-while-node2-offline"}})'

  # Phase 6: HEAL. Node 2 (still the v1 binary) syncs against node 1's v2
  # subtree via HashComparison. The v2 leaves must be BUFFERED by the apply
  # gate, never stored. trigger_sync drives the repair; we do NOT execute a
  # state op on node 2 yet, so its binary stays v1 during the sync.
  - name: Reconnect node 2 (still on the v1 binary)
    type: connect_node
    node: app-migration-v1pin-2

  - name: Sync node 2 against node 1's v2 subtree (v1 reader pulls v2 leaves)
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-v1pin-1
      - app-migration-v1pin-2
    timeout: 120
    check_interval: 2
    trigger_sync: true

  - name: Let the sync-repair gate buffer the future-schema leaves
    type: wait
    seconds: 10

  # Phase 7: NODE-LOG VALIDATION — the explicit requirement for scenario 25.
  #
  # (a) The v1 reader BUFFERED the v2 leaves instead of storing unreadable bytes.
  - name: Assert node 2 buffered the v2 leaves (did not store unreadable bytes)
    type: assert_log_present
    nodes:
      - app-migration-v1pin-2
    patterns:
      - "buffered into the absorb buffer instead of storing"
      - "absorbed_leaf_future_schema"
    min_matches: 1

  # (b) The v1 binary was NEVER corrupted: no StorageType-change rejection, no
  #     short-read deserialization panic, no ActionNotAllowed from replaying
  #     unreadable v2 bytes through the v1 guest.
  - name: Assert the v1 reader was never corrupted (no deserialization/panic)
    type: assert_log_absent
    nodes:
      - app-migration-v1pin-2
    patterns:
      - "Cannot change StorageType"
      - "Not all bytes read"
      - "ActionNotAllowed"

  # Phase 8: Now advance node 2 to v2 (its lazy upgrade fires on this execute),
  # which drains the buffered leaves and converges.
  - name: Node 2 reads schema_info (triggers lazy upgrade + leaf drain)
    type: call
    node: app-migration-v1pin-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: "Settle: let the leaf drain replay the buffered v2 leaves"
    type: wait
    seconds: 15

  - name: Final cross-node sync after drain
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-v1pin-1
      - app-migration-v1pin-2
    timeout: 120
    check_interval: 2
    trigger_sync: true

  - name: Node 2 reads the v2-only field after advancing
    type: call
    node: app-migration-v1pin-2
    context_id: "{{ctx_id}}"
    method: get_notes
    outputs:
      notes_node2: result

  - name: Assert node 2 converged to v2 with the v2-only field intact
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_equal({{notes_node2}}, {"output": "v2-only-field-written-while-node2-offline"})'

  # Phase 9: Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-v1pin-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-v1pin-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-v1pin-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-v1pin-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-v1pin-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
