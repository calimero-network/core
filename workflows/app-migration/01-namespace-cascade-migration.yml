name: 01 — Namespace-cascade migration (v1 → v2, 2-node, cascade=true)
description: >
  Multi-node namespace-rooted cascade upgrade. Node 1 (admin) creates a
  namespace + one descendant subgroup + one context, invites node 2,
  writes v1 state, waits for node 2 to catch up, then issues ONE
  upgrade_group(cascade=true) against the namespace root. Asserts on
  BOTH nodes:
    - cascade fan-out reaches BOTH the namespace root AND the
      descendant subgroup (target_application_id flips to v2)
    - the descendant context's state migrates (v1 fields preserved,
      v2-only field readable)

  Regression guard for the full app_key fix triangle in this PR:
    - `create_group::handle` (originator-side derivation)
    - `group_created::apply` (remote-peer parent inheritance)
    - `create_group_invitation` + `join_group` (invitation-side
      bootstrap of joiner's local meta — without this, node 2's
      local subgroup app_key would seed to [0u8; 32] and the
      cascade predicate would silently skip the subtree on node 2,
      diverging from node 1)

  Realistic: no pre-cascade alignment, no double-upgrade workaround.
  Goes straight from create_namespace → create_group_in_namespace →
  invite node 2 → cascade.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-cascade
  base_port: 9230
  base_rpc_port: 9330

steps:
  # Phase 1: Install v1 + v2 binaries on BOTH nodes. Node 2 needs the
  # WASM locally to execute the context post-upgrade.
  - name: Install migration-suite-v1 on node 1
    type: install_application
    node: app-migration-cascade-1
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install migration-suite-v1 on node 2
    type: install_application
    node: app-migration-cascade-2
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true

  - name: Install migration-suite-v2-add-field on node 1
    type: install_application
    node: app-migration-cascade-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true
    outputs:
      app_v2: applicationId

  - name: Install migration-suite-v2-add-field on node 2
    type: install_application
    node: app-migration-cascade-2
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true

  # Phase 2: Node 1 builds namespace + subgroup + context. NO
  # pre-cascade alignment — cascade should work straight out of
  # create_namespace + create_group_in_namespace.
  - name: Create namespace on node 1 (anchors app_v1)
    type: create_namespace
    node: app-migration-cascade-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (for teardown)
    type: get_namespace_identity
    node: app-migration-cascade-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create descendant Open subgroup on node 1
    # Open visibility lets node 2 materialise its inherited membership
    # via `join_subgroup_inheritance` (issue #2357 endpoint) instead
    # of needing an admin-signed group invitation per descendant.
    type: create_group_in_namespace
    node: app-migration-cascade-1
    namespace_id: "{{namespace_id}}"
    group_name: "cascade-target-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-cascade-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-cascade-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2 to the namespace, then have it materialise
  # the inherited Open-subgroup + context. The namespace-invitation
  # path issues a SignedGroupOpenInvitation containing the namespace
  # root's application_id AND app_key (added in this PR). Without the
  # app_key field, node 2 would seed its local namespace-root meta
  # with [0u8; 32] and the cascade predicate would silently skip the
  # subtree on node 2.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-cascade-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    # Same rationale as group-join-via-inheritance.yml — node 2 needs
    # to see the Open-visibility row and the context-registered op
    # before its inheritance materialisation can succeed.
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-cascade-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    # Open subgroup + inherited member: this endpoint (issue #2357)
    # publishes MemberJoinedOpen, fetches the subgroup key via the
    # direct-stream protocol, and returns once KeyDelivery lands so
    # the subsequent join_context can decrypt traffic immediately.
    type: join_subgroup_inheritance
    node: app-migration-cascade-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-cascade-2
    context_id: "{{ctx_id}}"

  # Phase 4: Write v1 state on node 1, wait for node 2 to catch up.
  - name: Node 1 writes v1 state (description)
    type: call
    node: app-migration-cascade-1
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "set-before-cascade"

  - name: Node 1 increments counter (v1)
    type: call
    node: app-migration-cascade-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-cascade-1
      - app-migration-cascade-2
    timeout: 90
    trigger_sync: true

  # Phase 5: Node 1 sanity check + cross-node verification of pre-
  # cascade v1 state.
  - name: Node 1 reads v1 schema (sanity)
    type: call
    node: app-migration-cascade-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema_node1: result

  - name: Assert v1 schema on node 1
    type: json_assert
    statements:
      - 'json_subset({{v1_schema_node1}}, {"output": {"schema_version": "1.0.0", "description": "set-before-cascade", "counter": "1"}})'

  - name: Node 2 reads v1 schema (catch-up verification)
    type: call
    node: app-migration-cascade-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema_node2: result

  - name: Assert node 2 caught up to v1 state
    type: json_assert
    statements:
      - 'json_subset({{v1_schema_node2}}, {"output": {"schema_version": "1.0.0", "description": "set-before-cascade", "counter": "1"}})'

  - name: Set upgrade policy to coordinated on node 1
    type: update_group_settings
    node: app-migration-cascade-1
    group_id: "{{namespace_id}}"
    upgrade_policy: coordinated

  # Phase 6: ONE cascade call from node 1 against the namespace root.
  # The cascade engine emits a single signed CascadeTargetApplicationSet
  # op on the namespace DAG; the apply path runs on every peer
  # subscribed to the namespace (node 1 + node 2).
  - name: Cascade namespace v1 → v2 (initiated by node 1)
    type: upgrade_group
    node: app-migration-cascade-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  - name: Wait for cascade + migration to apply on both nodes
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-cascade-1
      - app-migration-cascade-2
    timeout: 90
    trigger_sync: true

  # Phase 7a: Both nodes' local meta for BOTH layers must reflect v2.
  - name: Node 1 reads namespace root info
    type: get_group_info
    node: app-migration-cascade-1
    group_id: "{{namespace_id}}"
    outputs:
      ns_target_app_node1: targetApplicationId

  - name: Node 1 reads descendant subgroup info
    type: get_group_info
    node: app-migration-cascade-1
    group_id: "{{group_id}}"
    outputs:
      sub_target_app_node1: targetApplicationId

  - name: Node 2 reads namespace root info
    type: get_group_info
    node: app-migration-cascade-2
    group_id: "{{namespace_id}}"
    outputs:
      ns_target_app_node2: targetApplicationId

  - name: Node 2 reads descendant subgroup info
    type: get_group_info
    node: app-migration-cascade-2
    group_id: "{{group_id}}"
    outputs:
      sub_target_app_node2: targetApplicationId

  - name: Assert cascade landed on BOTH nodes' BOTH layers
    type: json_assert
    statements:
      - 'equal("{{ns_target_app_node1}}", "{{app_v2}}")'
      - 'equal("{{sub_target_app_node1}}", "{{app_v2}}")'
      - 'equal("{{ns_target_app_node2}}", "{{app_v2}}")'
      - 'equal("{{sub_target_app_node2}}", "{{app_v2}}")'

  # Phase 7b: Migration handler ran on BOTH nodes.
  - name: Assert migration ran on node 1
    type: assert_log_present
    nodes:
      - app-migration-cascade-1
    patterns:
      - "Executing migration"
      - "migrate_v1_to_v2"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert migration ran on node 2
    type: assert_log_present
    nodes:
      - app-migration-cascade-2
    patterns:
      - "Executing migration"
      - "migrate_v1_to_v2"
      - "Migrated state written successfully"
    min_matches: 1

  # Phase 7c: Post-migration schema visible on BOTH nodes with v1
  # data preserved + v2-only field readable.
  - name: Node 1 reads post-migration schema_info
    type: call
    node: app-migration-cascade-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Node 2 reads post-migration schema_info
    type: call
    node: app-migration-cascade-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert v2 schema on node 1 (v1 data preserved + notes seeded)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_subset({{v2_schema_node1}}, {"output": {"description": "set-before-cascade", "counter": "1"}})'
      - 'json_subset({{v2_schema_node1}}, {"output": {"notes": "added in v2"}})'

  - name: Assert v2 schema on node 2 (same shape, proves cascade reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_subset({{v2_schema_node2}}, {"output": {"description": "set-before-cascade", "counter": "1"}})'
      - 'json_subset({{v2_schema_node2}}, {"output": {"notes": "added in v2"}})'

  # Phase 7d: v2-only setter on node 1 round-trips to node 2.
  - name: Node 1 calls v2-only setter (set_notes)
    type: call
    node: app-migration-cascade-1
    context_id: "{{ctx_id}}"
    method: set_notes
    args:
      notes: "written-post-cascade-by-node1"

  - name: Wait for v2 write to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-cascade-1
      - app-migration-cascade-2
    timeout: 60
    trigger_sync: true

  - name: Node 2 reads notes via v2 getter
    type: call
    node: app-migration-cascade-2
    context_id: "{{ctx_id}}"
    method: get_notes
    outputs:
      notes_after_node2: result

  - name: Assert v2-only write reached node 2
    type: json_assert
    statements:
      - 'json_equal({{notes_after_node2}}, {"output": "written-post-cascade-by-node1"})'

  # Phase 8: Teardown (node 1 holds admin authority; node 2's local
  # state goes away with its container at end of run).
  - name: Delete context
    type: delete_context
    node: app-migration-cascade-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-cascade-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-cascade-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-cascade-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-cascade-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
