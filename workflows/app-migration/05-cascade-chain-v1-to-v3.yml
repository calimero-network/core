name: 05 — Cascade chain v1 → v2 → v3 (sequential cascades through DAG)
description: >
  2-node end-to-end regression guard for sequential cascade upgrades.
  Namespace `NS` holds a single subgroup `G` with one context. Node-1
  admin runs two cascade upgrades back-to-back against NS:
    1. Cascade `v1 → v2` (predicate `from_app_key == v1`, target v2,
       migrate `migrate_v1_to_v2`). After convergence, G.app_key == v2
       and the context's schema_version == "2.0.0".
    2. Cascade `v2 → v3` (predicate `from_app_key == v2`, target v3,
       migrate `migrate_v2_to_v3`). The second cascade's predicate now
       matches G (whose app_key was flipped to v2 by the first
       cascade), so the context migrates again to v3.

  Both cascade ops land on each node's namespace-governance DAG; the
  cascade-engine processes them in causal order — node-2's `v2 → v3`
  cascade entry can only apply on top of the materialised v2 state from
  the first cascade. This workflow is the regression guard that proves:
    * Each cascade op's `from_app_key` is correctly derived from the
      previous result's app_key (not stale, not hardcoded).
    * v2-only writes interposed between the two cascades persist
      through `migrate_v2_to_v3`'s additive mapping (`notes` field).
    * v3-only writes (`add_to_list` / `get_list`) work on both nodes
      after the second cascade, proving the final v3 ABI is live.

  -----------------------------------------------------------------------
  External-dependency contract (pinned for Task 14 CI guard):

    * `merobox >= 0.7.0` (placeholder pending merobox#255):
        - `upgrade_group` step must accept the `cascade: bool` field.
          Pre-#255 merobox silently drops `cascade`; each upgrade_group
          call then runs as a non-cascade single-group upgrade on NS,
          which has zero direct contexts and fails with "group has no
          contexts to upgrade". Treat any failure at the cascade steps
          under pre-0.7.0 merobox as the version guard tripping.

    * Core: `feat/cascade-engine` (this branch) — provides the
      cascade-emission handler (PR-2 Task 6) AND the apply-side
      Cascade* arms (PR-2 Tasks 4-5) on both emitter and follower
      nodes.

  Task 14 (`.github/workflows/app-migration-e2e.yml`) wires the actual
  version check.
  -----------------------------------------------------------------------

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  # Non-overlapping ports vs workflows 00 (9220), 01 (9221), 04 (9222).
  prefix: app-migration-cascade-chain
  base_port: 9223
  base_rpc_port: 9323

steps:
  # ── Phase 1: Install v1 + v2 + v3 on BOTH nodes ─────────────────────
  # Both nodes need all three apps locally so the cascade-engine on
  # node-2 can look up v2 and then v3 by id when applying each
  # gossiped state delta.

  - name: Install v1 on node-1
    type: install_application
    node: app-migration-cascade-chain-1
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install v1 on node-2
    type: install_application
    node: app-migration-cascade-chain-2
    path: apps/migrations/migration-suite-v1/res/migration_suite_v1.wasm
    dev: true

  - name: Install v2 on node-1
    type: install_application
    node: app-migration-cascade-chain-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true
    outputs:
      app_v2: applicationId

  - name: Install v2 on node-2
    type: install_application
    node: app-migration-cascade-chain-2
    path: apps/migrations/migration-suite-v2-add-field/res/migration_suite_v2_add_field.wasm
    dev: true

  - name: Install v3 on node-1
    type: install_application
    node: app-migration-cascade-chain-1
    path: apps/migrations/migration-suite-v3-add-list/res/migration_suite_v3_add_list.wasm
    dev: true
    outputs:
      app_v3: applicationId

  - name: Install v3 on node-2
    type: install_application
    node: app-migration-cascade-chain-2
    path: apps/migrations/migration-suite-v3-add-list/res/migration_suite_v3_add_list.wasm
    dev: true

  # ── Phase 2: Namespace + admin key + node-2 joins ───────────────────

  - name: Node-1 creates namespace NS at v1
    type: create_namespace
    node: app-migration-cascade-chain-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (for auto-follow requester + teardown)
    type: get_namespace_identity
    node: app-migration-cascade-chain-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create namespace invitation for node-2
    type: create_namespace_invitation
    node: app-migration-cascade-chain-1
    namespace_id: "{{namespace_id}}"
    outputs:
      ns_invite: invitation

  - name: Wait for namespace governance to gossip to node-2
    # Same window as workflow 01 / sync-tests — namespace governance
    # DAG must reach node-2 before join_namespace or the invitation
    # 404s on the responder side.
    type: wait
    seconds: 10

  - name: Node-2 joins namespace
    type: join_namespace
    node: app-migration-cascade-chain-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{ns_invite}}"
    outputs:
      node2_identity: memberIdentity

  # ── Phase 3: Subgroup G, made Open, joined by node-2 via inheritance,
  # ──          then per-subgroup auto-follow-contexts grant ───────────
  #
  # Approach chosen: A — `join_subgroup_inheritance` (per
  # apps/scaffolding-e2e/workflows/group-join-via-inheritance.yml).
  #
  # Why not the previously-used namespace-level
  # `set_member_auto_follow auto_follow_subgroups: true`:
  #   Per crates/context/src/auto_follow.rs:33-36 module docs and the
  #   event-loop at auto_follow.rs:239-252, subgroup auto-follow is NOT
  #   yet implemented for regular roles — `subgroups: true` is silently
  #   ignored. Result: node-2 never became a member of G, so the
  #   per-subgroup `auto_follow_contexts: true` grant had no effect
  #   (node-2 isn't a member of the subgroup yet) and the context
  #   never materialised on node-2. The namespace-level subgroup grant
  #   has therefore been removed.
  #
  # Replacement pattern (production-equivalent for inherited members):
  #   1. Create subgroup → make it Open via `set_subgroup_visibility`
  #      so namespace members with CAN_JOIN_OPEN_SUBGROUPS may join via
  #      the inherited Open chain.
  #   2. Node-2 calls `join_subgroup_inheritance` on G
  #      (POST /admin-api/groups/:group_id/join-via-inheritance,
  #      calimero-network/core#2357). This materialises node-2's
  #      membership in the subgroup so the subsequent
  #      `set_member_auto_follow auto_follow_contexts: true` grant
  #      binds to a real member and the auto-follow loop actually fires
  #      on context creation.
  #   3. Per-subgroup `auto_follow_contexts: true` from the admin —
  #      this IS implemented (auto_follow.rs:239-252 handles
  #      `contexts: true`) and triggers materialisation on node-2 when
  #      phase 4's context is created.
  #
  # Requires merobox >= 0.6.13 / calimero-client-py >= 0.6.11 for the
  # `join_subgroup_inheritance` step itself, which is already part of
  # the merobox >= 0.7.0 dependency contract pinned above.

  - name: Create subgroup G inside NS
    type: create_group_in_namespace
    node: app-migration-cascade-chain-1
    namespace_id: "{{namespace_id}}"
    group_name: "chain-G"
    outputs:
      g_id: groupId

  - name: Mark G as Open (enable inherited join from namespace members)
    type: set_subgroup_visibility
    node: app-migration-cascade-chain-1
    group_id: "{{g_id}}"
    visibility: open

  - name: Wait for subgroup-creation + Open-visibility ops to reach node-2
    # node-2 needs the Open-visibility row materialised before its
    # `join_subgroup_inheritance` call can pass the inherited-membership
    # validation. Matches the 10 s window used in
    # apps/scaffolding-e2e/workflows/group-join-via-inheritance.yml.
    type: wait
    seconds: 10

  - name: Node-2 joins G via inheritance
    type: join_subgroup_inheritance
    node: app-migration-cascade-chain-2
    group_id: "{{g_id}}"

  # Per-subgroup auto-follow-contexts grant lands AFTER node-2 has
  # materialised its membership in G — otherwise the auto-follow
  # handler skips a non-member target.
  - name: Grant node-2 auto-follow contexts in G
    type: set_member_auto_follow
    node: app-migration-cascade-chain-1
    group_id: "{{g_id}}"
    member_id: "{{node2_identity}}"
    auto_follow_contexts: true
    auto_follow_subgroups: false

  - name: Wait for inheritance-join + auto-follow grant to gossip
    type: wait
    seconds: 10

  # ── Phase 4: One context in G, on v1 ────────────────────────────────

  - name: Create G-ctx (v1)
    type: create_context
    node: app-migration-cascade-chain-1
    application_id: "{{app_v1}}"
    group_id: "{{g_id}}"
    outputs:
      ctx_id: contextId

  - name: Wait for context to inherit into node-2 via auto-follow
    # 1 context, conservative 15s window. Same rationale as workflow 01.
    type: wait
    seconds: 15

  - name: Assert bootstrap shape (all IDs resolved)
    type: assert
    statements:
      - "is_set({{namespace_id}})"
      - "is_set({{g_id}})"
      - "is_set({{ctx_id}})"
      - "is_set({{node2_identity}})"

  # ── Phase 5: Sanity — v1 schema on both nodes ───────────────────────

  - name: Sanity — read v1 schema on node-1
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema_n1: result

  - name: Assert node-1 sees v1 pre-cascade
    type: json_assert
    statements:
      - 'json_subset({{v1_schema_n1}}, {"output": {"schema_version": "1.0.0"}})'

  - name: Sanity — read v1 schema on node-2
    type: call
    node: app-migration-cascade-chain-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema_n2: result

  - name: Assert node-2 sees v1 pre-cascade (auto-follow materialised)
    type: json_assert
    statements:
      - 'json_subset({{v1_schema_n2}}, {"output": {"schema_version": "1.0.0"}})'

  # ── Phase 6: First cascade — NS v1 → v2 ─────────────────────────────

  - name: Set namespace upgrade policy to coordinated
    type: update_group_settings
    node: app-migration-cascade-chain-1
    group_id: "{{namespace_id}}"
    upgrade_policy: coordinated

  - name: Cascade-1 — NS v1 → v2
    type: upgrade_group
    node: app-migration-cascade-chain-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  - name: Wait for cascade-1 + per-context migration + state-delta gossip
    # 1 subgroup, 1 context. ~0.5s wasm migrate + ~3s state-delta
    # propagation + ~4s gossip slack ≈ 8s. Matches workflow 01's per-
    # cascade budget shape.
    type: wait
    seconds: 10

  - name: Sanity — cascade-1 ran (migration handler entered)
    # Same union pattern as workflow 01 phase 7. `min_matches: 1`
    # against both nodes confirms the migration handler entered at
    # least once; the schema asserts below are what actually prove
    # post-migration state reached node-2.
    type: assert_log_present
    nodes:
      - app-migration-cascade-chain-1
      - app-migration-cascade-chain-2
    patterns:
      - "Executing migration"
      - "migrate_v1_to_v2"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Read v2 schema on node-1 post-cascade-1
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_n1: result

  - name: Assert node-1 is v2 after cascade-1
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_n1}}, {"output": {"schema_version": "2.0.0"}})'

  - name: Read v2 schema on node-2 post-cascade-1
    type: call
    node: app-migration-cascade-chain-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_n2: result

  - name: Assert node-2 is v2 after cascade-1
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_n2}}, {"output": {"schema_version": "2.0.0"}})'

  # ── Phase 7: Write a v2-only field BETWEEN cascades ─────────────────
  # `notes` is added by v2 and PRESERVED into v3 by migrate_v2_to_v3's
  # additive mapping (`notes: old_state.notes`). The post-cascade-2
  # read of this value is what proves the second cascade picked up the
  # post-cascade-1 state, not a re-init or a stale v1 snapshot.

  - name: Set notes via v2 setter on node-1
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: set_notes
    args:
      notes: "carried-from-v2-through-cascade-2"

  - name: Wait for v2 setter write to gossip to node-2
    # Single-field LwwRegister write — gossip + apply ≈ 3s. Keep
    # generous since the next cascade depends on this delta being
    # materialised on both nodes before it lands.
    type: wait
    seconds: 5

  - name: Sanity — node-2 sees the v2 notes write
    type: call
    node: app-migration-cascade-chain-2
    context_id: "{{ctx_id}}"
    method: get_notes
    outputs:
      n2_notes_mid: result

  - name: Assert node-2 saw the v2 setter write
    type: json_assert
    statements:
      - 'json_equal({{n2_notes_mid}}, {"output": "carried-from-v2-through-cascade-2"})'

  # ── Phase 8: Second cascade — NS v2 → v3 ────────────────────────────
  # NS's app_key is now v2 (post-cascade-1 flipped it). G's app_key is
  # also v2. So the second cascade's predicate (`from_app_key == v2`)
  # matches G. If the engine instead derived from_app_key from a stale
  # source (e.g. NS's *original* v1 app_key), the predicate would
  # mismatch on G, the migration would skip, and the v3 asserts below
  # would fail with schema_version == "2.0.0". This is the core
  # regression guard for the chain.

  - name: Cascade-2 — NS v2 → v3
    type: upgrade_group
    node: app-migration-cascade-chain-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v3}}"
    migrate_method: migrate_v2_to_v3
    cascade: true

  - name: Wait for cascade-2 + per-context migration + state-delta gossip
    type: wait
    seconds: 10

  - name: Sanity — cascade-2 ran (migrate_v2_to_v3 entered)
    type: assert_log_present
    nodes:
      - app-migration-cascade-chain-1
      - app-migration-cascade-chain-2
    patterns:
      - "Executing migration"
      - "migrate_v2_to_v3"
      - "Migrated state written successfully"
    min_matches: 1

  # ── Phase 9: Final assertions — v3 schema + carried notes + list ──

  - name: Read v3 schema on node-1
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v3_schema_n1: result

  - name: Assert node-1 is v3 after cascade-2
    type: json_assert
    statements:
      - 'json_subset({{v3_schema_n1}}, {"output": {"schema_version": "3.0.0"}})'

  - name: Read v3 schema on node-2
    type: call
    node: app-migration-cascade-chain-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v3_schema_n2: result

  - name: Assert node-2 is v3 after cascade-2
    type: json_assert
    statements:
      - 'json_subset({{v3_schema_n2}}, {"output": {"schema_version": "3.0.0"}})'

  # Notes preservation across cascade-2 — the proof that
  # migrate_v2_to_v3 read the post-cascade-1 state, not a re-init.
  - name: Read notes on node-1 post-cascade-2
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: get_notes
    outputs:
      n1_notes_final: result

  - name: Assert v2 notes survived cascade-2 on node-1
    type: json_assert
    statements:
      - 'json_equal({{n1_notes_final}}, {"output": "carried-from-v2-through-cascade-2"})'

  - name: Read notes on node-2 post-cascade-2
    type: call
    node: app-migration-cascade-chain-2
    context_id: "{{ctx_id}}"
    method: get_notes
    outputs:
      n2_notes_final: result

  - name: Assert v2 notes survived cascade-2 on node-2
    type: json_assert
    statements:
      - 'json_equal({{n2_notes_final}}, {"output": "carried-from-v2-through-cascade-2"})'

  # v3 initialises an empty `list` Vector; migrate_v2_to_v3 does the
  # same (no carry-over from v2 — there was no list in v2).
  # `schema_info` exposes `list_len`, so assert that first as a cheap
  # structural check, then exercise add_to_list / get_list round-trip
  # on node-1 to prove the v3-only ABI is live.
  - name: Assert v3 list is empty on node-1 post-cascade
    type: json_assert
    statements:
      - 'json_subset({{v3_schema_n1}}, {"output": {"list_len": 0}})'

  - name: Assert v3 list is empty on node-2 post-cascade
    type: json_assert
    statements:
      - 'json_subset({{v3_schema_n2}}, {"output": {"list_len": 0}})'

  - name: Add an item to the v3 list on node-1
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: add_to_list
    args:
      item: "first-v3-item"

  - name: Read v3 list back on node-1
    type: call
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    method: get_list
    outputs:
      n1_list_after: result

  - name: Assert v3 list round-trip works on node-1
    type: json_assert
    statements:
      - 'json_equal({{n1_list_after}}, {"output": ["first-v3-item"]})'

  # ── Phase 10: Teardown ──────────────────────────────────────────────

  - name: Delete G-ctx
    type: delete_context
    node: app-migration-cascade-chain-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup G
    type: delete_group
    node: app-migration-cascade-chain-1
    group_id: "{{g_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-cascade-chain-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node-1
    type: uninstall_application
    node: app-migration-cascade-chain-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node-1
    type: uninstall_application
    node: app-migration-cascade-chain-1
    application_id: "{{app_v2}}"

  - name: Uninstall v3 on node-1
    type: uninstall_application
    node: app-migration-cascade-chain-1
    application_id: "{{app_v3}}"

  - name: Uninstall v1 on node-2
    type: uninstall_application
    node: app-migration-cascade-chain-2
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node-2
    type: uninstall_application
    node: app-migration-cascade-chain-2
    application_id: "{{app_v2}}"

  - name: Uninstall v3 on node-2
    type: uninstall_application
    node: app-migration-cascade-chain-2
    application_id: "{{app_v3}}"

stop_all_nodes: false
