name: 02 — Scenario "additive field" (v1 → v2-add-field, 2-node)
description: >
  2-node per-context migration for the additive-field scenario.
  v1 → v2-add-field adds a `notes: LwwRegister<String>` to the state
  struct; `migrate_v1_to_v2` preserves every v1 field and seeds the
  new `notes` field. Topology: namespace + one Open subgroup + one
  context in the subgroup. Upgrade is `upgrade_group(group=subgroup,
  target=v2, migrate=migrate_v1_to_v2)` — per-context (cascade=false),
  not namespace-cascade (that's `01`). Acts as the additive row of the
  per-scenario matrix.

  Negative assertion: before the upgrade, the v2-only setter
  `set_notes` must NOT be callable (the binary doesn't export it under
  v1). After the upgrade it must be callable and round-trip a value
  from node 1 to node 2.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-additive
  base_port: 9240
  base_rpc_port: 9340

steps:
  # Phase 1: Install v1 + v2 binaries on the ADMIN node only.
  #
  # Realistic distribution: only the admin (node 1) is given the
  # bytecode. Node 2 never runs install_application — it must obtain
  # both versions automatically:
  #   - v1 when it joins the context (the app blob is announced for the
  #     context and fetched over BlobShare on first execution), and
  #   - v2 when node 1 upgrades the group (upgrade_group announces the
  #     target blob; node 2 pulls it during its lazy migration — the
  #     sync-gate intentionally leaves BlobShare open for this).
  # App ids are content-addressed (blob_id of the bytecode), so node 1's
  # captured app_v1/app_v2 ids are exactly the ids node 2 resolves.
  - name: Install migration-suite-v1 on node 1
    type: install_application
    node: app-migration-additive-1
    path: apps/migrations/migration-suite-v1/res/migration-suite-1.0.0.mpk
    dev: true
    outputs:
      app_v1: applicationId

  # Phase 2: Node 1 builds namespace + Open subgroup + context.
  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-additive-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-additive-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-additive-1
    namespace_id: "{{namespace_id}}"
    group_name: "additive-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-additive-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-additive-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2 to namespace; materialise subgroup + context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-additive-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-additive-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-additive-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-additive-2
    context_id: "{{ctx_id}}"

  # Phase 4: Write v1 state on node 1, wait for node 2 to catch up.
  - name: Write v1 state (description + counter + item)
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: set_description
    args:
      description: "additive-scenario"

  - name: Increment counter twice (v1)
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Increment counter again (v1)
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: increment_counter

  - name: Write item to v1 map
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: set_item
    args:
      key: "k1"
      value: "v1-value"

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-additive-1
      - app-migration-additive-2
    timeout: 90
    trigger_sync: true

  - name: Sanity-check v1 state shape on node 1
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema in place
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "description": "additive-scenario", "counter": "2"}})'

  # Negative: v2-only setter not yet callable under v1.
  - name: Negative — set_notes is not exported by v1
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: set_notes
    args:
      notes: "should-fail-pre-upgrade"
    expected_failure: true

  # LazyOnAccess: each node migrates its OWN byte-identical v1 state
  # on next access. The migration write path emits no DAG delta (full
  # root replacement, not CRDT-mergeable), so migrated bytes do not
  # propagate over sync — each node must self-migrate. Under
  # `coordinated` only the emitter migrates and the receiver is left
  # with v1 bytes behind a v2 app pointer → "Not all bytes read"
  # panic. The per-context TargetApplicationSet + GroupMigrationSet
  # ops set both `target_application_id` and the `migration` method on
  # the subgroup's GroupMeta, which each receiver's
  # `maybe_lazy_upgrade` reads to self-migrate.
  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-additive-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  # Phase 5: Per-context upgrade on the subgroup (cascade=false default).
  # Under LazyOnAccess this sets the target + migration method on the
  # subgroup meta and returns WITHOUT running a propagator — no node
  # migrates eagerly; each migrates on its next access below.
  - name: Install migration-suite-v2-add-field on node 1
    type: install_application
    node: app-migration-additive-1
    path: apps/migrations/migration-suite-v2-add-field/res/migration-suite-2.0.0.mpk
    dev: true
    outputs:
      app_v2: applicationId


  - name: Assert both versions share one application id (bundle same-id)
    # Same-package bundles derive ApplicationId = hash(package, signer),
    # so the second install MUST dedup onto the first id — the upgrade
    # below then exercises the same-id (blob-only) propagation path.
    type: json_assert
    statements:
      - 'equal("{{app_v1}}", "{{app_v2}}")'

  - name: Upgrade subgroup v1 → v2 (per-context, not cascade)
    type: upgrade_group
    node: app-migration-additive-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2  # DELIBERATE: the one retained
    # explicit-method workflow — permanent coverage for the legacy
    # caller-supplied path (pre-v2 SDK apps still use it).

  # Fixed wait, NOT wait_for_sync (see scenario 01 rationale): lets the
  # target+migration meta gossip to node 2 before its lazy read.
  - name: Wait for upgrade meta to gossip to node 2
    type: wait
    seconds: 15

  # These reads TRIGGER each node's lazy migration: schema_info is not
  # a state op, so `maybe_lazy_upgrade` fires on each node, migrating
  # its own v1 state to v2 before serving the read.
  - name: Read post-migration schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-migration schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-additive-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  # Both nodes self-migrated via the lazy path — assert the migration
  # logs on EACH after its triggering read above.
  - name: Assert lazy migration ran on node 1
    type: assert_log_present
    nodes:
      - app-migration-additive-1
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert lazy migration ran on node 2 (receiver self-migrated)
    type: assert_log_present
    nodes:
      - app-migration-additive-2
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert v2 schema on node 1 (additive field seeded, v1 data preserved)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_subset({{v2_schema_node1}}, {"output": {"description": "additive-scenario", "counter": "2"}})'
      - 'json_subset({{v2_schema_node1}}, {"output": {"notes": "added in v2"}})'

  - name: Assert v2 schema on node 2 (same shape, proves migration reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_subset({{v2_schema_node2}}, {"output": {"description": "additive-scenario", "counter": "2"}})'
      - 'json_subset({{v2_schema_node2}}, {"output": {"notes": "added in v2"}})'

  - name: Assert v1 item map preserved through migration (node 1)
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: get_item
    args:
      key: "k1"
    outputs:
      preserved_item: result

  - name: Assert preserved v1 item value
    type: json_assert
    statements:
      - 'json_equal({{preserved_item}}, {"output": "v1-value"})'

  # Phase 6: v2-only setter on node 1 round-trips to node 2.
  - name: Node 1 calls v2-only setter set_notes
    type: call
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    method: set_notes
    args:
      notes: "additive-scenario-post-migration"

  - name: Wait for v2 write to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-additive-1
      - app-migration-additive-2
    timeout: 60
    trigger_sync: true

  - name: Node 2 reads notes back via v2-only get_notes
    type: call
    node: app-migration-additive-2
    context_id: "{{ctx_id}}"
    method: get_notes
    outputs:
      notes_after_node2: result

  - name: Assert v2-only round-trip reached node 2
    type: json_assert
    statements:
      - 'json_equal({{notes_after_node2}}, {"output": "additive-scenario-post-migration"})'

  # Phase 7: Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-additive-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-additive-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-additive-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-additive-1
    application_id: "{{app_v1}}"


stop_all_nodes: false
