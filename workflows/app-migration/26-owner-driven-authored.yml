name: 26 — Owner-driven identity-gated re-write (PR-6c, node-log validated)
description: >
  Owner-driven convert of an identity-gated (`UserStorage`) entry across a
  2-node namespace, validated against node logs (PR-6c task 6c.3 + 6c.11).

  Identity-gated data does NOT migrate via the whole-root migrate path — it
  migrates lazily, when each entry's OWNER next issues an ordinary signed
  write. `UserStorage` keys every slot by `env::executor_id`, so node 1 owns
  its note slot and node 2 owns its own. After cascading the namespace
  v1 → v2 (migration_v2 default-ON from PR-6b, so no feature flag), each
  owner's next `set_note` re-write stamps `schema_version = target` and
  advances the entry's monotonic nonce (`updated_at`) on the normal write
  path — NOT under merge mode, NOT entropy-suppressed (resolves spec O4).

  The discriminating node-log assertions (the explicit 6c.11 requirement):
    - POSITIVE, regression-coupled: the per-entry re-stamp branch in
      `Interface::save_raw` (6c.3) emits a debug log when an owner's own write
      re-stamps its identity-gated entry's `schema_version` to the target. Each
      owner re-writes its OWN slot, so this log MUST be present on both nodes
      (assert_log_present). This is the signal that the per-entry owner-driven
      convert actually ran — remove the 6c convert code and this log, and the
      entry, never get re-stamped, so the assert fails. (The `schema_info`
      `2.0.0` checks only reflect which WASM is loaded — a HARDCODED constant —
      not the per-entry stamp, so they cannot stand in for this signal.)
    - The OWNER's own re-write must NOT trip the owner gate ("Cannot change
      owner of User storage"): an owner re-writing its own slot keeps the same
      owner (assert_log_absent on both nodes across the convert).
    - A NON-owner can never drive another identity's convert — at the storage
      layer a non-owner write of a foreign User slot is impossible because
      UserStorage::insert always stamps the CALLER's executor_id as owner, and
      the re-stamp branch above only fires for the local owner. The negative is
      pinned by a cross-node convergence read: node 2's view of node 1's
      converted note is identical to node 1's, proving only the owner drove the
      convert and it replicated as one convergent signed delta.
    - The migrate machinery ran (lazy upgrade fired on both nodes) and the
      schema advanced to 2.0.0 with both per-user notes preserved.

  Because migration_v2 defaults ON (PR-6b task 6b.8), the nodes run the
  owner-driven convert natively — no merobox feature flag is needed.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-owner
  # Above every sibling's range so host ports can't collide.
  base_port: 9630
  base_rpc_port: 9730

steps:
  # Phase 1: Install v1 + v2 (identity-gated UserStorage fixture) on the
  # admin node only; node 2 fetches them over BlobShare on join / lazy
  # migration, same content-addressed distribution as scenarios 01/16.
  - name: Install scenario-user-storage-v1 on node 1
    type: install_application
    node: app-migration-owner-1
    path: apps/migrations/scenario-user-storage-v1/res/scenario_user_storage_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install scenario-user-storage-v2 on node 1
    type: install_application
    node: app-migration-owner-1
    path: apps/migrations/scenario-user-storage-v2/res/scenario_user_storage_v2.wasm
    dev: true
    outputs:
      app_v2: applicationId

  # Phase 2: Node 1 builds namespace + Open descendant subgroup + context.
  - name: Create namespace on node 1 (anchors app_v1)
    type: create_namespace
    node: app-migration-owner-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (for teardown)
    type: get_namespace_identity
    node: app-migration-owner-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create descendant Open subgroup on node 1
    type: create_group_in_namespace
    node: app-migration-owner-1
    namespace_id: "{{namespace_id}}"
    group_name: "owner-driven-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-owner-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-owner-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2, materialise inherited membership, join context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-owner-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-owner-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-owner-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-owner-2
    context_id: "{{ctx_id}}"

  # Phase 4: Each node writes its OWN identity-gated note slot under v1.
  # node 1 owns slot(node1); node 2 owns slot(node2). These are the
  # identity-gated entries that must convert via their owner's re-write.
  - name: Node 1 writes its own v1 note (owner = node 1)
    type: call
    node: app-migration-owner-1
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "node1-note-v1"

  - name: Node 2 writes its own v1 note (owner = node 2)
    type: call
    node: app-migration-owner-2
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "node2-note-v1"

  - name: Wait for both v1 notes to sync across nodes
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-owner-1
      - app-migration-owner-2
    timeout: 90
    trigger_sync: true

  - name: Assert v1 schema on node 1 (both notes present)
    type: call
    node: app-migration-owner-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema shape (2 identity-gated notes)
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "note_count": 2}})'

  # Phase 5: lazy-on-access upgrade policy, then ONE cascade v1 → v2.
  - name: Set upgrade policy to lazy-on-access on node 1
    type: update_group_settings
    node: app-migration-owner-1
    group_id: "{{namespace_id}}"
    upgrade_policy: lazy_on_access

  - name: Cascade namespace v1 → v2 (initiated by node 1)
    type: upgrade_group
    node: app-migration-owner-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  - name: Wait for cascade op to gossip + apply on both nodes
    type: wait
    seconds: 15

  # Phase 6: reads trigger each node's lazy whole-root migration to v2.
  - name: Read post-migration schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-owner-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-migration schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-owner-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  # The migration EXECUTED (not just which WASM is loaded): the migrate body
  # ran and rewrote the root. These two logs fire whenever a migration is
  # applied, on whatever trigger path — under a cascade upgrade (migration_v2,
  # PR-6b) the cascade propagator drives it, so the lazy-on-read-only
  # "performing lazy upgrade before execution" log does NOT fire and is not
  # asserted here. Each node self-derives v2 from its own v1 under LazyOnAccess.
  - name: Assert the migration executed on node 1
    type: assert_log_present
    nodes:
      - app-migration-owner-1
    patterns:
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert the migration executed on node 2 (receiver self-migrated)
    type: assert_log_present
    nodes:
      - app-migration-owner-2
    patterns:
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert v2 schema on node 1 (notes preserved through migrate)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "note_count": 2}})'

  # Phase 7: THE OWNER-DRIVEN CONVERT. Each owner now issues its next
  # ordinary signed write on its OWN identity-gated slot. Under migration_v2
  # that write stamps schema_version = target and advances the entry's
  # monotonic nonce on the normal write path. The owner gate must NOT trip
  # for an owner converting its OWN entry.
  - name: Node 1 owner re-writes its own note (drives the convert)
    type: call
    node: app-migration-owner-1
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "node1-note-v2"

  - name: Node 2 owner re-writes its own note (drives the convert)
    type: call
    node: app-migration-owner-2
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "node2-note-v2"

  # Give the converted deltas time to gossip + apply on the peer before the
  # host-side adoption assertions (wait_for_sync can return instantly on a
  # trivially-matching DAG-head check, racing the convert delta).
  - name: Wait for converted notes to replicate as normal signed deltas
    type: wait
    seconds: 15

  # Phase 7b: POSITIVE, REGRESSION-COUPLED SIGNAL for the owner-driven convert.
  # The owner re-stamps its own entry inside the wasm GUEST, where `tracing`
  # does not reach the node log. The node-observable signal is host-side on the
  # RECEIVER: when a node applies the replicated converted delta it adopts the
  # higher schema tag and logs it. Each node re-wrote its OWN slot, so each is
  # the receiver of the OTHER's convert → the log must be present on both.
  - name: Assert node 1 adopted the replicated convert (host-side apply)
    type: assert_log_present
    nodes:
      - app-migration-owner-1
    patterns:
      - "owner-driven convert: applied migrated identity-gated entry schema_version"
    min_matches: 1

  - name: Assert node 2 adopted the replicated convert (host-side apply)
    type: assert_log_present
    nodes:
      - app-migration-owner-2
    patterns:
      - "owner-driven convert: applied migrated identity-gated entry schema_version"
    min_matches: 1

  # Phase 8: NODE-LOG VALIDATION — the explicit requirement for scenario 26.
  #
  # (a) The owner's convert of its OWN entry NEVER trips the identity-gated
  #     owner gate. "Cannot change owner of User storage" guards owner-CHANGE;
  #     an owner re-writing its own slot keeps the same owner, so this must
  #     NEVER fire on either node across the whole run.
  - name: Assert the owner gate never tripped (no owner-change) on node 1
    type: assert_log_absent
    nodes:
      - app-migration-owner-1
    patterns:
      - "Cannot change owner of User storage"

  - name: Assert the owner gate never tripped (no owner-change) on node 2
    type: assert_log_absent
    nodes:
      - app-migration-owner-2
    patterns:
      - "Cannot change owner of User storage"

  # (b) No identity-gated delta was silently dropped by the schema fence — the
  #     converted owner write must converge, never vanish.
  - name: Assert no converted owner delta was silently dropped (both nodes)
    type: assert_log_absent
    nodes:
      - app-migration-owner-1
      - app-migration-owner-2
    patterns:
      - "Dropping state delta — HLC fence: stale schema after cascade migration"

  # Phase 9: CONVERGENCE — each owner's converted note is visible identically
  # on BOTH nodes, proving the convert replicated as a single convergent
  # signed delta and that only the OWNER drove it (a non-owner could never
  # have stamped the foreign slot — UserStorage::insert keys by the caller's
  # own executor_id).
  - name: Node 1 reads its own converted note
    type: call
    node: app-migration-owner-1
    context_id: "{{ctx_id}}"
    method: my_note
    outputs:
      note_node1: result

  - name: Node 2 reads its own converted note
    type: call
    node: app-migration-owner-2
    context_id: "{{ctx_id}}"
    method: my_note
    outputs:
      note_node2: result

  - name: Assert each owner's converted note is the v2 value
    type: json_assert
    statements:
      - 'json_equal({{note_node1}}, {"output": "node1-note-v2"})'
      - 'json_equal({{note_node2}}, {"output": "node2-note-v2"})'

  - name: Read final schema_info on node 2 (both converted notes converged)
    type: call
    node: app-migration-owner-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      final_schema_node2: result

  - name: Assert both identity-gated notes converged at v2 on node 2
    type: json_assert
    statements:
      - 'json_subset({{final_schema_node2}}, {"output": {"schema_version": "2.0.0", "note_count": 2}})'

  # Phase 10: Teardown (node 1 holds admin authority).
  - name: Delete context
    type: delete_context
    node: app-migration-owner-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-owner-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-owner-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-owner-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-owner-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
