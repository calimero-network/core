name: 27 — Departed-owner force-carry precondition (PR-6c, node-log validated)
description: >
  Departed-owner identity-gated entry across a 2-node namespace, validated
  against node logs (PR-6c tasks 6c.4/6c.5 + 6c.11).

  An identity-gated (`UserStorage`) entry can only convert when its OWNER
  next signs a write (scenario 26). When the owner DEPARTS the namespace and
  never writes again, no one can re-sign as that owner and no one may change
  an entry's owner (`verify_action_update` rejects both — "Cannot change
  owner of User storage"). The only crypto-sound resolution is the admin
  `GroupOp::MigrationForceCarry`: tombstone the stale entry and re-create it
  under the ADMIN's OWN key (the admin signs it normally, so it verifies at
  apply_action — no owner-forge, no owner-change). The op is authorized ONLY
  for the namespace admin/owner capability; a non-admin force-carry is
  rejected (`require_admin` → `MembershipError::NotAdmin`).

  This scenario drives the genuine end-to-end PRECONDITION the force-carry
  resolves:
    - node 1 is the namespace admin/owner; node 2 owns its own identity-gated
      note slot.
    - the namespace cascades v1 → v2 (migration_v2 default-ON from PR-6b).
    - node 2 (the owner of its slot) is REMOVED from the namespace and never
      writes again → its identity-gated note is now a departed-owner stale
      entry that the owner-driven path (scenario 26) can never resolve.

  Node-log validation (the explicit 6c.11 requirement):
    - The per-member capability map distinguishes admin from departing owner,
      asserted with exact values via get_member_capabilities: the namespace
      creator's stored map is `0` (its authority is the Admin ROLE, which is
      what `require_admin` checks and is deliberately NOT a capability bit),
      while the invited owner (node 2) holds exactly `CAN_JOIN_OPEN_SUBGROUPS`
      (4) — a plain member with NO manage/admin bit. This establishes that the
      departing identity is an ordinary member, not an admin; the role-based
      `require_admin` gate `migration_force_carry::apply` enforces (admin op
      passes, non-admin rejected with `MembershipError::NotAdmin`) is itself
      unit-covered in 6c.5 (see scope note), not minted from a step here.
    - The departed owner's stale entry is NOT silently dropped by the schema
      fence and node 1 (the surviving admin) holds the v2 root — the entry
      survives as residue awaiting force-carry, never vanishing.

  Scope note: the `MigrationForceCarry` GroupOp apply handler + admin
  authorization are unit-covered in task 6c.5
  (crates/governance-store/src/tests.rs: force_carry_requires_admin_capability
  / force_carry_by_admin_records_intent). The op-SUBMISSION surface (a signed
  governance-op route/client method) is not yet wired, so this e2e exercises
  and node-log-validates the departed-owner precondition + the admin-capability
  gate the handler enforces, rather than minting the op from a merobox step
  that does not exist. When the submission route lands this scenario gains the
  force-carry call + the "MigrationForceCarry: admin authorized" /
  "MembershipError::NotAdmin" log asserts.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-departed
  base_port: 9640
  base_rpc_port: 9740

steps:
  # Phase 1: Install v1 + v2 (identity-gated UserStorage fixture) on node 1.
  - name: Install scenario-user-storage-v1 on node 1
    type: install_application
    node: app-migration-departed-1
    path: apps/migrations/scenario-user-storage-v1/res/scenario_user_storage_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install scenario-user-storage-v2 on node 1
    type: install_application
    node: app-migration-departed-1
    path: apps/migrations/scenario-user-storage-v2/res/scenario_user_storage_v2.wasm
    dev: true
    outputs:
      app_v2: applicationId

  # Phase 2: Node 1 builds namespace + Open descendant subgroup + context.
  - name: Create namespace on node 1 (anchors app_v1)
    type: create_namespace
    node: app-migration-departed-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key (node 1 holds namespace admin authority)
    type: get_namespace_identity
    node: app-migration-departed-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create descendant Open subgroup on node 1
    type: create_group_in_namespace
    node: app-migration-departed-1
    namespace_id: "{{namespace_id}}"
    group_name: "departed-owner-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-departed-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-departed-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2, materialise inherited membership, join context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-departed-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-departed-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Capture node 2 identity (the departing owner)
    type: get_namespace_identity
    node: app-migration-departed-2
    namespace_id: "{{namespace_id}}"
    outputs:
      departed_owner_key: publicKey

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-departed-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-departed-2
    context_id: "{{ctx_id}}"

  # Phase 4: Node 2 writes its OWN identity-gated note slot under v1 — the
  # entry whose owner is about to depart.
  - name: Node 2 writes its own v1 note (owner = node 2, the departing owner)
    type: call
    node: app-migration-departed-2
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "departed-owner-note-v1"

  - name: Node 1 writes its own v1 note (owner = node 1, the admin)
    type: call
    node: app-migration-departed-1
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "admin-note-v1"

  - name: Wait for both v1 notes to sync across nodes
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-departed-1
      - app-migration-departed-2
    timeout: 90
    trigger_sync: true

  # Phase 5: ADMIN-CAPABILITY BOUNDARY — the exact gate force-carry reuses.
  # node 1 holds the namespace admin/owner capability; node 2 does not. This
  # is the `require_admin` gate `migration_force_carry::apply` enforces: an
  # admin-issued force-carry passes, a non-admin one is rejected.
  - name: Read admin's member capabilities on the namespace
    type: get_member_capabilities
    node: app-migration-departed-1
    group_id: "{{namespace_id}}"
    member_id: "{{admin_key}}"
    outputs:
      admin_caps: capabilities

  - name: Read the departing owner's member capabilities on the namespace
    type: get_member_capabilities
    node: app-migration-departed-1
    group_id: "{{namespace_id}}"
    member_id: "{{departed_owner_key}}"
    outputs:
      departed_caps: capabilities

  # Assert the per-member capability map distinguishes the two identities. The
  # bitmask `effective_capabilities` returns is the STORED per-member row, not a
  # role projection: the namespace creator is added with role Admin and NO
  # per-member capability row, so its map is 0 — its authority is the Admin ROLE
  # (what `require_admin` checks), which is deliberately separate from this map.
  # The invited member (node 2) is materialised with the namespace's
  # `default_capabilities`, which `create_group` seeds as exactly
  # `CAN_JOIN_OPEN_SUBGROUPS` (1<<2 = 4) — a plain member that does NOT hold
  # `MANAGE_MEMBERS` (1<<3 = 8) or any admin bit. These exact values are the
  # boundary this scenario can node-validate; the role-based `require_admin`
  # gate force-carry enforces is unit-covered in 6c.5 (see scope note).
  - name: Assert the admin's per-member capability map is empty (authority is the Admin role, not a bit)
    type: json_assert
    statements:
      - 'json_equal({{admin_caps}}, 0)'

  - name: Assert the departing owner holds exactly the default member capability (no manage/admin bit)
    type: json_assert
    statements:
      - 'json_equal({{departed_caps}}, 4)'

  # Phase 6: lazy-on-access upgrade policy, then ONE cascade v1 → v2.
  - name: Set upgrade policy to lazy-on-access on node 1
    type: update_group_settings
    node: app-migration-departed-1
    group_id: "{{namespace_id}}"
    upgrade_policy: lazy_on_access

  - name: Cascade namespace v1 → v2 (initiated by node 1, the admin)
    type: upgrade_group
    node: app-migration-departed-1
    group_id: "{{namespace_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2
    cascade: true

  - name: Wait for cascade op to gossip + apply on both nodes
    type: wait
    seconds: 15

  - name: Read post-migration schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-departed-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-migration schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-departed-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert lazy migration ran on node 1
    type: assert_log_present
    nodes:
      - app-migration-departed-1
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert node 1 reached v2 (both identity-gated notes carried through)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "note_count": 2}})'

  # Phase 7: THE OWNER DEPARTS. node 2 is removed from the namespace and will
  # never sign another write. Its identity-gated note is now a departed-owner
  # stale entry: the owner-driven convert (scenario 26) can never run for it,
  # because only its owner (node 2) could re-sign it — and node 2 is gone.
  # This is the precondition the admin `MigrationForceCarry` resolves.
  - name: Admin removes node 2 from the namespace (owner departs permanently)
    type: remove_group_members
    node: app-migration-departed-1
    group_id: "{{namespace_id}}"
    members:
      - "{{departed_owner_key}}"

  - name: Disconnect node 2 (the departed owner is offline for good)
    type: disconnect_node
    node: app-migration-departed-2

  - name: Settle removal + let node 1 reconcile the namespace head
    type: wait
    seconds: 15

  # Phase 8: NODE-LOG VALIDATION — the explicit requirement for scenario 27.
  #
  # (a) The departed owner's stale identity-gated entry was NEVER silently
  #     dropped by the schema fence — it survives as residue on the admin
  #     node, awaiting the admin force-carry, rather than vanishing.
  - name: Assert no identity-gated delta was silently dropped on the admin node
    type: assert_log_absent
    nodes:
      - app-migration-departed-1
    patterns:
      - "Dropping state delta — HLC fence: stale schema after cascade migration"

  # (b) No spurious owner-CHANGE was ever attempted — the force-carry path is
  #     tombstone+rekey-under-admin, never an owner mutation. If any code path
  #     tried to rewrite the departed owner's entry under a different owner the
  #     storage wall would log this; it must NEVER fire.
  - name: Assert no owner-change was attempted on the departed entry (admin node)
    type: assert_log_absent
    nodes:
      - app-migration-departed-1
    patterns:
      - "Cannot change owner of User storage"

  # Phase 9: CONVERGENCE — the admin (node 1) still holds the v2 root with the
  # departed owner's entry intact as residue. The admin's own note converged;
  # the departed owner's note persists pending force-carry (the precondition
  # this scenario establishes for tasks 6c.4/6c.5).
  - name: Admin re-reads schema_info after the owner departed
    type: call
    node: app-migration-departed-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      post_departure_schema: result

  - name: Assert the admin node still holds v2 with both notes (departed entry is residue, not dropped)
    type: json_assert
    statements:
      - 'json_subset({{post_departure_schema}}, {"output": {"schema_version": "2.0.0", "note_count": 2}})'

  # Phase 10: Teardown (node 1 holds admin authority).
  - name: Delete context
    type: delete_context
    node: app-migration-departed-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-departed-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-departed-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-departed-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-departed-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
