name: 16 — Scenario "user-storage" (v1 → v2 carry-through, 2-node)
description: >
  2-node per-context migration for a `UserStorage`-typed field. v1 holds
  `notes: UserStorage<LwwRegister<String>>` — a per-user keyed store where
  each member writes only their OWN slot (keyed by env::executor_id). Both
  nodes write a note under v1 (two distinct slots). v2 carries the store
  THROUGH the migrate and adds a `migration_note` register; the migrate does
  NOT re-insert (insert keys by the migrating node's own id and would
  diverge) — it carries every user's slot byte-for-byte.

  Discriminating assertion: after BOTH nodes self-migrate, `note_count`
  must be 2 on each (both users' slots survived the migrate on every node),
  and each node's own `my_note` still returns the value it wrote under v1 —
  proving per-user keying round-trips through migrate and converges.

  Per-context upgrade on the subgroup (cascade=false).

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-userstore
  base_port: 9580
  base_rpc_port: 9680

steps:
  - name: Install scenario-user-storage-v1 on node 1
    type: install_application
    node: app-migration-userstore-1
    path: apps/migrations/scenario-user-storage-v1/res/scenario_user_storage_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install scenario-user-storage-v2 on node 1
    type: install_application
    node: app-migration-userstore-1
    path: apps/migrations/scenario-user-storage-v2/res/scenario_user_storage_v2.wasm
    dev: true
    outputs:
      app_v2: applicationId

  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-userstore-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-userstore-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-userstore-1
    namespace_id: "{{namespace_id}}"
    group_name: "user-storage-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-userstore-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-userstore-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-userstore-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-userstore-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-userstore-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-userstore-2
    context_id: "{{ctx_id}}"

  # Phase 4: BOTH nodes write their own per-user slot under v1.
  - name: Node 1 writes its note
    type: call
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "note-from-node-1"

  - name: Node 1 sets title
    type: call
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    method: set_title
    args:
      title: "user-doc"

  - name: Wait for node 1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-userstore-1
      - app-migration-userstore-2
    timeout: 90
    trigger_sync: true

  - name: Node 2 writes its own note (second per-user slot)
    type: call
    node: app-migration-userstore-2
    context_id: "{{ctx_id}}"
    method: set_note
    args:
      value: "note-from-node-2"

  - name: Wait for both per-user slots to converge
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-userstore-1
      - app-migration-userstore-2
    timeout: 90
    trigger_sync: true

  - name: Assert v1 shape on node 1 (two user slots present)
    type: call
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema shape
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "title": "user-doc", "note_count": 2}})'

  - name: Negative — migration_note is not exported by v1
    type: call
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    method: migration_note
    expected_failure: true

  - name: Set upgrade policy to lazy-on-access
    type: update_group_settings
    node: app-migration-userstore-1
    group_id: "{{group_id}}"
    upgrade_policy: lazy_on_access

  - name: Upgrade subgroup v1 → v2 (per-context)
    type: upgrade_group
    node: app-migration-userstore-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2

  - name: Wait for upgrade + migration to apply + log flush
    type: wait
    seconds: 15

  - name: Read post-migration schema_info on node 1 (triggers lazy migration)
    type: call
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-migration schema_info on node 2 (triggers lazy migration)
    type: call
    node: app-migration-userstore-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert lazy migration ran on node 1
    type: assert_log_present
    nodes:
      - app-migration-userstore-1
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Assert lazy migration ran on node 2 (receiver self-migrated)
    type: assert_log_present
    nodes:
      - app-migration-userstore-2
    patterns:
      - "performing lazy upgrade before execution"
      - "Executing migration"
      - "Migrated state written successfully"
    min_matches: 1

  # Both per-user slots survived the migrate on BOTH nodes (note_count == 2).
  - name: Assert v2 schema on node 1 (both user slots preserved + note seeded)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0", "title": "user-doc", "note_count": 2, "migration_note": "migrated-v1-to-v2"}})'

  - name: Assert v2 schema on node 2 (same shape — migration reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0", "title": "user-doc", "note_count": 2, "migration_note": "migrated-v1-to-v2"}})'

  # Each node still owns the note it wrote under v1 (per-user keying survived).
  - name: Node 1 reads its own note post-migrate
    type: call
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    method: my_note
    outputs:
      my_note_node1: result

  - name: Node 2 reads its own note post-migrate
    type: call
    node: app-migration-userstore-2
    context_id: "{{ctx_id}}"
    method: my_note
    outputs:
      my_note_node2: result

  - name: Assert each node kept its own per-user slot through migrate
    type: json_assert
    statements:
      - 'json_equal({{my_note_node1}}, {"output": "note-from-node-1"})'
      - 'json_equal({{my_note_node2}}, {"output": "note-from-node-2"})'

  # Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-userstore-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-userstore-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-userstore-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1
    type: uninstall_application
    node: app-migration-userstore-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2
    type: uninstall_application
    node: app-migration-userstore-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
