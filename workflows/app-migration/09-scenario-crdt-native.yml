name: 09 — Scenario "crdt-native" (v1 → v2-add-crdt-collection, 2-node)
description: >
  2-node per-context migration for the CRDT-collection-typed field
  scenario. v1 → v2 adds a `tags: Vector<LwwRegister<String>>` to the
  state struct. Unlike scalar field addition, the `Vector` type has its
  own internal field-name handle, so borsh deserialize of v1 bytes
  under v2's schema would fail with EOF when it tries to read the
  missing `tags` field. The `migrate_v1_to_v2` handler reconstructs the
  v2 state, carrying over the v1 `items` and `title`, and seeds the new
  `tags` Vector empty. Topology: namespace + one Open subgroup + one
  context in the subgroup. Upgrade is `upgrade_group(group=subgroup,
  target=v2, migrate=migrate_v1_to_v2)` — per-context (cascade=false).
  Acts as the CRDT-collection-add row of the per-scenario matrix.

  Negative assertion: before the upgrade, the v2-only method `push_tag`
  must NOT be callable (the binary doesn't export it under v1). After
  the upgrade Phase 7d pushes tags from node 1 and reads them back via
  v2-only `tag_count` / `get_tag` on node 2 to prove convergence.

no_docker: false
nuke_on_start: true
nuke_on_end: false

nodes:
  count: 2
  image: merod:local
  prefix: app-migration-crdt
  base_port: 9310
  base_rpc_port: 9410

steps:
  # Phase 1: Install v1 + v2 binaries on BOTH nodes.
  - name: Install scenario-crdt-native-v1 on node 1
    type: install_application
    node: app-migration-crdt-1
    path: apps/migrations/scenario-crdt-native-v1/res/scenario_crdt_native_v1.wasm
    dev: true
    outputs:
      app_v1: applicationId

  - name: Install scenario-crdt-native-v1 on node 2
    type: install_application
    node: app-migration-crdt-2
    path: apps/migrations/scenario-crdt-native-v1/res/scenario_crdt_native_v1.wasm
    dev: true

  - name: Install scenario-crdt-native-v2 on node 1
    type: install_application
    node: app-migration-crdt-1
    path: apps/migrations/scenario-crdt-native-v2/res/scenario_crdt_native_v2.wasm
    dev: true
    outputs:
      app_v2: applicationId

  - name: Install scenario-crdt-native-v2 on node 2
    type: install_application
    node: app-migration-crdt-2
    path: apps/migrations/scenario-crdt-native-v2/res/scenario_crdt_native_v2.wasm
    dev: true

  # Phase 2: Node 1 builds namespace + Open subgroup + context.
  - name: Create namespace (v1) on node 1
    type: create_namespace
    node: app-migration-crdt-1
    application_id: "{{app_v1}}"
    outputs:
      namespace_id: namespaceId

  - name: Capture admin key
    type: get_namespace_identity
    node: app-migration-crdt-1
    namespace_id: "{{namespace_id}}"
    outputs:
      admin_key: publicKey

  - name: Create Open subgroup under namespace
    type: create_group_in_namespace
    node: app-migration-crdt-1
    namespace_id: "{{namespace_id}}"
    group_name: "crdt-native-scenario-subgroup"
    outputs:
      group_id: groupId

  - name: Mark subgroup as Open
    type: set_subgroup_visibility
    node: app-migration-crdt-1
    group_id: "{{group_id}}"
    visibility: open

  - name: Create context in subgroup on node 1 (v1)
    type: create_context
    node: app-migration-crdt-1
    application_id: "{{app_v1}}"
    group_id: "{{group_id}}"
    outputs:
      ctx_id: contextId

  # Phase 3: Invite node 2 to namespace; materialise subgroup + context.
  - name: Create namespace invitation for node 2
    type: create_namespace_invitation
    node: app-migration-crdt-1
    namespace_id: "{{namespace_id}}"
    outputs:
      namespace_invitation: invitation

  - name: Wait for subgroup visibility + context-registered ops to gossip
    type: wait
    seconds: 10

  - name: Node 2 joins namespace
    type: join_namespace
    node: app-migration-crdt-2
    namespace_id: "{{namespace_id}}"
    invitation: "{{namespace_invitation}}"

  - name: Node 2 materialises subgroup membership via inheritance
    type: join_subgroup_inheritance
    node: app-migration-crdt-2
    group_id: "{{group_id}}"

  - name: Node 2 joins the context
    type: join_context
    node: app-migration-crdt-2
    context_id: "{{ctx_id}}"

  # Phase 4: Write v1 state on node 1, wait for node 2 to catch up.
  - name: Write v1 title
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: set_title
    args:
      title: "crdt-scenario-doc"

  - name: Write item to v1 map
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: set_item
    args:
      key: "k1"
      value: "v1"

  - name: Wait for v1 state to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-crdt-1
      - app-migration-crdt-2
    timeout: 90
    trigger_sync: true

  - name: Sanity-check v1 state shape on node 1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v1_schema: result

  - name: Assert v1 schema in place
    type: json_assert
    statements:
      - 'json_subset({{v1_schema}}, {"output": {"schema_version": "1.0.0", "title": "crdt-scenario-doc", "tag_count": 0}})'

  # Negative: v2-only method not yet callable under v1.
  - name: Negative — push_tag is not exported by v1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: push_tag
    args:
      tag: "should-fail-pre-upgrade"
    expected_failure: true

  - name: Set upgrade policy to coordinated
    type: update_group_settings
    node: app-migration-crdt-1
    group_id: "{{group_id}}"
    upgrade_policy: coordinated

  # Phase 5: Per-context upgrade on the subgroup (cascade=false default).
  - name: Upgrade subgroup v1 → v2 (per-context, not cascade)
    type: upgrade_group
    node: app-migration-crdt-1
    group_id: "{{group_id}}"
    target_application_id: "{{app_v2}}"
    migrate_method: migrate_v1_to_v2

  # Fixed wait, NOT wait_for_sync (see scenario 01 rationale).
  - name: Wait for upgrade + migration to apply + log flush
    type: wait
    seconds: 15

  - name: Assert migration handler ran end-to-end (node 1)
    type: assert_log_present
    nodes:
      - app-migration-crdt-1
    patterns:
      - "Executing migration"
      - "migrate_v1_to_v2"
      - "Migrated state written successfully"
    min_matches: 1

  - name: Read post-migration schema_info on node 1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node1: result

  - name: Read post-migration schema_info on node 2
    type: call
    node: app-migration-crdt-2
    context_id: "{{ctx_id}}"
    method: schema_info
    outputs:
      v2_schema_node2: result

  - name: Assert v2 schema on node 1 (CRDT-native field seeded empty, v1 data preserved)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node1}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_subset({{v2_schema_node1}}, {"output": {"title": "crdt-scenario-doc"}})'
      - 'json_subset({{v2_schema_node1}}, {"output": {"tag_count": 0}})'

  - name: Assert v2 schema on node 2 (same shape, proves migration reached node 2)
    type: json_assert
    statements:
      - 'json_subset({{v2_schema_node2}}, {"output": {"schema_version": "2.0.0"}})'
      - 'json_subset({{v2_schema_node2}}, {"output": {"title": "crdt-scenario-doc"}})'
      - 'json_subset({{v2_schema_node2}}, {"output": {"tag_count": 0}})'

  - name: Assert v1 item map preserved through migration (node 1)
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: get_item
    args:
      key: "k1"
    outputs:
      preserved_item: result

  - name: Assert preserved v1 item value
    type: json_assert
    statements:
      - 'json_equal({{preserved_item}}, {"output": "v1"})'

  # Phase 7d: v2-only setter on node 1 round-trips to node 2 via v2-only getter.
  - name: Push first tag (v2-only) on node 1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: push_tag
    args:
      tag: "first-tag"

  - name: Push second tag (v2-only) on node 1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: push_tag
    args:
      tag: "second-tag"

  - name: Wait for v2 tag writes to sync to node 2
    type: wait_for_sync
    context_id: "{{ctx_id}}"
    nodes:
      - app-migration-crdt-1
      - app-migration-crdt-2
    timeout: 60
    trigger_sync: true

  - name: Read tag_count after pushes on node 1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: tag_count
    outputs:
      tag_count_after_node1: result

  - name: Assert two tags present on node 1
    type: json_assert
    statements:
      - 'json_equal({{tag_count_after_node1}}, {"output": 2})'

  - name: Read first tag via get_tag(0) on node 1
    type: call
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    method: get_tag
    args:
      index: 0
    outputs:
      tag_zero_node1: result

  - name: Assert first tag value on node 1
    type: json_assert
    statements:
      - 'json_equal({{tag_zero_node1}}, {"output": "first-tag"})'

  - name: Read tag_count after pushes on node 2 (v2-only round-trip)
    type: call
    node: app-migration-crdt-2
    context_id: "{{ctx_id}}"
    method: tag_count
    outputs:
      tag_count_after_node2: result

  - name: Assert two tags reached node 2
    type: json_assert
    statements:
      - 'json_equal({{tag_count_after_node2}}, {"output": 2})'

  - name: Read first tag via get_tag(0) on node 2
    type: call
    node: app-migration-crdt-2
    context_id: "{{ctx_id}}"
    method: get_tag
    args:
      index: 0
    outputs:
      tag_zero_node2: result

  - name: Assert first tag value reached node 2
    type: json_assert
    statements:
      - 'json_equal({{tag_zero_node2}}, {"output": "first-tag"})'

  # Phase 8: Teardown.
  - name: Delete context
    type: delete_context
    node: app-migration-crdt-1
    context_id: "{{ctx_id}}"
    requester: "{{admin_key}}"

  - name: Delete subgroup
    type: delete_group
    node: app-migration-crdt-1
    group_id: "{{group_id}}"
    requester: "{{admin_key}}"

  - name: Delete namespace
    type: delete_namespace
    node: app-migration-crdt-1
    namespace_id: "{{namespace_id}}"
    requester: "{{admin_key}}"

  - name: Uninstall v1 on node 1
    type: uninstall_application
    node: app-migration-crdt-1
    application_id: "{{app_v1}}"

  - name: Uninstall v2 on node 1
    type: uninstall_application
    node: app-migration-crdt-1
    application_id: "{{app_v2}}"

stop_all_nodes: false
